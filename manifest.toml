#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "vantage"
name = "Vantage"
description.en = "Self-hosted Fediverse moderation console — sign in with your instance, transparent heuristic risk scoring"
description.fr = "Console de modération Fediverse auto-hébergée — connexion via votre instance, score de risque heuristique transparent"

# Tracks the hosted server line. `~ynhN` is the packaging revision.
version = "0.1.4~ynh13"

maintainers = ["Crazypedia"]

[upstream]
license = "MIT"
# Private upstream (fediDash / Vantage) — this package is for self-hosting only
# and is not submitted to the YunoHost app catalog. The deployable server bundle
# is vendored under sources/ by `npm run pack` (scripts/pack.mjs).

[integration]
yunohost = ">= 12.0.0"
helpers_version = "2.1"
architectures = "all"          # pure-JS, zero native deps
multi_instance = false
ldap = "not_relevant"
# Vantage authenticates users against their OWN instance (OAuth/MiAuth) and gates
# on moderator role, so it runs public by default — mods log in from anywhere.
# The instance allow-list + role rejection are the access controls. YunoHost SSO
# can be layered on as an optional OUTER gate (set sso = true and pick a group
# below) if you'd rather only portal users even reach the login screen.
# NOTE: this must be a bare TOML boolean, not a quoted string — the manifest
# v2 schema only accepts `true`/`false` or the literal string "not_relevant"
# (like `ldap` above); a quoted "false" fails schema validation.
sso = false
disk = "50M"
ram.build = "50M"
ram.runtime = "128M"

[install]
    [install.domain]
    type = "domain"

    # The server serves its routes at the origin root, so Vantage needs its own
    # (sub)domain — e.g. vantage.example.org — not a subpath. Keep this at "/".
    [install.path]
    type = "path"
    default = "/"

    [install.init_main_permission]
    ask.en = "Who can reach Vantage"
    ask.fr = "Qui peut accéder à Vantage"
    type = "group"
    default = "visitors"
    help.en = "Default 'visitors' (public): SSO is off and users authenticate by signing in with their own instance; only moderators are admitted, and the instance allow-list below narrows it further. Choose 'all_users' or a group to add YunoHost SSO as an outer gate (also set sso = \"true\")."
    help.fr = "Par défaut « visitors » (public) : le SSO est désactivé et les utilisateurs s'authentifient via leur propre instance ; seuls les modérateurs sont admis, et la liste blanche ci-dessous restreint davantage. Choisissez « all_users » ou un groupe pour ajouter le SSO YunoHost comme barrière externe (mettez aussi sso = \"true\")."

    [install.allowed_instances]
    ask.en = "Allowed instance domains (comma-separated, optional)"
    ask.fr = "Domaines d'instance autorisés (séparés par des virgules, optionnel)"
    type = "string"
    optional = true
    default = ""
    example = "mypocketpals.online, another.instance"
    help.en = "When set, only logins from these instance domains are accepted. Strongly recommended — it also protects your shared OSINT API quotas. Leave empty to accept any instance."
    help.fr = "Si renseigné, seules les connexions depuis ces domaines d'instance sont acceptées. Fortement recommandé — protège aussi vos quotas d'API OSINT partagés. Laissez vide pour accepter n'importe quelle instance."

    [install.seed_admin_host]
    ask.en = "Global Admin instance (required)"
    ask.fr = "Instance de l'administrateur global (obligatoire)"
    type = "string"
    example = "mypocketpals.online"
    help.en = "The instance domain your first Global Admin will sign in from. The FIRST moderator who logs in to Vantage from this instance becomes the Global Admin — the one person who can later manage the allow-list, deployment-wide OSINT keys, and additional approved admins from inside Vantage. One-shot: it only matters until that first claim happens."
    help.fr = "Le domaine de l'instance depuis laquelle votre premier administrateur global se connectera. Le PREMIER modérateur qui se connecte à Vantage depuis cette instance devient l'administrateur global — la personne qui pourra ensuite gérer la liste blanche, les clés OSINT partagées au niveau du déploiement, et les administrateurs supplémentaires approuvés, depuis Vantage. Ponctuel : ne compte que jusqu'à cette première revendication."

[resources]
    [resources.system_user]

    [resources.install_dir]

    # SQLite database + generated master.key live here (survives upgrades, backed up).
    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
