#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/config_panel.v1.schema.json

version = "1.0"

[main]
name.en = "Configuration"
name.fr = "Configuration"

    [main.access]
    name.en = "Access control"
    name.fr = "Contrôle d'accès"

        [main.access.allowed_instances]
        ask.en = "Allowed instance domains"
        ask.fr = "Domaines d'instance autorisés"
        type = "string"
        optional = true
        # No `bind` = bound to the app setting of the same name (the default).
        # NOTE a bare `bind = "allowed_instances"` is NOT that: helpers2.1
        # parses a plain bind as key:file and tried to read a literal file
        # named "allowed_instances", which crashed the panel on load.
        # scripts/config regenerates the .env on apply and restarts the service.
        example = "mypocketpals.online, pagan.plus, gulp.cafe"
        help.en = "Comma-separated instance domains allowed to sign in. Leave empty to accept any instance. Recommended — it also protects your shared OSINT API quotas. Saving restarts Vantage."
        help.fr = "Domaines d'instance autorisés à se connecter, séparés par des virgules. Laissez vide pour accepter n'importe quelle instance. Recommandé — protège aussi vos quotas d'API OSINT partagés. L'enregistrement redémarre Vantage."

        [main.access.seed_admin_host]
        ask.en = "Global Admin instance"
        ask.fr = "Instance de l'administrateur global"
        type = "string"
        optional = true
        # No `bind` = bound to the app setting of the same name (see the
        # allowed_instances field above for the helpers2.1 gotcha this avoids).
        example = "mypocketpals.online"
        help.en = "Only takes effect until a Global Admin has been claimed (check inside Vantage — Global Admin panel). The first moderator who signs in from this instance becomes the Global Admin; once claimed, editing this field has no further effect — manage admins from the panel instead. Clearing it disables the bootstrap (nobody new can claim the role)."
        help.fr = "Ne prend effet que tant qu'aucun administrateur global n'a été revendiqué (vérifiez dans Vantage — panneau Administrateur global). Le premier modérateur qui se connecte depuis cette instance devient l'administrateur global ; une fois revendiqué, modifier ce champ n'a plus d'effet — gérez les administrateurs depuis le panneau. Le vider désactive l'amorçage (personne de nouveau ne peut revendiquer le rôle)."

        [main.access.public_url]
        ask.en = "Public URL"
        # "display_text" is not a valid config_panel.v1 type (the panel fails
        # schema validation and the WHOLE config tab errors out in the YunoHost
        # admin UI, not just this field) — "markdown" is the closest read-only
        # equivalent. Fixed upstream 2026-07-21 (was only patched downstream in
        # the vantage_ynh deploy repo, which gets overwritten by every repack).
        type = "markdown"
        # Read-only reminder; the OAuth/MiAuth callbacks are pinned to this.
        bind = "null"
        help.en = "Vantage is reachable at its install domain. Changing the domain requires reinstalling on the new (sub)domain."
