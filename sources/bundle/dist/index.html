/* ====== getting-started tour ====== */
.tour-launch{display:flex; align-items:center; gap:8px; width:100%; margin-bottom:9px; padding:7px 10px;
  background:var(--accent-bg); border:1px solid var(--accent-d); border-radius:var(--r-s); cursor:pointer;
  color:var(--accent); font-family:var(--sans); font-size:12.5px; font-weight:500; transition:.12s}
.tour-launch:hover{background:var(--accent); color:var(--bg)}
.tour-launch-q{width:16px; height:16px; border-radius:50%; border:1.5px solid currentColor; display:grid; place-items:center; font-size:10px; font-weight:700; flex:none}
.tour-launch-l{flex:1; text-align:left}
.tour-scrim{position:fixed; inset:0; background:oklch(0.1 0.01 256/.72); backdrop-filter:blur(4px);
  display:grid; place-items:center; z-index:55; padding:24px; animation:tourfade .18s ease}
@keyframes tourfade{from{opacity:0}to{opacity:1}}
@keyframes tourpop{from{opacity:0; transform:translateY(10px)}to{opacity:1; transform:none}}
.tour{position:relative; width:min(660px,100%); max-height:90vh; overflow-y:auto; background:var(--bg-2);
  border:1px solid var(--line); border-radius:16px; box-shadow:0 30px 70px -24px oklch(0 0 0/.75); padding:26px 28px 20px; animation:tourpop .22s cubic-bezier(.2,.7,.2,1)}
.tour-x{position:absolute; top:16px; right:16px; background:none; border:none; color:var(--txt-3); font-size:15px; cursor:pointer; padding:4px}
.tour-x:hover{color:var(--txt)}
.tour-head{display:flex; align-items:center; gap:14px; margin-bottom:16px; padding-right:28px}
.tour-icon{width:44px; height:44px; border-radius:12px; flex:none; display:grid; place-items:center; font-size:21px;
  background:var(--accent-bg); color:var(--accent); box-shadow:0 0 0 1px var(--accent-d) inset}
.tour-kicker{font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--accent)}
.tour-title{font-size:20px; font-weight:700; letter-spacing:-.01em; margin-top:2px}
.tour-body{display:flex; flex-direction:column; gap:14px}
.tour-lede{font-size:13.5px; line-height:1.6; color:var(--txt-2); text-wrap:pretty}
.tour-blocks{display:flex; flex-direction:column; gap:11px}
.tour-callout{background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:var(--r); padding:12px 14px; display:flex; flex-direction:column; gap:4px}
.tour-callout b{font-size:12.5px; color:var(--txt)}
.tour-callout span{font-size:12px; line-height:1.55; color:var(--txt-2); text-wrap:pretty}
.tour-callout-accent{border-color:var(--accent-d); background:var(--accent-bg)}
.tour-callout-accent b{color:var(--accent)}
.tour-callout-ok{border-color:oklch(0.76 0.13 158/.3); background:var(--ok-bg)}
.tour-callout-ok b{color:var(--ok)}
.tour-define{background:var(--bg-inset); border:1px solid var(--line-soft); border-left:2px solid var(--accent-d); border-radius:var(--r); padding:11px 14px; display:flex; flex-direction:column; gap:4px}
.tour-define-term{font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--txt-3)}

.tour-grid2{display:grid; grid-template-columns:1fr 1fr; gap:11px}
.tour-mini{background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:var(--r); padding:12px 14px}
.tour-mini-h{display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; margin-bottom:8px}
.tour-steps{list-style:none; display:flex; flex-direction:column; gap:6px; counter-reset:ts}
.tour-steps li{position:relative; padding-left:22px; font-size:11.5px; line-height:1.5; color:var(--txt-2); counter-increment:ts}
.tour-steps li::before{content:counter(ts); position:absolute; left:0; top:1px; width:15px; height:15px; border-radius:50%; background:var(--bg-3); color:var(--txt-3); font-size:9px; font-weight:700;  display:grid; place-items:center}
.tour-bullets{list-style:none; display:flex; flex-direction:column; gap:8px}
.tour-perms{list-style:none; margin:5px 0 2px; padding-left:0; display:flex; flex-direction:column; gap:3px}
.tour-perms li{position:relative; padding-left:11px; font-size:10.5px; line-height:1.45; color:var(--txt-3); counter-increment:none}
.tour-perms li::before{content:"·"; position:absolute; left:2px; top:0; color:var(--txt-3); background:none; width:auto; height:auto; font-weight:700}
.tour-bullets li{position:relative; padding-left:18px; font-size:12.5px; line-height:1.55; color:var(--txt-2); text-wrap:pretty}
.tour-bullets li::before{content:""; position:absolute; left:3px; top:8px; width:6px; height:6px; border-radius:50%; background:var(--accent)}
.tour-note{font-size:11.5px; line-height:1.55; color:var(--txt-3); background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:var(--r-s); padding:9px 12px; text-wrap:pretty}
.tour code{font-family:var(--mono); font-size:11px; background:var(--bg); padding:1px 5px; border-radius:4px; color:var(--txt-2)}
.tour-keys{display:flex; flex-wrap:wrap; align-items:center; gap:8px 16px; background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:var(--r-s); padding:10px 13px; font-size:11px; color:var(--txt-3)}
.tour-keys-l{font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--txt-3)}
.tour-cta{align-self:flex-start; display:inline-flex; align-items:center; gap:8px; font-family:var(--sans); font-size:13px; font-weight:600; background:var(--accent); color:var(--bg); border:none; border-radius:8px; padding:10px 16px; cursor:pointer; transition:.12s; margin-top:2px}
.tour-cta:hover{transform:translateY(-1px); box-shadow:0 6px 16px -6px var(--accent)}
.tour-cta-arrow{font-size:14px}
.tour-foot{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-top:18px; padding-top:15px; border-top:1px solid var(--line-soft)}

.tour-dot-done{background:var(--accent-d)}

.tour-back{background:var(--bg-3); border:1px solid var(--line); color:var(--txt-2); font-family:var(--sans); font-size:12.5px; font-weight:500; border-radius:7px; padding:8px 15px; cursor:pointer}
.tour-back:hover{color:var(--txt)}
.tour-next{background:var(--accent); border:none; color:var(--bg); font-family:var(--sans); font-size:12.5px; font-weight:600; border-radius:7px; padding:8px 18px; cursor:pointer; transition:.12s}

@media (max-width:640px){ .tour-grid2{grid-template-columns:1fr} }

.cmp-card-notes{font-size:11px; color:var(--txt-3); margin-top:3px; line-height:1.45}

.cmp-icon{background:none; border:1px solid var(--line-soft); border-radius:6px; color:var(--txt-3); cursor:pointer; width:28px; height:28px; font-size:12px; display:grid; place-items:center; transition:.12s}

.tone-ok.abuse-verdict{color:var(--ok)} .tone-warn.abuse-verdict{color:var(--warn)} .tone-bad.abuse-verdict{color:var(--bad)}

<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — debug + error logger
   ------------------------------------------------------------
   A single, dependency-free logging spine so that nothing fails
   silently. Provides:
     • a rolling in-memory ring buffer (last 300 events)
     • level-gated console output (debug/info muted unless the
       operator turns Debug mode on; warn/error always print)
     • a subscribe() hook so the Diagnostics panel can render the
       live log
     • global window.onerror + unhandledrejection handlers so an
       uncaught render/async error is captured instead of vanishing
   Persists the Debug-mode flag in localStorage ("reef.debug").
   Plain JS. Exposes window.ReefLog.
   ============================================================ */
(function () {
  const LS_KEY = "reef.debug";
  const MAX = 300;
  const buf = [];
  const subs = new Set();

  let debug = false;
  try { debug = localStorage.getItem(LS_KEY) === "1"; } catch (e) {}

  const LEVELS = { debug: 10, info: 20, warn: 30, error: 40 };

  function safe(d) {
    if (d == null) return undefined;
    if (typeof d === "string") return d;
    try { return JSON.parse(JSON.stringify(d)); } catch (e) { return String(d); }
  }

  function emit(level, scope, msg, data) {
    const entry = {
      at: Date.now(),
      level: level,
      scope: scope || "app",
      msg: String(msg == null ? "" : (msg.message || msg)),
      data: data != null ? safe(data) : undefined,
    };
    buf.push(entry);
    while (buf.length > MAX) buf.shift();

    // Console: errors & warnings always surface; debug/info only in Debug mode.
    if (debug || level === "error" || level === "warn") {
      const fn = level === "error" ? "error" : level === "warn" ? "warn" : "log";
      try { (console[fn] || console.log).call(console, "[Vantage:" + entry.scope + "] " + entry.msg, data != null ? data : ""); } catch (e) {}
    }
    subs.forEach((f) => { try { f(entry, buf); } catch (e) {} });
    return entry;
  }

  const api = {
    debug: function (scope, msg, data) { return emit("debug", scope, msg, data); },
    info:  function (scope, msg, data) { return emit("info", scope, msg, data); },
    warn:  function (scope, msg, data) { return emit("warn", scope, msg, data); },
    error: function (scope, msg, data) { return emit("error", scope, msg, data); },
    entries: function () { return buf.slice(); },
    clear: function () { buf.length = 0; subs.forEach((f) => { try { f(null, buf); } catch (e) {} }); emit("info", "log", "Log cleared"); },
    subscribe: function (f) { subs.add(f); return function () { subs.delete(f); }; },
    setDebug: function (on) {
      debug = !!on;
      try { localStorage.setItem(LS_KEY, on ? "1" : "0"); } catch (e) {}
      emit("info", "log", "Debug logging " + (on ? "ENABLED — verbose console output is on" : "disabled"));
    },
    isDebug: function () { return debug; },
    LEVELS: LEVELS,
  };

  window.ReefLog = api;

  // ---- global safety nets: nothing should vanish silently ----
  window.addEventListener("error", function (e) {
    if (e && e.message) api.error("window", e.message, { src: e.filename || "", line: e.lineno || 0, col: e.colno || 0 });
  });
  window.addEventListener("unhandledrejection", function (e) {
    const r = e && e.reason;
    const msg = (r && (r.message || r)) || "Unhandled promise rejection";
    api.error("promise", msg, r && r.stack ? { stack: String(r.stack).slice(0, 500) } : undefined);
  });

  emit("info", "log", "Vantage logger ready" + (debug ? " (debug mode on)" : ""));
})();

</script>
<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — shared low-level utilities (window.ReefUtil)
   Tiny helpers that several engines reimplemented independently:
   CORS-proxy URL building, score clamping, id generation, and
   JSON-backed localStorage read/write. Loaded right after logger
   so lsWrite can report storage failures through ReefLog.
   Plain JS. Exposes window.ReefUtil.
   ============================================================ */
(function () {
  // A CORS proxy is a prefix the target URL is appended to: either a
  // "…?url=" query form (target URL-encoded) or a path-prefix form.
  function withProxy(proxy, url) {
    if (!proxy) return url;
    // query form ("…?url=" or a bare "…?") gets the target URL-encoded;
    // otherwise treat the proxy as a path prefix (one trailing slash).
    return (proxy.includes("=") || proxy.endsWith("?")) ? proxy + encodeURIComponent(url) : proxy.replace(/\/?$/, "/") + url;
  }

  // round + bound a score into [lo, hi] (defaults to the 0–100 risk scale)
  function clamp(n, lo, hi) {
    lo = lo != null ? lo : 0; hi = hi != null ? hi : 100;
    return Math.max(lo, Math.min(hi, Math.round(n)));
  }

  // short random id with a caller-supplied prefix (e.g. "cmp", "dl", "c")
  function uid(prefix) { return (prefix || "") + Math.random().toString(36).slice(2, 9); }

  // JSON-backed localStorage helpers. lsRead returns `fallback` on miss or
  // parse error; lsWrite swallows quota/serialization failures and logs them
  // under `label` (the owning module) so a full store never throws mid-render.
  function lsRead(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch (e) { return fallback; }
  }
  function lsWrite(key, value, label) {
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch (e) { if (window.ReefLog) window.ReefLog.error(label || "store", "couldn't write '" + key + "' (storage full?)", e && e.message); }
  }

  window.ReefUtil = { withProxy, clamp, uid, lsRead, lsWrite };
})();

</script>
<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — hosted-server session bridge
   Detects whether this UI is being served by the Vantage server
   (the hosted deployment) or is running standalone (the demo HTML
   file / any static host). In server mode the app authenticates by
   "signing in with your instance" and all instance calls go through
   the same-origin gateway (see api.js); the browser never holds a
   token. Standalone mode is unchanged (pasted tokens, direct fetch).
   Plain JS. Exposes window.ReefServer.
   ============================================================ */
(function () {
  // mode: "unknown" until init() resolves, then "server" | "standalone".
  let state = { mode: "unknown", session: null, csrf: null };

  async function init() {
    try {
      const r = await fetch("/auth/me", { credentials: "same-origin", headers: { Accept: "application/json" } });
      const ct = r.headers.get("content-type") || "";
      // The Vantage server answers /auth/me with JSON — 200 (identity) when
      // signed in, 401 ({error}) when not. Anything else (a 404 HTML page, a
      // non-JSON body, a network failure on file://) means we're not being
      // served by the server: fall back to standalone.
      if (!ct.includes("application/json")) { state = { mode: "standalone", session: null, csrf: null }; return state; }
      if (r.status === 200) {
        const me = await r.json();
        state = { mode: "server", session: me, csrf: me.csrf };
      } else if (r.status === 401) {
        state = { mode: "server", session: null, csrf: null };
      } else {
        state = { mode: "standalone", session: null, csrf: null };
      }
    } catch (e) {
      state = { mode: "standalone", session: null, csrf: null };
    }
    return state;
  }

  // Start the "sign in with your instance" flow: hand off to the server, which
  // detects the software, runs OAuth/MiAuth, and redirects back to "/".
  // opts.link = "add another server": the callback attaches the new instance
  // account to the signed-in principal instead of starting a new session.
  function login(host, opts) {
    const h = (host || "").trim();
    if (!h) return;
    window.location.href = "/auth/login?host=" + encodeURIComponent(h) + (opts && opts.link ? "&link=1" : "");
  }

  // Detach a linked connection (not the one signed in with), then reload so
  // the app re-seeds its connection list from /auth/me.
  async function unlink(host) {
    const r = await fetch("/auth/unlink", {
      method: "POST", credentials: "same-origin",
      headers: { "Content-Type": "application/json", "X-Vantage-CSRF": state.csrf || "" },
      body: JSON.stringify({ host }),
    });
    if (!r.ok) {
      let m = "HTTP " + r.status;
      try { m = (await r.json()).error || m; } catch (e) {}
      throw new Error(m);
    }
    window.location.reload();
  }

  async function logout() {
    try {
      await fetch("/auth/logout", { method: "POST", credentials: "same-origin", headers: { "X-Vantage-CSRF": state.csrf || "" } });
    } catch (e) { /* fall through to reload regardless */ }
    window.location.href = "/";
  }

  window.ReefServer = {
    init,
    login,
    logout,
    unlink,
    get mode() { return state.mode; },
    get session() { return state.session; },
    get csrf() { return state.csrf; },
  };
})();

</script>
<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — mock data layer  (DEMO ONLY — none of this is live)
   ------------------------------------------------------------
   Synthetic account + report data was removed from this file.
   It has been exported as:
     • vantage-sample-misp.json  — MISP event collection (8 accounts + 6 reports)
     • vantage-sample-stix.json  — STIX 2.1 bundle (same dataset)
   Import either file via Denylists → Paste / Upload to load the
   synthetic IoC indicators, or use them in MISP / TheHive / etc.
   The queue starts empty; connect a live server to pull real data.

   What demo provided that LIVE data does NOT (still relevant for
   understanding live refinement gaps):
     • acc.osint  — the full pre-baked OSINT card set. Live accounts
       use the real-lookup engine (enrich.js) instead.
     • report.history  — toxicity trend, top tags/domains, reach,
       prior reports/actions. Live reports zero/empty these.
     • report.categoryType / ruleIds / abcLabels / reporterStats —
       added by enrichReportMeta(); live reports lack them.
   Plain JS. Exposes window.REEF_DATA.
   ============================================================ */
(function () {

<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — persistence (connections + settings) in localStorage
   Plain JS. Exposes window.ReefStore.
   NOTE: tokens are stored locally on this device per the tool's
   single-trusted-device model. For a multi-user deploy, move
   tokens behind a server-side vault.
   ============================================================ */
(function () {
  const KEY = "reef.state.v1";
  const DEFAULTS = {
    connections: [],          // [{id,label,host,baseUrl,software,version,token,role,identity,status,isDefault,error}]
    settings: { mode: "demo", showDemo: true, proxy: "", keys: { abuseipdb: "", virustotal: "", ipqs: "" }, sfs: { region: "auto", emailhash: false, expire: 0, tor: "default", ignore: {} }, weights: {}, affirmTerms: {} },
  };

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) { const fresh = structuredClone(DEFAULTS); seed(fresh); return fresh; }
      const parsed = JSON.parse(raw);
      const state = {
        connections: Array.isArray(parsed.connections) ? parsed.connections : [],
        settings: Object.assign({}, DEFAULTS.settings, parsed.settings || {}),
      };
      state.settings.keys = Object.assign({}, DEFAULTS.settings.keys, state.settings.keys || {});
      state.settings.sfs = Object.assign({}, DEFAULTS.settings.sfs, state.settings.sfs || {});
      state.settings.sfs.ignore = Object.assign({}, (DEFAULTS.settings.sfs.ignore || {}), (state.settings.sfs.ignore || {}));
      seed(state);
      return state;
    } catch (e) { if (window.ReefLog) window.ReefLog.warn("store", "settings unreadable — starting from defaults", e && e.message); const fresh = structuredClone(DEFAULTS); seed(fresh); return fresh; }
  }

  // merge seeded keys (only fills blanks; never overwrites a user-set key).
  // Tracks seeded keys individually so adding a new seed key later still merges.
  function seed(state) {
    const s = window.REEF_SEED;
    if (!s || !s.keys) return;
    state.settings.keys = state.settings.keys || {};
    state.settings._seededKeys = state.settings._seededKeys || {};
    for (const k in s.keys) {
      if (s.keys[k] && !state.settings.keys[k] && !state.settings._seededKeys[k]) {
        state.settings.keys[k] = s.keys[k];
        state.settings._seededKeys[k] = true;
      }
    }
  }

  function save(state) {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) { if (window.ReefLog) window.ReefLog.error("store", "couldn't persist settings (storage full or blocked?)", e && e.message); }
  }

  function uid() { return window.ReefUtil.uid("c"); }

  // deterministic accent hue for a host string
  function hostColor(host) {
    let h = 0;
    for (let i = 0; i < host.length; i++) h = (h * 31 + host.charCodeAt(i)) % 360;
    return `oklch(0.72 0.12 ${h})`;
  }

  function normalizeBaseUrl(input) {
    let u = (input || "").trim();
    if (!u) return null;
    if (!/^https?:\/\//i.test(u)) u = "https://" + u;
    try { const p = new URL(u); return p.origin; } catch (e) { return null; }
  }

  window.ReefStore = { load, save, uid, hostColor, normalizeBaseUrl, DEFAULTS };
})();

<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — persistent OSINT cache + history / correlation store
   Goal: never re-query a paid/limited API while data is fresh.
   - IP reputation     : fresh 30 days
   - Email domain rep  : fresh 120 days (~4 months)
   - VirusTotal domain : fresh 120 days
   - DNS/ASN/RDAP      : fresh 30 days
   Also records time-series snapshots (so we can graph drift) and
   an IP -> accounts correlation index (friend/foe pattern spotting).
   Plain JS. Exposes window.ReefCache.
   ============================================================ */
(function () {
  const CACHE_KEY = "reef.cache.v1";
  const HIST_KEY = "reef.history.v1";
  const CORR_KEY = "reef.corr.v1";
  const DAY = 86400000;

  // default freshness windows (ms) per cache namespace
  const TTL = {
    ip: 30 * DAY,
    domain: 120 * DAY,
    vt: 120 * DAY,
    abuseipdb: 30 * DAY,
    ipqs: 30 * DAY,
    username: 14 * DAY,
  };

  // In-memory mirror of the three localStorage stores. cache.js is the sole
  // writer of these keys (within a tab), so once a key is read we keep the
  // parsed object live and write through on mutation — turning the old
  // "JSON.parse the whole store on every get/set/snapshot" into a one-time
  // parse per key. Mutators here read an object and write it straight back,
  // so the live reference and localStorage never diverge.
  const _mem = {};
  function readJSON(k, fb) {
    if (!(k in _mem)) _mem[k] = window.ReefUtil.lsRead(k, fb);
    return _mem[k];
  }
  function writeJSON(k, v) { _mem[k] = v; window.ReefUtil.lsWrite(k, v, "cache"); }

  // ---- cache ----
  function cacheKey(ns, id) { return ns + ":" + id; }
  function get(ns, id, ttlOverride) {
    if (!id) return null;
    const all = readJSON(CACHE_KEY, {});
    const e = all[cacheKey(ns, id)];
    if (!e) return null;
    const ttl = ttlOverride != null ? ttlOverride : (TTL[ns] || 30 * DAY);
    const age = Date.now() - e.at;
    if (age > ttl) return { ...e, stale: true, ageDays: Math.floor(age / DAY) };
    return { ...e, stale: false, ageDays: Math.floor(age / DAY) };
  }
  function set(ns, id, value) {
    if (!id) return;
    const all = readJSON(CACHE_KEY, {});
    all[cacheKey(ns, id)] = { value, at: Date.now() };
    writeJSON(CACHE_KEY, all);
    snapshot(ns, id, value);
  }
  // fetch-through helper: return cached fresh value, else run fn() and cache it
  async function through(ns, id, fn, opts) {
    opts = opts || {};
    const hit = get(ns, id, opts.ttl);
    if (hit && !hit.stale && !opts.force) return { value: hit.value, cached: true, ageDays: hit.ageDays, at: hit.at };
    const value = await fn();
    if (value != null && !(value && value._err)) { set(ns, id, value); return { value, cached: false, ageDays: 0, at: Date.now() }; }
    // on error, fall back to stale cache if present
    if (hit) return { value: hit.value, cached: true, stale: true, ageDays: hit.ageDays, at: hit.at, error: value && value._err };
    return { value, cached: false, error: value && value._err };
  }

  // ---- time-series history (for drift graphs) ----
  // stores a compact numeric snapshot per (ns,id) over time
  function metricOf(ns, value) {
    if (!value || typeof value !== "object") return null;
    if (ns === "abuseipdb") return value.score;
    if (ns === "ipqs") return value.fraud;
    if (ns === "vt") return value.malicious;
    if (ns === "domain") return value.domainAgeDays != null ? Math.round(value.domainAgeDays / 30) : null;
    return null;
  }
  function snapshot(ns, id, value) {
    const m = metricOf(ns, value);
    if (m == null) return;
    const all = readJSON(HIST_KEY, {});
    const k = cacheKey(ns, id);
    const arr = all[k] || [];
    const last = arr[arr.length - 1];
    // only record if changed or >7d since last point
    if (!last || last.v !== m || Date.now() - last.t > 7 * DAY) {
      arr.push({ t: Date.now(), v: m });
      while (arr.length > 40) arr.shift();
      all[k] = arr;
      writeJSON(HIST_KEY, all);
    }
  }
  function history(ns, id) { return readJSON(HIST_KEY, {})[cacheKey(ns, id)] || []; }

  // ---- IP <-> account correlation ----
  // records which accounts have been seen on which IP, with last-seen + verdict
  function recordSighting(ip, acc) {
    if (!ip || !acc) return;
    const all = readJSON(CORR_KEY, {});
    const rec = all[ip] || { ip, accounts: {} };
    rec.accounts[acc.id || acc.username] = {
      username: acc.username, instance: acc.instance,
      tier: acc.tier, risk: acc.risk,
      resolution: acc._resolution || null, at: Date.now(),
    };
    all[ip] = rec;
    writeJSON(CORR_KEY, all);
  }
  function correlateIP(ip, exceptId) {
    if (!ip) return [];
    const rec = readJSON(CORR_KEY, {})[ip];
    if (!rec) return [];
    return Object.entries(rec.accounts)
      .filter(([id]) => id !== exceptId)
      .map(([id, v]) => ({ id, ...v }))
      .sort((a, b) => b.at - a.at);
  }
  function allSightings(ip) {
    const rec = readJSON(CORR_KEY, {})[ip];
    return rec ? Object.keys(rec.accounts).length : 0;
  }

  // ---- generic string-keyed correlation (actor handle / host / domain) ----
  // Report enrichment reuses the same on-device sighting graph as IP correlation
  // but with prefixed keys ("actor:@u@h", "host:h", "domain:d") so they never
  // collide with raw IP keys. Lets us answer "have I reviewed this handle /
  // instance / linked-domain before?" cache-first, no network.
  function recordSeen(key, who) { recordSighting(key, who); }
  function correlate(key, exceptId) { return correlateIP(key, exceptId); }

  function stats() {
    const c = readJSON(CACHE_KEY, {});
    const corr = readJSON(CORR_KEY, {});
    const byNs = {};
    Object.keys(c).forEach((k) => { const ns = k.split(":")[0]; byNs[ns] = (byNs[ns] || 0) + 1; });
    return { entries: Object.keys(c).length, byNs, ips: Object.keys(corr).length };
  }
  function clear() { writeJSON(CACHE_KEY, {}); writeJSON(HIST_KEY, {}); }
  function clearAll() { clear(); writeJSON(CORR_KEY, {}); }

  // full database dump (raw localStorage stores) for export
  function dump() { return { cache: readJSON(CACHE_KEY, {}), history: readJSON(HIST_KEY, {}), corr: readJSON(CORR_KEY, {}), at: Date.now() }; }

  window.ReefCache = { get, set, through, history, snapshot, recordSighting, correlateIP, recordSeen, correlate, allSightings, stats, clear, clearAll, dump, TTL, DAY };
})();

</script>
<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — API usage / quota tracker (window.ReefUsage)
   ------------------------------------------------------------
   Two kinds of number, kept honest and clearly separated:
     • LOCAL TALLY  — how many real network lookups Vantage fired
       from THIS browser today, per service. Incremented by enrich.js
       on every actual call (cache hits don't count). Resets at UTC
       midnight. This is the only counter most APIs allow, because
       they don't report remaining quota in their responses.
     • SERVER QUOTA — authoritative remaining/limit when the API
       actually reports it. Of our sources only AbuseIPDB does, via
       X-RateLimit-Remaining / X-RateLimit-Limit / X-RateLimit-Reset
       response headers (and only when the CORS proxy forwards them).
   services.jsx renders whichever it has, with a tooltip that says
   which kind it is. Persists in localStorage; survives reload.
   Plain JS. Exposes window.ReefUsage.
   ============================================================ */
(function () {
  const KEY = "reef.usage.v1";
  function today() { return new Date().toISOString().slice(0, 10); }
  function read() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { return {}; } }
  function write(v) { try { localStorage.setItem(KEY, JSON.stringify(v)); } catch (e) {} }

  const subs = new Set();
  function subscribe(fn) { subs.add(fn); return () => subs.delete(fn); }
  function notify() { subs.forEach((f) => { try { f(); } catch (e) {} }); }

  // get-or-roll: returns the record for `svc`, resetting the daily count if the
  // stored day is stale (server quota is kept across the roll — it's authoritative).
  function roll(all, svc) {
    let r = all[svc];
    if (!r || r.day !== today()) r = { day: today(), count: 0, server: (r && r.server) || null };
    all[svc] = r;
    return r;
  }

  function tally(svc) {
    if (!svc) return;
    const all = read(); const r = roll(all, svc);
    r.count = (r.count || 0) + 1;
    write(all); notify();
  }
  // q: { remaining, limit, reset } — any subset; numbers (reset may be a header string)
  function setServer(svc, q) {
    if (!svc || !q) return;
    const all = read(); const r = roll(all, svc);
    if (q.remaining != null || q.limit != null) {
      r.server = {
        remaining: q.remaining != null ? Number(q.remaining) : (r.server && r.server.remaining),
        limit: q.limit != null ? Number(q.limit) : (r.server && r.server.limit),
        reset: q.reset != null ? q.reset : (r.server && r.server.reset),
        at: Date.now(),
      };
      write(all); notify();
    }
  }
  function get(svc) {
    const all = read(); const r = all[svc];
    if (!r || r.day !== today()) return { count: 0, server: (r && r.server) || null };
    return { count: r.count || 0, server: r.server || null };
  }
  function reset(svc) { const all = read(); if (svc) delete all[svc]; else { for (const k in all) delete all[k]; } write(all); notify(); }

  window.ReefUsage = { tally, setServer, get, subscribe, reset };
})();

</script>
<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — denylist / blocklist store + matcher
   ------------------------------------------------------------
   Imports and normalizes shared blocklists so reports (and new
   signups) can be checked against known bad actors:
     • Mastodon domain-block CSV  — the format IFTAS DNI / CARIAD /
       AUD ship in (header: #domain,#severity,#reject_media,
       #reject_reports,#public_comment,#private_comment,#obfuscate)
     • Sharkey / Misskey host lists — bare host-per-line, a JSON
       array, or { blockedHosts:[…], silencedHosts:[…] }
     • Actor / Do-Not-Interact lists — @user@domain handles
   Everything is normalized to a flat entry list and indexed for
   fast host + handle matching (domain blocks also cover subdomains
   and every actor on that domain).
   Persists in localStorage. Plain JS. Exposes window.ReefDenylist.
   ============================================================ */
(function () {
  const KEY = "reef.denylists.v1";
  let _version = 0;
  let _index = null; // { domains: Map, actors: Map }

  // IFTAS + community sources (Mastodon-format CSV). Fetch may be CORS-blocked
  // from the browser — route via the proxy, or download + paste/upload.
  const IFTAS_PRESETS = [
    { name: "IFTAS Do Not Interact (DNI)", url: "https://about.iftas.org/wp-content/uploads/2025/10/iftas-dni-latest.csv", format: "mastodon-csv", note: "Curated, manually-reviewed domains recommended for defederation." },
    { name: "IFTAS Abandoned & Unmanaged (AUD)", url: "https://about.iftas.org/library/iftas-abandoned-and-unmanaged-domain-list/", format: "mastodon-csv", note: "Abandoned / unmanaged domains (SW-ISAC advisory)." },
  ];

  const FORMATS = [
    { id: "auto", label: "Auto-detect" },
    { id: "mastodon-csv", label: "Mastodon domain-block CSV" },
    { id: "sharkey-hosts", label: "Sharkey / Misskey host list" },
    { id: "actors", label: "Actor / DNI handle list" },
    { id: "misp", label: "MISP event / collection (JSON)" },
    { id: "stix", label: "STIX 2.1 bundle (JSON)" },
    { id: "fires", label: "FediMod FIRES dataset / changes (JSON)" },
  ];

  // Major mailbox providers + the base domains of their mail servers. These must
  // NEVER be block-able from the UI: blocking gmail.com (or its google.com MX, or
  // smtp.google.com) would wall off a huge share of legitimate signups. Protection
  // covers the From-domain AND the MX-host base, plus any subdomain of either.
  const PROTECTED = [
    // consumer / mailbox domains
    "gmail.com", "googlemail.com", "google.com", "outlook.com", "hotmail.com", "live.com", "msn.com",
    "office365.com", "microsoft.com", "yahoo.com", "ymail.com", "rocketmail.com", "aol.com",
    "icloud.com", "me.com", "mac.com", "apple.com", "proton.me", "protonmail.com", "protonmail.ch", "pm.me",
    "zoho.com", "zoho.eu", "yandex.com", "yandex.ru", "gmx.com", "gmx.net", "web.de", "mail.com",
    "fastmail.com", "hey.com", "tutanota.com", "tuta.com", "qq.com", "163.com", "126.com", "naver.com",
    // common MX-server base domains for the providers above
    "yahoodns.net", "pphosted.com", "messagingengine.com", "mimecast.com", "protection.outlook.com",
    "secureserver.net", "registrar-servers.com", "kundenserver.de", "ionos.com",
  ];
  // Admin-tunable overrides (Scoring → Admin controls), synced to window.__reefProtected
  // by app.jsx: { add:[domains the admin also wants protected], remove:[shipped domains to un-protect] }.
  function protectedList() {
    const ov = window.__reefProtected || {};
    const removed = (ov.remove || []).map((d) => cleanHost(d));
    const added = (ov.add || []).map((d) => cleanHost(d)).filter(Boolean);
    return PROTECTED.concat(added).filter((p) => removed.indexOf(p) < 0);
  }
  function isProtected(host) {
    const h = cleanHost(host);
    if (!h) return false;
    const list = protectedList();
    for (let i = 0; i < list.length; i++) { const p = list[i]; if (h === p || h.endsWith("." + p)) return true; }
    return false;
  }

  // ---------- helpers ----------
  function readJSON(fb) { return window.ReefUtil.lsRead(KEY, fb); }
  function writeJSON(v) { window.ReefUtil.lsWrite(KEY, v, "denylist"); _index = null; _version++; }
  function uid() { return window.ReefUtil.uid("dl"); }
  function cleanHost(h) {
    return String(h || "").trim().toLowerCase()
      .replace(/^@/, "").replace(/^https?:\/\//, "").replace(/\/.*$/, "").replace(/\.$/, "");
  }
  function normSeverity(s) {
    s = String(s || "").trim().toLowerCase();
    if (s === "suspend" || s === "block" || s === "reject" || s === "defederate") return "suspend";
    if (s === "silence" || s === "limit" || s === "warn") return "silence";
    if (s === "noop" || s === "" || s === "none") return "noop";
    return s;
  }

  // tiny CSV row splitter (handles quoted fields with commas / quotes)
  function csvRow(line) {
    const out = []; let cur = ""; let q = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (q) {
        if (c === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if (c === '"') q = false;
        else cur += c;
      } else if (c === '"') q = true;
      else if (c === ",") { out.push(cur); cur = ""; }
      else cur += c;
    }
    out.push(cur);
    return out.map((x) => x.trim());
  }

  // ---------- parsers ----------
  function parseMastodonCSV(text) {
    const lines = text.split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
    if (!lines.length) return [];
    let header = null, start = 0;
    const first = csvRow(lines[0]).map((h) => h.replace(/^#/, "").toLowerCase());
    if (first.includes("domain") || first[0] === "domain") { header = first; start = 1; }
    const col = (cells, name, idx) => {
      if (header) { const i = header.indexOf(name); return i >= 0 ? cells[i] : ""; }
      return cells[idx] != null ? cells[idx] : "";
    };
    const out = [];
    for (let i = start; i < lines.length; i++) {
      const cells = csvRow(lines[i]);
      const host = cleanHost(col(cells, "domain", 0));
      if (!host || host === "domain") continue;
      const dEntry = {
        kind: "domain", host,
        severity: normSeverity(col(cells, "severity", 1) || "suspend"),
        labels: [],
        comment: (col(cells, "public_comment", 4) || col(cells, "private_comment", 5) || "").trim(),
      };
      if (String(col(cells, "reject_media", 2)).trim().toLowerCase() === "true") dEntry.rejectMedia = true;
      out.push(dEntry);
    }
    return out;
  }

  function parseSharkeyHosts(text) {
    const t = text.trim();
    const out = [];
    const push = (h, sev) => { const host = cleanHost(h); if (host) out.push({ kind: "domain", host, severity: sev, labels: [], comment: "" }); };
    if (t.startsWith("{") || t.startsWith("[")) {
      try {
        const j = JSON.parse(t);
        if (Array.isArray(j)) { j.forEach((h) => push(h, "suspend")); return out; }
        (j.blockedHosts || []).forEach((h) => push(h, "suspend"));
        (j.silencedHosts || []).forEach((h) => push(h, "silence"));
        if (out.length) return out;
      } catch (e) { /* fall through to line parse */ }
    }
    text.split(/\r?\n/).forEach((l) => { const h = l.trim(); if (h && !h.startsWith("#")) push(h, "suspend"); });
    return out;
  }

  function parseActors(text) {

      let l = line.trim();
      if (!l || l.startsWith("#")) return;
      l = l.split(",")[0].trim(); // tolerate "handle,reason" rows
      l = l.replace(/^https?:\/\//, "").replace(/^@/, "");
      // forms: user@domain  |  domain/@user  |  @user@domain
      let user = "", host = "";
      if (l.includes("/@")) { const [d, u] = l.split("/@"); host = cleanHost(d); user = (u || "").split("/")[0]; }
      else if (l.includes("@")) { const parts = l.split("@").filter(Boolean); user = parts[0]; host = cleanHost(parts[1] || ""); }
      else return;
      if (!host) return;
      out.push({ kind: "actor", handle: (user + "@" + host).toLowerCase(), host, user: user.toLowerCase(), severity: "suspend", labels: [], comment: "" });
    });
    return out;
  }

  // ---------- threat-intel interchange (MISP + STIX 2.1) ----------
  // Pulls actionable indicators OUT of a shared event/bundle and maps them to
  // denylist entries: IPs (ip kind), domains/hostnames (domain kind, covers
  // subdomains), and @user@host handles (actor kind). Email + URL indicators are
  // reduced to their domain. Major mailbox providers are skipped (see PROTECTED)
  // so an imported feed can't wall off Gmail/Outlook/etc.
  function isIpLiteral(s) {

      const ip = v.split("|")[0].split("/")[0].trim();
      if (isIpLiteral(ip)) return { kind: "ip", ip, severity: "suspend", labels: [], comment: C };
    }
    if (/(domain|hostname|domain-name)/.test(t)) {
      const h = cleanHost(v.split("|")[0]);
      if (h && !isProtected(h)) return { kind: "domain", host: h, severity: "suspend", labels: [], comment: C };
      return null;
    }
    if (/(url|link|uri)/.test(t)) {
      try { const h = cleanHost(new URL(v).hostname); if (h && !isProtected(h)) return { kind: "domain", host: h, severity: "suspend", labels: [], comment: C }; } catch (e) {}
      return null;
    }
    if (/(email-src|email-dst|email|email-addr)/.test(t)) {
      const dom = cleanHost(v.split("@").pop());
      if (dom && !isProtected(dom)) return { kind: "domain", host: dom, severity: "silence", labels: [], comment: (C ? C + " · " : "") + "email domain from " + v };
      return null;
    }
    // a handle embedded in a text/account value: @user@host
    const m = v.match(/@?([a-z0-9_.-]+)@([a-z0-9.-]+\.[a-z]{2,})/i);
    if (m && (t === "text" || t === "other" || t.indexOf("account") >= 0 || t === "value")) {
      const host = cleanHost(m[2]);
      if (host) return { kind: "actor", handle: (m[1] + "@" + host).toLowerCase(), host, user: m[1].toLowerCase(), severity: "suspend", labels: [], comment: C };
    }
    return null;
  }

  function parseMISP(text) {
    const out = []; let j;
    try { j = JSON.parse(text); } catch (e) { return out; }
    const events = [];
    const pushEv = (e) => { if (e && e.Event) events.push(e.Event); else if (e && (e.Attribute || e.Object)) events.push(e); };
    if (Array.isArray(j)) j.forEach(pushEv);
    else if (Array.isArray(j.response)) j.response.forEach(pushEv);
    else if (Array.isArray(j.Event)) j.Event.forEach((ev) => events.push(ev));
    else pushEv(j);
    events.forEach((ev) => {
      const evComment = ev.info ? String(ev.info).slice(0, 80) : "";
      (ev.Attribute || []).forEach((a) => { const e = indicatorEntry(a.type, a.value, a.comment || evComment); if (e) out.push(e); });
      (ev.Object || []).forEach((o) => (o.Attribute || []).forEach((a) => { const e = indicatorEntry(a.type, a.value, a.comment || evComment); if (e) out.push(e); }));

  // ---------- FediMod FIRES (moderation advisories / recommendations) ----------
  // FIRES (https://fires.fedimod.org/) distributes moderation *advisories* and
  // *recommendations* about Fediverse entities, versioned over time — the same
  // domain as this denylist. A Dataset holds a change feed; the snapshot is that
  // feed reduced by (entityKind, entityKey) keeping the newest. Each change is an
  // Advisory / Recommendation / Retraction / Tombstone carrying entityKind
  // ("domain" | "actor"), entityKey, labels and published; a Recommendation adds
  // recommendedPolicy in {accept, filter, reject, drop}.
  //

  // entity whose latest change is a Retraction/Tombstone, and map

  // Shared label URIs ride along in entry.labels (additive; the stored entry

  function firesType(t) { return String(Array.isArray(t) ? t[0] : (t || "")).split(/[#/]/).pop().toLowerCase(); }

    if (node.changes) firesCollect(node.changes, out, depth + 1);

    if (/fires\.fedimod\.org/.test(ctxStr)) return true;

    const cur = new Map(); let seq = 0;

      cur.set(ck, Object.assign({ _pub: pub, _ord: ord }, c));

    cur.forEach((c) => {

      if (t === "retraction" || t === "tombstone") return; // removed from current state
      const kind = String(c.entityKind || "").toLowerCase();
      const key = String(c.entityKey || "").trim();
      const labels = firesLabels(c.labels);
      const sev = t === "recommendation" ? firesPolicyToSeverity(c.recommendedPolicy) : { severity: "noop" };
      const note = firesStrip(c.summary || c.content || "");
      const comment = note || (labels.length ? "FIRES: " + labels.map(firesLabelName).join(", ") : (t === "advisory" ? "FIRES advisory (no policy yet)" : ""));
      if (kind === "domain") {

        if (!host || isProtected(host)) return;
        const e = { kind: "domain", host, severity: sev.severity, labels, comment };
        if (sev.rejectMedia) e.rejectMedia = true;
        out.push(e);
      } else if (kind === "actor") {
        const p = firesActorKey(key);
        if (!p) return;
        out.push({ kind: "actor", handle: p.handle, host: p.host, user: p.user, severity: sev.severity, labels, comment });
      }
    });
    return out;
  }

  function detectFormat(text) {
    const t = text.trim();
    if (!t) return "mastodon-csv";
    if (t.startsWith("{") || t.startsWith("[")) {
      try {
        const j = JSON.parse(t);
        if (j && (j.type === "bundle" || Array.isArray(j.objects) || (Array.isArray(j) && j[0] && j[0].spec_version))) return "stix";
        if (j && (j.Event || Array.isArray(j.response) || (Array.isArray(j) && j[0] && j[0].Event))) return "misp";
        if (looksFires(j)) return "fires";
      } catch (e) { /* not JSON we recognize */ }

    }
    const first = t.split(/\r?\n/).find((l) => l.trim() && !l.trim().startsWith("#")) || "";
    if (/^#?domain/i.test(t.split(/\r?\n/)[0] || "")) return "mastodon-csv";
    if (first.includes(",")) return "mastodon-csv";
    // a line like user@domain (two @-parts) → actor list; single token → host
    const at = (first.match(/@/g) || []).length;
    if (at >= 1 && !/^@?[a-z0-9.-]+$/i.test(first)) return "actors";
    if (first.includes("/@")) return "actors";
    return "sharkey-hosts";
  }

  function parse(text, format) {
    const fmt = (!format || format === "auto") ? detectFormat(text) : format;
    let entries = [];
    if (fmt === "mastodon-csv") entries = parseMastodonCSV(text);
    else if (fmt === "sharkey-hosts") entries = parseSharkeyHosts(text);
    else if (fmt === "actors") entries = parseActors(text);
    else if (fmt === "misp") entries = parseMISP(text);
    else if (fmt === "stix") entries = parseSTIX(text);
    else if (fmt === "fires") entries = parseFIRES(text);
    // de-dup within the list (ip / host / actor)
    const seen = new Set();
    entries = entries.filter((e) => { const k = e.kind + ":" + (e.handle || e.host || e.ip); if (seen.has(k)) return false; seen.add(k); return true; });
    return { format: fmt, entries };
  }

  // ---------- store ----------
  function lists() { return Object.values(readJSON({})).sort((a, b) => (b.importedAt || 0) - (a.importedAt || 0)); }
  function getList(id) { return readJSON({})[id] || null; }
  function addList(meta, entries) {
    const all = readJSON({});
    const id = meta.id || uid();
    all[id] = {
      id, name: meta.name || "Untitled list", source: meta.source || "paste",
      format: meta.format || "mastodon-csv", url: meta.url || "",
      importedAt: Date.now(), enabled: meta.enabled !== false, entries: entries || [],
    };
    writeJSON(all);
    return id;
  }
  function removeList(id) { const all = readJSON({}); delete all[id]; writeJSON(all); }
  function setEnabled(id, on) { const all = readJSON({}); if (all[id]) { all[id].enabled = !!on; writeJSON(all); } }
  function clearAll() { writeJSON({}); }

  // ---------- programmatic blocking (from the review UI) ----------
  // Appends entries to one well-known "Blocked in Vantage" list, de-dups, and
  // REFUSES major mailbox providers (see PROTECTED) for domain entries — so the
  // "block email domain / mail servers" buttons can't wall off Gmail/Outlook/etc.
  // IP entries are never protected. Returns { added, skippedProtected, skippedDup }.
  function block(entries, meta) {
    meta = meta || {};
    const list = Array.isArray(entries) ? entries : [entries];
    const id = meta.id || "dl_vantage";
    const existing = getList(id);
    const cur = existing ? (existing.entries || []).slice() : [];
    const keyOf = (e) => e.kind + ":" + (e.handle || e.host || e.ip || "");
    const have = new Set(cur.map(keyOf));
    const added = [], skippedProtected = [], skippedDup = [];
    list.forEach((e) => {
      const label = e.host || e.ip || e.handle || "";
      if (e.kind === "domain" && isProtected(e.host)) { skippedProtected.push(label); return; }
      const k = keyOf(e);
      if (have.has(k)) { skippedDup.push(label); return; }
      have.add(k);
      cur.push(Object.assign({ severity: "suspend", labels: [], comment: "" }, e));
      added.push(label);
    });
    if (added.length) addList({ id, name: meta.name || "Blocked in Vantage", source: meta.source || "review", format: "mastodon-csv" }, cur);
    if (window.ReefLog && added.length) window.ReefLog.info("denylist", "blocked " + added.join(", ") + (skippedProtected.length ? " (refused protected: " + skippedProtected.join(", ") + ")" : ""));
    return { added, skippedProtected, skippedDup };
  }

  // ---------- programmatic UNblocking (the review-UI "undo") ----------
  // Removes matching entries from the Vantage-managed "Blocked in Vantage" list
  // so a block button resets to actionable. Only touches that one list — imported
  // shared blocklists are never edited here. Returns { removed: [...] }.
  function unblock(entries, meta) {
    meta = meta || {};
    const list = Array.isArray(entries) ? entries : [entries];
    const id = meta.id || "dl_vantage";
    const existing = getList(id);
    if (!existing) return { removed: [] };
    const matchOf = (e) => (a) => {
      if (e.kind === "ip") return a.kind === "ip" && a.ip === e.ip;
      if (e.kind === "actor") return a.kind === "actor" && a.handle === String(e.handle || "").toLowerCase();
      return a.kind !== "ip" && a.kind !== "actor" && cleanHost(a.host) === cleanHost(e.host);
    };
    const removed = [];
    let cur = (existing.entries || []).slice();
    list.forEach((e) => {
      const m = matchOf(e);
      const keep = [];
      cur.forEach((a) => { if (m(a)) removed.push(a.ip || a.host || a.handle); else keep.push(a); });
      cur = keep;
    });
    if (removed.length) {
      const all = readJSON({});
      all[id] = Object.assign({}, existing, { entries: cur });
      writeJSON(all);
      if (window.ReefLog) window.ReefLog.info("denylist", "unblocked " + removed.join(", "));
    }
    return { removed };
  }

  // ---------- index + match ----------
  function buildIndex() {
    const domains = new Map(); const actors = new Map(); const ips = new Map();

        const hit = { list: L.name, listId: L.id, severity: e.severity, labels: e.labels || [], comment: e.comment || "" };
        if (e.kind === "actor") {
          const arr = actors.get(e.handle) || []; arr.push(hit); actors.set(e.handle, arr);

          const arr = ips.get(e.ip) || []; arr.push(hit); ips.set(e.ip, arr);

  // ---------- export ----------

  // ---------- FIRES export (publish our decisions as a FIRES dataset) ----------

    const now = new Date().toISOString();
    const base = String(opts.datasetId || ("https://vantage.local/datasets/" + uid())).replace(/\/+$/, "");
    const name = opts.name || "Vantage moderation recommendations";
    const ents = gather(listIds).filter((e) => e.kind === "domain" || e.kind === "actor");
    const items = ents.map((e) => {
      const change = {
        id: base + "/changes/" + uid(),
        type: "Recommendation",
        published: now,
        entityKind: e.kind === "actor" ? "actor" : "domain",
        entityKey: e.kind === "actor" ? ("@" + e.handle) : e.host,
        recommendedPolicy: firesSeverityToPolicy(e),
      };
      if (e.labels && e.labels.length) change.labels = e.labels.slice();
      if (e.comment) change.summary = e.comment;
      return change;
    });
    return {
      "@context": ["https://www.w3.org/ns/activitystreams", FIRES_CTX],
      id: base + "/snapshot",
      type: "OrderedCollection",
      name: name,
      summary: "Exported from " + "Vantage \u2014 Fediverse Moderation Console",
      published: now,
      updated: now,
      totalItems: items.length,
      orderedItems: items,
      context: { id: base, type: "Dataset", name: name, endpoints: { snapshot: base + "/snapshot", changes: base + "/changes" } },
    };
  }
  function exportIPs(listIds) {
    return gather(listIds).filter((e) => e.kind === "ip").map((e) => e.ip + (e.comment ? "  # " + e.comment : "")).join("\n") + "\n";
  }

  window.ReefDenylist = {
    FORMATS, IFTAS_PRESETS, PROTECTED, isProtected, protectedList,
    parse, detectFormat, block, unblock,
    lists, getList, addList, removeList, setEnabled, clearAll,
    match: matchTarget, matchHost, matchActor, matchTarget, matchIP,
    stats, version: () => _version,
    exportMastodonCSV, exportSharkeyHosts, exportActors, exportIPs, exportFIRES,
  };
})();
