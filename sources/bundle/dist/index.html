// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — live OSINT enrichment panel (renders real lookups)
   ============================================================ */

function srcDotClass(s) { return s === "ok" ? "ok" : s === "err" ? "bad" : s === "off" ? "off" : "na"; }

// Block button used across the account inspector. `protectedHost` disables it for
// major mailbox providers; `blocked` shows the already-on-list state — and, when an
// `onUnblock` handler is supplied, that state becomes a clickable "undo" so the
// button can be reset (and the block lifted on the server where possible).
function BlockBtn({ label, sub, onClick, onUnblock, protectedHost, blocked }) {
  if (protectedHost) {
    return (
      <button className="block-btn block-protected" disabled title={"Major email provider — protected from blocking so you can't wall off the world's largest mail services by accident."}>
        <span className="block-ic">⦻</span>{label}<span className="block-sub">protected provider</span>
      </button>
    );
  }
  if (blocked) {
    if (!onUnblock) {
      return (
        <button className="block-btn block-done" disabled title="Already on your blocklist">
          <span className="block-ic">✓</span>{label}<span className="block-sub">on blocklist</span>
        </button>
      );
    }
    return (
      <button className="block-btn block-done block-undo" onClick={onUnblock} style={{ cursor: "pointer" }} title="On your blocklist — click to undo (lifts it on the server where possible)">
        <span className="block-ic">✓</span>{label}<span className="block-sub">on blocklist · undo</span>
      </button>
    );
  }
  return (
    <button className="block-btn" onClick={onClick} title={"Add to your blocklist: " + (sub || "")}>
      <span className="block-ic">⊘</span>{label}{sub ? <span className="block-sub mono">{sub}</span> : null}
    </button>
  );
}

// StopForumSpam panel: the community spammer registry for IP + email + username.
// Lookup is keyless (JSONP browser-direct); the submit button only appears when
// an API key is configured (contributing a confirmed spammer needs the proxy).
function SfsRow({ label, data, value }) {
  if (!data) return <div className="sfs-row"><span className="sfs-row-k">{label}</span><span className="sfs-row-v mono">{value || "\u2014"}</span><span className="sfs-tag sfs-na">not queried</span></div>;
  const listed = data.appears;
  const tone = data.blacklisted ? "bad" : listed ? ((data.confidence != null && data.confidence >= 40) ? "bad" : "warn") : "ok";
  const meta = listed ? [
    data.lastseen ? "seen " + String(data.lastseen).slice(0, 10) : "",
    data.asn ? "AS" + String(data.asn).replace(/^AS/i, "") : "",
    data.country || "",
    data.delegated && data.delegated !== data.country ? "\u2190 " + data.delegated : "",
    data.torexit ? "Tor exit" : "",
    data.normalized ? "norm: " + data.normalized : "",
  ].filter(Boolean).join(" \u00b7 ") : "";
  return (
    <div className="sfs-row">
      <span className="sfs-row-k">{label}</span>
      <div className="sfs-row-mid">
        <span className="sfs-row-v mono">{value || "\u2014"}</span>
        {meta && <span className="sfs-row-meta mono">{meta}</span>}
      </div>
      {listed ? (
        <span className={cx("sfs-tag", "sfs-" + tone)} title={(data.lastseen ? "Last seen " + data.lastseen : "") + (data.country ? " \u00b7 " + data.country : "")}>
          {data.blacklisted ? "blacklisted" : data.frequency + "\u00d7 listed"}{data.confidence != null ? <span className="sfs-conf">{data.confidence}%</span> : null}
        </span>
      ) : <span className="sfs-tag sfs-ok">clean</span>}
    </div>
  );
}

function SfsPanel({ res, acc, settings }) {
  const sfs = res.sfs;
  const key = (settings && settings.keys && settings.keys.stopforumspam) || "";
  const proxy = (settings && settings.proxy) || "";
  const [sub, setSub] = useState(null); // null | "submitting" | "ok" | error string
  if (!sfs) return null;
  const anyListed = (sfs.ip && sfs.ip.appears) || (sfs.email && sfs.email.appears) || (sfs.username && sfs.username.appears);
  const canSubmit = !!key && acc.username && acc.email && acc.ip;
  async function submit() {
    setSub("submitting");
    try {
      await ReefEnrich.submitSFS({ username: acc.username, email: acc.email, ip: acc.ip, evidence: "Rejected as spam by Vantage moderation" + (acc.instance ? " (" + acc.instance + ")" : "") }, key, proxy);
      setSub("ok");
    } catch (e) { setSub(e.message || String(e)); }
  }
  return (
    <div className="sfs-card">
      <div className="sfs-card-h"><b>StopForumSpam</b><span className={cx("sfs-verdict", anyListed ? "tone-bad" : "tone-ok")}>{anyListed ? "listed" : "not listed"}</span></div>
      <div className="sfs-rows">
        <SfsRow label="IP" data={sfs.ip} value={acc.ip} />
        <SfsRow label="Email" data={sfs.email} value={acc.email} />
        <SfsRow label="Username" data={sfs.username} value={acc.username ? "@" + acc.username : ""} />
      </div>
      <div className="sfs-foot">
        <span className="sfs-note">Community spammer registry · keyless lookup{sfs.region && sfs.region !== "auto" ? " · " + (sfs.region === "eu" ? "EU" : "US") + " region" : ""}{sfs.emailhash ? " · email hashed" : ""}{key ? " · key set" : ""}</span>
        {key ? (sub === "ok"
          ? <span className="sfs-sub-ok">✓ submitted to registry</span>
          : <button className="sfs-submit" disabled={!canSubmit || sub === "submitting"} onClick={submit} title={canSubmit ? "Contribute this spammer (IP + email + username) back to StopForumSpam — needs the proxy" : "Needs username + email + IP"}>{sub === "submitting" ? "Submitting…" : "Report to StopForumSpam →"}</button>
        ) : null}
      </div>
      {typeof sub === "string" && sub !== "ok" && sub !== "submitting" && <div className="muted-line tone-bad" style={{ marginTop: 6 }}>Submission failed: {sub}</div>}
    </div>
  );
}

function LiveEnrichment({ acc, settings, bind, onEnriched, onBlock, onUnblock, auto, recalc, initial }) {
  const [status, setStatus] = useState(initial ? "done" : "idle"); // idle | running | done | error
  const [res, setRes] = useState(initial || null);
  const [err, setErr] = useState(null);

  async function go(force) {
    setStatus("running"); setErr(null);
    try {
      window.__reefProxy = (settings && settings.proxy) || "";
      const out = await ReefEnrich.run(acc, { proxy: (settings && settings.proxy) || "", keys: (settings && settings.keys) || {}, sfs: (settings && settings.sfs) || {}, force: !!force });
      setRes(out); setStatus("done");
      if (bind && onEnriched) onEnriched(acc.id, { risk: out.score, tier: out.tier, recommend: out.recommend, signals: out.signals, rationale: out.rationale, _osintLive: out });
    } catch (e) { setErr(e.message || String(e)); setStatus("error"); }
  }

  // (re)initialise when the selected account changes: render a pre-supplied
  // result (e.g. OSINT carried in by an import) with no network call; otherwise
  // reset, and auto-run live enrichment when asked.
  useEffect(() => {
    if (initial) { setRes(initial); setStatus("done"); return; }
    setRes(null); setStatus("idle");
    if (auto) go();
    /* eslint-disable-next-line */
  }, [acc.id]);
  // re-score (no new API calls — uses cached lookups) when weights / affirm terms change
  useEffect(() => { if (auto && status === "done") go(); /* eslint-disable-next-line */ }, [recalc]);

  if (status === "idle") {
    return (
      <Section title="Live OSINT enrichment" service="real lookups">
        <button className="enrich-run" onClick={go}>Run enrichment on {acc.ip || "this account"} →</button>
        <div className="muted-line" style={{ marginTop: 8 }}>Runs ASN / reverse-DNS / DNSBL / RDAP / MX / disposable-email / username checks. AbuseIPDB, VirusTotal &amp; IPQS run too if keys are set.</div>
      </Section>
    );
  }

  return (
    <Section title="Live OSINT enrichment" service={status === "running" ? "running…" : "real lookups"}
      right={status === "done" && <span className="enrich-btns"><button className="enrich-rerun" onClick={() => go(false)} title="Re-score (uses cache)">↻</button><button className="enrich-rerun" onClick={() => go(true)} title="Force refresh (bypass cache, re-query APIs)">⟳!</button></span>}>
      {status === "running" && <div className="enrich-loading"><span className="spinner" /> Querying sources…</div>}
      {status === "error" && <div className="muted-line tone-bad">Enrichment failed: {err}</div>}

      {/* source status strip (with cache age) */}
      {res && (
        <div className="src-strip">
          {res.sources.map((s, i) => (
            <span key={i} className={cx("src-chip", "src-" + srcDotClass(s.status), s.cached && "src-cached")} title={s.note + (s.cached ? ` · cached ${s.ageDays}d ago` : "")}>
              <span className="src-chip-dot" />{s.name}{s.cached ? <span className="src-age">{s.ageDays}d</span> : null}
            </span>
          ))}
        </div>
      )}

      {res && (
        <div className="osint-grid two" style={{ marginTop: 12 }}>
          {/* network */}
          <div className="osint-card">
            <div className="osint-card-h"><b>IP &amp; network</b><span className="mono">{res.net && res.net.country || "—"}</span></div>
            <div className="osint-mini">
              <KV k="ASN" v={res.net && res.net.asn ? `${res.net.asn} ${res.net.asnOrg || ""}` : "—"} mono />
              <KV k="Reverse DNS" v={res.net && res.net.rdns || "none"} mono />
              <KV k="BGP prefix" v={res.net && res.net.prefix || "—"} mono />
            </div>
            <div className="flag-row">
              <Flag on={res.net && res.net.tor} label="Tor exit" />
              <Flag on={res.net && res.net.datacenter} label="Datacenter" />
              <Flag on={res.net && res.net.dnsblCount > 0} label={`DNSBL ${res.net ? res.net.dnsblCount : 0}`} />
            </div>
            {res.net && res.net.abuseipdb && (
              <div className="kv-strong"><span>AbuseIPDB</span><b className={res.net.abuseipdb.score >= 50 ? "tone-bad" : res.net.abuseipdb.score >= 20 ? "tone-warn" : "tone-ok"}>{res.net.abuseipdb.score}% · {res.net.abuseipdb.reports} reports</b></div>
            )}
            {res.net && res.net.ipqs && (
              <div className="kv-strong"><span>IPQS fraud</span><b className={res.net.ipqs.fraud >= 75 ? "tone-bad" : res.net.ipqs.fraud >= 40 ? "tone-warn" : "tone-ok"}>{res.net.ipqs.fraud} {res.net.ipqs.vpn ? "· VPN" : res.net.ipqs.proxy ? "· proxy" : ""}</b></div>
            )}
            {acc.ip && ReefDenylist.matchIP(acc.ip).length > 0 && (
              <div className="kv-strong"><span>IP blocklist</span><b className="tone-bad">on your blocklist</b></div>
            )}
            {acc.ip && <PivotLinks type="ip" value={acc.ip} />}
          </div>

          {/* email / domain */}
          <div className="osint-card">
            <div className="osint-card-h"><b>Email &amp; domain</b><span className="mono">{acc.emailDomain || "—"}</span></div>
            <div className="flag-row">
              <Flag on={res.dom && res.dom.disposable} label="Disposable" />
              <Flag on={res.dom && res.dom.hasMX === false} label="Has MX" invert />
            </div>
            <div className="osint-mini">
              <KV k="Domain age" v={res.dom && res.dom.domainAgeDays != null ? `${Math.round(res.dom.domainAgeDays / 365)} yrs (${(res.dom.created || "").slice(0, 10)})` : "unknown"} />
              <KV k="Registrar" v={res.dom && res.dom.registrar || "—"} />
            </div>
            {res.vt && (
              <div className="kv-strong"><span>VirusTotal</span><b className={res.vt.malicious ? "tone-bad" : "tone-ok"}>{res.vt.malicious} malicious · {res.vt.suspicious} suspicious</b></div>
            )}
            {res.ipqsEmail && (
              <div className="kv-strong"><span>IPQS email</span><b className={res.ipqsEmail.disposable || res.ipqsEmail.valid === false ? "tone-bad" : (res.ipqsEmail.recentAbuse || res.ipqsEmail.deliverability === "low") ? "tone-warn" : "tone-ok"}>{res.ipqsEmail.valid === false ? "invalid" : "valid"}{res.ipqsEmail.disposable ? " · disposable" : ""}{res.ipqsEmail.deliverability ? " · " + res.ipqsEmail.deliverability : ""}{res.ipqsEmail.recentAbuse ? " · recent abuse" : ""}</b></div>
            )}
            <div className="kv-strong"><span>GitHub username</span><b className={res.gh === "exists" ? "tone-ok" : "tone-warn"}>{res.gh === "exists" ? "found" : res.gh === "none" ? "not found" : "unknown"}</b></div>
            <div className="osint-pivots">
              {acc.emailDomain && <PivotLinks type="domain" value={acc.emailDomain} label="domain" />}
              {acc.email && <PivotLinks type="email" value={acc.email} label="email" />}
              {acc.username && <PivotLinks type="username" value={acc.username} label="username" />}
            </div>

            {/* MX servers — who actually serves this domain's mail */}
            {res.dom && res.dom.mxHosts && res.dom.mxHosts.length > 0 ? (
              <div className="mx-block">
                <div className="mx-h"><span>Mail servers (MX)</span>{res.dom.mxProviders && res.dom.mxProviders.length ? <span className="mx-prov">{res.dom.mxProviders.join(" · ")}</span> : null}</div>
                <div className="mx-list">
                  {res.dom.mx.slice(0, 6).map((m, i) => (
                    <span key={i} className="mx-row mono"><span className="mx-pri">{m.priority != null ? m.priority : "—"}</span>{m.host}{ReefDenylist.matchHost(m.host).length ? <span className="mx-blocked">blocked</span> : null}</span>
                  ))}
                </div>
              </div>
            ) : (res.dom && res.dom.hasMX === false ? <div className="muted-line tone-warn" style={{ marginTop: 4 }}>No MX records — mail to this domain is undeliverable.</div> : null)}

            {/* block controls: the mail servers serving this domain (the From-domain
                and signup IP have always-available buttons up in Application) */}
            {res.dom && res.dom.mxBase && res.dom.mxBase.length > 0 && (() => {
              const open = res.dom.mxBase.filter((d) => !ReefDenylist.isProtected(d));
              return (
                <div className="block-row">
                  <BlockBtn label="Block mail servers" sub={open.length ? open.join(", ") : res.dom.mxBase.join(", ")}
                    protectedHost={open.length === 0}
                    blocked={open.length > 0 && open.every((d) => ReefDenylist.matchHost(d).length > 0)}
                    onClick={() => onBlock && onBlock(open.map((d) => ({ kind: "domain", host: d, comment: "Mail server for " + acc.emailDomain + " — blocked from review" })), "Blocked mail server" + (open.length > 1 ? "s" : "") + " " + open.join(", "), { instance: acc.instance, live: acc.live })}
                    onUnblock={() => onUnblock && onUnblock(open.map((d) => ({ kind: "domain", host: d })), "Unblocked mail server" + (open.length > 1 ? "s" : ""), { instance: acc.instance, live: acc.live })} />
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {res && res.sfs && <SfsPanel res={res} acc={acc} settings={settings} />}

      {res && !bind && (
        <div className="enrich-verdict">
          <span className="ev-l">Live verdict</span>
          <span className={"ev-score tone-" + (res.tier === "high" ? "bad" : res.tier === "medium" ? "warn" : "ok")}>{res.score}</span>
          <span className="ev-rec">{res.recommend}</span>
          <span className="ev-note">{res.rationale}</span>
        </div>
      )}

      {/* IP correlation — other accounts seen on this IP */}
      {res && res.correlated && res.correlated.length > 0 && (
        <div className="corr-card">
          <div className="corr-h"><b>Also seen on {acc.ip}</b><span className="mono">{res.correlated.length} other account{res.correlated.length === 1 ? "" : "s"}</span></div>
          <div className="corr-list">
            {res.correlated.slice(0, 6).map((c, i) => (
              <span key={i} className={cx("corr-chip", c.resolution === "reject" || c.tier === "high" ? "corr-bad" : c.resolution === "approve" ? "corr-ok" : "")}>
                @{c.username}<span className="corr-meta mono">{c.instance}{c.resolution ? " · " + c.resolution : c.risk != null ? " · " + c.risk : ""}</span>
              </span>
            ))}
          </div>
          <div className="corr-note">Shared-IP history helps tell friend from foe (note: CGNAT &amp; mobile carriers rotate IPs across many people).</div>
        </div>
      )}

      {/* reputation trend over time */}
      {res && res.trend && (res.trend.abuseipdb && res.trend.abuseipdb.length > 1 || res.trend.vt && res.trend.vt.length > 1) && (
        <div className="trend-card">
          <div className="trend-h">Reputation drift <span className="mono">recorded over time</span></div>
          {res.trend.abuseipdb && res.trend.abuseipdb.length > 1 && (
            <div className="trend-row"><span className="trend-k">AbuseIPDB %</span><Sparkline data={res.trend.abuseipdb.map((p) => p.v)} h={28} color="var(--bad)" /></div>
          )}
          {res.trend.vt && res.trend.vt.length > 1 && (
            <div className="trend-row"><span className="trend-k">VT malicious</span><Sparkline data={res.trend.vt.map((p) => p.v)} h={28} color="var(--warn)" /></div>
          )}
        </div>
      )}
    </Section>
  );
}

Object.assign(window, { LiveEnrichment, BlockBtn, SfsPanel, SfsRow });

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — StopForumSpam pre-flight submission (new accounts)
   ------------------------------------------------------------
   SFS is a forum/blog SPAMMER registry with a strict acceptance
   policy: a VERIFIED email, the ACTUAL IP the account used, and
   genuine spam (not "suspicious-but-unproven"). This modal lets a
   moderator review the exact /add payload — username · email ·
   ip_addr · evidence — gated by red/green eligibility checks, edit
   the evidence, then submit via ReefEnrich.submitSFS. Ineligible
   accounts are blocked with the reason shown. Reports are NOT
   handled here (a report carries no verified email / contacting IP).
   ============================================================ */

function sfsIsIPv4(ip) { return /^\d{1,3}(\.\d{1,3}){3}$/.test(String(ip || "")); }

// Compact, spam-relevant evidence from our own findings. UTF-8; URLSearchParams
// url-encodes it on submit. Point scores are stripped (kept human-readable), and
// the whole thing is capped at the 600-char field budget.
function buildSfsEvidence(acc) {
  const clean = (l) => String(l || "")
    .replace(/\s*[\u2014\u2013-]\s*\d+\s*\/\s*100(\s*\u00b7\s*\d+\s*sources?)?/i, "")
    .replace(/\s*\(\s*\d+\s*\/\s*100\s*\)/g, "").trim();
  const parts = [];
  parts.push("Vantage automated triage flagged this signup (" + (acc.tier || "?") + " risk " + (acc.risk != null ? acc.risk : "?") + "/100; recommended " + (recVerb(acc.recommend || "") || "review") + ").");
  const adverse = (acc.signals || []).filter((s) => s.dir === "bad" || s.dir === "warn");
  if (adverse.length) parts.push("Signals: " + adverse.map(clean).filter(Boolean).slice(0, 6).join("; ") + ".");
  const reason = (acc.reason || "").trim();
  if (reason) parts.push("Stated join reason: \u201c" + reason.slice(0, 220) + (reason.length > 220 ? "\u2026" : "") + "\u201d.");
  let ev = parts.join(" ");
  if (ev.length > 600) ev = ev.slice(0, 599) + "\u2026";
  return ev;
}

// Advisory "is this actually spam?" check — SFS rejects suspicious-only / non-spam.
function sfsLooksLikeSpam(acc) {
  if (acc.recommend === "reject" || acc.tier === "high") return true;
  const ids = (acc.signals || []).map((s) => s.id || "");
  return ids.some((id) => /campaign_|scam_language|link_in_reason|disposable|email_reputation|sfs_|vt_malicious|domain_no_mx/.test(id));
}

function SfsCheck({ ok, warn, label, detail }) {
  const tone = ok ? "ok" : warn ? "warn" : "bad";
  return (
    <div className={cx("sfsr-check", "sfsr-" + tone)}>
      <span className="sfsr-check-i">{ok ? "\u2713" : warn ? "!" : "\u2717"}</span>
      <div className="sfsr-check-b"><b>{label}</b>{detail && <span>{detail}</span>}</div>
    </div>
  );
}

function SfsReportModal({ acc, settings, onClose }) {
  const keys = (settings && settings.keys) || {};
  const proxy = (settings && settings.proxy) || "";
  const ipCandidates = [acc.ip]
    .concat((Array.isArray(acc.signinIps) ? acc.signinIps : []).map((x) => x.ip))
    .filter(sfsIsIPv4).filter((v, i, a) => a.indexOf(v) === i);
  const [ip, setIp] = useState(ipCandidates[0] || "");
  const [evidence, setEvidence] = useState(() => buildSfsEvidence(acc));
  const [ack, setAck] = useState(false);
  const [status, setStatus] = useState("idle");
  const [msg, setMsg] = useState("");

  const emailOk = acc.emailConfirmed === true;
  const ipOk = sfsIsIPv4(ip);
  const keyOk = !!keys.stopforumspam;
  // Hosted mode submits through the server gateway — no browser proxy involved.
  const hosted = !!(window.ReefServer && window.ReefServer.mode === "server");
  const proxyOk = hosted || !!proxy;
  const spam = sfsLooksLikeSpam(acc);
  const hardOk = emailOk && ipOk && keyOk && proxyOk;
  const canSubmit = hardOk && (spam || ack) && status !== "submitting" && status !== "done";

  async function submit() {
    setStatus("submitting"); setMsg("");
    try {
      await ReefEnrich.submitSFS({ username: acc.username, email: acc.email, ip, evidence }, keys.stopforumspam, proxy);
      setStatus("done"); setMsg("Submitted. It will appear under your account \u2192 My Spammers on stopforumspam.com.");
      if (window.ReefLog) window.ReefLog.info("sfs", "submitted spammer @" + acc.username + " (" + ip + ")");
    } catch (e) { setStatus("error"); setMsg(e.message || String(e)); }
  }

  return (
    <div className="modal-scrim" onMouseDown={(e) => { if (e.target.classList.contains("modal-scrim")) onClose(); }}>
      <div className="modal" style={{ width: "min(560px,100%)" }}>
        <div className="modal-h">
          <div><h3>Report to StopForumSpam</h3><div className="modal-sub">Community spammer registry · pre-flight review</div></div>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="sfsr-sec">
            <div className="sfsr-sec-t">Eligibility</div>
            <div className="sfsr-checks">
              <SfsCheck ok={emailOk} label="Verified email" detail={emailOk ? acc.email : "SFS only accepts addresses your server has verified. This account is " + (acc.emailConfirmed === false ? "unconfirmed" : "not reported confirmed") + " \u2014 submission blocked."} />
              <SfsCheck ok={ipOk} label="Real contacting IP" detail={ipOk ? "Using " + ip + " (the IP this account used)" : "No valid IPv4 signup / sign-in IP available to attribute."} />
              <SfsCheck ok={keyOk} label="API key configured" detail={keyOk ? "Set in Services \u2192 StopForumSpam" : "Submissions need your SFS API key \u2014 add it in Services \u2192 StopForumSpam."} />
              <SfsCheck ok={proxyOk} label={hosted ? "Server gateway" : "CORS proxy configured"} detail={hosted ? "Submission POSTs go via the Vantage server (key injected from the vault)" : (proxyOk ? "Submission POSTs route through your proxy" : "Submission POSTs are CORS-blocked browser-direct \u2014 set a proxy in Services.")} />
              <SfsCheck ok={spam} warn={!spam} label="Looks like spam" detail={spam ? "Matches spam / abuse signals" : "SFS is for spam only \u2014 not suspicious-but-unproven, and not harassment. Confirm this is a spammer."} />
            </div>
          </div>

          <div className="sfsr-sec">
            <div className="sfsr-sec-t">Submission payload <span className="sfsr-ep mono">POST /add.php</span></div>
            <div className="sfsr-field"><span className="sfsr-k">username</span><span className="sfsr-v mono">{acc.username}</span></div>
            <div className="sfsr-field"><span className="sfsr-k">email</span><span className="sfsr-v mono">{acc.email || "\u2014"}</span></div>
            <div className="sfsr-field"><span className="sfsr-k">ip_addr</span>
              {ipCandidates.length > 1
                ? <select className="conn-input sfsr-ipsel" value={ip} onChange={(e) => setIp(e.target.value)}>{ipCandidates.map((c) => <option key={c} value={c}>{c}</option>)}</select>
                : <span className="sfsr-v mono">{ip || "\u2014"}</span>}
            </div>
            <div className="sfsr-evidence">
              <div className="sfsr-evidence-h"><span className="sfsr-k">evidence <span className="sfsr-opt">optional</span></span><span className={cx("sfsr-count mono", evidence.length > 600 && "tone-bad")}>{evidence.length}/600</span></div>
              <textarea className="conn-input sfsr-ta mono" value={evidence} maxLength={600} onChange={(e) => setEvidence(e.target.value)} rows={5} />
            </div>
          </div>

          <div className="sfsr-policy">SFS accepts only confirmed forum/blog <b>spammers</b> with a <b>verified email</b> and the <b>actual IP</b> they used to contact you. Don't submit suspicious-only registrations or non-spam abuse — unsupported listings can be challenged and removed.</div>

          {!spam && hardOk && (
            <label className="sfsr-ack"><input type="checkbox" checked={ack} onChange={(e) => setAck(e.target.checked)} /> I've confirmed this is a spammer and the evidence is accurate.</label>
          )}

          {status === "done" && <div className="sfsr-result sfsr-rok">✓ {msg}</div>}
          {status === "error" && <div className="sfsr-result sfsr-rbad">Submission failed: {msg}</div>}

          <div className="sfsr-actions">
            <button className="lact lact-ghost" onClick={onClose}>{status === "done" ? "Close" : "Cancel"}</button>
            <button className="modnote-write" disabled={!canSubmit} onClick={submit}
              title={!hardOk ? "Resolve the blocked eligibility checks first" : (!spam && !ack ? "Confirm this is a spammer first" : "")}>
              {status === "submitting" ? "Submitting\u2026" : status === "done" ? "\u2713 Submitted" : "Submit to StopForumSpam"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function SfsReport({ acc, settings }) {
  const [open, setOpen] = useState(false);
  const eligibleHint = acc.emailConfirmed === true;
  return (
    <Section title="StopForumSpam report" sub="Contribute this spammer back to the community registry" service="community registry">
      <button className="modnote-expand" onClick={() => setOpen(true)}>Report to StopForumSpam →</button>
      <div className="muted-line" style={{ marginTop: 6 }}>
        {eligibleHint
          ? "Opens a pre-flight review of the exact /add payload (username \u00b7 email \u00b7 IP \u00b7 evidence) with eligibility checks before anything is sent."
          : "Pre-flight review \u2014 note SFS requires a verified email, which this account doesn't have yet, so submission will be blocked."}
      </div>
      {open && <SfsReportModal acc={acc} settings={settings} onClose={() => setOpen(false)} />}
    </Section>
  );
}

Object.assign(window, { SfsReport, SfsReportModal, buildSfsEvidence, sfsLooksLikeSpam });

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — New Account Review inspector
   ============================================================ */

function recColor(rec) {
  if (["approve", "dismiss", "claimed", "released"].includes(rec)) return "ok";
  if (["hold", "warn", "cw", "silence", "freeze", "forward"].includes(rec)) return "warn";
  return "bad";
}
function recVerb(rec) {
  return { approve: "Approve", hold: "Hold for review", reject: "Reject", warn: "Warn", suspend: "Suspend", silence: "Limit / silence", cw: "Add content warning", delete: "Delete post", freeze: "Freeze", blockdomain: "Block domain", forward: "Forward to remote", dismiss: "Dismiss", claimed: "Claimed case", released: "Released case" }[rec] || rec;
}

function OsintMeter({ value, invert }) {
  // value 0-100, higher = worse (unless invert)
  const bad = invert ? 100 - value : value;
  const tone = bad >= 66 ? "bad" : bad >= 33 ? "warn" : "ok";
  return (
    <span className="osint-meter">
      <span className="osint-meter-track"><span className={"osint-meter-fill tone-" + tone} style={{ width: value + "%" }} /></span>
      <span className={"mono osint-meter-num tone-" + tone}>{value}</span>
    </span>
  );
}

// ---- Moderator note helpers -------------------------------------------
function buildModNote(acc) {
  // Minimum-necessary TLP:AMBER finding summary.
  // Deliberately omits raw email address + verbatim join reason (may contain
  // PII). Follows ENISA/FIRST moderation-record best-practice guidelines.
  const tier = (acc.tier || "?").toUpperCase();
  const score = acc.risk != null ? acc.risk : "?";
  const rec = recVerb(acc.recommend || "") || "?";
  const adverse = (acc.signals || []).filter((s) => s.dir === "bad" || s.dir === "warn");
  const positive = (acc.signals || []).filter((s) => s.dir === "ok" && s.id !== "clean");
  // Two flag lists — negatives with ✗, positives with ✓. Per-signal point scores
  // are deliberately dropped (only the headline risk score above is kept): strip
  // any "— NN/100 · N sources" or "(NN/100)" fragment from the flag labels.
  const cleanFlag = (s) => String(s.label || "")
    .replace(/\s*[\u2014\u2013-]\s*\d+\s*\/\s*100(\s*\u00b7\s*\d+\s*sources?)?/i, "")
    .replace(/\s*\(\s*\d+\s*\/\s*100\s*\)/g, "")
    .trim();
  const negLines = adverse.map((s) => "  \u2717 " + cleanFlag(s));
  const posLines = positive.map((s) => "  \u2713 " + cleanFlag(s));
  const netParts = [acc.ip, acc.asn || null, acc.asnOrg ? "(" + acc.asnOrg + ")" : null, acc.ipCountry || null].filter(Boolean);
  const netLine = acc.ip ? "Network: " + netParts.join(" \u00b7 ") : "";
  // reverse DNS — from live enrichment (net.rdns), a checked sign-in IP, or acc.rdns
  const live = acc._osintLive || null;
  const signinRdns = (Array.isArray(acc.signinIps) ? acc.signinIps : []).map((x) => x.rdns).filter(Boolean)[0];
  const rdns = (live && live.net && live.net.rdns) || acc.rdns || signinRdns || "";
  const rdnsLine = rdns ? "Reverse DNS: " + rdns : "";
  const emLine = acc.emailDomain ? "Email domain: " + acc.emailDomain : "";
  return [
    "[Vantage \u00b7 TLP:AMBER] Risk: " + tier + " (" + score + "/100) \u00b7 Recommendation: " + rec,
    netLine, rdnsLine, emLine,
    negLines.length ? "Negative flags:" : "", ...negLines,
    posLines.length ? "Positive flags:" : "", ...posLines,
    "Reviewed: " + new Date().toISOString().slice(0, 10) + " via Vantage",
  ].filter(Boolean).join("\n");
}

function ModNote({ acc, connections }) {
  const [open, setOpen] = React.useState(false);
  const [text, setText] = React.useState(() => buildModNote(acc));
  const [status, setStatus] = React.useState("idle");
  const [errMsg, setErrMsg] = React.useState("");
  const conn = (connections || []).find((c) => c.host === acc.instance);
  const isMastodon = conn && conn.software === "Mastodon";
  const isMisskey = conn && !isMastodon;
  const canWrite = acc.live && isMastodon && acc.rawId;
  async function writeNote() {
    setStatus("writing"); setErrMsg("");
    try { await ReefAPI.writeModeratorNote(conn, acc.rawId, text); setStatus("done"); }
    catch (e) { setStatus("error"); setErrMsg(e.message || "Write failed"); }
  }
  function copyNote() {
    try { navigator.clipboard.writeText(text); } catch (e) {}
    setStatus("copied"); setTimeout(() => setStatus("idle"), 2200);
  }
  function regen() { setText(buildModNote(acc)); setStatus("idle"); setErrMsg(""); }
  return (
    <Section title="Moderator note" sub="TLP:AMBER · auto-generated finding summary" service="local">
      {!open ? (
        <button className="modnote-expand" onClick={() => setOpen(true)}>Draft a note →</button>
      ) : (
        <div className="modnote-body">
          <textarea className="modnote-ta mono" value={text} onChange={(e) => setText(e.target.value)} rows={5} />
          <div className="modnote-hint"><b>TLP:AMBER</b> — share within your moderation team only. No raw email address or verbatim join reason (minimum-necessary, per ENISA/FIRST guidelines). Edit any field before writing.</div>
          <div className="modnote-actions">
            <button className="modnote-regen" onClick={regen} title="Reset to auto-generated">↺ regenerate</button>
            {canWrite ? (
              <button className="modnote-write" disabled={status === "writing" || status === "done"} onClick={writeNote}>
                {status === "writing" ? "Writing\u2026" : status === "done" ? "\u2713 Written to account" : "Write to Mastodon account"}
              </button>
            ) : (
              <button className="modnote-copy" onClick={copyNote}>
                {status === "copied" ? "\u2713 Copied" : isMisskey ? "Copy \u2014 paste on server" : "Copy"}
              </button>
            )}
          </div>
          {status === "error" && <div className="modnote-err">{errMsg}<br /><button className="modnote-regen" style={{marginTop:4}} onClick={copyNote}>Copy instead</button></div>}
          {isMisskey && (
            <div className="modnote-hint modnote-hint-path">Sharkey / Misskey has no moderator-note API. Paste this text into the account’s <b>Moderator memo</b> field: Admin panel → Users → [account] → Moderator memo.</div>
          )}
          {!acc.live && (
            <div className="modnote-hint">Demo — “Write to server” is unavailable. In live mode, Mastodon writes via <span className="mono">POST /api/v1/accounts/:id/note</span> (<span className="mono">write:accounts</span> scope); Sharkey/Misskey uses copy-to-clipboard.</div>
          )}
        </div>
      )}
    </Section>
  );
}

function AccountInspector({ acc, inst, onAction, resolved, connections, acting, onActing, settings, onEnriched, onResend, onBlock, onUnblock, denyHits }) {
  const o = acc.osint;
  const recalc = JSON.stringify((settings && settings.weights) || {}) + "|" + JSON.stringify((settings && settings.affirmTerms) || {});
  return (
    <div className="inspector">
      {/* identity header */}
      <div className="insp-id">
        <Avatar name={acc.displayName || acc.username} hue={acc.tier === "high" ? 25 : acc.tier === "medium" ? 78 : 158} size={52} square />
        <div className="insp-id-main">
          <div className="insp-id-name">{acc.displayName}</div>
          <div className="insp-id-handle mono">@{acc.username}@{inst.host}</div>
        </div>
        <ConfirmPill acc={acc} />
        <ExportButton formats={[
          { label: "Native JSON", sub: "full archive · OSINT, sign-ins, denylist", fn: () => ReefExport.exportAccount(acc) },
          { label: "MISP Event", sub: "IoCs · MISP core data model", fn: () => ReefExport.exportAccountMISP(acc) },
          { label: "STIX 2.1", sub: "bundle · observables + indicator + note", fn: () => ReefExport.exportAccountSTIX(acc) },
        ]} />
        <TierChip tier={acc.tier} />
      </div>

      <ConfirmBanner acc={acc} onResend={onResend} />
      {denyHits && denyHits.length > 0 && <DenyBanner hits={denyHits} target={{ username: acc.username, host: acc.emailDomain }} />}

      <div className="insp-id-meta">
        <KV k="Applied" v={ago(acc.createdAt)} />
        <KV k="Server" v={inst.host} mono />
        <KV k="Software" v={<SoftwareBadge software={inst.software} name={inst.softwareName} />} />
        <KV k="Locale" v={acc.detectedLang} />
      </div>

      {/* assessment */}
      <Section title="Vantage assessment" sub="Weighted across all connected sources" service="reasoning engine">
        <div className="assess">
          <RiskGauge score={acc.risk} tier={acc.tier} />
          <div className="assess-body">
            <div className={"rec-banner tone-" + recColor(acc.recommend)}>
              <span className="rec-k">Suggested</span>
              <span className="rec-v">{recVerb(acc.recommend)}</span>
              <span className="rec-note">suggestion · you decide</span>
            </div>
            <p className="rationale">{acc.rationale}</p>
          </div>
        </div>
        <div className="signals">
          {acc.signals.map((s, i) => <SignalRow key={i} s={s} />)}
        </div>
      </Section>

      {/* submitted application */}
      <Section title="Application" sub="What the applicant submitted" service="signup form">
        <div className="appfields">
          <KV k="Email" v={acc.email} mono />
          <KV k="Email domain" v={acc.emailDomain} mono />
          <KV k="Signup IP" v={acc.ip} mono />
          <KV k="Geo / ASN" v={`${acc.ipCity}, ${acc.ipCountry} · ${acc.asnOrg}`} />
          <KV k="User agent" v={acc.ua} mono title={acc.ua} />
          <KV k="Accept-Language" v={acc.acceptLang} mono />
        </div>
        <div className="joinreason">
          <span className="joinreason-l">Reason for joining</span>
          <p className="joinreason-t">"{acc.reason}"</p>
        </div>
        {/* always-available blocks: the From-domain and the signup IP (mail-server
            blocking needs the live MX lookup and lives in the enrichment panel) */}
        <div className="block-row block-row-app">
          <BlockBtn label="Block email domain" sub={acc.emailDomain}
            protectedHost={ReefDenylist.isProtected(acc.emailDomain)}
            blocked={ReefDenylist.matchHost(acc.emailDomain).length > 0}
            onClick={() => onBlock && onBlock([{ kind: "domain", host: acc.emailDomain, comment: "Email domain — blocked from account review" }], "Blocked email domain " + acc.emailDomain, { instance: acc.instance, live: acc.live })}
            onUnblock={() => onUnblock && onUnblock([{ kind: "domain", host: acc.emailDomain }], "Unblocked email domain " + acc.emailDomain, { instance: acc.instance, live: acc.live })} />
          <BlockBtn label="Block signup IP" sub={acc.ip}
            blocked={ReefDenylist.matchIP(acc.ip).length > 0}
            onClick={() => onBlock && onBlock([{ kind: "ip", ip: acc.ip, comment: "Signup IP — blocked from account review" }], "Blocked IP " + acc.ip, { instance: acc.instance, live: acc.live })}
            onUnblock={() => onUnblock && onUnblock([{ kind: "ip", ip: acc.ip }], "Unblocked IP " + acc.ip, { instance: acc.instance, live: acc.live })} />
        </div>
        <div className="app-pivots">
          {acc.ip && <PivotLinks type="ip" value={acc.ip} label="signup IP" />}
          {acc.emailDomain && <PivotLinks type="domain" value={acc.emailDomain} label="email domain" />}
          {acc.email && <PivotLinks type="email" value={acc.email} only={["EmailRep", "SFS"]} label="email" />}
        </div>
      </Section>

      {/* ongoing sign-in IP history (existing accounts) */}
      <SigninHistory acc={acc} settings={settings} onBlock={onBlock} onUnblock={onUnblock} />

      {/* join-reason text analysis (local, runs for every applicant) */}
      <JoinReasonAnalysis acc={acc} />

      {/* IP intelligence (only when enriched) */}
      {o ? (<React.Fragment>
      {/* Demo-shaped OSINT card set. Each card is guarded by its own sub-object so a
          partial / differently-shaped osint degrades gracefully instead of blanking
          the UI (live-shaped imports are routed to _osintLive and render below). */}
      {(o.abuseipdb || o.ipqs) && (
      <Section title="IP &amp; network intelligence" service="AbuseIPDB · IPQS">
        <div className="osint-grid two">
          {o.abuseipdb && (
          <div className="osint-card">
            <div className="osint-card-h"><b>AbuseIPDB</b><span className="mono">confidence</span></div>
            <OsintMeter value={o.abuseipdb.score} />
            <div className="osint-mini">
              <KV k="Reports" v={(o.abuseipdb.reports || 0).toLocaleString()} mono />
              <KV k="Usage" v={o.abuseipdb.usage} />
              <KV k="Last seen" v={o.abuseipdb.lastReported || "never"} mono />
            </div>
          </div>
          )}
          {o.ipqs && (
          <div className="osint-card">
            <div className="osint-card-h"><b>IPQualityScore</b><span className="mono">fraud</span></div>
            <OsintMeter value={o.ipqs.fraud} />
            <div className="flag-row">
              <Flag on={o.ipqs.proxy} label="Proxy" />
              <Flag on={o.ipqs.vpn} label="VPN" />
              <Flag on={o.ipqs.tor} label="Tor" />
              <Flag on={o.ipqs.bot} label="Bot" />
            </div>
          </div>
          )}
        </div>
      </Section>
      )}

      {/* Email + domain */}
      {(o.emailrep || o.virustotal) && (
      <Section title="Email &amp; domain reputation" service="EmailRep · VirusTotal">
        <div className="osint-grid two">
          {o.emailrep && (
          <div className="osint-card">
            <div className="osint-card-h"><b>EmailRep</b><span className={"mono tone-" + (o.emailrep.reputation === "low" ? "bad" : o.emailrep.reputation === "high" ? "ok" : "warn")}>{o.emailrep.reputation}</span></div>
            <div className="flag-row">
              <Flag on={o.emailrep.disposable} label="Disposable" />
              <Flag on={!o.emailrep.deliverable} label="Deliverable" invert />
              <Flag on={o.emailrep.suspicious} label="Suspicious" />
            </div>
            <KV k="Domain age" v={o.emailrep.domainAgeDays != null ? Math.round(o.emailrep.domainAgeDays / 365) + " yrs (since " + o.emailrep.firstSeen + ")" : "unknown"} />
          </div>
          )}
          {o.virustotal && (
          <div className="osint-card">
            <div className="osint-card-h"><b>VirusTotal</b><span className="mono">domain</span></div>
            <div className="vt-row">
              <span className={"vt-pill " + (o.virustotal.malicious ? "tone-bad" : "tone-ok")}>{o.virustotal.malicious} malicious</span>
              <span className={"vt-pill " + (o.virustotal.suspicious ? "tone-warn" : "tone-ok")}>{o.virustotal.suspicious} suspicious</span>
            </div>
            <KV k="Registrar" v={o.virustotal.registrar} />
          </div>
          )}
        </div>
      </Section>
      )}

      {/* StopForumSpam — community spammer registry (IP / email / username) */}
      {o.sfs && (
        <Section title="StopForumSpam" service="community spammer registry">
          <div className="sfs-card sfs-card-flat">
            <div className="sfs-rows">
              <SfsRow label="IP" data={o.sfs.ip} value={acc.ip} />
              <SfsRow label="Email" data={o.sfs.email} value={acc.email} />
              <SfsRow label="Username" data={o.sfs.username} value={acc.username ? "@" + acc.username : ""} />
            </div>
            <div className="sfs-foot"><span className="sfs-note">Aggregated spam reports across forums &amp; sites · keyless lookup (IP + email + username)</span></div>
          </div>
        </Section>
      )}

      {/* text analysis */}
      <LiveEnrichment acc={acc} settings={settings} bind={false} initial={acc._osintLive} onBlock={onBlock} onUnblock={onUnblock} recalc={recalc} />
      </React.Fragment>) : (
        <LiveEnrichment acc={acc} settings={settings} bind={true} auto={acc.live && !acc._osintLive} initial={acc._osintLive} onEnriched={onEnriched} onBlock={onBlock} onUnblock={onUnblock} recalc={recalc} />
      )}

      {/* moderator note — draft a TLP:AMBER finding summary before or after acting */}
      <ModNote acc={acc} connections={connections} />

      {/* StopForumSpam — contribute a confirmed spammer back to the registry */}
      <SfsReport acc={acc} settings={settings} />

      {/* action bar */}
      {!resolved ? (
        <div className="action-wrap">
          {acc.live && <ActingAs host={acc.instance} connections={connections} value={acting} onChange={onActing} />}
          <div className="action-bar">
            <button className="act act-reject" onClick={() => onAction(acc, "reject")}>Reject</button>
            <button className="act act-hold" title="Hold is local only — no API call is made. The account stays pending on your server indefinitely. Use when you need more time or a second opinion." onClick={() => onAction(acc, "hold")}>Hold</button>
            <button className="act act-approve" onClick={() => onAction(acc, "approve")}>Approve</button>
          </div>
        </div>
      ) : (
        <div className="resolved-bar">
          {recVerb(acc._resolution)} {acc._resolution === "approve" ? "\u2713" : ""}
          {acc._resolution === "hold" && <span className="resolved-hold-note" title="Hold is local only — the account is still pending on your server"> · local only, still pending on server</span>}
        </div>
      )}
    </div>
  );
}

function JoinReasonAnalysis({ acc }) {
  const [a, setA] = useState(undefined);
  useEffect(() => {
    let live = true;
    const reason = (acc.reason || "").trim();
    if (!reason) { setA(null); return; }
    setA(undefined);
    Promise.resolve(window.ReefText ? window.ReefText.analyze(reason) : null).then((r) => { if (live) setA(r); });
    return () => { live = false; };
  }, [acc.id]);
  if (a === null) return null;
  return (
    <Section title="Join-reason text analysis" sub="Local — no text leaves your browser" service="Vantage Text Analysis">
      {a === undefined ? (
        <div className="enrich-loading"><span className="spinner" />Analyzing the join reason…</div>
      ) : (
        <React.Fragment>
          <div className="text-metrics">
            <div className="tm"><span className="tm-k">Language</span><span className="mono tm-v">{a.language.name}</span></div>
            <div className="tm"><span className="tm-k">Sentiment</span><span className="mono tm-v">{a.sentiment.label}</span></div>
            <div className="tm"><span className="tm-k">Links in text</span><span className={cx("mono tm-v", a.links && "tone-bad")}>{a.links}</span></div>
            <div className="tm"><span className="tm-k">Template / boilerplate</span><OsintMeter value={a.boilerplate} /></div>
            <div className="tm"><span className="tm-k">Coherence</span><OsintMeter value={a.coherence} invert /></div>
            <div className="tm"><span className="tm-k">On-topic / relevance</span>{a.relevance ? <OsintMeter value={a.relevance.score} invert /> : <span className="mono tm-v">—</span>}</div>
            <div className="tm"><span className="tm-k">Looks generated</span>{a.generated && a.generated.score ? <OsintMeter value={a.generated.score} /> : <span className="mono tm-v tone-ok">no</span>}</div>
            <div className="tm"><span className="tm-k">Campaign match</span>{a.campaigns.length ? <span className="mono tm-v tone-bad">{a.campaigns.length} hit{a.campaigns.length === 1 ? "" : "s"}</span> : <span className="mono tm-v tone-ok">none</span>}</div>
          </div>
          {a.nonsense && a.nonsense.evaluable && a.nonsense.score >= 30 && (
            <div className={cx("nonsense-flag", a.nonsense.score >= 55 ? "nf-bad" : "nf-warn")}>
              <span className="nf-tag">{a.nonsense.score >= 55 ? "Likely nonsense / generated" : "Questionable / off-topic"}</span>
              <ul className="nf-reasons">{a.nonsense.reasons.map((r, i) => <li key={i}>{r}</li>)}</ul>
            </div>
          )}
          {a.campaigns.length > 0 && (
            <div className="campaign-hits">
              {a.campaigns.map((c, i) => (
                <span key={i} className={cx("campaign-hit", c.status === "confirmed" ? "ch-bad" : "ch-warn")}>
                  {c.name} · {c.status}<span className="campaign-hit-terms">{c.matched.join(", ")}</span>
                </span>
              ))}
            </div>
          )}
          <p className="rationale soft">{a.note}</p>
        </React.Fragment>
      )}
    </Section>
  );
}

function ExportButton({ onClick, label, formats, triggerClass, title, disabled, menuUp }) {
  const [done, setDone] = useState(false);
  const [open, setOpen] = useState(false);
  const [menuStyle, setMenuStyle] = useState({});
  const wrapRef = useRef(null);
  const btnRef = useRef(null);
  useEffect(() => {
    if (!open) return;
    if (btnRef.current) {
      const r = btnRef.current.getBoundingClientRect();
      setMenuStyle(menuUp
        ? { position: "fixed", bottom: window.innerHeight - r.top + 4, right: window.innerWidth - r.right, top: "auto" }
        : { position: "fixed", top: r.bottom + 4, right: window.innerWidth - r.right }
      );
    }
    const h = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [open, menuUp]);
  function fire(fn) { fn(); setOpen(false); setDone(true); setTimeout(() => setDone(false), 1600); }
  if (!formats) {
    return (
      <button ref={btnRef} className={cx(triggerClass || "export-btn", done && "export-done")} disabled={disabled} onClick={() => fire(onClick)} title={title || "Download a JSON archive: account info, assessment, OSINT findings, sign-in IPs & denylist matches"}>
        {done ? "\u2713 saved" : (label || "\u2913 JSON")}
      </button>
    );
  }
  return (
    <div className={cx("export-wrap", triggerClass === "qexport" && "export-wrap-r")} ref={wrapRef}>
      <button ref={btnRef} className={cx(triggerClass || "export-btn", done && "export-done")} disabled={disabled} onClick={() => setOpen((o) => !o)} title={title || "Export this record"} aria-haspopup="true" aria-expanded={open}>
        {done ? "\u2713 saved" : (label || "\u2913 Export")}
      </button>
      {open && (
        <div className="export-menu" style={menuStyle} role="menu">
          {formats.map((f, i) => (
            <button key={i} className="export-menu-item" role="menuitem" onClick={() => fire(f.fn)}>
              <b>{f.label}</b>{f.sub ? <span>{f.sub}</span> : null}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function ConfirmPill({ acc }) {
  if (acc.emailConfirmed === true) return <span className="confirm-pill cp-ok" title="Email address confirmed">✓ confirmed</span>;
  if (acc.emailConfirmed === false) return <span className="confirm-pill cp-bad" title="Email address not confirmed">✉ unconfirmed</span>;
  return null;
}

function ConfirmBanner({ acc, onResend }) {
  if (acc.emailConfirmed === true) {
    return (
      <div className="confirm-gate confirm-ok">
        <span className="cg-icon">✓</span>
        <span className="cg-body">
          <b>Email confirmed</b>
          <span className="cg-sub">{acc.confirmedAt ? "Verified " + ago(acc.confirmedAt) + " — clears the registration gate." : "Address verified — clears the registration gate."}</span>
        </span>
        <span className="cg-tag mono">{acc.email}</span>
      </div>
    );
  }
  if (acc.emailConfirmed === false) {
    return (
      <div className="confirm-gate confirm-bad">
        <span className="cg-icon">!</span>
        <span className="cg-body">
          <b>Email not confirmed — hard requirement</b>
          <span className="cg-sub">The applicant hasn't clicked the verification link. This gate is independent of the email reputation score below — a clean address still has to be confirmed.</span>
        </span>
        {acc._resent
          ? <span className="cg-resent" title="Verification email re-sent — awaiting click">Re-sent ✓</span>
          : <button className="confirm-resend" onClick={() => onResend && onResend(acc)} title="Re-send the verification email via the server API">Resend verification</button>}
      </div>
    );
  }
  return (
    <div className="confirm-gate confirm-unknown">
      <span className="cg-icon">?</span>
      <span className="cg-body">
        <b>Confirmation status not reported</b>

      </span>

}

function SigninResult({ res, ip }) {
  if (res.error) return <div className="signin-res signin-res-err">Lookup failed: {res.error}</div>;
  const a = res.abuseipdb, q = res.ipqs;
  return (
    <div className="signin-res">
      <span className="sr-item"><span className="sr-k">ASN</span><span className="sr-v mono">{res.asn ? res.asn + " " + (res.asnOrg || "") : "—"}</span></span>
      <span className="sr-item"><span className="sr-k">rDNS</span><span className="sr-v mono">{res.rdns || "none"}</span></span>
      <span className="sr-item"><span className="sr-k">DNSBL</span><span className={cx("sr-v mono", res.dnsbl.count && "tone-bad")}>{res.dnsbl.count ? res.dnsbl.listed.join(", ") : "clean"}</span></span>
      {res.tor && <span className="sr-flag sf-bad">Tor exit</span>}
      {res.datacenter && <span className="sr-flag sf-warn">Datacenter</span>}
      <span className="sr-item"><span className="sr-k">AbuseIPDB</span>{a ? <span className={cx("sr-v mono", a.score >= 50 ? "tone-bad" : a.score >= 20 ? "tone-warn" : "tone-ok")}>{a.score}% · {a.reports} reports</span> : <span className="sr-v sr-na">{res.errors.abuseipdb || (res.keys.abuseipdb ? "no data" : "no key")}</span>}</span>
      <span className="sr-item"><span className="sr-k">IPQS</span>{q ? <span className={cx("sr-v mono", q.fraud >= 75 ? "tone-bad" : q.fraud >= 40 ? "tone-warn" : "tone-ok")}>fraud {q.fraud}{q.vpn ? " · VPN" : q.proxy ? " · proxy" : ""}</span> : <span className="sr-v sr-na">{res.errors.ipqs || (res.keys.ipqs ? "no data" : "no key")}</span>}</span>
      {ip && <PivotLinks type="ip" value={ip} only={["AbuseIPDB", "VirusTotal", "Shodan", "GreyNoise"]} />}
    </div>
  );
}

function SigninRow({ x, res, busy, onCheck, onRefresh, onBlock, onUnblock }) {
  const blocked = ReefDenylist.matchIP(x.ip).length > 0;
  return (
    <div className={cx("signin-row-wrap", res && "signin-open")}>
      <div className={cx("signin-row", x.sharedWith && x.sharedWith.length && "signin-flag")}>
        <span className="signin-ip mono">{x.ip}</span>
        <span className="signin-geo">{[x.city, x.country].filter(Boolean).join(", ") || "—"} · {x.asnOrg || "—"}</span>
        <span className="signin-flags">
          {x.tor && <span className="signin-tag st-bad">Tor</span>}
          {x.datacenter && <span className="signin-tag st-warn">DC</span>}
          {blocked && <span className="signin-tag st-bad">blocked</span>}
        </span>
        <span className="signin-count mono">{x.count || 1}×</span>
        <span className="signin-when mono">{ago(x.at)}</span>
        <button className={cx("signin-block", blocked && "signin-block-done")} onClick={blocked ? onUnblock : onBlock} title={blocked ? "On your IP blocklist — click to undo (lifts it on the server where possible)" : "Add this IP to your blocklist"}>{blocked ? "✓" : "⊘"}</button>
        <button className="signin-check" disabled={busy} onClick={res ? onRefresh : onCheck} title="Check this IP against AbuseIPDB / IPQS">
          {busy ? <span className="spinner" /> : res ? "↻" : "Check"}
        </button>
      </div>
      {res && <SigninResult res={res} ip={x.ip} />}
    </div>
  );
}

function SigninHistory({ acc, settings, onBlock, onUnblock }) {
  const ips = Array.isArray(acc.signinIps) ? acc.signinIps : [];
  const [res, setRes] = useState({});
  const [busy, setBusy] = useState({});
  if (ips.length < 2) return null;
  const countries = [...new Set(ips.map((x) => x.country).filter(Boolean))];
  const dc = ips.filter((x) => x.datacenter || x.tor).length;
  const shared = ips.flatMap((x) => (x.sharedWith || []).map((s) => ({ ...s, ip: x.ip })));
  const keys = (settings && settings.keys) || {};
  const proxy = (settings && settings.proxy) || "";

  async function check(ip, force) {
    setBusy((b) => ({ ...b, [ip]: true }));
    try {
      const out = await ReefEnrich.checkIP(ip, { keys, proxy, force: !!force });
      setRes((r) => ({ ...r, [ip]: out }));
    } catch (e) {
      setRes((r) => ({ ...r, [ip]: { ip, error: e.message } }));
    } finally { setBusy((b) => ({ ...b, [ip]: false })); }
  }
  async function checkAll() { for (const x of ips) { if (!res[x.ip]) { await check(x.ip); } } }

  return (
    <Section title="Sign-in IP history" sub="Ongoing logins — studied &amp; correlated" service="admin sign-in log"
      right={<button className="enrich-rerun" title="Run IP checks on every address" onClick={checkAll}>check all →</button>}>
      <div className="signin-summary">
        <span className="ss-stat"><b>{ips.length}</b> addresses</span>
        <span className="ss-stat"><b>{countries.length}</b> {countries.length === 1 ? "country" : "countries"}</span>
        {dc > 0 && <span className="ss-stat ss-warn"><b>{dc}</b> datacenter / Tor</span>}
        {shared.length > 0 && <span className="ss-stat ss-bad">shared-IP match</span>}
      </div>
      <div className="signin-list">
        {ips.map((x, i) => (
          <SigninRow key={i} x={x} res={res[x.ip]} busy={!!busy[x.ip]} onCheck={() => check(x.ip)} onRefresh={() => check(x.ip, true)}
            onBlock={() => onBlock && onBlock([{ kind: "ip", ip: x.ip, comment: "Sign-in IP — blocked from account review" }], "Blocked IP " + x.ip, { instance: acc.instance, live: acc.live })}
            onUnblock={() => onUnblock && onUnblock([{ kind: "ip", ip: x.ip }], "Unblocked IP " + x.ip, { instance: acc.instance, live: acc.live })} />
        ))}
      </div>
      {shared.length > 0 && (
        <div className="signin-corr">
          {shared.map((s, i) => (
            <span key={i} className={cx("corr-chip", (s.resolution === "reject" || s.tier === "high") ? "corr-bad" : "")}>
              {s.ip} → @{s.username}<span className="corr-meta mono">{s.instance}{s.resolution ? " · " + s.resolution : ""}</span>
            </span>
          ))}
        </div>
      )}
      <div className="corr-note">Each address can be sent to AbuseIPDB / IPQS individually — “Check” runs ASN · reverse-DNS · DNSBL (keyless) plus AbuseIPDB &amp; IPQS when keys are set in Services. Mind CGNAT &amp; mobile carriers — they place many unrelated users behind one address.</div>
    </Section>
  );
}

Object.assign(window, { AccountInspector, ExportButton, recColor, recVerb });

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — Report OSINT: instance & actor intelligence panel
   Split into THREE independently-runnable, cache-first lookups so
   a moderator can pivot on exactly what they need:
     • ReportActorPanel    → reported account profile + fields,
       username lookups (GitHub · StopForumSpam) and a LOCAL
       sentiment / abuse scan of the profile text.
       (ReefEnrich.runReportActor)
     • ReportInstancePanel → origin server OSINT: nodeinfo, RDAP
       domain age, hosting ASN · reverse-DNS · DNSBL, registration
       posture, software freshness, Observer, SFS instance-IP and
       cited-link reputation. (ReefEnrich.runReportInstance)
     • ReportPostsPanel    → run each reported post through the
       local text checker (ReefText.abuseScan) — no network.
   The wrapper lifts {actor, instance, links} up via onResult so the
   inspector can fill the real avatar + checked link domains.
   ============================================================ */

function riSrcDot(s) { return s === "ok" ? "ok" : s === "err" ? "bad" : s === "off" ? "off" : "na"; }
const RI_REG_LABEL = { "open-unmoderated": "Open · unmoderated", "open-moderated": "Open · moderated", closed: "Closed", invite: "Invite-only", unknown: "Reg. unknown" };
function riTone(verdict) { return verdict === "clean" ? "ok" : verdict === "borderline" ? "warn" : "bad"; }

function RISources({ res }) {
  if (!res || !res.sources || !res.sources.length) return null;
  return (
    <div className="src-strip">
      {res.sources.map((s, i) => (
        <span key={i} className={cx("src-chip", "src-" + riSrcDot(s.status), s.cached && "src-cached")} title={s.note + (s.cached ? ` · cached ${s.ageDays}d ago` : "")}>
          <span className="src-chip-dot" />{s.name}{s.cached ? <span className="src-age">{s.ageDays}d</span> : null}
        </span>
      ))}
    </div>
  );
}

// A runnable sub-panel shell: idle → run button; after a run → ↻ / ⟳! refresh.
function RIPanel({ title, sub, status, err, onGo, idleLabel, idleNote, children }) {
  return (
    <div className="ri-panel">
      <div className="ri-panel-h">
        <div className="ri-panel-tt"><b>{title}</b>{sub && <span className="ri-panel-sub">{sub}</span>}</div>
        {status === "idle"
          ? <button className="ri-run" onClick={() => onGo(false)}>{idleLabel} →</button>
          : <span className="ri-btns"><button className="enrich-rerun" title="Re-run (uses cache)" onClick={() => onGo(false)}>↻</button><button className="enrich-rerun" title="Force refresh (bypass cache)" onClick={() => onGo(true)}>⟳!</button></span>}
      </div>
      {status === "idle" && idleNote && <div className="muted-line" style={{ marginTop: 6 }}>{idleNote}</div>}
      {status === "running" && <div className="enrich-loading"><span className="spinner" /> Querying…</div>}
      {status === "error" && <div className="muted-line tone-bad">Lookup failed: {err}</div>}
      {children}
    </div>
  );
}

// ---- 1) reported account profile + username lookups + profile-text sentiment ----
function ReportActorPanel({ rep, settings, onRes }) {
  const [status, setStatus] = useState("idle");
  const [res, setRes] = useState(null);
  const [err, setErr] = useState(null);
  async function go(force) {
    setStatus("running"); setErr(null);
    try {
      window.__reefProxy = (settings && settings.proxy) || "";
      const out = await ReefEnrich.runReportActor(rep, { proxy: (settings && settings.proxy) || "", sfs: (settings && settings.sfs) || {}, force: !!force });
      setRes(out); setStatus("done"); if (onRes) onRes(out);
    } catch (e) { setErr(e.message || String(e)); setStatus("error"); }
  }
  const ac = res && res.actor;
  const sc = res && res.profile && res.profile.scan;
  const sent = res && res.profile && res.profile.sentiment;
  return (
    <RIPanel title="Reported account &amp; profile" sub="username lookups · profile-text sentiment" status={status} err={err} onGo={go}
      idleLabel={"Look up @" + rep.target.username}
      idleNote="WebFinger/ActivityPub profile &amp; fields, GitHub + StopForumSpam username checks, and a local harassment / hate / sexism sentiment scan of the display name, bio and profile fields. Keyless &amp; cache-first.">
      {res && <RISources res={res} />}
      {ac && (
        <div className="osint-card" style={{ marginTop: 10 }}>
          <div className="osint-card-h"><b>Profile</b><span className="mono">{ac.exists ? "live profile" : "no AP data"}</span></div>
          <div className="intel-actor">
            <Avatar name={rep.target.displayName || rep.target.username} src={ac.avatar} hue={rep.target.avatarHue} size={42} square />
            <div className="osint-mini" style={{ flex: 1 }}>
              <KV k="Account age" v={ac.ageDays != null ? `${ac.ageDays}d (${(ac.createdAt || "").slice(0, 10)})` : "—"} />
              <KV k="Followers" v={ac.followers != null ? ac.followers.toLocaleString() : "—"} mono />
              <KV k="Posts" v={ac.posts != null ? ac.posts.toLocaleString() : "—"} mono />
            </div>
          </div>
          {ac.fields && ac.fields.length > 0 && (
            <div className="intel-fields">
              {ac.fields.map((f, i) => (<div key={i} className="intel-field"><span className="if-k">{f.name}</span><span className="if-v mono">{f.value}</span></div>))}
            </div>
          )}
        </div>
      )}
      {res && (
        <div className="ri-lookups">
          <PivotLinks type="username" value={rep.target.username} label="username" />
          <span className="ri-gh">GitHub: <b className={cx("mono", res.gh === "exists" ? "tone-ok" : "")}>{res.gh === "exists" ? "profile found" : res.gh === "none" ? "no profile" : "unknown"}</b></span>
        </div>
      )}
      {res && res.sfs && (
        <div className="sfs-card sfs-card-flat" style={{ marginTop: 10 }}>
          <div className="sfs-rows"><SfsRow label="Username" data={res.sfs.username} value={rep.target.username ? "@" + rep.target.username : ""} /></div>
          <div className="sfs-foot"><span className="sfs-note">Community spammer registry · keyless username lookup</span></div>
        </div>
      )}
      {sc && sc.evaluable && (
