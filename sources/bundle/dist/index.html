      else setMsg({ tone: "ok", text: `Connected · ${id} · ${n} dataset${n === 1 ? "" : "s"} available.` });
    } catch (e) {
      if (window.ReefLog) window.ReefLog.debug("fires", "discover failed", e && e.message);
      setMsg({ tone: "bad", text: firesErrText(e) });
    } finally { setBusy(false); }
  }

  async function importDataset(ds) {
    setRowBusy(ds.id); setMsg(null);
    window.__reefProxy = proxy;
    try {
      const { entries, count } = await ReefFires.fetchSnapshot(ds.snapshot, proxy, token);
      const id = ReefFires.listId(fires.server || server, ds.id);
      ReefDenylist.addList({ id, name: "FIRES · " + ds.name, source: "fires", format: "fires", url: ds.id }, entries);
      patchFires({ synced: Object.assign({}, synced, { [ds.id]: { at: Date.now(), count, listId: id, name: ds.name } }) });
      onDenylistChange && onDenylistChange();
      const doms = entries.filter((e) => e.kind === "domain").length;
      const acts = entries.filter((e) => e.kind === "actor").length;
      setMsg({ tone: "ok", text: `Imported “${ds.name}” → ${doms} domain${doms === 1 ? "" : "s"}${acts ? " · " + acts + " actor" + (acts === 1 ? "" : "s") : ""} into Denylists.` });
    } catch (e) {
      if (window.ReefLog) window.ReefLog.debug("fires", "snapshot failed", e && e.message);
      setMsg({ tone: "bad", text: firesErrText(e) });
    } finally { setRowBusy(null); }
  }

  function removeSync(ds) {
    const s = synced[ds.id];
    if (s && window.ReefDenylist) window.ReefDenylist.removeList(s.listId);
    const next = Object.assign({}, synced); delete next[ds.id];
    patchFires({ synced: next });
    onDenylistChange && onDenylistChange();
    setMsg({ tone: "warn", text: `Removed “${ds.name}” from your denylists.` });
  }

  const syncedCount = Object.keys(synced).length;

  return (
    <div className="modal-body">
      <div className="score-intro">
        <b>FediMod FIRES</b> servers distribute moderation <span className="tone-warn">advisories</span> and <span className="tone-bad">recommendations</span>
        about Fediverse domains &amp; actors, versioned over time. Connect a server, then import a dataset — its current
        recommendations land in <b>Denylists</b> (reject → suspend · filter → silence · drop → suspend + reject media),
        checked against every report &amp; signup. Re-import any time to pull the latest snapshot.
      </div>

      <div className="fires-conn">
        <div className="svc-section-h">FIRES server</div>
        <div className="fires-conn-row">
          <input className="conn-input mono" placeholder="https://fires.example.org" value={server}
            onChange={(e) => setServer(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && server.trim()) connect(); }} />
          <button className="svc-test fires-connect" disabled={busy || !server.trim()} onClick={connect}>{busy ? "Connecting…" : datasets.length ? "Reconnect" : "Connect"}</button>
        </div>
        <div className="fires-conn-row">
          <input className="conn-input mono" type={reveal ? "text" : "password"} placeholder="Access token — optional, only for servers that gate reads" value={token} onChange={(e) => setToken(e.target.value)} />
          <button className="svc-reveal" onClick={() => setReveal((r) => !r)} title={reveal ? "Hide" : "Show"}>{reveal ? "◎" : "○"}</button>
        </div>
        {!proxy && <div className="svc-proxy-note">No proxy set — most FIRES servers block direct browser calls (CORS). If Connect fails with a network error, add a proxy on the <b>API keys</b> tab.</div>}
        {msg && <div className={cx("svc-detail", "tone-" + (msg.tone === "ok" ? "ok" : msg.tone === "warn" ? "warn" : msg.tone === "bad" ? "bad" : "accent"))}>{msg.text}</div>}
        {(fires.software || fires.server) && !busy && (
          <div className="fires-ident mono">
            {fires.isFires ? <span className="fires-badge ok">FIRES</span> : <span className="fires-badge na">protocol?</span>}
            {fires.software ? fires.software + (fires.version ? " " + fires.version : "") : fires.server}
            {syncedCount > 0 && <span className="fires-ident-sub"> · {syncedCount} dataset{syncedCount === 1 ? "" : "s"} imported</span>}
          </div>
        )}
      </div>

      {datasets.length > 0 && (
        <div className="fires-ds-list">
          <div className="svc-section-h">Datasets <span className="opt">import a snapshot into your denylists</span></div>
          {datasets.map((ds) => (
            <DatasetRow key={ds.id} ds={ds} sync={synced[ds.id]} busy={rowBusy === ds.id}
              onImport={() => importDataset(ds)} onRemove={() => removeSync(ds)} />
          ))}
        </div>
      )}
      {datasets.length === 0 && !busy && (
        <div className="muted-line fires-empty">No datasets loaded. Enter a FIRES server URL above and connect — try the public <span className="mono">fires.fedimod.org</span> or your own server.</div>
      )}
    </div>
  );
}

function ServicesModal({ open, onClose, settings, onSettings, onSetKey, onDenylistChange, serverSession, vaultKeys, onVaultRefresh }) {
  const [tab, setTab] = useState("free");
  if (!open) return null;
  const hosted = !!serverSession;
  const proxy = settings.proxy || "";
  const keys = settings.keys || {}; // hosted mode: vault sentinels mirrored by app.jsx, not real keys
  const configured = ALL_KEY_SERVICES.filter((s) => keys[s.key]).length;
  const firesSynced = Object.keys((settings.fires || {}).synced || {}).length;

  // One card renderer for both deployments: hosted gets the write-only vault
  // card, standalone keeps the localStorage key card. adminHosts = every
  // connected instance where this person holds the admin role (share targets).
  const adminHosts = hosted
    ? ((serverSession.connections && serverSession.connections.length ? serverSession.connections : [serverSession])
        .filter((c) => c.capabilities && c.capabilities.admin).map((c) => c.instance))
    : [];
  const card = (svc) => hosted
    ? <VaultServiceCard key={svc.key} svc={svc} vault={vaultKeys} adminHosts={adminHosts} sfsOpts={settings.sfs} onChanged={onVaultRefresh} />
    : <ServiceCard key={svc.key} svc={svc} value={keys[svc.key]} proxy={proxy} sfsOpts={settings.sfs} onChange={(v) => onSetKey(svc.key, v)} />;

  const sub = tab === "free"
    ? "Always-on sources + no-key APIs — run without a key"
    : tab === "keyed"
    ? `Keyed OSINT APIs · ${KEY_SERVICES.filter((s) => keys[s.key]).length}/${KEY_SERVICES.length} configured`
    : `FediMod FIRES server${firesSynced ? " · " + firesSynced + " dataset" + (firesSynced === 1 ? "" : "s") + " imported" : ""}`;

  return (
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <header className="modal-h">
          <div><h3>Services</h3><span className="modal-sub">{sub}</span></div>
          <button className="modal-x" onClick={onClose}>✕</button>
        </header>

        <div className="score-tabs">
          <button className={cx("score-tab", tab === "free" && "score-tab-on")} onClick={() => setTab("free")}>Free &amp; keyless</button>
          <button className={cx("score-tab", tab === "keyed" && "score-tab-on")} onClick={() => setTab("keyed")}>API keys <span className="score-tab-n">{configured ? KEY_SERVICES.filter((s) => keys[s.key]).length : ""}</span></button>
          <button className={cx("score-tab", tab === "fires" && "score-tab-on")} onClick={() => setTab("fires")}>FIRES{firesSynced ? <span className="score-tab-n">{firesSynced}</span> : null}</button>
        </div>

        {tab === "free" && (
          <div className="modal-body">
            <div className="score-intro">
              These run <b>browser-direct with no API key</b> — they're always part of every assessment. Nothing to configure;
              the keyless APIs below take an optional free key only to raise their rate limits.
            </div>

            <div className="svc-list">
              <div className="svc-section-h">Keyless APIs <span className="opt">work with no key · a free key raises limits</span></div>
              {API_FREE_SERVICES.map((svc) => (
                <React.Fragment key={svc.key}>
                  {card(svc)}
                  {svc.key === "stopforumspam" && <SfsOptions opts={settings.sfs} onChange={(next) => onSettings({ sfs: next })} />}
                </React.Fragment>
              ))}
            </div>

            <div className="svc-free">
              <div className="svc-section-h">Always-on sources <span className="opt">no key, no proxy — run browser-direct</span></div>
              <div className="svc-free-grid">
                {FREE_SOURCES.map(([n, d]) => (
                  <div key={n} className="svc-free-item">
                    <span className="svc-free-dot" />
                    <div><b>{n}</b><span>{d}</span></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab === "keyed" && (
          <div className="modal-body">
            {hosted ? (
              <div className="svc-proxy-box">
                <div className="svc-section-h">Server vault <span className="opt">no CORS proxy needed</span></div>
                <div className="svc-proxy-note">
                  Keyed lookups run through the Vantage server, which stores API keys sealed in its vault and injects them
                  server-side — your browser never holds a key. Add your own keys below; an admin of{" "}
                  <span className="mono">{serverSession.instance}</span> can share one key per service with every moderator.
                </div>
              </div>
            ) : (
              <div className="svc-proxy-box">
                <div className="svc-section-h">Proxy <span className="opt">required for keyed services (they block direct browser calls)</span></div>
                <input className="conn-input mono" placeholder="https://my-proxy.example/fetch?url=" value={proxy}
                  onChange={(e) => onSettings({ proxy: e.target.value })} />
                <div className="svc-proxy-note">
                  The proxy must forward request headers (<code>x-apikey</code>, <code>Key</code>) and append the target URL. A
                  cors-anywhere-style relay works. Without it, VirusTotal / AbuseIPDB / IPQS can't be reached from the browser —
                  the free sources still run with no proxy. This proxy is also used for FIRES.
                </div>
              </div>
            )}

            <div className="svc-list">
              <div className="svc-section-h">Keyed services</div>
              {KEY_SERVICES.map((svc) => card(svc))}
            </div>
          </div>
        )}

        {tab === "fires" && <FiresPanel settings={settings} onSettings={onSettings} onDenylistChange={onDenylistChange} />}
      </div>
    </div>
  );
}

Object.assign(window, { ServicesModal });

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — Scoring panel: transparent weights + manual tuning
   + cache/data management
   ============================================================ */

function WeightRow({ spec, value, def, onChange }) {
  const [id, dflt, dir, label, group] = spec;
  const min = dflt < 0 ? -40 : 0;
  const max = dflt < 0 ? 0 : 40;
  const changed = value !== def;
  const tone = dir === "bad" ? "bad" : dir === "warn" ? "warn" : "ok";
  const help = (window.ReefWeights.HELP && window.ReefWeights.HELP[id]) || label;
  const dirWord = dir === "ok" ? "lowers risk" : "raises risk";
  const tip = help + "\n\n(" + dirWord + " · default " + (dflt >= 0 ? "+" : "") + dflt + ")";
  return (
    <div className="wrow">
      <div className="wrow-l">
        <span className={"wdot tone-" + tone} />
        <span className="wrow-label" title={tip}>{label}</span>
        <span className="wrow-help" tabIndex={0} role="img" aria-label={help} title={tip}>?</span>
        {changed && <button className="wrow-reset" title="Reset to default" onClick={() => onChange(def)}>↺</button>}
      </div>
      <input className={"wrange wr-" + tone} type="range" min={min} max={max} step="1" value={value}
        onChange={(e) => onChange(parseInt(e.target.value, 10))} />
      <input className="wnum mono" type="number" min={min} max={max} value={value}
        onChange={(e) => onChange(Math.max(min, Math.min(max, parseInt(e.target.value || "0", 10))))} />
    </div>
  );
}

// Protected email-domain editor: shipped list (some removable) + admin additions.
function ProtectedDomains({ settings, onSettings }) {
  const [draft, setDraft] = useState("");
  const base = window.ReefDenylist ? window.ReefDenylist.PROTECTED : [];
  const ov = settings.protectedDomains || { add: [], remove: [] };
  const added = ov.add || [];
  const removed = ov.remove || [];
  const dirty = added.length > 0 || removed.length > 0;
  function commit(next) { onSettings({ protectedDomains: next }); }
  function clean(d) { return String(d || "").trim().toLowerCase().replace(/^@/, "").replace(/^https?:\/\//, "").replace(/\/.*$/, ""); }
  function addDomain() {
    const d = clean(draft);
    if (!d || !d.includes(".")) return;
    if (base.includes(d) && !removed.includes(d)) { setDraft(""); return; } // already protected
    const next = { add: added.includes(d) ? added : added.concat([d]), remove: removed.filter((r) => r !== d) };
    commit(next); setDraft("");
  }
  function removeBase(d) { commit({ add: added, remove: removed.includes(d) ? removed : removed.concat([d]) }); }
  function restoreBase(d) { commit({ add: added, remove: removed.filter((r) => r !== d) }); }
  function removeAdded(d) { commit({ add: added.filter((a) => a !== d), remove: removed }); }
  function resetAll() { commit({ add: [], remove: [] }); }
  return (
    <div className="wgroup">
      <div className="wgroup-h">Protected email domains
        <button className="score-reset-all pd-reset" onClick={resetAll} disabled={!dirty}>Restore defaults</button>
      </div>
      <div className="cache-note">Major mailbox + infrastructure providers that the block buttons and feed imports <b>refuse to block</b>, so you can’t wall off the world’s largest mail services by accident. Add your own, or un-protect a shipped one if your policy requires it.</div>
      <div className="pd-add">
        <input className="conn-input mono" placeholder="add a domain to protect, e.g. fastmail.com" value={draft}
          onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") addDomain(); }} />
        <button className="cache-btn" onClick={addDomain} disabled={!clean(draft).includes(".")}>Add</button>
      </div>
      {added.length > 0 && (
        <div className="pd-block">
          <div className="pd-sub">Your additions</div>
          <div className="pd-chips">
            {added.map((d) => <span key={d} className="pd-chip pd-chip-add">{d}<button title="Remove" onClick={() => removeAdded(d)}>×</button></span>)}
          </div>
        </div>
      )}
      <div className="pd-block">
        <div className="pd-sub">Shipped defaults <span className="pd-count mono">{base.length}</span></div>
        <div className="pd-chips">
          {base.map((d) => {
            const off = removed.includes(d);
            return <span key={d} className={cx("pd-chip", off && "pd-chip-off")}>{d}
              {off ? <button title="Restore protection" onClick={() => restoreBase(d)}>↺</button>
                   : <button title="Un-protect (allow blocking)" onClick={() => removeBase(d)}>×</button>}
            </span>;
          })}
        </div>
      </div>
    </div>
  );
}

function ScoringModal({ open, onClose, settings, onSettings }) {
  const [cacheStats, setCacheStats] = useState(null);
  const [tab, setTab] = useState("weights");
  const intelFileRef = useRef(null);
  const [intelMsg, setIntelMsg] = useState(null);
  useEffect(() => { if (open && window.ReefCache) setCacheStats(window.ReefCache.stats()); }, [open]);
  if (!open) return null;

  const SPEC = window.ReefWeights.SPEC;
  const DEFAULTS = window.ReefWeights.DEFAULTS;
  const weights = window.ReefWeights.resolve(settings);
  const groups = {};
  SPEC.forEach((s) => { (groups[s[4]] = groups[s[4]] || []).push(s); });

  function setWeight(id, v) { onSettings({ weights: Object.assign({}, settings.weights, { [id]: v }) }); }
  function resetAll() { onSettings({ weights: {} }); }
  const overridden = Object.keys(settings.weights || {}).filter((k) => settings.weights[k] !== DEFAULTS[k]).length;

  const pdDirty = ((settings.protectedDomains || {}).add || []).length + ((settings.protectedDomains || {}).remove || []).length;

  const TTL = window.ReefCache ? window.ReefCache.TTL : {};
  function importIntel(e) {
    const file = e.target.files && e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const res = window.ReefExport.importCacheText(String(r.result));
        setCacheStats(window.ReefCache.stats());
        setIntelMsg({ tone: "ok", text: `Imported ${res.imported} ${res.format} indicator${res.imported === 1 ? "" : "s"}${res.skipped ? " · " + res.skipped + " dup/skip" : ""}.` });
      } catch (err) { setIntelMsg({ tone: "bad", text: "Import failed: " + err.message }); }
    };
    r.readAsText(file); e.target.value = "";
  }

  return (
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <header className="modal-h">
          <div><h3>Scoring &amp; data</h3><span className="modal-sub">{tab === "weights" ? `Tune how risk is calculated · ${overridden} weight${overridden === 1 ? "" : "s"} customized` : `Protected email-domain guardrails${pdDirty ? " · " + pdDirty + " customized" : ""}`}</span></div>
          <button className="modal-x" onClick={onClose}>✕</button>
        </header>

        <div className="score-tabs">
          <button className={cx("score-tab", tab === "weights" && "score-tab-on")} onClick={() => setTab("weights")}>Signal weights</button>
          <button className={cx("score-tab", tab === "admin" && "score-tab-on")} onClick={() => setTab("admin")}>Protected domains</button>
        </div>

        {tab === "weights" ? (
        <div className="modal-body">
          <div className="score-intro">
            Every account starts at <b className="mono">5</b>. Each matched signal adds its weight (negative weights
            <span className="tone-ok"> reduce</span> risk). Final score → <span className="tone-ok">Low &lt;34</span> ·
            <span className="tone-warn"> Elevated 34–65</span> · <span className="tone-bad"> High ≥66</span>.
            Adjust any weight below; changes apply live and are saved on this device.
            <button className="score-reset-all" onClick={resetAll} disabled={!overridden}>Reset all to defaults</button>
          </div>

          {Object.entries(groups).map(([g, specs]) => (
            <div key={g} className="wgroup">
              <div className="wgroup-h">{g}</div>
              {specs.map((s) => (
                <WeightRow key={s[0]} spec={s} value={weights[s[0]]} def={DEFAULTS[s[0]]} onChange={(v) => setWeight(s[0], v)} />
              ))}
            </div>
          ))}

          <div className="wgroup">
            <div className="wgroup-h">Cache &amp; data freshness</div>
            <div className="cache-note">
              Lookups are cached locally so paid / rate-limited APIs aren't re-queried while fresh.
              Freshness windows: <b>IP {Math.round((TTL.ip||0)/window.ReefCache.DAY)}d</b> ·
              <b> domain {Math.round((TTL.domain||0)/window.ReefCache.DAY)}d</b> ·
              <b> VirusTotal {Math.round((TTL.vt||0)/window.ReefCache.DAY)}d</b> ·
              <b> AbuseIPDB {Math.round((TTL.abuseipdb||0)/window.ReefCache.DAY)}d</b>.
            </div>
            {cacheStats && (
              <div className="cache-stats">
                <div className="cstat"><b>{cacheStats.entries}</b><span>cached lookups</span></div>
                <div className="cstat"><b>{cacheStats.ips}</b><span>IPs tracked</span></div>
                {Object.entries(cacheStats.byNs).map(([ns, n]) => <div key={ns} className="cstat"><b>{n}</b><span>{ns}</span></div>)}
              </div>
            )}
            <div className="cache-actions">
              <ExportButton triggerClass="cache-btn" label="⤓ Export database" title="Export the cached OSINT lookups + IP/actor correlation as indicators"
                formats={[
                  { label: "MISP Event", sub: "deduped indicators · MISP core model", fn: () => window.ReefExport.exportCacheMISP() },
                  { label: "STIX 2.1", sub: "bundle · observables + indicators", fn: () => window.ReefExport.exportCacheSTIX() },
                  { label: "CSV", sub: "one row per indicator", fn: () => window.ReefExport.exportCacheCSV() },
                  { label: "Raw JSON", sub: "full cache + correlation dump", fn: () => window.ReefExport.exportCacheJSON() },
                ]} menuUp />
              <button className="cache-btn" onClick={() => { window.ReefCache.clear(); setCacheStats(window.ReefCache.stats()); }}>Clear cached lookups</button>
              <button className="cache-btn cache-btn-warn" onClick={() => { window.ReefCache.clearAll(); setCacheStats(window.ReefCache.stats()); }}>Clear all (incl. IP correlation)</button>
            </div>
            <div className="cache-import">
              <button className="cache-btn" onClick={() => intelFileRef.current && intelFileRef.current.click()} title="Pre-seed the cache with known-bad IPs / domains from a MISP event or STIX 2.1 bundle">⤒ Import threat intel (MISP / STIX)</button>
              <input ref={intelFileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={importIntel} />
              {intelMsg && <span className={cx("cache-import-msg", "tone-" + intelMsg.tone)}>{intelMsg.text}</span>}
            </div>
            <div className="cache-note cache-note-sub">Imported indicators are stored under an <b>intel</b> namespace and flagged known-bad, so a reviewed account or report that references one is caught without an API call.</div>
          </div>
        </div>
        ) : (
        <div className="modal-body">
          <div className="score-intro">
            Major mailbox &amp; infrastructure providers that Vantage <b>refuses to block</b> — so a stray click or an imported feed can’t wall off the world’s largest mail services by accident. Add your own, or un-protect a shipped one if your policy requires it. Applies live to the block buttons and feed imports.
          </div>

          <ProtectedDomains settings={settings} onSettings={onSettings} />
        </div>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { ScoringModal });

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — Denylists modal (import / manage shared blocklists)

function dlDownload(name, text, type) {
  const b = new Blob([text], { type: type || "text/plain" });
  const u = URL.createObjectURL(b);
  const a = document.createElement("a");
  a.href = u; a.download = name; document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(u); a.remove(); }, 1000);
}
async function dlFetchUrl(url) {
  const proxy = window.__reefProxy || "";
  const target = proxy ? (proxy.includes("=") ? proxy + encodeURIComponent(url) : proxy.replace(/\/?$/, "/") + url) : url;
  const r = await fetch(target, { mode: "cors" });
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.text();
}

function ImportCard({ onAdded }) {
  const [name, setName] = useState("");
  const [format, setFormat] = useState("auto");
  const [mode, setMode] = useState("paste"); // paste | upload | url
  const [text, setText] = useState("");
  const [url, setUrl] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const parsed = React.useMemo(() => text.trim() ? ReefDenylist.parse(text, format) : null, [text, format]);
  const nDom = parsed ? parsed.entries.filter((e) => e.kind === "domain").length : 0;
  const nAct = parsed ? parsed.entries.filter((e) => e.kind === "actor").length : 0;
  const nIp = parsed ? parsed.entries.filter((e) => e.kind === "ip").length : 0;

  function onFile(e) {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    if (!name) setName(f.name.replace(/\.[^.]+$/, ""));
    const reader = new FileReader();
    reader.onload = () => setText(String(reader.result || ""));
    reader.readAsText(f);
  }
  async function loadUrl(presetUrl, presetName, presetFmt) {
    const u = presetUrl || url;
    if (!u) return;
    setBusy(true); setErr("");
    if (presetName && !name) setName(presetName);
    if (presetFmt) setFormat(presetFmt);
    if (presetUrl) setUrl(presetUrl);
    try { setText(await dlFetchUrl(u)); }
    catch (e) { setErr("Fetch failed (" + e.message + "). The CSV is often CORS-blocked — set a proxy in Services, or download it and paste/upload instead."); }
    finally { setBusy(false); }
  }
  function add() {
    if (!parsed || !parsed.entries.length) return;
    ReefDenylist.addList({ name: name || "Imported list", source: mode, format: parsed.format, url: mode === "url" ? url : "" }, parsed.entries);
    setName(""); setText(""); setUrl(""); setErr(""); setFormat("auto");
    onAdded && onAdded();
  }

  return (
    <div className="dl-import">
      <div className="svc-section-h">Import a list</div>

      <div className="dl-presets">
        <span className="dl-presets-l">IFTAS quick-add:</span>
        {ReefDenylist.IFTAS_PRESETS.map((p) => (
          <button key={p.name} className="dl-preset" disabled={busy} title={p.note + "  ·  " + p.url} onClick={() => { setMode("url"); loadUrl(p.url, p.name, p.format); }}>{p.name}</button>
        ))}
      </div>

      <div className="dl-row">
        <input className="conn-input dl-name" placeholder="List name (e.g. IFTAS DNI)" value={name} onChange={(e) => setName(e.target.value)} />
        <select className="dl-select" value={format} onChange={(e) => setFormat(e.target.value)}>
          {ReefDenylist.FORMATS.map((f) => <option key={f.id} value={f.id}>{f.label}</option>)}
        </select>
      </div>

      <div className="seg-group dl-modes">
        {["paste", "upload", "url"].map((m) => (
          <button key={m} className={cx("seg", mode === m && "seg-on")} onClick={() => setMode(m)}>{m === "url" ? "Fetch URL" : m === "upload" ? "Upload file" : "Paste"}</button>
        ))}
      </div>

      {mode === "paste" && (
        <textarea className="conn-input dl-textarea mono" placeholder="Paste a Mastodon CSV, Sharkey host list, @user@domain handles, a MISP / STIX 2.1 export, or a FediMod FIRES dataset / changes (JSON)…" value={text} onChange={(e) => setText(e.target.value)} />
      )}
      {mode === "upload" && (
        <label className="dl-upload">
          <input type="file" accept=".csv,.txt,.json,text/csv,text/plain,application/json" onChange={onFile} />
          <span>{text ? "File loaded — review below" : "Choose a .csv / .txt / .json file"}</span>
        </label>
      )}
      {mode === "url" && (
        <div className="dl-url-row">
          <input className="conn-input mono" placeholder="https://…/blocklist.csv" value={url} onChange={(e) => setUrl(e.target.value)} />
          <button className="svc-test" disabled={busy || !url} onClick={() => loadUrl()}>{busy ? "Fetching…" : "Fetch"}</button>
        </div>
      )}

      {err && <div className="dl-err">{err}</div>}

      {parsed && (
        <div className="dl-preview">
          <span className="dl-preview-fmt mono">{parsed.format}</span>
          <span className="dl-preview-counts">{nDom} domain{nDom === 1 ? "" : "s"}{nAct ? ` · ${nAct} actor${nAct === 1 ? "" : "s"}` : ""}{nIp ? ` · ${nIp} IP${nIp === 1 ? "" : "s"}` : ""}</span>
          <button className="dl-add" disabled={!parsed.entries.length} onClick={add}>Add list</button>
        </div>
      )}
    </div>
  );
}

function ListCard({ L, onChange }) {
  const dom = (L.entries || []).filter((e) => e.kind === "domain");
  const act = (L.entries || []).filter((e) => e.kind === "actor");
  const ipE = (L.entries || []).filter((e) => e.kind === "ip");
  const susp = dom.filter((e) => e.severity === "suspend").length;
  const sil = dom.filter((e) => e.severity === "silence").length;
  return (
    <div className={cx("dl-card", L.enabled === false && "dl-card-off")}>
      <div className="dl-card-top">
        <label className="dl-toggle" title={L.enabled === false ? "Disabled — not used for matching" : "Enabled"}>
          <input type="checkbox" checked={L.enabled !== false} onChange={(e) => { ReefDenylist.setEnabled(L.id, e.target.checked); onChange(); }} />
        </label>
        <div className="dl-card-id">
          <div className="dl-card-name">{L.name}</div>
          <div className="dl-card-meta mono">{L.format} · {L.source}{L.url ? " · " + L.url.replace(/^https?:\/\//, "").slice(0, 36) : ""}</div>
        </div>
        <button className="conn-remove" title="Remove list" onClick={() => { ReefDenylist.removeList(L.id); onChange(); }}>✕</button>
      </div>
      <div className="dl-card-stats">
        <span className="dl-stat"><b>{dom.length}</b> domains</span>
        {susp > 0 && <span className="dl-stat dl-stat-bad">{susp} suspend</span>}
        {sil > 0 && <span className="dl-stat dl-stat-warn">{sil} silence</span>}
        {act.length > 0 && <span className="dl-stat"><b>{act.length}</b> actors</span>}
        {ipE.length > 0 && <span className="dl-stat"><b>{ipE.length}</b> IPs</span>}
      </div>
    </div>
  );
}

function DenylistsModal({ open, onClose, onChange }) {
  const [tick, setTick] = useState(0);
  if (!open) return null;
  const bump = () => { setTick((t) => t + 1); onChange && onChange(); };
  const L = ReefDenylist.lists();
  const st = ReefDenylist.stats();

  return (
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <header className="modal-h">
          <div>
            <h3>Denylists</h3>
            <span className="modal-sub">Shared blocklists checked against reports &amp; signups · {st.entries.toLocaleString()} entries across {st.lists} list{st.lists === 1 ? "" : "s"} ({st.domains} domains · {st.actors} actors{st.ips ? " · " + st.ips + " IPs" : ""})</span>
          </div>
          <button className="modal-x" onClick={onClose}>✕</button>
        </header>

        <div className="modal-body">
          <ImportCard onAdded={bump} />

          <div className="dl-lists">
            <div className="dl-lists-h">
              <span className="svc-section-h">Imported lists <span className="opt">{st.enabled}/{st.lists} enabled used for matching</span></span>
              {L.length > 0 && (
                <div className="dl-export">
                  <button className="cache-btn" onClick={() => dlDownload("reef-denylist-mastodon.csv", ReefDenylist.exportMastodonCSV(), "text/csv")}>Export Mastodon CSV</button>
                  <button className="cache-btn" onClick={() => dlDownload("reef-denylist-sharkey.json", ReefDenylist.exportSharkeyHosts(), "application/json")}>Export Sharkey hosts</button>
                  <button className="cache-btn" title="Publish domain + actor decisions as a FediMod FIRES snapshot (recommendations)" onClick={() => dlDownload("reef-denylist-fires.json", JSON.stringify(ReefDenylist.exportFIRES(), null, 2), "application/json")}>Export FIRES</button>
                  {st.actors > 0 && <button className="cache-btn" onClick={() => dlDownload("reef-denylist-actors.txt", ReefDenylist.exportActors())}>Export actors</button>}
                  {st.ips > 0 && <button className="cache-btn" onClick={() => dlDownload("reef-denylist-ips.txt", ReefDenylist.exportIPs())}>Export IPs</button>}
                </div>
              )}
            </div>
            {L.length === 0
              ? <div className="muted-line dl-empty">No lists yet. Quick-add an IFTAS list above, or paste / upload a Mastodon CSV or Sharkey host list.</div>
              : L.map((x) => <ListCard key={x.id} L={x} onChange={bump} />)}
          </div>

          <div className="dl-note">
            Matching covers the reported account's host (domain blocks also cover subdomains) and its full <span className="mono">@user@host</span> handle against actor lists. Listed targets get a banner in the report inspector. CGNAT &amp; large shared hosts can over-match — read the source note before acting. <b>MISP events</b>, <b>STIX 2.1 bundles</b> and <b>FediMod FIRES</b> datasets import too — FIRES advisories / recommendations reduce by entity (domain / actor), mapping <span className="mono">reject→suspend</span>, <span className="mono">filter→silence</span>, <span className="mono">drop→suspend+reject&nbsp;media</span>; retractions drop the entity. Major mailbox providers are always skipped.
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { DenylistsModal });

<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — Diagnostics / troubleshooting console
   Surfaces the full text of live-fetch failures (which otherwise
   only flash a truncated banner), classifies each into an
   actionable hint, shows transport + connection state, and hosts
   the live debug log (window.ReefLog) with a verbose-mode toggle
   plus copy / download for support hand-off.
   ============================================================ */

function diagHint(msg) {
  const m = String(msg || "");
  if (/Failed to fetch|NetworkError|CORS|load failed|ERR_/i.test(m))
    return "Browser blocked the request — almost always CORS, or the host is unreachable. In this preview, cross-origin calls to instances are frequently blocked. Fixes: set a proxy in Services, open the console in your own browser, or confirm the instance is online.";
  if (/\b401\b|unauthor/i.test(m))
    return "Unauthorized (401) — the access token is missing, expired, or wrong for this host. Re-add the connection with a fresh token that has admin read/write scopes.";
  if (/\b403\b|forbidden|permission|PERMISSION_DENIED|ACCESS_DENIED|\brole\b|denied/i.test(m))
    return "Forbidden — the token (or the account's role) lacks the admin permission for this endpoint. On Sharkey/Misskey grant the specific read:admin:* / write:admin:* scopes you need; on Mastodon grant the matching admin:read:* / admin:write:* scopes. The account must also hold the Moderator or Admin role — no token scope grants what the account lacks.";
  if (/\b404\b|not found/i.test(m))
    return "Not found (404) — the server may not expose this admin endpoint, or it was detected as different software. Re-check the instance URL.";
  if (/\b429\b|rate/i.test(m))
    return "Rate limited (429) — reduce the fetch size or wait before retrying.";
  if (/\b5\d\d\b/.test(m))
    return "Server-side error (5xx) on the instance — usually temporary, retry later.";
  if (/nodeinfo/i.test(m))
    return "Couldn't read /nodeinfo — the URL may not be a Mastodon / Sharkey / Misskey instance, or it's blocking the request.";
  return "Unrecognized error. Check the instance URL, the token, and the proxy setting in Services.";
}

function transportLine() {
  const s = (window.ReefMega && window.ReefMega.status && window.ReefMega.status()) || "unknown";
  if (s === "ready") return { cls: "ok", label: "megalodon ready" };
  if (String(s).startsWith("failed")) return { cls: "bad", label: "megalodon failed — using raw fetch (" + String(s).replace("failed:", "").slice(0, 40) + ")" };
  if (s === "loading") return { cls: "warn", label: "megalodon loading…" };
  return { cls: "na", label: "megalodon " + s };
}

function fmtLogText(entries) {
  return (entries || []).map((e) =>
    new Date(e.at).toISOString() + " [" + String(e.level).toUpperCase() + "] " + e.scope + ": " + e.msg +
    (e.data !== undefined ? "  " + (typeof e.data === "string" ? e.data : JSON.stringify(e.data)) : "")
  ).join("\n");
}

function SelfCheck({ connections, settings }) {
  const [running, setRunning] = useState(false);
  const [rows, setRows] = useState(null);
  async function run() {
    setRunning(true); setRows(null);
    const out = [];
    window.__reefProxy = settings.proxy || "";
    const proxy = settings.proxy || "";
    for (const c of (connections || [])) {
      try {
        const me = await ReefAPI.verify(c);
        out.push({ k: "Connection", n: c.host, state: me.isMod ? "ok" : "warn", d: "@" + (me.username || "?") + " · " + (me.role || "?") + (me.isMod ? "" : " · NOT a moderator/admin — admin calls will 403") });
      } catch (e) { out.push({ k: "Connection", n: c.host, state: "bad", d: e.message }); }
    }
    out.push({ k: "Proxy", n: proxy ? proxy.replace(/^https?:\/\//, "").slice(0, 34) : "not set", state: proxy ? "ok" : "warn", d: proxy ? "Configured — keyed sources route through it." : "None set — keyed sources call browser-direct, which CORS usually blocks." });
    const keys = settings.keys || {};
    const svcs = [["stopforumspam", null], ["abuseipdb", keys.abuseipdb], ["ipqs", keys.ipqs], ["virustotal", keys.virustotal], ["emailrep", keys.emailrep]];
    for (const [svc, key] of svcs) {
      if (svc !== "stopforumspam" && svc !== "emailrep" && !key) { out.push({ k: "Service", n: svc, state: "na", d: "No key set — skipped." }); continue; }
      try {
        const r = await ReefEnrich.test(svc, key, proxy, { sfs: settings.sfs || {} });
        out.push({ k: "Service", n: svc, state: r.status === "ok" ? "ok" : (r.status === "needsproxy" || r.status === "unconfigured") ? "warn" : "bad", d: r.detail || r.status });
      } catch (e) { out.push({ k: "Service", n: svc, state: "bad", d: e.message }); }
    }
    setRows(out); setRunning(false);
  }
  const bad = rows ? rows.filter((r) => r.state === "bad").length : 0;
  const warn = rows ? rows.filter((r) => r.state === "warn").length : 0;
  return (
    <div className="diag-sec">
      <div className="dbg-head">
        <div className="svc-section-h" style={{ margin: 0 }}>Self-check <span className="opt">ping every connection, the proxy &amp; each service</span></div>
        <button className="dbg-btn" disabled={running} onClick={run}>{running ? "Checking…" : (rows ? "Re-run" : "Run self-check")}</button>
      </div>
      {rows && (
        <div className="selfcheck">
          <div className={cx("selfcheck-sum", bad ? "tone-bad" : warn ? "tone-warn" : "tone-ok")}>{bad ? bad + " failing" : warn ? warn + " need attention" : "All checks passed"}{warn && !bad ? "" : ""} · {rows.length} checks</div>
          {rows.map((r, i) => (
            <div key={i} className="selfcheck-row">
              <span className={cx("conn-dot", r.state === "ok" ? "ok" : r.state === "bad" ? "bad" : "")} style={r.state === "warn" ? { background: "var(--warn)" } : r.state === "na" ? { background: "var(--txt-3)" } : null} />
              <span className="selfcheck-k">{r.k}</span>
              <span className="selfcheck-n mono">{r.n}</span>
              <span className={cx("selfcheck-d", "tone-" + (r.state === "ok" ? "ok" : r.state === "bad" ? "bad" : r.state === "warn" ? "warn" : ""))}>{r.d}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DiagnosticsModal({ open, onClose, fetchErrs, diagLog, connections, settings }) {
  const [log, setLog] = useState(() => (window.ReefLog ? window.ReefLog.entries() : []));
  const [debugOn, setDebugOn] = useState(() => !!(window.ReefLog && window.ReefLog.isDebug()));
  const [filter, setFilter] = useState("all");
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    if (!open || !window.ReefLog) return;
    setLog(window.ReefLog.entries());
    const unsub = window.ReefLog.subscribe(() => setLog(window.ReefLog.entries()));
    return unsub;
  }, [open]);

  if (!open) return null;
  const t = transportLine();
  const proxy = (settings && settings.proxy) || "";
  const live = (connections || []).filter((c) => c.status === "verified");
  const errored = (connections || []).filter((c) => c.status === "error");

  const RANK = { all: 0, debug: 10, info: 20, warn: 30, error: 40 };
  const shown = (log || []).filter((e) => filter === "all" || (RANK[e.level] || 0) >= RANK[filter]).slice().reverse();
  const counts = (log || []).reduce((a, e) => { a[e.level] = (a[e.level] || 0) + 1; return a; }, {});

  function toggleDebug() { const on = !debugOn; setDebugOn(on); if (window.ReefLog) window.ReefLog.setDebug(on); }
  function execCopy(text) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0"; ta.style.top = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      const ok = document.execCommand("copy"); ta.remove(); return ok;
    } catch (e) { return false; }
  }
  function copyLog() {
    const text = fmtLogText(log);
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1400); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, () => {
        if (execCopy(text)) done();
        else if (window.ReefLog) window.ReefLog.warn("diag", "clipboard blocked by the browser — use Download instead");
      });
    } else if (execCopy(text)) done();
    else if (window.ReefLog) window.ReefLog.warn("diag", "clipboard unavailable — use Download instead");
  }
  function downloadLog() {
    const blob = new Blob([fmtLogText(log)], { type: "text/plain" });
    const u = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = u; a.download = "vantage-log-" + new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-") + ".txt";
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(u); a.remove(); }, 800);
  }

  return (
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <header className="modal-h">
          <div>
            <h3>Diagnostics</h3>
            <span className="modal-sub">Live-fetch errors, transport state, connection health &amp; debug log</span>
          </div>
          <button className="modal-x" onClick={onClose}>✕</button>
        </header>

        <div className="modal-body">
          {/* environment */}
          <div className="diag-env">
            <div className="svc-section-h">Environment</div>
            <div className="diag-env-grid">
              <div className="diag-kv"><span>Data mode</span><b className="mono">{(settings && settings.mode) || "demo"}{settings && settings.showDemo ? " + demo" : ""}</b></div>
              <div className="diag-kv"><span>Transport</span><b className={"mono tone-" + (t.cls === "ok" ? "ok" : t.cls === "bad" ? "bad" : t.cls === "warn" ? "warn" : "")}>{t.label}</b></div>
              <div className="diag-kv"><span>Proxy</span><b className="mono">{proxy ? proxy.replace(/^https?:\/\//, "").slice(0, 40) : "none — direct calls"}</b></div>
              <div className="diag-kv"><span>Verified connections</span><b className="mono">{live.length}{errored.length ? " · " + errored.length + " errored" : ""}</b></div>
            </div>
            {!proxy && <div className="diag-tip">No proxy set — instance and OSINT calls go browser-direct, which CORS often blocks in this preview. Add a proxy in <b>Services</b> if calls fail.</div>}
          </div>

          {/* self-check */}
          <SelfCheck connections={connections} settings={settings} />

          {/* debug mode toggle */}
          <div className="diag-debug-bar">
            <div className="dd-main">
              <b>Debug mode</b>
              <span>Prints verbose <code>debug</code>/<code>info</code> events to the browser console (F12). Warnings &amp; errors always print. The rolling log below records everything regardless.</span>
            </div>
            <button className={cx("dd-toggle", debugOn && "dd-on")} onClick={toggleDebug} role="switch" aria-checked={debugOn}>
              <span className="dd-knob" />
              <span className="dd-label">{debugOn ? "On" : "Off"}</span>
            </button>
          </div>

          {/* active fetch issues */}
          <div className="diag-sec">
            <div className="svc-section-h">Active fetch issues <span className="opt">{(fetchErrs || []).length} from the last pull</span></div>
            {(!fetchErrs || fetchErrs.length === 0)
              ? <div className="muted-line diag-clean">✓ No fetch errors on the last pull.</div>
              : fetchErrs.map((e, i) => (
                <div key={i} className="diag-err">
                  <div className="diag-err-top">
                    <span className="diag-err-host mono">{e.host}</span>
                    <span className="diag-err-what">{e.what}</span>
                  </div>
                  <div className="diag-err-msg mono">{e.msg}</div>
                  <div className="diag-err-hint">{diagHint(e.msg)}</div>
                </div>
              ))}
          </div>

          {/* connection health */}
          {(connections || []).length > 0 && (
            <div className="diag-sec">
              <div className="svc-section-h">Connections</div>
              {connections.map((c) => (
                <div key={c.id} className="diag-conn">
                  <span className={cx("conn-dot", c.status === "verified" ? "ok" : "bad")} />
                  <span className="diag-conn-host mono">{c.host}</span>
                  <span className="diag-conn-sw">{c.software}</span>
                  <span className="diag-conn-id mono">{c.identity ? "@" + c.identity.username : c.label}{c.role ? " · " + c.role : ""}</span>
                  <span className={cx("diag-conn-st", "tone-" + (c.status === "verified" ? "ok" : "bad"))}>{c.status}{c.error ? " · " + c.error : ""}</span>
                </div>
              ))}
            </div>
          )}

          {/* live debug log */}
          <div className="diag-sec">
            <div className="dbg-head">
              <div className="svc-section-h" style={{ margin: 0 }}>Debug log <span className="opt">last {log.length} events · newest first</span></div>
              <div className="dbg-actions">
                <button className="dbg-btn" onClick={copyLog}>{copied ? "Copied ✓" : "Copy"}</button>
                <button className="dbg-btn" onClick={downloadLog}>Download</button>
                <button className="dbg-btn dbg-btn-warn" onClick={() => { if (window.ReefLog) window.ReefLog.clear(); }}>Clear</button>
              </div>
            </div>
            <div className="dbg-filters">
              {["all", "debug", "info", "warn", "error"].map((lv) => (
                <button key={lv} className={cx("dbg-filter", filter === lv && "dbg-filter-on", "dbg-" + lv)} onClick={() => setFilter(lv)}>
                  {lv}{lv !== "all" && counts[lv] ? " " + counts[lv] : ""}
                </button>
              ))}
            </div>
            {shown.length === 0
              ? <div className="muted-line">No matching log events.</div>
              : <div className="dbg-log">
                  {shown.map((e, i) => (
                    <div key={i} className={cx("dbg-row", "dbg-row-" + e.level)}>
                      <span className="dbg-time mono">{new Date(e.at).toLocaleTimeString()}</span>
                      <span className={cx("dbg-level", "dbg-lvl-" + e.level)}>{e.level}</span>
                      <span className="dbg-scope mono">{e.scope}</span>
                      <span className="dbg-msg">{e.msg}{e.data !== undefined && <span className="dbg-data mono"> · {typeof e.data === "string" ? e.data : JSON.stringify(e.data)}</span>}</span>
                    </div>
                  ))}
                </div>}
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { DiagnosticsModal, diagHint });

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — Campaigns panel (custom classifier wordlists)
   Add / edit named term + regex lists for suspected or confirmed
   spam / abuse campaigns. Matches drive the join-reason text
   analysis and add per-campaign-weighted signals to the score.
   ============================================================ */

const CMP_BLANK = { id: null, name: "", status: "suspected", weight: "", terms: "", patterns: "", notes: "" };

function CampaignForm({ value, onSave, onCancel }) {
  const [f, setF] = useState(value);
  useEffect(() => { setF(value); }, [value.id, value._k]);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const dw = (window.ReefCampaigns && window.ReefCampaigns.DEFAULT_WEIGHT) || { suspected: 14, confirmed: 32 };

  function submit() {
    if (!f.name.trim() && !f.terms.trim()) return;
    onSave(f);
    setF(CMP_BLANK);
  }
  return (
    <div className="cmp-form">
      <div className="cmp-form-h">{f.id ? "Edit campaign" : "New campaign"}</div>
      <div className="cmp-grid">
        <div className="conn-field">
          <label className="conn-field-l">Name</label>
          <input className="conn-input" placeholder="e.g. VBucks giveaway ring" value={f.name} onChange={(e) => set("name", e.target.value)} />
        </div>
        <div className="conn-field">
          <label className="conn-field-l">Status</label>
          <div className="seg-group cmp-status">
            <button className={cx("seg", f.status === "suspected" && "seg-on")} onClick={() => set("status", "suspected")}>Suspected</button>
            <button className={cx("seg", f.status === "confirmed" && "seg-on")} onClick={() => set("status", "confirmed")}>Confirmed</button>
          </div>
        </div>
      </div>
      <div className="cmp-grid">
        <div className="conn-field">
          <label className="conn-field-l">Weight <span className="opt">added to risk on match · default {dw[f.status]}</span></label>
          <input className="conn-input mono" type="number" min="0" max="80" placeholder={String(dw[f.status])} value={f.weight} onChange={(e) => set("weight", e.target.value)} />
        </div>
        <div className="conn-field">
          <label className="conn-field-l">Notes <span className="opt">optional</span></label>
          <input className="conn-input" placeholder="what this campaign is" value={f.notes} onChange={(e) => set("notes", e.target.value)} />
        </div>
      </div>
      <div className="conn-field">
        <label className="conn-field-l">Terms <span className="opt">case-insensitive phrases · one per line or comma-separated</span></label>
        <textarea className="conn-input dl-textarea cmp-textarea" placeholder={"free v-bucks\nreverify\nclaim now"} value={f.terms} onChange={(e) => set("terms", e.target.value)} />
      </div>
      <div className="conn-field">
        <label className="conn-field-l">Regex patterns <span className="opt">advanced · one JS regex per line (matched case-insensitively)</span></label>
        <textarea className="conn-input dl-textarea cmp-textarea cmp-regex" placeholder={"bit\\.ly/\\S+\nverify.{0,20}password"} value={f.patterns} onChange={(e) => set("patterns", e.target.value)} />
      </div>
      <div className="cmp-form-actions">
        {f.id && <button className="cmp-btn" onClick={() => { onCancel(); setF(CMP_BLANK); }}>Cancel edit</button>}
        <button className="dl-add cmp-save" onClick={submit} disabled={!f.name.trim() && !f.terms.trim()}>{f.id ? "Save changes" : "Add campaign"}</button>
      </div>
    </div>
  );
}

function CampaignTester() {
  const [t, setT] = useState("");
  const hits = t.trim() && window.ReefCampaigns ? window.ReefCampaigns.match(t) : [];
  return (
    <div className="cmp-test">
      <div className="conn-field-l">Test a join reason <span className="opt">paste text to see which campaigns fire</span></div>
      <textarea className="conn-input dl-textarea cmp-textarea" placeholder="Paste a suspicious join reason or post…" value={t} onChange={(e) => setT(e.target.value)} />
      {t.trim() && (
        hits.length
          ? <div className="cmp-test-hits">{hits.map((h, i) => <span key={i} className={cx("campaign-hit", h.status === "confirmed" ? "ch-bad" : "ch-warn")}>{h.name} · {h.status} <span className="campaign-hit-terms">{h.matched.join(", ")}</span></span>)}</div>
          : <div className="muted-line cmp-test-clean">No campaign matched this text.</div>
      )}
    </div>
  );
}

function RejectedReasonsQueue({ onChange }) {
  const [tick, setTick] = useState(0);
  const T = window.ReefText;
  if (!T) return null;
  const cands = T.candidates();
  const approved = T.approved();
  function refresh() { setTick((t) => t + 1); onChange && onChange(); }
  return (
    <div className="cmp-list-h" style={{ marginTop: 24 }}>
      <div className="svc-section-h" style={{ margin: 0 }}>Rejected join reasons <span className="opt">{cands.length} pending · {approved.length} approved</span></div>
      <div className="cmp-intro" style={{ marginTop: 4 }}>
        Every account you <b className="tone-bad">Reject</b> queues its join reason here. Approving one adds it to the
        boilerplate-similarity corpus (the "Template / boilerplate" meter); rejecting is a moderator judgment call, not
        ground truth, so nothing is added automatically.
      </div>
      {cands.length === 0
        ? <div className="muted-line dl-empty">No pending candidates. They'll appear here after you reject a signup.</div>
        : <div className="cmp-cards">
            {cands.map((c) => (
              <div key={c.id} className="cmp-card">
                <div className="cmp-card-top">
                  <div className="cmp-card-id">
                    <div className="cmp-card-name">{c.handle ? "@" + c.handle : "Rejected applicant"}{c.host ? <span className="cmp-card-notes"> · {c.host}</span> : null}</div>
                    <div className="cmp-card-notes">"{c.text}"</div>
                  </div>
                  <div className="cmp-card-actions">
                    <button className="cmp-icon" title="Approve into corpus" onClick={() => { T.approveCandidate(c.id); refresh(); }}>✓</button>
                    <button className="cmp-icon cmp-icon-del" title="Discard" onClick={() => { T.discardCandidate(c.id); refresh(); }}>✕</button>
                  </div>
                </div>
              </div>
            ))}
          </div>}
      {approved.length > 0 &&
        <div className="cmp-terms" style={{ marginTop: 12 }}>
          {approved.map((a) => (
            <span key={a.id} className="cmp-term" title={a.text}>
              {a.text.slice(0, 40)}{a.text.length > 40 ? "…" : ""}
              <button className="cmp-icon cmp-icon-del" style={{ marginLeft: 6 }} title="Remove from corpus" onClick={() => { T.removeApproved(a.id); refresh(); }}>✕</button>
            </span>
          ))}
        </div>}
    </div>
  );
}

function CampaignsModal({ open, onClose, onChange }) {
  const [tick, setTick] = useState(0);
  const [edit, setEdit] = useState(CMP_BLANK);
  const fileRef = useRef(null);
  if (!open) return null;
  const C = window.ReefCampaigns;
  const items = C ? C.lists() : [];
  const stats = C ? C.stats() : { total: 0, enabled: 0, terms: 0, patterns: 0 };

  function refresh() { setTick((t) => t + 1); onChange && onChange(); }
  function saveOne(f) { C.save(f); setEdit(CMP_BLANK); refresh(); }
  function editOne(c) { setEdit({ id: c.id, name: c.name, status: c.status, weight: String(c.weight), terms: (c.terms || []).join("\n"), patterns: (c.patterns || []).join("\n"), notes: c.notes || "", _k: Math.random() }); }
  function exportAll() {
    const blob = new Blob([C.exportJSON()], { type: "application/json" });
    const u = URL.createObjectURL(blob); const a = document.createElement("a");
    a.href = u; a.download = "vantage-campaigns-" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a); a.click(); setTimeout(() => { URL.revokeObjectURL(u); a.remove(); }, 800);
  }
  function importFile(e) {
    const file = e.target.files && e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => { try { const n = C.importJSON(String(r.result)); refresh(); if (window.ReefLog) window.ReefLog.info("campaigns", "imported " + n + " campaign(s)"); } catch (err) { alert("Import failed: " + err.message); } };
    r.readAsText(file); e.target.value = "";
  }

  return (
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <header className="modal-h">
          <div>
            <h3>Campaigns</h3>
            <span className="modal-sub">Custom classifier wordlists · {stats.enabled}/{stats.total} active · {stats.terms} terms · {stats.patterns} patterns</span>
          </div>
          <button className="modal-x" onClick={onClose}>✕</button>
        </header>

        <div className="modal-body">
          <div className="cmp-intro">
            Define the language of known spam / abuse campaigns. A <b className="tone-warn">suspected</b> campaign is a hunch you're tracking; a <b className="tone-bad">confirmed</b> one you've already actioned. Matches appear in each applicant's <b>join-reason analysis</b> and add a per-campaign weighted signal to the risk score.
          </div>

          <CampaignForm value={edit} onSave={saveOne} onCancel={() => setEdit(CMP_BLANK)} />

          <CampaignTester />

          <div className="cmp-list-h">
            <div className="svc-section-h" style={{ margin: 0 }}>Campaigns <span className="opt">{items.length}</span></div>
            <div className="dl-export">
              <button className="export-btn" onClick={() => fileRef.current && fileRef.current.click()}>⤒ Import</button>
              <button className="export-btn" onClick={exportAll} disabled={!items.length}>⤓ Export</button>
              <input ref={fileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={importFile} />
            </div>
          </div>

          {items.length === 0
            ? <div className="muted-line dl-empty">No campaigns yet. Add one above — start with a few terms from a spam wave you've seen.</div>
            : <div className="cmp-cards">
                {items.map((c) => (
                  <div key={c.id} className={cx("cmp-card", c.enabled === false && "dl-card-off", edit.id === c.id && "cmp-card-editing")}>
                    <div className="cmp-card-top">
                      <label className="dl-toggle"><input type="checkbox" checked={c.enabled !== false} onChange={(e) => { C.setEnabled(c.id, e.target.checked); refresh(); }} /></label>
                      <div className="cmp-card-id">
                        <div className="cmp-card-name">{c.name}<span className={cx("cmp-badge", c.status === "confirmed" ? "cmp-badge-bad" : "cmp-badge-warn")}>{c.status}</span></div>
                        {c.notes && <div className="cmp-card-notes">{c.notes}</div>}
                      </div>
                      <div className="cmp-card-actions">
                        <button className="cmp-icon" title="Edit" onClick={() => editOne(c)}>✎</button>
                        <button className="cmp-icon cmp-icon-del" title="Delete" onClick={() => { C.remove(c.id); if (edit.id === c.id) setEdit(CMP_BLANK); refresh(); }}>✕</button>
                      </div>
                    </div>
                    <div className="cmp-card-stats">
                      <span className="dl-stat"><b>+{c.weight}</b> weight</span>
                      <span className="dl-stat"><b>{(c.terms || []).length}</b> terms</span>
                      {(c.patterns || []).length > 0 && <span className="dl-stat"><b>{c.patterns.length}</b> regex</span>}
                    </div>
                    {(c.terms || []).length > 0 && <div className="cmp-terms">{c.terms.slice(0, 10).map((t, i) => <span key={i} className="cmp-term">{t}</span>)}{c.terms.length > 10 && <span className="cmp-term cmp-term-more">+{c.terms.length - 10}</span>}</div>}
                  </div>
                ))}
              </div>}

          <div className="dl-note">Terms match as case-insensitive substrings; regex patterns match case-insensitively. Keep terms specific — a single common word will over-fire. Confirmed campaigns are weighted heavier than suspected by default, but every campaign's weight is editable above and tunable like any other signal.</div>

          <RejectedReasonsQueue onChange={onChange} />
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { CampaignsModal });

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — Getting-started guided walkthrough
   ------------------------------------------------------------
   A first-run, multi-step tour written for a moderator who is
   NOT an OSINT / cybersecurity specialist. Explains, in plain
   language: what the tool does, how to connect Mastodon/Sharkey,
   where to find the free vs. keyed intelligence services, how
   denylist checking works, and how to tune scoring.

   Each step can deep-link to the relevant panel via onOpen(name).
   The tour scrim sits BELOW the app's modals (z-index) so an
   opened panel layers on top while the tour waits behind it.
   "Seen" is remembered in localStorage ("reef.tour.seen").
   ============================================================ */

const TOUR_STEPS = [
{
  icon: "◆", kicker: "What this is",
  title: "Welcome to Vantage",
  lede: "Vantage helps you identify bad actors in your signup queue and triage abuse reports. It gathers public signals about each applicant, scores the risk across IP, email, username, and text intelligence, and recommends a decision. You always make the final call.",
  render: () =>
  <div className="tour-blocks">
        <div className="tour-callout tour-callout-accent">
          <b>The queue starts empty.</b>
          <span>Connect your server in the next step to pull live signups and reports. If you want to explore the interface first, download the sample data package below — 8 synthetic applicants and 6 reports, exported from the demo dataset in MISP and STIX 2.1 format. Nothing you do here affects your server until you connect and confirm an action.</span>
        </div>
        <div className="tour-callout">
          <b>Sample data download</b>
          <span>
            <a className="tour-dl-link" href="vantage-sample-misp.json" download>MISP JSON (14 cases)</a>
            {" · "}
            <a className="tour-dl-link" href="vantage-sample-stix.json" download>STIX 2.1 bundle</a>
            {" — import either via Denylists → Paste to load synthetic IoC indicators, or ingest into MISP / TheHive / OpenCTI."}
            <br /><span className="tour-dl-note">Using the standalone HTML? Save the full source package to get the .json files alongside the HTML.</span>
          </span>
        </div>
        <div className="tour-define">
          <span className="tour-define-term">OSINT, in one sentence</span>
          <span className="tour-define-body">“Open-Source Intelligence” just means looking up information that is <i>already public</i> — the IP an applicant signed up from, how old their email domain is, whether that address is a throwaway. No hacking, just public records, gathered for you automatically.</span>
        </div>
      </div>

},
{
  icon: "⚇", kicker: "Step 1 · Connect",
  title: "Connect your server",
  lede: "Vantage reads your pending signups and reports — and, when you act on them, approves / suspends / resolves — through your server's own admin API. It speaks two API families: Mastodon (also GoToSocial, Pixelfed, glitch-soc, Hometown) and Misskey (also Sharkey, Firefish, Iceshrimp, Foundkey, Catodon). You connect once with an access token you generate on your server, granting exactly the scopes below.",
  render: () =>
  <div className="tour-blocks">
        <div className="tour-grid2">
          <div className="tour-mini">
            <div className="tour-mini-h"><span className="sw-dot" style={{ background: "oklch(0.72 0.13 300)" }} /> Sharkey / Misskey <span className="opt">+ Firefish, Iceshrimp, Foundkey, Catodon</span></div>
            <ol className="tour-steps">
              <li>Your account must hold the <b>Moderator</b> or <b>Administrator</b> role — admin endpoints are role-gated, no token scope can grant what the account lacks.</li>
              <li>Open <b>Settings → API → Generate access token</b> and enable these permissions:
                <ul className="tour-perms">
                  <li><code>read:admin:show-user</code> · <code>read:admin:user-ips</code> — pending signups + sign-in IPs</li>
                  <li><code>read:admin:abuse-user-reports</code> — the reports queue</li>
                  <li><code>write:admin:suspend-user</code> · <code>write:admin:delete-account</code> — reject / remove a signup</li>
                  <li><code>write:admin:resolve-abuse-user-report</code> — close out reports</li>
                  <li><i>If your software lists them</i> (Sharkey + newer Misskey): <code>write:admin:approve-user</code> · <code>write:admin:silence-user</code></li>
                </ul>
                Grant only the scopes above — nothing broader. If your software names them slightly differently, match them by function (pending users, sign-in IPs, abuse reports, suspend / delete / resolve); don’t reach for a catch-all admin permission.</li>
              <li>Copy the token.</li>
            </ol>

function GettingStartedTour({ open, onClose, onOpen }) {

  return (

        <div className="tour-foot">

            {TOUR_STEPS.map((s, n) =>

            onClick={() => setI(n)} title={s.title} aria-label={"Go to step " + (n + 1)} />

            {last ?

}

Object.assign(window, { GettingStartedTour });

<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — app shell (live + demo data, connections, acting-as)
   ============================================================ */
const D = window.REEF_DATA;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#3aa0e6",
  "density": "comfortable",
  "sortBy": "risk",
  "showHints": true
}/*EDITMODE-END*/;

function tierColor(t) { return `var(--${t === "high" ? "bad" : t === "medium" ? "warn" : "ok"})`; }

// collapse multiple open reports against the same target into one case row
function collapseByTarget(list) {
  const seen = new Map(); const out = [];
  list.forEach((r) => {
    const key = r.target.username + "@" + r.target.host;
    if (seen.has(key)) { seen.get(key)._groupCount += 1; return; }
    const rep = Object.assign({}, r, { _groupCount: 1 });
    seen.set(key, rep); out.push(rep);
  });
  return out;
}

// ---- Queue rows --------------------------------------------------------
function AccountRow({ acc, inst, active, onClick }) {
  return (
    <button className={cx("qrow", active && "qrow-active")} onClick={onClick}>
      <span className={"qrow-rail t-" + acc.tier} />

      <span className="qrow-main">
        <span className="qrow-top">
          <span className="qrow-name">@{acc.username}</span>
          {acc.emailConfirmed === false && <span className="qrow-unconf" title="Email not confirmed">✉</span>}
          {acc.live && <span className="live-tick" title="Live">●</span>}
          {acc.imported && <span className="qrow-imp" title="Imported test data">TEST</span>}
          <span className="qrow-score mono" style={{ color: tierColor(acc.tier) }}>{acc.risk}</span>
        </span>
        <span className="qrow-sub">
          <span className="qrow-host mono">{inst ? inst.host : acc.instance}</span>
          <span className="qrow-dot">·</span>
          <span className="qrow-reason">{(acc.reason || "no reason given").slice(0, 46)}{(acc.reason || "").length > 46 ? "…" : ""}</span>
        </span>
      </span>
      <span className="qrow-when mono">{ago(acc.createdAt)}</span>
    </button>
  );
}

function ReportRow({ rep, inst, active, onClick }) {
  return (
    <button className={cx("qrow", active && "qrow-active")} onClick={onClick}>
      <span className={"qrow-rail t-" + rep.tier} />
      <Avatar name={rep.target.displayName || rep.target.username} hue={rep.target.avatarHue} size={34} square />
      <span className="qrow-main">
