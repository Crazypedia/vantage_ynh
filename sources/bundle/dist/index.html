        <div className={cx("abuse-scan", "abuse-scan-" + riTone(sc.verdict))} style={{ marginTop: 10 }} title={sc.note}>
          <span className={cx("abuse-verdict", "tone-" + riTone(sc.verdict))}>profile {sc.verdict}</span>
          <span className="abuse-score mono">{sc.score}</span>
          <div className="abuse-cats">
            {sc.categories.map((c) => (<span key={c.id} className="abuse-cat" title={c.matched.join(", ")}>{c.label}<span className="abuse-cat-terms mono">{c.matched.slice(0, 4).join(", ")}</span></span>))}
            {!sc.categories.length && <span className="abuse-clean mono">sentiment {sent ? sent.label : "—"}</span>}
          </div>
        </div>
      )}
      {res && res.signals && res.signals.length > 0 && (
        <div className="signals" style={{ marginTop: 10 }}>{res.signals.map((s, i) => <SignalRow key={i} s={s} />)}</div>
      )}
    </RIPanel>
  );
}

// ---- 2) origin server OSINT (domain lookups) ----
function ReportInstancePanel({ rep, settings, onRes }) {
  const [status, setStatus] = useState("idle");
  const [res, setRes] = useState(null);
  const [err, setErr] = useState(null);
  async function go(force) {
    setStatus("running"); setErr(null);
    try {
      window.__reefProxy = (settings && settings.proxy) || "";
      const out = await ReefEnrich.runReportInstance(rep, { proxy: (settings && settings.proxy) || "", sfs: (settings && settings.sfs) || {}, force: !!force });
      setRes(out); setStatus("done"); if (onRes) onRes(out);
    } catch (e) { setErr(e.message || String(e)); setStatus("error"); }
  }
  const inst = res && res.instance;
  const ni = inst && inst.nodeinfo, dm = inst && inst.domain, nt = inst && inst.net, reg = inst && inst.registration, fr = inst && inst.freshness, ob = inst && inst.observer;
  const host = rep.target.host || rep.instance;
  return (
    <RIPanel title="Origin server OSINT" sub="domain · hosting · registration · cited links" status={status} err={err} onGo={go}
      idleLabel={"Run OSINT on " + host}
      idleNote="nodeinfo (software/users/registration), RDAP domain age, hosting ASN · reverse-DNS · DNSBL, software freshness, Fediverse Observer, the instance IP on StopForumSpam, and the reputation of every domain cited in the reported posts. Keyless &amp; cache-first.">
      {res && <RISources res={res} />}
      {inst && (
        <div className="osint-card" style={{ marginTop: 10 }}>
          <div className="osint-card-h"><b>Origin instance</b><span className="mono">{inst.host}</span></div>
          <div className="osint-mini">
            <KV k="Software" v={ni && ni.software ? (ni.software + " " + (ni.version || "")).trim() : "—"} />
            <KV k="Users" v={ni && ni.totalUsers != null ? ni.totalUsers.toLocaleString() + (ni.activeMonth != null ? ` (${ni.activeMonth.toLocaleString()} active)` : "") : "—"} mono />
            <KV k="Domain age" v={dm && dm.domainAgeDays != null ? `${Math.round(dm.domainAgeDays / 365)} yrs (${(dm.created || "").slice(0, 10)})` : "unknown"} />
            <KV k="Hosting" v={nt && nt.asn ? `${nt.asn} ${nt.asnOrg || ""}` : "—"} mono />
            <KV k="Reverse DNS" v={nt && nt.rdns ? nt.rdns : "—"} mono />
          </div>
          {((reg && reg.mode !== "unknown") || fr || ob) ? (
            <div className="inst-posture">
              {reg && reg.mode !== "unknown" && <span className={cx("posture-pill", reg.mode === "open-unmoderated" ? "pp-bad" : reg.mode === "open-moderated" ? "pp-warn" : "pp-ok")} title={reg.source ? "via " + reg.source : ""}>{RI_REG_LABEL[reg.mode]}</span>}
              {fr && <span className={cx("posture-pill", fr.status === "behind" ? (fr.behindLevel === "major" ? "pp-bad" : "pp-warn") : "pp-ok")} title={`${fr.project} ${fr.reported || "?"} · latest ${fr.latest || "?"}`}>{fr.status === "behind" ? `${fr.behindLevel} behind · latest ${fr.latest}` : fr.status === "current" ? "up to date" : fr.status === "ahead" ? "pre-release" : "version ?"}</span>}
              {ob && <span className={cx("posture-pill", ob.up ? "pp-ok" : "pp-bad")} title={`Fediverse Observer${ob.uptime != null ? " · " + ob.uptime + "% all-time" : ""}`}>{ob.up ? "live" : "offline"}{ob.uptime != null ? ` · ${Math.round(ob.uptime)}%` : ""}</span>}
            </div>
          ) : null}
          <div className="flag-row">
            <Flag on={reg && reg.mode === "open-unmoderated"} label="Open+unmod" />
            <Flag on={fr && fr.status === "behind"} label="Outdated" />
            <Flag on={ob && ob.up === false} label="Offline" />
            <Flag on={nt && nt.datacenter} label="Datacenter" />
            <Flag on={nt && nt.dnsblCount > 0} label={`DNSBL ${nt ? nt.dnsblCount : 0}`} />
          </div>
        </div>
      )}
      {res && res.sfs && res.sfs.ip && (
        <div className="sfs-card sfs-card-flat" style={{ marginTop: 10 }}>
          <div className="sfs-rows"><SfsRow label="Instance IP" data={res.sfs.ip} value={nt && nt.ip} /></div>
          <div className="sfs-foot"><span className="sfs-note">Community spammer registry · keyless instance-IP lookup</span></div>
        </div>
      )}
      {res && res.links && res.links.length > 0 && (
        <div className="intel-links">
          <div className="intel-h">Cited-link reputation <span className="mono">{res.links.length} domain{res.links.length === 1 ? "" : "s"}</span></div>
          {res.links.map((l, i) => (
            <div key={i} className={cx("intel-link", "il-" + (l.risk === "ok" ? "ok" : l.risk === "new" ? "warn" : "bad"))}>
              <span className="il-dom mono">{l.domain}</span>
              <span className="il-meta mono">{l.ageDays != null ? Math.round(l.ageDays / 365) + "y" : "age?"}{l.dnsbl ? ` · DNSBL ${l.dnsbl}` : ""}{l.denylist && l.denylist.length ? " · denylist" : ""}</span>
              <span className={cx("il-tag", "ilt-" + (l.risk === "ok" ? "ok" : l.risk === "new" ? "warn" : "bad"))}>{l.risk === "ok" ? "clean" : l.risk === "new" ? "new domain" : l.risk === "dnsbl" ? "blocklisted" : "denylisted"}</span>
              <a className="pivot il-pivot" href={"https://www.virustotal.com/gui/domain/" + l.domain} target="_blank" rel="noopener noreferrer" title={"Open " + l.domain + " on VirusTotal (new tab)"}>VT<span className="pivot-ic">↗</span></a>
            </div>
          ))}
        </div>
      )}
      {res && res.correlation && res.correlation.host && res.correlation.host.length > 0 && (
        <div className="corr-card">
          <div className="corr-h"><b>Internal correlation</b><span className="mono">prior reviews on this device</span></div>
          <div className="corr-list">
            {res.correlation.host.slice(0, 8).map((c, i) => (
              <span key={i} className={cx("corr-chip", c.tier === "high" ? "corr-bad" : c.resolution === "approve" ? "corr-ok" : "")}>@{c.username}<span className="corr-meta mono">{c.instance}{c.tier ? " · " + c.tier : ""}</span></span>
            ))}
          </div>
          <div className="corr-note">Other items from <b>{inst ? inst.host : host}</b> you've already triaged. A recurring source may warrant an instance-level rule.</div>
        </div>
      )}
      {res && res.signals && res.signals.length > 0 && (
        <div className="signals" style={{ marginTop: 10 }}>{res.signals.map((s, i) => <SignalRow key={i} s={s} />)}</div>
      )}
    </RIPanel>
  );
}

// ---- 3) per-post text checker (local, no network) ----
function ReportPostsPanel({ rep }) {
  const [ran, setRan] = useState(false);
  const posts = rep.posts || [];
  return (
    <RIPanel title="Reported content text checks" sub="local harassment / hate / threat scan per post" status={ran ? "done" : "idle"} err={null} onGo={() => setRan(true)}
      idleLabel={"Check " + posts.length + " post" + (posts.length === 1 ? "" : "s")}
      idleNote="Runs each reported post through the local text checker (harassment &amp; abuse, threats, sexism / misogyny, racism, toxicity). No network — instant &amp; repeatable.">
      {ran && <AbuseReview posts={posts} />}
      {ran && (
        <div className="ri-posts">
          {posts.map((p) => (
            <div key={p.id} className="ri-post">
              <div className="ri-post-text">{(p.text || "").slice(0, 180)}{(p.text || "").length > 180 ? "…" : ""}</div>
              <AbuseScan post={p} />
            </div>
          ))}
          {!posts.length && <div className="muted-line">No cited posts to scan.</div>}
        </div>
      )}
    </RIPanel>
  );
}

function ReportIntel({ rep, settings, onResult }) {
  const [aRes, setARes] = useState(null);
  const [iRes, setIRes] = useState(null);
  // Lift a merged {actor, instance, links} up so the inspector can fill the real
  // avatar (from the actor lookup) and the checked link domains (from the server
  // lookup) — whichever of the two has been run so far.
  function lift(a, i) {
    if (!onResult) return;
    const A = a || aRes, I = i || iRes;
    onResult({ actor: A ? A.actor : null, instance: I ? I.instance : null, links: I ? I.links : null });
  }
  return (
    <Section title="Instance &amp; actor intelligence" sub="run each lookup on its own — cache-first" service="real lookups">
      <div className="ri-panels">
        <ReportActorPanel rep={rep} settings={settings} onRes={(r) => { setARes(r); lift(r, null); }} />
        <ReportInstancePanel rep={rep} settings={settings} onRes={(r) => { setIRes(r); lift(null, r); }} />
        <ReportPostsPanel rep={rep} />
      </div>
    </Section>
  );
}

Object.assign(window, { ReportIntel, ReportActorPanel, ReportInstancePanel, ReportPostsPanel });

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — Report Moderation inspector
   Mastodon-faithful: canonical category + cited server rules,
   case assignment + decision audit trail (statement of reasons),
   a scoped action ladder, IFTAS ABC labels + target screening,
   and case grouping / reporter-trust / aging.
   ============================================================ */

function RULES_BY_ID(id) {
  const R = (window.REEF_DATA && window.REEF_DATA.RULES) || [];
  return R.find((r) => r.id === id) || null;
}
const CAT_TYPE_LABEL = { spam: "Spam", violation: "Rule violation", legal: "Illegal content", other: "Other" };
const CAT_TYPE_TONE = { spam: "warn", violation: "bad", legal: "bad", other: "" };

function CaseBar({ rep, onChange }) {
  const cw = window.ReefCasework;
  const assigned = cw ? cw.assignedTo(rep.id) : null;
  return (
    <div className="case-bar">
      <span className="case-l">Case</span>
      {assigned
        ? (<React.Fragment>
            <span className="case-assigned">Handled by <b>{assigned}</b></span>
            <button className="case-btn" onClick={() => { cw.assign(rep.id, null); onChange && onChange(); }}>Release</button>
          </React.Fragment>)
        : (<React.Fragment>
            <span className="case-unassigned">Unassigned — claim it so no one double-works it</span>
            <button className="case-btn case-claim" onClick={() => { cw.assign(rep.id, "you"); onChange && onChange(); }}>Claim</button>
          </React.Fragment>)}
    </div>
  );
}

function CwReview({ posts }) {
  const r = (window.ReefText && window.ReefText.cwReview) ? window.ReefText.cwReview(posts) : null;
  if (!r || !r.evaluable) return null;
  const tone = r.verdict === "abusive" ? "bad" : r.verdict === "missing" ? "warn" : "ok";
  const icon = r.verdict === "abusive" ? "⛔" : r.verdict === "missing" ? "⚠" : "✓";
  const parts = [];
  if (r.abusive) parts.push(`${r.abusive} with abuse in the CW text`);
  if (r.missing) parts.push(`${r.missing} sensitive post${r.missing === 1 ? "" : "s"} missing a CW`);
  if (r.present) parts.push(`${r.present} properly content-warned`);
  const headline = r.verdict === "abusive" ? "Abuse hidden in a content warning"
    : r.verdict === "missing" ? "Sensitive content posted without a content warning"
    : "Content warnings applied";
  return (
    <div className={cx("cw-review", "cw-review-" + tone)}>
      <span className="cw-review-icon">{icon}</span>
      <div className="cw-review-body">
        <b>{headline}</b>
        <span className="cw-review-detail">{parts.join(" · ")} — the CW field is scanned separately from the post body.</span>
      </div>
    </div>
  );
}

const ABUSE_VERDICT = {
  severe: { tone: "bad", icon: "⛔", head: "Severe abuse in reported content" },
  abusive: { tone: "bad", icon: "⛔", head: "Abusive content detected" },
  borderline: { tone: "warn", icon: "⚠", head: "Borderline / hostile content" },
  clean: { tone: "ok", icon: "✓", head: "No abuse patterns detected" },
};

// Spam roll-up banner — the other lens: ReefText.spamReview scans the same posts
// for bulk-solicitation structure (hashtag walls, promo language, template reuse).
const SPAM_VERDICT = {
  spam: { tone: "bad", icon: "⛔", head: "Spam-patterned content" },
  promotional: { tone: "warn", icon: "⚠", head: "Promotional content" },
  clean: { tone: "ok", icon: "✓", head: "No spam patterns detected" },
};
function SpamReview({ posts }) {
  const r = (window.ReefText && window.ReefText.spamReview) ? window.ReefText.spamReview(posts) : null;
  if (!r || !r.evaluable || r.verdict === "clean") return null; // stay quiet when clean — the abuse banner already covers "nothing found"
  const v = SPAM_VERDICT[r.verdict];
  const parts = [];
  if (r.spam) parts.push(`${r.spam} spam`);
  if (r.promotional) parts.push(`${r.promotional} promotional`);
  if (r.clean) parts.push(`${r.clean} clean`);
  return (
    <div className={cx("abuse-review", "abuse-review-" + v.tone)}>
      <span className="abuse-review-icon">{v.icon}</span>
      <div className="abuse-review-body">
        <b>{v.head}</b>
        <span className="abuse-review-detail">
          {r.total} post{r.total === 1 ? "" : "s"} scanned · {parts.join(" · ")}
          {r.templated ? " — same hashtag wall across posts (bulk-automation tell)" : ""}
          {" · max spam score "}{r.maxScore}/100. Structural solicitation markers — separate lens from the abuse scan.
        </span>
      </div>
    </div>
  );
}

// Roll-up banner — runs every cited post through ReefText.abuseScan (harassment /
// hate / threats / sexism / misogyny / toxicity) and headlines the worst verdict.
function AbuseReview({ posts }) {
  const r = (window.ReefText && window.ReefText.abuseReview) ? window.ReefText.abuseReview(posts) : null;
  if (!r || !r.evaluable) return null;
  const v = ABUSE_VERDICT[r.verdict] || ABUSE_VERDICT.clean;
  const parts = [];
  if (r.severe) parts.push(`${r.severe} severe`);
  if (r.abusive) parts.push(`${r.abusive} abusive`);
  if (r.borderline) parts.push(`${r.borderline} borderline`);
  if (r.clean) parts.push(`${r.clean} clean`);
  return (
    <div className={cx("abuse-review", "abuse-review-" + v.tone)}>
      <span className="abuse-review-icon">{v.icon}</span>
      <div className="abuse-review-body">
        <b>{v.head}</b>
        <span className="abuse-review-detail">
          {r.total} post{r.total === 1 ? "" : "s"} scanned · {parts.join(" · ")}
          {r.topCategories.length ? " — " + r.topCategories.slice(0, 4).join(", ").toLowerCase() : ""}
          {" · max severity "}{r.maxScore}/100. Sentiment validation tuned for interpersonal harm, not spam — local, no text leaves your browser.
        </span>
      </div>
    </div>
  );
}

// Per-post result line — shown under every reported post so the moderator can see
// the scan ran on each one, with the matched abuse categories called out.
function AbuseScan({ post }) {
  const s = (window.ReefText && window.ReefText.abuseScan) ? window.ReefText.abuseScan(post) : null;
  if (!s || !s.evaluable) return null;
  const v = ABUSE_VERDICT[s.verdict] || ABUSE_VERDICT.clean;
  return (
    <div className={cx("abuse-scan", "abuse-scan-" + v.tone)} title={s.note}>
      <span className={cx("abuse-verdict", "tone-" + v.tone)}>{v.icon} {s.verdict}</span>
      <span className="abuse-score mono">{s.score}</span>
      <div className="abuse-cats">
        {s.categories.map((c) => (
          <span key={c.id} className="abuse-cat" title={"matched: " + c.matched.join(", ")}>
            {c.label}<span className="abuse-cat-terms mono">{c.matched.slice(0, 4).join(", ")}</span>
          </span>
        ))}
        {s.campaigns.map((c, i) => (
          <span key={"cmp" + i} className="abuse-cat abuse-cat-camp" title={"campaign: " + c.matched.join(", ")}>{c.name}</span>
        ))}
        {!s.categories.length && !s.campaigns.length && <span className="abuse-clean mono">sentiment {s.sentiment.label}</span>}
      </div>
    </div>
  );
}

function Classification({ rep }) {
  const type = rep.categoryType || "other";
  // Live Mastodon reports carry the cited rules inline ({id,text}); demo reports
  // reference rule ids resolved against the server rules table.
  const rules = (rep.citedRules && rep.citedRules.length)
    ? rep.citedRules
    : (rep.ruleIds || []).map(RULES_BY_ID).filter(Boolean);
  const abc = rep.abcLabels || {};
  return (
    <Section title="Classification" sub="Mastodon category · cited rules · IFTAS labels" service="report metadata">
      <div className="cls-row">
        <span className="cls-k">Category</span>
        <span className={cx("cls-cat", "cls-cat-" + (CAT_TYPE_TONE[type] || "na"))}>{CAT_TYPE_LABEL[type]}</span>
        <span className="cls-sub">{rep.categoryInferred ? "inferred from the reporter’s comment (Misskey reports carry no category)" : `reported as “${rep.category}”`}</span>
      </div>
      {rules.length > 0 && (
        <div className="cls-rules">
          <span className="cls-k">Rules cited</span>
          <div className="cls-rules-list">
            {rules.map((r) => (
              <div key={r.id} className="cls-rule"><span className="cls-rule-n mono">#{r.id}</span><span className="cls-rule-t">{r.text || "(rule " + r.id + ")"}</span></div>
            ))}
          </div>
        </div>
      )}
      {(rep.assignedTo || rep.actionTakenAt || (rep.updatedAt && rep.updatedAt !== rep.createdAt)) && (
        <div className="cls-server">
          <span className="cls-k">Server status</span>
          <div className="cls-server-row">
            {rep.assignedTo && <span className="cls-srv-pill" title="Moderator assigned on the server">assigned {rep.assignedTo}</span>}
            {rep.actionTaken && <span className="cls-srv-pill cls-srv-done" title={rep.actionTakenBy ? "Actioned by " + rep.actionTakenBy : "Action taken on the server"}>actioned{rep.actionTakenAt ? " " + ago(rep.actionTakenAt) : ""}{rep.actionTakenBy ? " · " + rep.actionTakenBy : ""}</span>}
            {rep.updatedAt && rep.updatedAt !== rep.createdAt && !rep.actionTaken && <span className="cls-srv-pill" title="Last changed on the server">updated {ago(rep.updatedAt)}</span>}
          </div>
        </div>
      )}
      {(abc.actor || abc.behaviour || abc.content) && (
        <div className="cls-abc">
          <span className="cls-k">IFTAS labels</span>
          <div className="abc-chips">
            {abc.actor && <span className="abc-chip abc-actor">Actor · {abc.actor}</span>}
            {abc.behaviour && <span className="abc-chip abc-behav">Behaviour · {abc.behaviour}</span>}
            {abc.content && <span className="abc-chip abc-content">Content · {abc.content}</span>}
          </div>
        </div>
      )}
    </Section>
  );
}

function ReporterTrust({ rep }) {
  const s = rep.reporterStats;
  const rate = s ? s.rate : null;
  const tone = rate == null ? "" : rate >= 60 ? "ok" : rate >= 30 ? "warn" : "bad";
  return (
    <div className="rep-reporter">
      <span className="rep-reporter-k">Reported by</span>
      <span className={cx("mono", rep.reporter.local ? "tone-accent" : "")}>{rep.reporter.handle}</span>
      {rep.reporter.local ? <span className="rep-origin rep-origin-local">local</span> : <span className="rep-origin rep-origin-remote">remote</span>}
      {rep.forwarded && <span className="rep-origin rep-origin-fwd" title="This report was forwarded between instances">↪ forwarded</span>}
      {s && <span className={cx("reporter-trust", "rt-" + tone)} title="How many of this reporter's past reports led to action">{s.actioned}/{s.filed} prior actioned · {rate}%</span>}
      <span className="rep-reporter-when">{ago(rep.createdAt)}</span>
    </div>
  );
}

function RelatedReports({ rep, allReports, onSelect }) {
  const key = rep.target.username + "@" + rep.target.host;
  const related = (allReports || []).filter((r) => r.id !== rep.id && r.status === "open" && (r.target.username + "@" + r.target.host) === key);
  if (!related.length) return null;
  const reporters = new Set([rep.reporter.handle, ...related.map((r) => r.reporter.handle)]);
  return (
    <Section title="Related reports" sub={(related.length + 1) + " open reports · " + reporters.size + " reporters on this target"} service="case grouping">
      <div className="brigade-note">Multiple open reports target this account — likely a pile-on. Resolving here should account for all of them.</div>
      <div className="related-list">
        {related.map((r) => (
          <button key={r.id} className="related-row" onClick={() => onSelect && onSelect(r.id)}>
            <span className={cx("related-tier", "t-" + r.tier)} />
            <span className="related-reporter mono">{r.reporter.handle}</span>
            <span className="related-comment">{(r.comment || "").slice(0, 64)}{(r.comment || "").length > 64 ? "…" : ""}</span>
            <span className="related-when mono">{ago(r.createdAt)}</span>
          </button>
        ))}
      </div>
    </Section>
  );
}

function AuditTrail({ rep, tick }) {
  const cw = window.ReefCasework;
  const log = cw ? cw.auditFor(rep.id) : [];
  if (!log.length) return null;
  return (
    <Section title="Decision history" sub="Audit trail — statement of reasons" service="casework">
      <div className="audit-list">
        {log.slice().reverse().map((e, i) => (
          <div key={i} className="audit-row">
            <span className="audit-when mono">{new Date(e.at).toLocaleString()}</span>
            <span className={cx("audit-action", "tone-" + recColor(e.action))}>{recVerb(e.action)}</span>
            <span className="audit-who mono">{e.who}</span>
            {e.notify && <span className="audit-notify" title="The user was notified with the reason">✉ notified</span>}
            {e.note && <span className="audit-note">“{e.note}”</span>}
          </div>
        ))}
      </div>
    </Section>
  );
}

function ReportActions({ rep, onAction }) {
  const [note, setNote] = useState("");
  const [notify, setNotify] = useState(false);
  const remote = rep.target.remote;
  function act(decision) { onAction(rep, decision, { note: note.trim(), notify }); setNote(""); setNotify(false); }
  return (
    <div className="ladder">
      <div className="ladder-note">
        <textarea className="conn-input ladder-note-input" placeholder="Decision note — recorded to the audit trail as the statement of reasons (recommended)." value={note} onChange={(e) => setNote(e.target.value)} />
        <label className="ladder-notify"><input type="checkbox" checked={notify} onChange={(e) => setNotify(e.target.checked)} /> Notify the user with this reason <span className="ladder-notify-off">(off by default)</span></label>
      </div>
      <div className="ladder-groups">
        <div className="ladder-group">
          <span className="ladder-k">Content</span>
          <button className="lact" onClick={() => act("cw")}>Add CW</button>
          <button className="lact" onClick={() => act("delete")}>Delete post</button>
        </div>
        <div className="ladder-group">
          <span className="ladder-k">Account</span>
          <button className="lact" onClick={() => act("warn")}>Warn</button>
          <button className="lact" onClick={() => act("silence")}>Limit</button>
          <button className="lact" onClick={() => act("freeze")}>Freeze</button>
          <button className="lact lact-bad" onClick={() => act("suspend")}>Suspend</button>
        </div>
        <div className="ladder-group">
          <span className="ladder-k">Server</span>
          {remote && <button className="lact" onClick={() => act("forward")}>Forward</button>}
          {remote && <button className="lact lact-bad" onClick={() => act("blockdomain")} title={"Defederate " + rep.target.host}>Block domain</button>}
          <button className="lact lact-ghost" onClick={() => act("dismiss")} disabled={rep.locked} title={rep.locked ? "Locked queue item cannot be dismissed" : ""}>Dismiss</button>
        </div>
      </div>
    </div>
  );
}

function ReportInspector({ rep, inst, onAction, resolved, connections, acting, onActing, settings, denyHits, allReports, onSelectRep, caseTick, onCaseChange }) {
  const t = rep.target;
  const h = rep.history;
  const [intel, setIntel] = useState(null); // ReefEnrich.runReport result — fills real avatar + checked link domains
  const ageDays = (Date.now() - new Date(rep.createdAt)) / 86400000;
  const stale = ageDays > 2 && !resolved;
  const targetHits = window.ReefCampaigns ? window.ReefCampaigns.match((t.username || "") + " " + (t.displayName || "") + " " + (t.bio || "")) : [];
  const intelLinks = intel && intel.links && intel.links.length ? intel.links : null;
  const linkedDomains = intelLinks ? intelLinks.map((l) => l.domain) : h.topDomains;
  return (
    <div className="inspector">
      {/* report header */}
      <div className="rep-head">
        <div className="rep-cat">
          <span className={"cat-chip t-" + rep.tier}>{rep.category}</span>
          {stale && <span className="stale-chip" title="Open longer than 2 days">⏱ {Math.round(ageDays)}d open</span>}
          {rep.locked && <span className="lock-chip">🔒 locked queue</span>}
        </div>
        <TierChip tier={rep.tier}>{rep.severity} severity</TierChip>
        <ExportButton formats={[
          { label: "Native JSON", sub: "full archive · target, posts, audit", fn: () => ReefExport.exportReport(rep) },
          { label: "MISP Event", sub: "IoCs · MISP core data model", fn: () => ReefExport.exportReportMISP(rep) },
          { label: "STIX 2.1", sub: "bundle · observables + indicator + note", fn: () => ReefExport.exportReportSTIX(rep) },
          { label: "xARF report", sub: "abuse desk · eXtended Abuse Reporting Format", fn: () => ReefExport.exportReportXARF(rep) },
        ]} />
      </div>

      <CaseBar rep={rep} onChange={onCaseChange} />

      <DenyBanner hits={denyHits} target={t} />

      <ReporterTrust rep={rep} />
      <p className="rep-comment">"{rep.comment}"</p>

      <Classification rep={rep} />

      {/* assessment */}
      <Section title="Vantage assessment" sub="Severity &amp; recommended action" service="reasoning engine">
        <div className="assess">
          <RiskGauge score={rep.severity} tier={rep.tier} label="Severity" />
          <div className="assess-body">
            <div className={"rec-banner tone-" + recColor(rep.recommend)}>
              <span className="rec-k">Suggested</span>
              <span className="rec-v">{recVerb(rep.recommend)}</span>
              <span className="rec-note">{rep.locked ? "override required" : "suggestion · you decide"}</span>
            </div>
            <p className="rationale">{rep.rationale}</p>
          </div>
        </div>
        <div className="signals">
          {rep.severitySignals.map((s, i) => <SignalRow key={i} s={s} />)}
        </div>
      </Section>

      {/* reported account */}
      <Section title="Reported account" service={t.remote ? "remote · " + t.host : "local"}>
        <div className="tgt">
          <Avatar name={t.displayName || t.username} src={intel && intel.actor ? intel.actor.avatar : ""} hue={t.avatarHue} size={46} square />
          <div className="tgt-main">
            <div className="tgt-name">{t.displayName} {t.bot && <span className="bot-tag">BOT</span>}</div>
            <div className="tgt-handle mono">@{t.username}@{t.host}</div>
            <p className="tgt-bio">{t.bio}</p>
            <TargetLookups target={t} denyHits={denyHits} />
          </div>
        </div>
        {intel && intel.instance && intel.instance.nodeinfo && intel.instance.nodeinfo.software && (
          <div className="tgt-instance">
            <span className="ti-k">Origin instance</span>
            <span className="ti-v mono">{intel.instance.host}</span>
            <span className="ti-soft">{(intel.instance.nodeinfo.software + " " + (intel.instance.nodeinfo.version || "")).trim()}</span>
            {intel.instance.nodeinfo.totalUsers != null && <span className="ti-users mono">{intel.instance.nodeinfo.totalUsers.toLocaleString()} users</span>}
            {intel.instance.nodeinfo.openRegistration === true && <span className="ti-open">open reg</span>}
          </div>
        )}
        {targetHits.length > 0 && (
          <div className="campaign-hits tgt-camp">
            {targetHits.map((c, i) => (
              <span key={i} className={cx("campaign-hit", c.status === "confirmed" ? "ch-bad" : "ch-warn")} title="Matched a campaign wordlist on the handle / bio">{c.name} · {c.status}<span className="campaign-hit-terms">{c.matched.join(", ")}</span></span>
            ))}
          </div>
        )}
        <div className="tgt-stats">
          <div className="tgt-stat"><b>{t.notes.toLocaleString()}</b><span>posts</span></div>
          <div className="tgt-stat"><b>{t.followers}</b><span>followers</span></div>
          <div className="tgt-stat"><b>{t.following}</b><span>following</span></div>
          <div className="tgt-stat"><b className={t.ageDays < 14 ? "tone-bad" : t.ageDays < 60 ? "tone-warn" : ""}>{t.ageDays}d</b><span>account age</span></div>
        </div>
        {t.links.length > 0 && (
          <div className="tgt-links">
            {t.links.map((l, i) => <span key={i} className="chip chip-link mono">{l}</span>)}
          </div>
        )}
      </Section>

      {/* posting behavior */}
      <Section title="Posting behavior" sub="15-day window" service="post-history analysis">
        <div className="behav-grid">
          <div className="behav-card">
            <div className="behav-h"><span>Posting volume</span><span className="mono tone-accent">▲ rising</span></div>
            <BarChart data={h.volume} color="var(--accent)" h={46} />
          </div>
          <div className="behav-card">
            <div className="behav-h"><span>Toxicity trend</span><span className={"mono " + (h.toxicity[h.toxicity.length-1] > 60 ? "tone-bad" : h.toxicity[h.toxicity.length-1] > 30 ? "tone-warn" : "tone-ok")}>{h.toxicity[h.toxicity.length-1]}%</span></div>
            <Sparkline data={h.toxicity} color={h.toxicity[h.toxicity.length-1] > 60 ? "var(--bad)" : h.toxicity[h.toxicity.length-1] > 30 ? "var(--warn)" : "var(--ok)"} h={46} />
          </div>
        </div>
        <div className="behav-row2">
          <RatioBar reply={h.replyRatio} original={h.originalRatio} />
        </div>
        <div className="behav-tags">
          {h.topTags.length > 0 && (
            <div className="bt-group">
              <span className="bt-k">Top hashtags</span>
              <div className="chiprow">{h.topTags.map((x, i) => <span key={i} className="chip">{x}</span>)}</div>
            </div>
          )}
          {linkedDomains.length > 0 && (
            <div className="bt-group">
              <span className="bt-k">Linked domains{intelLinks ? " · reputation-checked" : ""}</span>
              <div className="chiprow">{(intelLinks || linkedDomains.map((d) => ({ domain: d, risk: "ok" }))).map((x, i) => <span key={i} className={cx("chip", "mono", x.risk && x.risk !== "ok" ? "chip-warn" : "chip-link")} title={x.risk && x.risk !== "ok" ? x.risk : ""}>{x.domain}</span>)}</div>
            </div>
          )}
          <div className="bt-group">
            <span className="bt-k">Federation reach</span>
            <div className="chiprow">{h.reach.map((x, i) => <span key={i} className="chip mono">{x}</span>)}</div>
          </div>
        </div>
        {(h.priorReports > 0 || h.priorActions.length > 0) && (
          <div className="prior">
            <span className="prior-k">Moderation history</span>
            <div className="prior-body">
              <span className="prior-count">{h.priorReports} prior report{h.priorReports === 1 ? "" : "s"}</span>
              {h.priorActions.map((a, i) => <span key={i} className="chip chip-warn">{a}</span>)}
              {h.priorActions.length === 0 && <span className="muted-line">No prior actions on file.</span>}
            </div>
          </div>
        )}
      </Section>

      {/* reported posts */}
      <Section title="Reported content" sub={rep.evidenceCount === 0 && rep.posts.length ? rep.posts.length + " recent post" + (rep.posts.length === 1 ? "" : "s") + " — no specific posts cited (account-level report)" : rep.posts.length + " post" + (rep.posts.length === 1 ? "" : "s") + " cited as evidence"} service="evidence">
        <CwReview posts={rep.posts} />
        <SpamReview posts={rep.posts} />
        <AbuseReview posts={rep.posts} />
        <div className="posts">
          {rep.posts.map((p) => {
            const cwa = (window.ReefText && window.ReefText.cwAnalysis) ? window.ReefText.cwAnalysis(p) : null;
            return (
              <div key={p.id} className={cx("post", p.flagged.includes("media-withheld") && "post-withheld")}>
                {cwa && cwa.hasCw && (
                  <div className={cx("post-cw", cwa.state === "abusive" && "post-cw-bad")}>
                    <span className="post-cw-label">CW</span>
                    <span className="post-cw-text">{cwa.cw}</span>
                    {cwa.state === "abusive" && <span className="post-cw-hit" title={cwa.campaigns.map((c) => c.name + ": " + c.matched.join(", ")).join(" · ")}>⛔ pattern in warning</span>}
                  </div>
                )}
                {cwa && cwa.state === "missing" && (
                  <div className="post-cw post-cw-missing"><span className="post-cw-label">no CW</span><span className="post-cw-text">sensitive content posted without a content warning</span></div>
                )}
                <div className="post-text">{p.text}</div>
                <AbuseScan post={p} />
                <div className="post-foot">
                  <span className="post-when mono">{ago(p.at)}</span>
                  <span className="post-metrics mono">♺ {p.renotes} · ♥ {p.reactions}</span>
                  {p.mediaCount > 0 && <span className="post-metrics mono" title="Attached media">📎 {p.mediaCount}</span>}
                  {p.evidence && <span className="post-evidence" title="Reporter cited this specific post as evidence">cited</span>}
                  {p.url && <a className="pivot post-link" href={p.url} target="_blank" rel="noopener noreferrer" title="Open the original post (new tab)">open↗</a>}
                  <span className="post-flags">
                    {p.flagged.map((f, i) => <span key={i} className={cx("pflag", ["slur","threat","doxxing","phishing","csam-hashmatch"].includes(f) && "pflag-bad")}>{f}</span>)}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      </Section>

      <ReportIntel rep={rep} settings={settings} onResult={setIntel} />

      <RelatedReports rep={rep} allReports={allReports} onSelect={onSelectRep} />

      <AuditTrail rep={rep} tick={caseTick} />

      {/* actions */}
      {!resolved ? (
        <div className="action-wrap">
          {rep.live && <ActingAs host={rep.instance} connections={connections} value={acting} onChange={onActing} />}
          <ReportActions rep={rep} onAction={onAction} />
        </div>
      ) : (
        <div className="resolved-bar">Resolved · {recVerb(rep._resolution)}</div>
      )}
    </div>
  );
}

// Reuses the shared username/domain lookup pivots (same tools as account review)
// for the REPORTED account, and surfaces the live denylist check on its origin
// host so the moderator can see the domain was screened — clean or listed.
function TargetLookups({ target, denyHits }) {
  const t = target || {};
  const handle = (t.username && t.host) ? (t.username + "@" + t.host) : "";
  const hits = denyHits || [];
  const sev = hits.some((x) => x.severity === "suspend") ? "bad" : hits.length ? "warn" : "ok";
  const lists = [...new Set(hits.map((x) => x.list))];
  return (
    <div className="tgt-lookups">
      {t.username && <PivotLinks type="username" value={t.username} label="reported user" />}
      {handle && <PivotLinks type="email" value={handle} only={["SFS"]} label="handle" />}
      {t.host && <PivotLinks type="domain" value={t.host} label="origin host" />}
      <div className={cx("deny-check", "deny-check-" + sev)} title={hits.length ? "Origin host / actor matched: " + lists.join(", ") : "Origin host and actor handle screened against your enabled denylists — no match"}>
        <span className="deny-check-i">{sev === "ok" ? "✓" : "⊘"}</span>
        <span className="deny-check-t">
          Denylist {hits.length
            ? <React.Fragment>match · <b>{hits.length}</b> hit{hits.length === 1 ? "" : "s"} on {lists.slice(0, 2).join(", ")}{lists.length > 2 ? " +" + (lists.length - 2) : ""}</React.Fragment>
            : <React.Fragment>checked · <b className="mono">{t.host}</b> clean</React.Fragment>}
        </span>
      </div>
    </div>
  );
}

function DenyBanner({ hits, target }) {
  if (!hits || !hits.length) return null;
  const sev = hits.some((x) => x.severity === "suspend") ? "suspend" : hits.some((x) => x.severity === "silence") ? "silence" : "noop";
  const tone = sev === "suspend" ? "bad" : "warn";
  const actorHit = hits.some((x) => x.on === "actor");
  return (
    <div className={cx("deny-banner", "deny-" + tone)}>
      <span className="deny-icon">⊘</span>
      <div className="deny-body">
        <div className="deny-title">
          {actorHit ? "Known bad actor" : "Listed domain"} — on {hits.length} denylist{hits.length === 1 ? "" : "s"}
          <span className="deny-sub">@{target.username}@{target.host}</span>
        </div>
        <div className="deny-hits">
          {hits.map((x, i) => (
            <span key={i} className={cx("deny-hit", "dh-" + (x.severity === "suspend" ? "bad" : x.severity === "silence" ? "warn" : "noop"))} title={x.comment || ""}>
              <b>{x.list}</b>
              <span className="deny-hit-sev">{x.severity}</span>
              <span className="deny-hit-on mono">{x.on === "actor" ? x.matched : x.matched}</span>
            </span>
          ))}
        </div>
        {hits.find((x) => x.comment) && <div className="deny-comment">"{hits.find((x) => x.comment).comment}"</div>}
      </div>
    </div>
  );
}

Object.assign(window, { ReportInspector, DenyBanner, TargetLookups, AbuseReview, AbuseScan, SpamReview });

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — Connections manager (add/verify/default/remove) + settings
   ============================================================ */

function ConnectionsModal({ open, onClose, connections, settings, instances, serverSession, onSave, onRemove, onSetDefault, onScopeAudit, onSettings, onSetKey, onSetAffirm }) {
  const [baseUrl, setBaseUrl] = useState("");
  const [token, setToken] = useState("");
  const [label, setLabel] = useState("");
  const [busy, setBusy] = useState(false);
  const [status, setStatus] = useState(null); // {tone, msg}
  const hosted = !!serverSession;

  // Lazily audit token scopes for verified connections that don't have a result yet
  // (e.g. saved before this feature, or re-opened) so the over-provisioned notice
  // appears without re-connecting. Best-effort; failures are swallowed. Skipped in
  // hosted mode — the token lives in the server vault, there's nothing to audit here.
  useEffect(() => {
    if (!open || !onScopeAudit || hosted) return;
    connections.forEach((c) => {
      if (c.status === "verified" && !c.scopeAudit) {
        ReefAPI.tokenScopes(c).then((a) => onScopeAudit(c.id, a)).catch(() => {});
      }
    });
  }, [open, hosted, connections.map((c) => c.id + (c.scopeAudit ? "1" : "0")).join(",")]);

  if (!open) return null;

  async function connect() {
    setBusy(true); setStatus({ tone: "wait", msg: "Detecting software…" });
    const origin = ReefStore.normalizeBaseUrl(baseUrl);
    if (!origin) { setBusy(false); setStatus({ tone: "bad", msg: "Enter a valid instance URL." }); return; }
    const host = new URL(origin).host;
    window.__reefProxy = settings.proxy || "";
    try {
      const det = await ReefAPI.detect(origin);
      if (!det.software) throw new Error("Unrecognized software: " + (det.raw || "unknown"));
      const realName = det.raw ? det.raw.replace(/^\w/, (c) => c.toUpperCase()) : det.software;
      setStatus({ tone: "wait", msg: `Found ${realName} ${det.version} — verifying token…` });
      const conn = { id: ReefStore.uid(), label: label || host, host, baseUrl: origin, software: det.software, softwareName: realName, version: det.version, token, status: "pending" };
      const idn = await ReefAPI.verify(conn);
      conn.identity = idn; conn.role = idn.role; conn.status = "verified";
      conn.isDefault = !connections.some((c) => c.host === host);
      try { conn.scopeAudit = await ReefAPI.tokenScopes(conn); } catch (e) { conn.scopeAudit = null; }
      const sa = conn.scopeAudit;
      const op = sa && sa.overprovisioned ? ` · ⚠ token is over-provisioned (${sa.extra.length} extra scope${sa.extra.length === 1 ? "" : "s"} beyond moderation)` : "";
      if (!idn.isMod) setStatus({ tone: "warn", msg: `Connected as @${idn.username} (${idn.role}) — note: not a moderator/admin, actions may be denied.` + op });
      else setStatus({ tone: op ? "warn" : "ok", msg: `Connected as @${idn.username} · ${idn.role}` + op });
      onSave(conn);
      setToken(""); setBaseUrl(""); setLabel("");
    } catch (e) {
      setStatus({ tone: "bad", msg: errText(e) });
    } finally { setBusy(false); window.__reefProxy = settings.proxy || ""; }
  }

  function errText(e) {
    const m = (e && e.message) || String(e);
    if (/Failed to fetch|NetworkError|CORS/i.test(m)) return "Couldn't reach the instance (network/CORS). In this preview, external calls are blocked — try from your own browser, or set a proxy below.";
    return m;
  }

  const byHost = {};
  connections.forEach((c) => { (byHost[c.host] = byHost[c.host] || []).push(c); });

  return (
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <header className="modal-h">
          <div><h3>Connections</h3><span className="modal-sub">Moderator &amp; admin accounts across your servers</span></div>
          <button className="modal-x" onClick={onClose}>✕</button>
        </header>

        <div className="modal-body">
          {hosted ? (
            /* Hosted server: identity comes from "sign in with your instance";
               tokens are held server-side, so there's no token paste. One
               account per instance; "add another server" re-runs the login
               flow and links the new account to this sign-in (phase 2.5). */
            <HostedConnections serverSession={serverSession} />
          ) : (
          <React.Fragment>
          {/* mode + settings */}
          <div className="conn-settings">
            <div className="mode-toggle">
              <span className="ms-l">Data source</span>
              <div className="seg-group">
                <button className={cx("seg", settings.mode === "demo" && "seg-on")} onClick={() => onSettings({ mode: "demo" })}>Demo</button>
                <button className={cx("seg", settings.mode === "live" && "seg-on")} onClick={() => onSettings({ mode: "live" })}>Live</button>
              </div>
            </div>
            <label className="conn-check">
              <input type="checkbox" checked={settings.showDemo} onChange={(e) => onSettings({ showDemo: e.target.checked })} />
              <span>Show demo data (<code>example.com</code>) alongside live</span>
            </label>
            <div className="conn-proxy">
              <span className="conn-svc-hint">OSINT API keys &amp; proxy moved to the <b>Services</b> panel.</span>
            </div>
          </div>

          {/* add form */}
          <div className="conn-add">
            <div className="conn-add-h">Add a server</div>
            <div className="conn-grid">
              <div className="conn-field">
                <label className="conn-field-l">Instance URL</label>
                <input className="conn-input mono" placeholder="mastodon.example.com" value={baseUrl} onChange={(e) => setBaseUrl(e.target.value)} />
              </div>
              <div className="conn-field">
                <label className="conn-field-l">Label <span className="opt">optional</span></label>
                <input className="conn-input" placeholder="My admin account" value={label} onChange={(e) => setLabel(e.target.value)} />
              </div>
            </div>
            <div className="conn-field">
              <label className="conn-field-l">Access token <span className="opt">Settings → API in your instance · needs read/write admin scopes</span></label>
              <input className="conn-input mono" type="password" placeholder="paste token" value={token} onChange={(e) => setToken(e.target.value)} />
            </div>
            <div className="conn-actions">
              <button className="act act-approve conn-connect" disabled={busy || !baseUrl || !token} onClick={connect}>
                {busy ? "Connecting…" : "Connect & verify"}
              </button>
              {status && <span className={"conn-status tone-" + (status.tone === "wait" ? "accent" : status.tone)}>{status.msg}</span>}
            </div>
          </div>

          {/* existing connections */}
          <div className="conn-list">
            <div className="conn-list-h">Connected accounts <span className="mono">{connections.length}</span></div>
            {connections.length === 0 && <div className="muted-line">No accounts yet. Demo mode is active until you connect one.</div>}
            {Object.entries(byHost).map(([host, list]) => (
              <div key={host} className="conn-host-group">
                <div className="conn-host-l">
                  <SoftwareBadge software={list[0].software} name={list[0].softwareName} /> <span className="mono">{host}</span>
                </div>
                {list.map((c) => (
                  <div key={c.id} className={cx("conn-row", c.status === "error" && "conn-row-err")}>
                    <span className={cx("conn-dot", c.status === "verified" ? "ok" : "bad")} />
                    <div className="conn-row-main">
                      <div className="conn-row-id">
                        {c.identity ? "@" + c.identity.username : c.label}
                        <span className="conn-role">{c.role || "?"}</span>
                        {c.status === "verified" && <ScopeNotice audit={c.scopeAudit} software={c.software} />}
                      </div>
                      <div className="conn-row-sub mono">{c.label}{c.error ? " · " + c.error : ""}</div>
                    </div>
                    <button className={cx("conn-default", c.isDefault && "is-default")} onClick={() => onSetDefault(c.host, c.id)} title="Default account this server acts as">
                      {c.isDefault ? "★ default" : "set default"}
                    </button>
                    <button className="conn-remove" onClick={() => onRemove(c.id)} title="Remove">✕</button>
                  </div>
                ))}
              </div>
            ))}
          </div>
          </React.Fragment>
          )}
          {/* per-server affirmation terms */}
          <div className="conn-list">
            <div className="conn-list-h">Join-reason affirmation terms <span className="opt">words that suggest a genuine human applicant — each match reduces risk</span></div>
            <AffirmRow host="*" label="All servers (global)" value={(settings.affirmTerms || {})["*"] || []} onSet={onSetAffirm} />
            {(instances || []).map((i) => (
              <AffirmRow key={i.id} host={i.host} label={i.host} software={i.software} value={(settings.affirmTerms || {})[i.host] || []} onSet={onSetAffirm} />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// Hosted-mode connection manager (phase 2.5): every instance account linked to
// this sign-in, an "add another server" form that rides the same login flow
// with link=1, and unlink for the non-current ones. Tokens never appear here —
// they live in the server vault.
function HostedConnections({ serverSession }) {
  const [host, setHost] = useState("");
  const [busyHost, setBusyHost] = useState(null); // host being unlinked
  const [adding, setAdding] = useState(false);
  const [msg, setMsg] = useState(null); // {tone, text}
  const conns = (serverSession.connections && serverSession.connections.length)
    ? serverSession.connections
    : [{ ...serverSession, current: true }]; // pre-2.5 server shape

  function add() {
    const h = host.trim();
    if (!h) return;
    setAdding(true);
    ReefServer.login(h, { link: true }); // full-page handoff to the instance
  }
  async function unlink(c) {
    setBusyHost(c.instance); setMsg(null);
    try { await ReefServer.unlink(c.instance); } // reloads the page on success
    catch (e) { setMsg({ tone: "bad", text: e.message }); setBusyHost(null); }
  }

  return (
    <div className="conn-add">
      <div className="conn-add-h">Connected servers <span className="mono">{conns.length}</span></div>
      {conns.map((c) => (
        <div key={c.instance} className="conn-host-group">
          <div className="conn-host-l">
            <SoftwareBadge software={c.software} name={c.software} /> <span className="mono">{c.instance}</span>
          </div>
          <div className="conn-row">
            <span className="conn-dot ok" />
            <div className="conn-row-main">
              <div className="conn-row-id">@{c.username}<span className="conn-role">{c.role}</span>{c.current && <span className="conn-role" title="The account this session signed in with">signed in</span>}</div>
              <div className="conn-row-sub mono">{c.acct}</div>
            </div>
            {c.current
              ? <button className="conn-remove" onClick={() => ReefServer.logout()} title="Sign out of Vantage">Sign out</button>
              : <button className="conn-remove" disabled={busyHost === c.instance} onClick={() => unlink(c)} title={"Unlink " + c.instance + " — removes its token and keys from the server vault"}>{busyHost === c.instance ? "…" : "✕"}</button>}
          </div>
        </div>
      ))}

      <div className="conn-field" style={{ marginTop: "0.75rem" }}>
        <label className="conn-field-l">Add another server <span className="opt">you'll authorize Vantage on it, same as signing in</span></label>
        <div className="fires-conn-row">
          <input className="conn-input mono" placeholder="other-instance.example" value={host}
            onChange={(e) => setHost(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && host.trim() && !adding) add(); }}
            autoCapitalize="none" autoCorrect="off" spellCheck={false} />
          <button className="act act-approve conn-connect" disabled={adding || !host.trim()} onClick={add}>{adding ? "Redirecting…" : "Connect"}</button>
        </div>
      </div>
      {msg && <div className={cx("conn-status", "tone-" + msg.tone)}>{msg.text}</div>}
      <div className="conn-proxy" style={{ marginTop: "0.75rem" }}>
        <span className="conn-svc-hint">Instance tokens are held securely on the server, never in this browser — one account per server. OSINT API keys live in the <b>Services</b> panel.</span>
      </div>
    </div>
  );
}

function AffirmRow({ host, label, software, value, onSet }) {
  const [text, setText] = useState(value.join(", "));
  useEffect(() => { setText(value.join(", ")); }, [value.join("\u0001")]);
  function commit(v) {
    setText(v);
    const terms = v.split(",").map((s) => s.trim()).filter(Boolean);
    onSet(host, terms);
  }
  return (
    <div className="affirm-row">
      <div className="affirm-host">
        {software && <SoftwareBadge software={software} />}
        <span className="mono">{label}</span>
      </div>
      <input className="conn-input affirm-input" placeholder="e.g. local org, vouched by, our discord, photography"
        value={text} onChange={(e) => commit(e.target.value)} />
    </div>
  );
}

// "Acting as" picker used in the inspector action bars
function ActingAs({ host, connections, value, onChange }) {
  const opts = connections.filter((c) => c.host === host && c.status === "verified");
  if (opts.length === 0) return null;
  return (
    <div className="acting-as">
      <span className="aa-l">Acting as</span>
      <select className="aa-select mono" value={value || ""} onChange={(e) => onChange(e.target.value)}>
        {opts.map((c) => <option key={c.id} value={c.id}>@{c.identity ? c.identity.username : c.label} · {c.role}</option>)}
      </select>
    </div>
  );
}

// Token least-privilege notice shown next to a verified connection. Mastodon keys
// can be read back (Doorkeeper /oauth/token/info); Misskey/Sharkey can't introspect
// a token's permissions, so we say so. Tooltip carries the detail.
function ScopeNotice({ audit, software }) {
  if (!audit) return <span className="scope-chip scope-na" title="Checking token permissions…">scopes…</span>;
  if (!audit.supported) {
    return <span className="scope-chip scope-na"
      title={`${software || "This platform"} has no token-introspection endpoint, so Vantage can't read this key's permissions to audit them. As a precaution, generate the key with only the admin scopes you need.`}>scopes n/a</span>;
  }
  if (!audit.readable) {
    return <span className="scope-chip scope-na"
      title={"Couldn't read token scopes via /oauth/token/info: " + (audit.error || "unavailable") + ". The key still works for the calls it's allowed to make."}>scopes ?</span>;
  }
  if (audit.overprovisioned) {
    const tip = "Over-provisioned token.\n\nVantage only needs: admin:read, admin:write, read:accounts, write:accounts.\n\nThis key ALSO grants:\n  • " + audit.extra.join("\n  • ")
      + "\n\nThose let anyone holding the key do more than moderate — e.g. post, follow, or read DMs as this account. Best practice: issue a new token with only the four scopes above and revoke this one."
      + "\n\nFull grant: " + audit.scopes.join(" ");
    return <span className="scope-chip scope-over" title={tip}>⚠ over-provisioned</span>;
  }
  if (audit.underprovisioned) {
    const tip = "This token is missing scopes Vantage needs — some actions will fail:\n  • " + audit.missing.join("\n  • ")
      + "\n\nRe-issue the key with admin:read and admin:write (plus read:accounts, write:accounts).\n\nGranted: " + audit.scopes.join(" ");
    return <span className="scope-chip scope-under" title={tip}>⚠ missing scopes</span>;
  }
  return <span className="scope-chip scope-ok"
    title={"Least-privilege \u2713 — this token grants only what Vantage uses:\n  • " + audit.scopes.join("\n  • ")}>✓ least-privilege</span>;
}

Object.assign(window, { ConnectionsModal, ActingAs, ScopeNotice });

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — Services configuration panel (external OSINT APIs)
   Three tabs (tab pattern lifted from the Scoring panel):
     • Free & keyless  — always-on sources + the no-key-required APIs
     • API keys        — keyed services. Standalone: key in localStorage
       + CORS proxy. Hosted: write-only key in the server vault (own or
       instance-shared), lookups via the /api/osint gateway, no proxy.
     • FIRES           — connect a FediMod FIRES server, import its datasets
   ============================================================ */

// Services that work with NO API key (keyless, or key purely optional).
const API_FREE_SERVICES = [
  { key: "stopforumspam", name: "StopForumSpam", scope: "Community spammer registry — IP / email / username", site: "stopforumspam.com/signup", needsProxy: false, keylessLookup: true, used: "New-account IP / email / username · reported-account username + origin-instance IP. Lookups are keyless (JSONP); a key is ONLY needed to submit confirmed spammers back (that POST needs the proxy)." },
  { key: "emailrep", name: "EmailRep", scope: "Email / persona reputation — breaches, blacklists, social footprint", site: "emailrep.io/free", needsProxy: true, keyOptional: true, used: "New-account email reputation (folds into the email-reputation rollup). Works keyless at a low rate limit; a free key raises it.", quota: { reports: false, plan: "Keyless ~10/day · free key 250/month" } },
];

// Services that REQUIRE an API key (and the CORS proxy).
const KEY_SERVICES = [
  { key: "virustotal", name: "VirusTotal", scope: "Domain / URL / IP reputation", site: "virustotal.com/gui/my-apikey", needsProxy: true, used: "New-account email domains · report post links", quota: { reports: false, plan: "Free: 500 lookups/day · 4/min" } },
  { key: "abuseipdb", name: "AbuseIPDB", scope: "IP abuse confidence & reports", site: "abuseipdb.com/account/api", needsProxy: true, used: "Signup IP reputation", quota: { reports: true, plan: "Free: 1,000 checks/day" } },
  { key: "ipqs", name: "IPQualityScore", scope: "IP fraud · proxy / VPN / Tor + email validation", site: "ipqualityscore.com/user/settings", needsProxy: true, used: "Signup IP fraud · email validation · per-IP sign-in checks", quota: { reports: false, plan: "Free: 5,000 lookups/month" } },
];

// every keyed-or-keyless service, for the configured-count readout
const ALL_KEY_SERVICES = API_FREE_SERVICES.concat(KEY_SERVICES);

const FREE_SOURCES = [
  ["Team Cymru", "IP → ASN / org / country (DoH)"],
  ["Reverse DNS", "PTR hostname — datacenter / Tor hints"],
  ["DNSBL", "DroneBL · blocklist.de · s5h (DoH)"],
  ["RDAP", "Domain age + registrar"],
  ["MX records", "Mail deliverability (DoH)"],
  ["Disposable check", "kickbox open disposable list"],
  ["GitHub", "Username existence"],
  ["nodeinfo + meta", "Instance software · users · registration posture (Mastodon /api/v2, Misskey /api/meta)"],
  ["Release feeds", "Latest software version (GitHub / GitLab / Forgejo)"],
  ["Fediverse Observer", "Independent software version · liveness · uptime · signups (GraphQL)"],
];

function statusMeta(s) {
  return ({
    ok: { cls: "ok", label: "Connected" },
    error: { cls: "bad", label: "Error" },
    needsproxy: { cls: "warn", label: "Needs proxy" },
    unconfigured: { cls: "na", label: "Not configured" },
    testing: { cls: "accent", label: "Testing…" },
  })[s] || { cls: "na", label: "Not tested" };
}

function fmtReset(reset) {
  const n = Number(reset); if (!n) return "";
  const ms = n > 1e11 ? n : n * 1000; // header is epoch seconds (sometimes ms)
  const d = ms - Date.now(); if (d <= 0) return "soon";
  const h = Math.floor(d / 3600000), m = Math.round((d % 3600000) / 60000);
  return h ? h + "h" : (m || 1) + "m";
}

function fmtAgo(at) {
  if (!at) return "";
  const d = Date.now() - at; const m = Math.round(d / 60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.round(m / 60); if (h < 24) return h + "h ago";
  return Math.round(h / 24) + "d ago";
}

// Usage / quota readout next to a key. Two honest modes (see usage.js):
//  • server-reported remaining (AbuseIPDB) — authoritative bar.
//  • local tally — lookups Vantage fired from this browser today; the API
//    doesn't report remaining, so we say so and name the plan limit.
function UsageMeter({ svc }) {
  const q = svc.quota;
  const [u, setU] = useState(() => (window.ReefUsage ? window.ReefUsage.get(svc.key) : { count: 0, server: null }));
  useEffect(() => {
    if (!window.ReefUsage) return;
    setU(window.ReefUsage.get(svc.key));
    return window.ReefUsage.subscribe(() => setU(window.ReefUsage.get(svc.key)));
  }, [svc.key]);
  if (!q) return null;
  const srv = u.server;
  const hasServer = q.reports && srv && (srv.remaining != null || srv.limit != null);
  if (hasServer) {
    const rem = srv.remaining, lim = srv.limit;
    const pct = (rem != null && lim) ? Math.max(0, Math.min(100, (rem / lim) * 100)) : null;
    const tone = pct == null ? "" : pct < 10 ? "bad" : pct < 30 ? "warn" : "ok";
    const resetTxt = srv.reset ? fmtReset(srv.reset) : "";
    const tip = "Authoritative quota — " + svc.name + " reports it in X-RateLimit response headers (" + (window.ReefServer && window.ReefServer.mode === "server" ? "relayed by the Vantage server" : "visible when your proxy forwards them") + "). " + q.plan + ". " + u.count + " lookups fired from this browser today.";
    return (
      <div className="svc-usage" title={tip}>
        <div className="svc-usage-top"><span>API quota left</span><b className={"mono tone-" + tone}>{rem != null ? Number(rem).toLocaleString() : "?"}{lim ? " / " + Number(lim).toLocaleString() : ""}</b></div>
        {pct != null && <div className="svc-usage-bar"><span className={"svc-usage-fill u-" + tone} style={{ width: pct + "%" }} /></div>}
        <div className="svc-usage-sub">{q.plan}{resetTxt ? " · resets in " + resetTxt : ""} · {u.count} used here today</div>
      </div>
    );
  }
  const tip = "Local tally only — lookups Vantage fired from this browser today (cache hits don't count). " + svc.name + " doesn't report remaining quota in its responses, so there's no live counter; you'll get a 429 error at the plan limit. Plan: " + q.plan + ".";
  return (
    <div className="svc-usage" title={tip}>
      <div className="svc-usage-top"><span>Used today <span className="svc-usage-q">?</span></span><b className="mono">{u.count}</b></div>
      <div className="svc-usage-sub">{q.plan} · local tally (API reports no live counter)</div>
    </div>
  );
}

function ServiceCard({ svc, value, proxy, sfsOpts, onChange }) {
  const [reveal, setReveal] = useState(false);
  const [st, setSt] = useState(value ? "untested" : "unconfigured");
  const [detail, setDetail] = useState("");
  const untestedStatus = value ? "na" : ((svc.keylessLookup || svc.keyOptional) ? "ok" : "unconfigured");
  const meta = statusMeta(st === "untested" ? untestedStatus : st);

  async function test() {
    setSt("testing"); setDetail("");
    const r = await ReefEnrich.test(svc.key, value, proxy, { sfs: sfsOpts || {} });
    setSt(r.status); setDetail(r.detail);
  }

  return (
    <div className="svc-card">
      <div className="svc-card-top">
        <div className="svc-id">
          <div className="svc-name">{svc.name}{svc.needsProxy && <span className="svc-proxy-tag" title="Blocks direct browser calls — routes through your proxy">via proxy</span>}{svc.keylessLookup && <span className="svc-proxy-tag" title="Lookups run browser-direct via JSONP — no key, no proxy needed">keyless lookup</span>}</div>
          <div className="svc-scope">{svc.scope}</div>
        </div>
        <span className={cx("svc-status", "ss-" + meta.cls)}><span className="svc-status-dot" />{st === "untested" ? (value ? "Key set" : (svc.keylessLookup ? "Keyless — ready" : svc.keyOptional ? "Keyless — key optional" : meta.label)) : meta.label}</span>
      </div>
      <div className="svc-used">Used for: {svc.used}</div>
      <div className="svc-key-row">
        <input className="conn-input mono" type={reveal ? "text" : "password"} title="Stored in this browser's local storage only — it's sent only to this service's API (through your proxy when one is set), never anywhere else." placeholder={svc.keylessLookup ? `${svc.name} API key — optional, only to submit spammers` : svc.keyOptional ? `${svc.name} API key — optional (raises rate limits)` : `${svc.name} API key`}
          value={value || ""} onChange={(e) => { onChange(e.target.value); setSt(e.target.value ? "untested" : "unconfigured"); setDetail(""); }} />
        <button className="svc-reveal" onClick={() => setReveal((r) => !r)} title={reveal ? "Hide" : "Show"}>{reveal ? "◎" : "○"}</button>
        <button className="svc-test" disabled={(!value && !svc.keylessLookup && !svc.keyOptional) || st === "testing"} onClick={test}>Test</button>
      </div>
      {detail && <div className={cx("svc-detail", "tone-" + (meta.cls === "ok" ? "ok" : meta.cls === "warn" ? "warn" : meta.cls === "bad" ? "bad" : "accent"))}>{detail}</div>}
      {(value || svc.keyOptional) && <UsageMeter svc={svc} />}
      <a className="svc-link" href={`https://${svc.site}`} target="_blank" rel="noopener noreferrer">Get a key → {svc.site}</a>
    </div>
  );
}

// Hosted-mode service card (hosted-design §5.2, §10 phase 3). Keys are
// WRITE-ONLY: pasted once, sent to the server, sealed in its vault, and never
// read back — the UI sees only the last 4 characters. Lookups run through the
// same-origin /api/osint gateway (no CORS proxy), which resolves your own key
// first, then a key an instance admin shared. Admins can save a key for the
// whole instance; shared keys carry a per-user daily cap.
function VaultServiceCard({ svc, vault, adminHosts, sfsOpts, onChanged }) {
  const vk = (vault && vault.services && vault.services[svc.key]) || { user: null, instances: [] };
  const shared = vk.instances || [];
  const cap = (vault && vault.sharedCap) || 0;
  const [draft, setDraft] = useState("");
  const [reveal, setReveal] = useState(false);
  const [scope, setScope] = useState("user"); // "user" or the host to share with
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null); // {tone: ok|warn|bad, text}
  const [st, setSt] = useState("untested");
  const [detail, setDetail] = useState("");

  const activeKey = vk.user || shared[0]; // what the gateway resolves for this session (own key wins)
  const untestedStatus = activeKey ? "na" : ((svc.keylessLookup || svc.keyOptional) ? "ok" : "unconfigured");
  const meta = statusMeta(st === "untested" ? untestedStatus : st);

  async function api(method, path, body) {
    const r = await fetch("/api/osint/keys" + path, {
      method, credentials: "same-origin",
      headers: { "Content-Type": "application/json", "X-Vantage-CSRF": (window.ReefServer && window.ReefServer.csrf) || "" },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!r.ok) { let m = "HTTP " + r.status; try { m = (await r.json()).error || m; } catch (e) {} throw new Error(m); }
    return r.json();
  }
  async function save() {
    setBusy(true); setMsg(null);
    try {
      const body = scope === "user" ? { key: draft.trim() } : { key: draft.trim(), scope: "instance", host: scope };
      const out = await api("PUT", "/" + svc.key, body);
      setDraft(""); setScope("user"); setSt("untested"); setDetail("");
      setMsg(out.scope === "instance"
        ? { tone: "ok", text: `Key ····${out.last4} vaulted and shared with every moderator of ${out.host}.` }
        : { tone: "ok", text: `Key ····${out.last4} vaulted — only your lookups use it.` });
      onChanged();
    } catch (e) { setMsg({ tone: "bad", text: e.message }); }
    finally { setBusy(false); }
  }
  async function remove(scopeToDrop, host) {
    setBusy(true); setMsg(null);
    try {
      await api("DELETE", "/" + svc.key + "?scope=" + scopeToDrop + (host ? "&host=" + encodeURIComponent(host) : ""));
      setSt("untested"); setDetail("");
      setMsg({ tone: "warn", text: scopeToDrop === "instance" ? `Shared key for ${host} removed.` : "Your key removed." });
      onChanged();
    } catch (e) { setMsg({ tone: "bad", text: e.message }); }
    finally { setBusy(false); }
  }
  async function test() {
    setSt("testing"); setDetail("");
    const r = await ReefEnrich.test(svc.key, activeKey ? "vault:" + (activeKey.last4 || "") : "", "", { sfs: sfsOpts || {} });
    setSt(r.status); setDetail(r.detail);
  }

  return (
    <div className="svc-card">
      <div className="svc-card-top">
        <div className="svc-id">
          <div className="svc-name">{svc.name}<span className="svc-proxy-tag" title="The Vantage server calls this API and injects the vaulted key — the browser never holds it and needs no CORS proxy">via server vault</span>{svc.keylessLookup && <span className="svc-proxy-tag" title="Lookups run browser-direct via JSONP — no key needed; submissions go via the server">keyless lookup</span>}</div>
          <div className="svc-scope">{svc.scope}</div>
        </div>
        <span className={cx("svc-status", "ss-" + meta.cls)}><span className="svc-status-dot" />{st === "untested" ? (activeKey ? "Key vaulted" : (svc.keylessLookup ? "Keyless — ready" : svc.keyOptional ? "Keyless — key optional" : meta.label)) : meta.label}</span>
      </div>
      <div className="svc-used">Used for: {svc.used}</div>

      {vk.user && (
        <div className="svc-vault-row">
          <span className="svc-vault-l">Your key</span>
          <span className="mono">····{vk.user.last4}</span>
          <span className="svc-vault-meta">{vk.user.usedToday} call{vk.user.usedToday === 1 ? "" : "s"} today</span>
          <button className="conn-remove" onClick={() => remove("user")} disabled={busy} title="Remove your key from the vault">✕</button>
        </div>
      )}
      {shared.map((k) => (
        <div key={k.host} className="svc-vault-row">
          <span className="svc-vault-l">{k.host}</span>
          <span className="mono">····{k.last4}</span>
          <span className="svc-vault-meta">shared by {k.sharedBy}{vk.user || shared[0] !== k ? " · idle (a higher key wins)" : (cap ? ` · ${k.usedToday}/${cap} of your daily cap` : "")}</span>
          {adminHosts.includes(k.host) && <button className="conn-remove" onClick={() => remove("instance", k.host)} disabled={busy} title={"Remove the key shared with " + k.host + " (admin)"}>✕</button>}
        </div>
      ))}

      <div className="svc-key-row">
        <input className="conn-input mono" type={reveal ? "text" : "password"} title="Sent once to the Vantage server and sealed in its vault — never shown again; only the last 4 characters are kept for display."
          placeholder={activeKey ? `Replace ${svc.name} key` : (svc.keylessLookup ? `${svc.name} API key — optional, only to submit spammers` : svc.keyOptional ? `${svc.name} API key — optional (raises rate limits)` : `${svc.name} API key`)}
          value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && draft.trim() && !busy) save(); }} />
        <button className="svc-reveal" onClick={() => setReveal((r) => !r)} title={reveal ? "Hide" : "Show"}>{reveal ? "◎" : "○"}</button>
        <button className="svc-test" disabled={busy || !draft.trim()} onClick={save}>{busy ? "Saving…" : "Save"}</button>
        <button className="svc-test" disabled={busy || (!activeKey && !svc.keylessLookup && !svc.keyOptional) || st === "testing"} onClick={test}>Test</button>
      </div>
      {adminHosts.length > 0 && draft.trim() !== "" && (
        <div className="svc-share-row">
          <span className="svc-vault-l">Save for</span>
          <Seg value={scope} onChange={setScope} options={[
            { v: "user", label: "Just me" },
            ...adminHosts.map((h) => ({ v: h, label: "Everyone on " + h, title: "Every moderator of " + h + " can use it (per-user daily cap applies) — nobody can read it back" })),
          ]} />
        </div>
      )}
      {msg && <div className={cx("svc-detail", "tone-" + msg.tone)}>{msg.text}</div>}
      {detail && <div className={cx("svc-detail", "tone-" + (meta.cls === "ok" ? "ok" : meta.cls === "warn" ? "warn" : meta.cls === "bad" ? "bad" : "accent"))}>{detail}</div>}
      {(activeKey || svc.keyOptional) && <UsageMeter svc={svc} />}
      <a className="svc-link" href={`https://${svc.site}`} target="_blank" rel="noopener noreferrer">Get a key → {svc.site}</a>
    </div>
  );
}

// Full StopForumSpam query options (region / privacy / expiry / Tor / wildcards).
// These apply to BOTH the new-account lookup (IP + email + username) and the
// report lookup (reported username + origin-instance IP). See enrich.js stopforumspam().
function Seg({ value, onChange, options }) {
  return (
    <div className="sfs-seg">
      {options.map((o) => (
        <button key={o.v} className={cx("sfs-seg-btn", value === o.v && "on")} onClick={() => onChange(o.v)} title={o.title || ""}>{o.label}</button>
      ))}
    </div>
  );
}

function SfsOptions({ opts, onChange }) {
  const o = Object.assign({ region: "auto", emailhash: false, expire: 0, tor: "default", ignore: {} }, opts || {});
  const ig = o.ignore || {};
  const set = (patch) => onChange(Object.assign({}, o, patch));
  const setIg = (patch) => onChange(Object.assign({}, o, { ignore: Object.assign({}, ig, patch) }));
  return (
    <div className="sfs-opts">
      <div className="sfs-opts-h">StopForumSpam query options <span className="opt">apply to new-account &amp; report lookups</span></div>

      <div className="sfs-opt-row">
        <div className="sfs-opt-lbl"><b>Region</b><span>Route to the nearest server, or pin EU / US for data residency.</span></div>
        <Seg value={o.region} onChange={(v) => set({ region: v })} options={[{ v: "auto", label: "Auto" }, { v: "eu", label: "EU", title: "europe.stopforumspam.org" }, { v: "us", label: "US", title: "us.stopforumspam.org" }]} />
      </div>

      <div className="sfs-opt-row">
        <div className="sfs-opt-lbl"><b>Email privacy</b><span>Send an MD5 <code>emailhash</code> instead of the raw address (hashed in-browser).</span></div>
        <button className={cx("sfs-toggle", o.emailhash && "on")} role="switch" aria-checked={o.emailhash} onClick={() => set({ emailhash: !o.emailhash })}><span className="sfs-toggle-dot" /></button>
      </div>

      <div className="sfs-opt-row">
        <div className="sfs-opt-lbl"><b>Expire window</b><span>Ignore listings older than N days (0 = off). Tames stale username matches.</span></div>
        <div className="sfs-num-wrap"><input className="conn-input mono sfs-num" type="number" min="0" max="3650" value={o.expire || 0} onChange={(e) => set({ expire: Math.max(0, parseInt(e.target.value || "0", 10) || 0) })} /><span className="sfs-num-suffix">days</span></div>
      </div>

      <div className="sfs-opt-row">
        <div className="sfs-opt-lbl"><b>Tor exit policy</b><span>Default reports as-is · Ignore clears Tor exits · Block treats any Tor exit as listed.</span></div>
        <Seg value={o.tor} onChange={(v) => set({ tor: v })} options={[{ v: "default", label: "Default" }, { v: "ignore", label: "Ignore", title: "notorexit" }, { v: "bad", label: "Block", title: "badtorexit" }]} />
      </div>

      <div className="sfs-opt-row">
        <div className="sfs-opt-lbl"><b>Wildcard lists</b><span>SFS hostile IP / email / username wildcards are ON by default — switch off any you don't want applied.</span></div>
        <div className="sfs-chips">
          {[["ip", "IP"], ["email", "Email"], ["username", "Username"]].map(([k, lbl]) => (
            <button key={k} className={cx("sfs-chip-toggle", !ig[k] && "on")} onClick={() => setIg({ [k]: !ig[k] })} title={ig[k] ? "Ignored — click to apply" : "Applied — click to ignore"}>{lbl}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// FIRES — connect a FediMod FIRES server, browse its datasets, and import a
// dataset snapshot into the denylists (via ReefDenylist, the same engine that
// already understands the FIRES shape). Transport lives in ReefFires.
// ---------------------------------------------------------------------------
function firesErrText(e) {
  const m = (e && e.message) || String(e);
  if (/Failed to fetch|NetworkError|CORS|load failed|ERR_/i.test(m)) return "Couldn't reach the server (network / CORS). FIRES is browser-CORS-blocked on most hosts — set a proxy on the API keys tab, then retry. (In this preview, external calls are blocked entirely.)";
  if (/401|403|auth/i.test(m)) return "Server requires authentication (" + m + ") — paste an access token below.";
  if (/404/.test(m)) return "Not found (404) — check the server URL; it may not be a FIRES server.";
  return m;
}

function DatasetRow({ ds, sync, busy, onImport, onRemove }) {
  return (
    <div className="fires-ds">
      <div className="fires-ds-main">
        <div className="fires-ds-name">{ds.name}
          {sync && <span className="fires-ds-synced" title={"Imported " + sync.count + " entries " + fmtAgo(sync.at)}>● synced · {Number(sync.count).toLocaleString()}</span>}
        </div>
        {ds.summary && <div className="fires-ds-sum">{ds.summary}</div>}
        <div className="fires-ds-meta mono">{ds.updated ? "updated " + String(ds.updated).slice(0, 10) : ds.published ? "published " + String(ds.published).slice(0, 10) : ds.id.replace(/^https?:\/\//, "").slice(0, 40)}{sync ? " · " + fmtAgo(sync.at) : ""}</div>
      </div>
      <div className="fires-ds-actions">
        <button className="cache-btn" disabled={busy || !ds.snapshot} onClick={onImport}>{busy ? "Syncing…" : sync ? "↻ Refresh" : "⤓ Import"}</button>
        {sync && <button className="conn-remove" title="Remove this imported list" onClick={onRemove}>✕</button>}
      </div>
    </div>
  );
}

function FiresPanel({ settings, onSettings, onDenylistChange }) {
  const fires = settings.fires || {};
  const proxy = settings.proxy || "";
  const [server, setServer] = useState(fires.server || "");
  const [token, setToken] = useState(fires.token || "");
  const [reveal, setReveal] = useState(false);
  const [busy, setBusy] = useState(false);
  const [rowBusy, setRowBusy] = useState(null);
  const [msg, setMsg] = useState(null);
  const datasets = fires.datasets || [];
  const synced = fires.synced || {};

  function patchFires(p) { onSettings({ fires: Object.assign({}, fires, p) }); }

  async function connect() {
    setBusy(true); setMsg(null);
    window.__reefProxy = proxy;
    try {
      const res = await ReefFires.discover(server, proxy, token);
      patchFires({ server: res.origin, token, software: res.software, version: res.version, isFires: res.isFires, hadNodeinfo: res.hadNodeinfo, datasetsUrl: res.datasetsUrl, labelsUrl: res.labelsUrl, datasets: res.datasets });
      const id = res.software ? res.software + (res.version ? " " + res.version : "") : "server";
      const n = res.datasets.length;
      if (!res.isFires && res.hadNodeinfo) setMsg({ tone: "warn", text: `Connected to ${id}, but its nodeinfo doesn't advertise the FIRES protocol. Found ${n} dataset${n === 1 ? "" : "s"} anyway.` });
      else if (!res.hadNodeinfo) setMsg({ tone: "warn", text: `Reached ${res.origin} (no nodeinfo) — listed ${n} dataset${n === 1 ? "" : "s"} from /datasets.` });
