          <span className="qrow-name">@{rep.target.username}</span>
          <span className="qrow-cat">{rep.category}</span>
          {rep._groupCount > 1 && <span className="qrow-group" title={rep._groupCount + " reports on this target"}>×{rep._groupCount}</span>}
          {rep.live && <span className="live-tick" title="Live">●</span>}
          {rep.imported && <span className="qrow-imp" title={rep._xarf ? "Imported xARF report" : "Imported test data"}>TEST</span>}
          <span className="qrow-score mono" style={{ color: tierColor(rep.tier) }}>{rep.severity}</span>
        </span>
        <span className="qrow-sub">
          <span className="qrow-host mono">{inst ? inst.host : rep.instance}</span>
          <span className="qrow-dot">·</span>
          <span className="qrow-reason">{(rep.comment || "").slice(0, 44)}…</span>
        </span>
      </span>
      <span className="qrow-when mono">{ago(rep.createdAt)}</span>
    </button>
  );
}

// In hosted-server mode the "connections" are the principal's linked instance
// accounts from /auth/me; the server holds every token, so these carry none
// and never persist. One connection per instance (phase 2.5).
function serverConn(c) {
  return {
    id: "session:" + c.instance, label: c.acct, host: c.instance,
    baseUrl: "https://" + c.instance,
    software: c.software, softwareName: c.software, version: "",
    token: null,
    identity: { id: c.acct, username: c.username, name: c.display || c.username, role: c.role, isMod: true },
    role: c.role, status: "verified", isDefault: true,
  };
}
function serverConns(session) {
  const list = session.connections && session.connections.length
    ? session.connections
    : [session]; // pre-2.5 server shape: the login identity is the only connection
  return list.map(serverConn);
}

function App({ serverSession }) {
  const persisted = ReefStore.load();
  const [connections, setConnections] = useState(serverSession ? serverConns(serverSession) : persisted.connections);
  const [settings, setSettings] = useState(serverSession ? { ...persisted.settings, mode: "live", showDemo: false, proxy: "", keys: {} } : persisted.settings);
  const [connOpen, setConnOpen] = useState(false);
  const [svcOpen, setSvcOpen] = useState(false);
  const [scoreOpen, setScoreOpen] = useState(false);
  const [dlOpen, setDlOpen] = useState(false);
  const [campOpen, setCampOpen] = useState(false);
  const [denyTick, setDenyTick] = useState(0);
  const [diagOpen, setDiagOpen] = useState(false);
  const [diagLog, setDiagLog] = useState([]);
  const [caseTick, setCaseTick] = useState(0);
  const [tourOpen, setTourOpen] = useState(() => { try { return localStorage.getItem("reef.tour.seen") !== "1"; } catch (e) { return true; } });
  function openTourPanel(name) {
    if (name === "connections") setConnOpen(true);
    else if (name === "services") setSvcOpen(true);
    else if (name === "denylists") setDlOpen(true);
    else if (name === "scoring") setScoreOpen(true);
    else if (name === "campaigns") setCampOpen(true);
  }

  const [view, setView] = useState("accounts");
  const [server, setServer] = useState("all");
  const [toast, setToast] = useState(null);
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(() => { document.documentElement.style.setProperty("--accent", t.accent); }, [t.accent]);

  // demo data (mutable copies)
  const [demoAcc, setDemoAcc] = useState(D.ACCOUNTS.map((a) => ({ ...a })));
  const [demoRep, setDemoRep] = useState(D.REPORTS.map((r) => ({ ...r })));
  // live data state is owned by useLiveData (wired below, once its inputs exist)

  const [selAcc, setSelAcc] = useState(null);
  const [selRep, setSelRep] = useState(null);
  const importFileRef = useRef(null);
  const [actingBy, setActingBy] = useState({}); // {host: connId}
  const [query, setQuery] = useState("");
  const [serverSearch, setServerSearch] = useState(null); // {q, by, items, demo, errs}
  const [searching, setSearching] = useState(false);
  const [scopeAll, setScopeAll] = useState({ accounts: false, reports: false });
  const [fetchN, setFetchN] = useState({ accounts: 40, reports: 40 });

  // ---- affirmation terms map (host -> [terms], '*' global) ----
  const affirmMap = useMemo(() => Object.assign({}, settings.affirmTerms || {}), [settings.affirmTerms]);
  // expose live scoring config to the engines (read synchronously at assess/
  // enrich time — including the useMemos below in this same render — so the
  // globals are assigned in the render body, not an effect). make() is memoized
  // so it only recomputes when settings actually change, not every render.
  const reefW = useMemo(() => window.ReefWeights.make(settings), [settings]);
  window.__reefW = reefW;
  window.__reefAffirm = affirmMap;
  window.__reefProtected = settings.protectedDomains || { add: [], remove: [] };
  const recalcKey = JSON.stringify(settings.weights || {}) + "|" + JSON.stringify(affirmMap) + "|" + JSON.stringify(settings.protectedDomains || {});
  useEffect(() => {
    // globals are already current (set in the render body above); this effect
    // only re-scores already-loaded items when the tunables change.
    const customized = Object.keys(settings.weights || {}).length > 0 || Object.keys(affirmMap).length > 0;
    if (!customized) return;
    setLiveAcc((prev) => prev.map((a) => a._enriched ? a : { ...a, ...ReefAssess.account(a) }));
    setDemoAcc((prev) => prev.map((a) => ({ ...a, ...ReefAssess.account(a) })));
  }, [recalcKey]);

  // persist. In server mode connections are derived from the session (never
  // user-managed and token-free) and settings.keys holds vault sentinels, not
  // keys — strip both so nothing session-derived lands in localStorage.
  useEffect(() => { ReefStore.save({ connections: serverSession ? [] : connections, settings: serverSession ? { ...settings, keys: {} } : settings }); }, [connections, settings]);
  useEffect(() => { window.__reefProxy = settings.proxy || ""; }, [settings.proxy]);

  // ---- hosted mode: vaulted OSINT keys (hosted-design §10 phase 3) ----
  // The server holds the real keys; the UI sees only {last4, scope, usage}.
  // Vault state is mirrored into settings.keys as truthy sentinels
  // ("vault:xxxx") so every engine gate (keys.abuseipdb ? …) and badge count
  // works unchanged — the gateway injects the real key server-side.
  const [vaultKeys, setVaultKeys] = useState(null);
  function refreshVaultKeys() {
    if (!serverSession) return;
    fetch("/api/osint/keys", { credentials: "same-origin", headers: { Accept: "application/json" } })
      .then((r) => (r.ok ? r.json() : null))
      .then((v) => {
        if (!v) return;
        setVaultKeys(v);
        const sentinels = {};
        for (const [svc, s] of Object.entries(v.services || {})) {
          const k = s.user || (s.instances && s.instances[0]);
          if (k) sentinels[svc] = "vault:" + (k.last4 || "");
        }
        setSettings((s) => ({ ...s, keys: sentinels }));
      })
      .catch(() => { /* stay on the previous vault snapshot; Services shows a retry */ });
  }
  useEffect(() => { refreshVaultKeys(); }, []);

  const verified = connections.filter((c) => c.status === "verified");
  const liveMode = settings.mode === "live";
  const showDemo = settings.mode === "demo" || settings.showDemo;

  // Live-data concern (per-host read connections, the fetch, and the resulting
  // accounts / reports / loading / errors) lives in useLiveData — see src/hooks.jsx.
  const { fetchConns, connKey, liveAcc, setLiveAcc, liveRep, setLiveRep, loading, fetchErrs, setFetchErrs } =
    useLiveData({
      verified, liveMode, settings, fetchN, scopeAll,
      onFetchErrLog: (errs) => setDiagLog((prev) => [...errs.map((e) => ({ ...e, at: Date.now() })), ...prev].slice(0, 60)),
    });

  // ---- merged instances ----
  const instances = useMemo(() => {
    const live = [];
    const seen = new Set();
    verified.forEach((c) => { if (!seen.has(c.host)) { seen.add(c.host); live.push({ id: c.host, host: c.host, software: c.software, softwareName: c.softwareName, version: c.version, color: ReefStore.hostColor(c.host), live: true }); } });
    const demo = showDemo ? D.INSTANCES : [];
    return [...(liveMode ? live : []), ...demo];
  }, [connKey, showDemo, liveMode]);
  // Resolve an instance by id. Falls back to a safe stub when the instance is
  // gone (e.g. the user just removed that server's connection while one of its
  // accounts/reports was still selected) so consumers that read inst.host /
  // inst.software don't crash the whole UI — they degrade to the bare host.
  const instOf = (id) => instances.find((i) => i.id === id) || (id ? { id, host: id, software: "", version: "", color: "", live: true, _missing: true } : null);

  // ---- displayed items ----
  const accounts = useMemo(() => {
    const live = liveMode ? liveAcc : [];
    const demo = showDemo ? demoAcc : [];
    const seen = new Set(); // safety net: collapse any duplicate ids (e.g. two keys on one host)
    return [...live, ...demo].filter((x) => !seen.has(x.id) && seen.add(x.id));
  }, [liveMode, liveAcc, showDemo, demoAcc]);
  const reports = useMemo(() => {
    const live = liveMode ? liveRep : [];
    const demo = showDemo ? demoRep : [];
    const seen = new Set();
    return [...live, ...demo].filter((x) => !seen.has(x.id) && seen.add(x.id));
  }, [liveMode, liveRep, showDemo, demoRep]);

  const pendingAcc = accounts.filter((a) => a.status === "pending");
  const openReps = reports.filter((r) => r.status === "open");
  // visible base honoring scope toggle (all = include approved/resolved, minus this-session resolutions)
  const visAcc = accounts.filter((a) => scopeAll.accounts ? a.status !== "resolved" : a.status === "pending");
  const visRep = reports.filter((r) => scopeAll.reports ? r.status !== "resolved" : r.status === "open");

  function matchQ(text) { return !query.trim() || text.toLowerCase().includes(query.trim().toLowerCase()); }
  function accMatch(a) { return matchQ([a.username, a.displayName, a.email, a.emailDomain, a.ip, a.reason, a.instance].join(" ")); }
  function repMatch(r) { return matchQ([r.target.username, r.target.displayName, r.target.host, r.comment, r.category, r.instance, r.reporter.handle].join(" ")); }

  function srvFilter(list) { return server === "all" ? list : list.filter((x) => x.instance === server); }
  function sortList(list, key) {
    const arr = list.slice();
    if (t.sortBy === "recent") arr.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    else arr.sort((a, b) => (b[key] || 0) - (a[key] || 0));
    return arr;
  }
  const accList = (view === "accounts" && serverSearch)
    ? sortList(srvFilter(serverSearch.items), "risk")
    : sortList(srvFilter(visAcc).filter(accMatch), "risk");
  const repList = collapseByTarget(sortList(srvFilter(visRep).filter(repMatch), "severity"));
  const serverMode = view === "accounts" && !!serverSearch;

  // keep selection valid
  useEffect(() => { if (!accList.find((a) => a.id === selAcc)) setSelAcc(accList[0] ? accList[0].id : null); }, [accList.map((a) => a.id).join(",")]);
  useEffect(() => { if (!repList.find((r) => r.id === selRep)) setSelRep(repList[0] ? repList[0].id : null); }, [repList.map((r) => r.id).join(",")]);

  const curAcc = accounts.find((a) => a.id === selAcc);
  const curRep = reports.find((r) => r.id === selRep);

  // denylist matches for the selected items (recompute when lists change)
  const repDenyHits = useMemo(() => curRep ? ReefDenylist.matchTarget({ username: curRep.target.username, host: curRep.target.host }) : [], [curRep && curRep.id, denyTick]);
  const accDenyHits = useMemo(() => curAcc ? ReefDenylist.matchHost(curAcc.emailDomain) : [], [curAcc && curAcc.id, denyTick]);

  function showToast(msg, tone) { setToast({ msg, tone }); setTimeout(() => setToast(null), 2800); }

  // ---- server-side account search (looks up the whole instance, not just the loaded sweep) ----
  async function runServerSearch() {
    const q = query.trim();
    if (!q) { setServerSearch(null); return; }
    const by = /@.+\./.test(q) ? "email" : /^\d{1,3}(\.\d{1,3}){3}$/.test(q) ? "ip" : "username";
    setSearching(true);
    try {
      if (liveMode && verified.length) {
        const items = [], errs = [];
        await Promise.all(fetchConns.map(async (c) => {
          try { items.push(...await ReefAPI.searchAccounts(c, { q, by })); }
          catch (e) { errs.push({ host: c.host, msg: e.message }); }
        }));
        const seen = new Set();
        const uniq = items.filter((a) => (!seen.has(a.id) && seen.add(a.id)));
        setServerSearch({ q, by, items: uniq, errs });
        if (errs.length) setDiagLog((prev) => [...errs.map((e) => ({ host: e.host, what: "search", msg: e.msg, at: Date.now() })), ...prev].slice(0, 60));
        if (errs.length && !uniq.length) showToast(`Search failed on ${errs[0].host}: ${errs[0].msg.slice(0, 40)}`, "bad");
      } else {
        // demo / no live connections: search the full demo dataset (incl. accounts outside the sweep)
        const ql = q.toLowerCase();
        const items = demoAcc.filter((a) => [a.username, a.displayName, a.email, a.emailDomain, a.ip].join(" ").toLowerCase().includes(ql));
        setServerSearch({ q, by, items, demo: true, errs: [] });
      }
    } finally { setSearching(false); }
  }

  function connFor(host) {
    return connections.find((c) => c.id === actingBy[host] && c.status === "verified")
      || connections.find((c) => c.host === host && c.isDefault && c.status === "verified")
      || connections.find((c) => c.host === host && c.status === "verified");
  }

  // A rejected join reason is queued as a boilerplate-corpus CANDIDATE, not
  // applied directly — an operator reviews/approves it in the Campaigns panel
  // before it can affect anyone else's boilerplate score (see textanalysis.js).
  function queueRejectedReason(acc) {
    if (window.ReefText && acc.reason) {
      window.ReefText.addCandidate(acc.reason, { accId: acc.id, handle: acc.username, host: acc.instance || "" });
    }
  }

  async function resolveAccount(acc, decision) {
    if (acc.live) {
      const conn = connFor(acc.instance);
      if (!conn) { showToast("No verified account to act on " + acc.instance, "bad"); return; }
      try {
        await ReefAPI.actOnAccount(conn, acc, decision);
        setLiveAcc((prev) => prev.map((a) => a.id === acc.id ? { ...a, status: "resolved", _resolution: decision } : a));
        if (decision === "reject") queueRejectedReason(acc);
        showToast(`@${acc.username} — ${recVerb(decision)} (as @${conn.identity.username})`, recColor(decision));
        if (window.ReefLog) window.ReefLog.info("action", "account @" + acc.username + " " + decision + " on " + acc.instance + " (as @" + conn.identity.username + ")");
      } catch (e) { if (window.ReefLog) window.ReefLog.error("action", "account " + decision + " failed for @" + acc.username + " on " + acc.instance, e && e.message); showToast("Action failed: " + e.message, "bad"); }
      return;
    }
    setDemoAcc((prev) => prev.map((a) => a.id === acc.id ? { ...a, status: "resolved", _resolution: decision } : a));
    if (decision === "reject") queueRejectedReason(acc);
    showToast(`@${acc.username} — ${recVerb(decision)}`, recColor(decision));
  }

  // Import accounts + reports as test data (native Vantage JSON export, or xARF).
  // Imported items join the demo queue (synthetic, local-only) and demo display is
  // switched on so they're visible immediately.
  function onImportFile(e) {
    const file = e.target.files && e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const { accounts, reports } = ReefExport.importQueueData(String(r.result));
        if (accounts.length) setDemoAcc((prev) => [...accounts, ...prev]);
        if (reports.length) setDemoRep((prev) => [...reports, ...prev]);
        if (!showDemo) patchSettings({ showDemo: true });
        if (accounts.length && view === "accounts") setSelAcc(accounts[0].id);
        if (reports.length && view === "reports") setSelRep(reports[0].id);
        const parts = [];
        if (accounts.length) parts.push(accounts.length + " account" + (accounts.length === 1 ? "" : "s"));
        if (reports.length) parts.push(reports.length + " report" + (reports.length === 1 ? "" : "s"));
        showToast("Imported " + parts.join(" + ") + " as test data", "ok");
      } catch (err) { showToast("Import failed: " + err.message, "bad"); if (window.ReefLog) window.ReefLog.warn("import", "test-data import failed", err && err.message); }
    };
    r.readAsText(file); e.target.value = "";
  }

  async function resendConfirmation(acc) {
    if (acc.live) {
      const conn = connFor(acc.instance);
      if (!conn) { showToast("No verified account to act on " + acc.instance, "bad"); return; }
      try {
        await ReefAPI.resendConfirmation(conn, acc);
        setLiveAcc((prev) => prev.map((a) => a.id === acc.id ? { ...a, _resent: true } : a));
        showToast(`Verification re-sent to ${acc.email}`, "ok");
      } catch (e) { if (window.ReefLog) window.ReefLog.error("action", "resend confirmation failed for @" + acc.username, e && e.message); showToast("Resend failed: " + e.message, "bad"); }
      return;
    }
    setDemoAcc((prev) => prev.map((a) => a.id === acc.id ? { ...a, _resent: true } : a));
    showToast(`Verification re-sent to ${acc.email}`, "ok");
  }

  function blockDomainFromReport(host) {
    const dl = window.ReefDenylist; if (!dl || !host) return;
    dl.block([{ kind: "domain", host: host, severity: "suspend", comment: "Added from a report" }], { source: "reports" });
    setDenyTick((t) => t + 1);
  }

  // central blocker for the account inspector (email domain / mail servers / IPs).
  // ENFORCE-FIRST: on a live Mastodon account we push to the server admin API first,
  // and only record a local "blocked" badge for the entries that ACTUALLY enforced.
  // That way a server rejection (e.g. token missing admin:write:ip_blocks) does NOT
  // leave the button stuck showing "blocked" for a block that never happened — the
  // button resets and stays actionable so you can fix scopes and retry.
  //   • demo / no verified admin login → local denylist only (clearly labelled)
  //   • Misskey/Sharkey → local only (no admin IP/email-domain block API exists)
  //   • protected mailbox providers are never pushed and never recorded
  async function blockToDenylist(entries, label, ctx) {
    ctx = ctx || {};
    const dl = window.ReefDenylist; if (!dl) return;

    const pushable = entries.filter((e) => e.kind === "ip" || (e.kind === "domain" && !dl.isProtected(e.host)));
    const protectedOnly = entries.filter((e) => e.kind === "domain" && dl.isProtected(e.host));
    const conn = ctx.live ? connFor(ctx.instance) : null;
    const canServer = conn && conn.software === "Mastodon";

    // ---- live Mastodon: enforce on the server, record only what succeeds ----
    if (canServer && pushable.length) {
      const ok = [], errs = [];
      for (const e of pushable) {
        try {
          if (e.kind === "ip") await ReefAPI.blockIP(conn, e.ip, { severity: "sign_up_block", comment: e.comment || "Blocked from Vantage review" });
          else await ReefAPI.blockEmailDomain(conn, e.host);
          ok.push(e);
        } catch (err) {
          errs.push((e.ip || e.host) + " — " + (err && err.message || err));
          if (window.ReefLog) window.ReefLog.warn("block", "server block failed for " + (e.ip || e.host) + " on " + ctx.instance, err && err.message);
        }
      }
      if (ok.length) dl.block(ok, { source: "account review" }); // local badge only for enforced entries
      setDenyTick((t) => t + 1);
      if (ok.length && !errs.length) showToast((label || "Blocked") + " · enforced on " + ctx.instance + " (as @" + (conn.identity ? conn.identity.username : "you") + ")", "bad");
      else if (ok.length && errs.length) showToast("Enforced " + ok.length + " · failed: " + errs[0], "warn");
      else showToast("Not blocked — " + errs[0], "bad");
      return;
    }

    // ---- live but cannot enforce on the server ----
    if (ctx.live && pushable.length && !canServer) {
      dl.block(entries, { source: "account review" });
      setDenyTick((t) => t + 1);
      if (!conn) showToast("Saved to local list — no verified admin login for " + ctx.instance + " to enforce it", "warn");
      else showToast("Saved to local list — " + conn.software + " has no server IP/email block API (enforce at your proxy/firewall)", "warn");
      return;
    }

    // ---- demo / local-only / protected-only ----
    const res = dl.block(entries, { source: "account review" });
    setDenyTick((t) => t + 1);
    if (res.added.length) showToast((label || ("Blocked " + res.added.join(", "))) + (ctx.live ? "" : " (local list)"), "bad");
    else if (res.skippedProtected.length || protectedOnly.length) showToast("Won't block major email provider: " + (res.skippedProtected.join(", ") || protectedOnly.map((e) => e.host).join(", ")), "warn");
    else showToast("Already on your blocklist", "warn");
  }

  // Undo a block: lift it on the server where we can (Mastodon), then drop the local
  // record so the button resets to an actionable "Block …" state. Best-effort on the
  // server — the local reset always happens so a stuck/stale badge can be cleared.
  async function unblockFromDenylist(entries, label, ctx) {
    ctx = ctx || {};
    const dl = window.ReefDenylist; if (!dl) return;
    const conn = ctx.live ? connFor(ctx.instance) : null;
    const canServer = conn && conn.software === "Mastodon";
    let serverErr = null;
    if (canServer) {
      for (const e of entries) {
        try {
          if (e.kind === "ip") await ReefAPI.unblockIP(conn, e.ip);
          else if (e.kind === "domain") await ReefAPI.unblockEmailDomain(conn, e.host);
        } catch (err) { serverErr = serverErr || (err && err.message || String(err)); if (window.ReefLog) window.ReefLog.warn("block", "server unblock failed for " + (e.ip || e.host) + " on " + ctx.instance, err && err.message); }
      }
    }
    const removed = dl.unblock(entries);
    setDenyTick((t) => t + 1);
    if (serverErr) showToast("Removed locally · server lift failed: " + serverErr, "warn");
    else showToast((label || "Unblocked") + (canServer ? " · lifted on " + ctx.instance : " (local list)"), "ok");
  }

  async function resolveReport(rep, decision, opts) {
    opts = opts || {};
    if (rep.locked && decision === "dismiss") { showToast("Locked queue item cannot be dismissed", "bad"); return; }
    const conn = connFor(rep.instance);
    const who = conn && conn.identity ? "@" + conn.identity.username : "you";
    // statement of reasons / audit trail for EVERY decision
    if (window.ReefCasework) window.ReefCasework.addAudit(rep.id, { action: decision, who: who, note: opts.note || "", notify: !!opts.notify });
    setCaseTick((c) => c + 1);
    const suffix = opts.notify ? " · user notified" : "";
    if (decision === "blockdomain") { blockDomainFromReport(rep.target.host); showToast("Domain blocked · " + rep.target.host, "bad"); return; }
    const terminal = decision === "suspend" || decision === "silence" || decision === "dismiss";
    if (rep.live && terminal) {
      if (!conn) { showToast("No verified account to act on " + rep.instance, "bad"); return; }
      try {
        await ReefAPI.actOnReport(conn, rep, decision);
        setLiveRep((prev) => prev.map((r) => r.id === rep.id ? { ...r, status: "resolved", _resolution: decision } : r));
        showToast(`@${rep.target.username} — ${recVerb(decision)} (as @${conn.identity.username})${suffix}`, recColor(decision));
        if (window.ReefLog) window.ReefLog.info("action", "report on @" + rep.target.username + " " + decision + " on " + rep.instance + " (as @" + conn.identity.username + ")");
      } catch (e) { if (window.ReefLog) window.ReefLog.error("action", "report " + decision + " failed for @" + rep.target.username + " on " + rep.instance, e && e.message); showToast("Action failed: " + e.message, "bad"); }
      return;
    }
    if (terminal) {
      setDemoRep((prev) => prev.map((r) => r.id === rep.id ? { ...r, status: "resolved", _resolution: decision } : r));
    }
    showToast(`@${rep.target.username} — ${recVerb(decision)}${suffix}`, recColor(decision));
  }

  // keyboard triage
  useEffect(() => {
    function onKey(e) {
      if (connOpen) return;
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;
      const list = view === "accounts" ? accList : repList;
      const sel = view === "accounts" ? selAcc : selRep;
      const setSel = view === "accounts" ? setSelAcc : setSelRep;
      const idx = list.findIndex((x) => x.id === sel);
      if (e.key === "j" || e.key === "ArrowDown") { e.preventDefault(); const n = list[Math.min(list.length - 1, idx + 1)]; if (n) setSel(n.id); }
      if (e.key === "k" || e.key === "ArrowUp") { e.preventDefault(); const n = list[Math.max(0, idx - 1)]; if (n) setSel(n.id); }
      if (view === "accounts" && curAcc && curAcc.status === "pending") {
        if (e.key === "a") resolveAccount(curAcc, "approve");
        if (e.key === "x") resolveAccount(curAcc, "reject");
        if (e.key === "h") resolveAccount(curAcc, "hold");
      }
      if (view === "reports" && curRep && curRep.status === "open") {
        if (e.key === "s") resolveReport(curRep, "suspend");
        if (e.key === "d") resolveReport(curRep, "dismiss");
      }
      if (e.key === "1") setView("accounts");
      if (e.key === "2") setView("reports");
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  });

  const accCountBy = (id) => pendingAcc.filter((a) => id === "all" || a.instance === id).length;
  const repCountBy = (id) => openReps.filter((r) => id === "all" || r.instance === id).length;

  // connection management callbacks
  function saveConn(conn) { setConnections((prev) => { const others = conn.isDefault ? prev.map((c) => c.host === conn.host ? { ...c, isDefault: false } : c) : prev; return [...others, conn]; }); }
  function removeConn(id) { setConnections((prev) => prev.filter((c) => c.id !== id)); }
  function setDefaultConn(host, id) { setConnections((prev) => prev.map((c) => c.host === host ? { ...c, isDefault: c.id === id } : c)); }
  function setScopeAudit(id, audit) { setConnections((prev) => prev.map((c) => c.id === id ? { ...c, scopeAudit: audit } : c)); }
  function patchSettings(p) { setSettings((s) => ({ ...s, ...p })); }
  function setKey(k, v) { setSettings((s) => ({ ...s, keys: { ...(s.keys || {}), [k]: v } })); }
  function handleEnriched(id, patch) { setLiveAcc((prev) => prev.map((a) => a.id === id ? { ...a, ...patch, _enriched: true } : a)); }
  function setAffirm(host, terms) { setSettings((s) => ({ ...s, affirmTerms: Object.assign({}, s.affirmTerms || {}, { [host]: terms }) })); }

  // Honest "Connected sources" state (replaces the hardcoded demo `connected` flags):
  //  • keyless live (StopForumSpam, text analysis) → always on
  //  • keyed real integrations (AbuseIPDB, IPQS, VirusTotal) → on only when a key is set, else "key"
  //  • EmailRep is keyless-capable (rides the proxy); nothing demo-only remains → see per-source logic below
  const SRC_KEYED = { abuseipdb: 1, ipqs: 1, virustotal: 1 };
  function sourceState(s) {
    const keys = settings.keys || {};
    const proxy = settings.proxy || "";
    if (s.key === "emailrep") {
      if (keys.emailrep) return { state: "on", tag: "", title: s.scope + " — API key set (higher rate limits)" };
      if (serverSession) return { state: "on", tag: "", title: s.scope + " — keyless via the Vantage server; add a free key in Services for higher limits" };
      if (proxy) return { state: "on", tag: "", title: s.scope + " — keyless via CORS proxy; add a free key in Services for higher limits" };
      return { state: "needskey", tag: "proxy", title: s.scope + " — needs the CORS proxy (Settings) to reach; key optional" };
    }
    if (SRC_KEYED[s.key]) return keys[s.key] ? { state: "on", tag: "", title: s.scope + " \u2014 API key set" } : { state: "needskey", tag: "key", title: s.scope + " \u2014 add an API key in Services to enable" };
    return { state: "on", tag: "", title: s.scope + " \u2014 keyless, always available" };
  }

  return (
    <div className={cx("app", "density-" + t.density)}>
      <aside className="rail">
        <div className="brand">
          <span className="brand-mark" />
          <span className="brand-name">Vantage</span>
          <span className="brand-sub">moderation</span>
        </div>

        <button className="conn-btn" onClick={() => setConnOpen(true)}>
          <span className={cx("mode-pill", liveMode ? "mode-live" : "mode-demo")}>{liveMode ? "LIVE" : "DEMO"}</span>
          <span className="conn-btn-l">Connections</span>
          <span className="conn-btn-n mono">{verified.length}</span>
        </button>

        <button className="conn-btn svc-btn" onClick={() => setSvcOpen(true)}>
          <span className="svc-btn-i">◈</span>
          <span className="conn-btn-l">Services</span>
          <span className="conn-btn-n mono">{["virustotal", "abuseipdb", "ipqs"].filter((k) => (settings.keys || {})[k]).length}</span>
        </button>

        <button className="conn-btn svc-btn" onClick={() => setScoreOpen(true)}>
          <span className="svc-btn-i">⚖</span>
          <span className="conn-btn-l">Scoring</span>
          <span className="conn-btn-n mono">{Object.keys(settings.weights || {}).length || ""}</span>
        </button>

        <button className="conn-btn svc-btn" onClick={() => setDlOpen(true)}>
          <span className="svc-btn-i">⊘</span>
          <span className="conn-btn-l">Denylists</span>
          <span className="conn-btn-n mono">{ReefDenylist.stats().entries || ""}</span>
        </button>

        <button className="conn-btn svc-btn" onClick={() => setCampOpen(true)}>
          <span className="svc-btn-i">◉</span>
          <span className="conn-btn-l">Campaigns</span>
          <span className="conn-btn-n mono">{(window.ReefCampaigns && ReefCampaigns.stats().enabled) || ""}</span>
        </button>

        <nav className="nav">
          <button className={cx("nav-item", view === "accounts" && "nav-on")} onClick={() => setView("accounts")}>
            <span className="nav-i">⊕</span><span className="nav-l">New accounts</span>
            <span className="nav-count">{accCountBy(server)}</span>
          </button>
          <button className={cx("nav-item", view === "reports" && "nav-on")} onClick={() => setView("reports")}>
            <span className="nav-i">⚑</span><span className="nav-l">Reports</span>
            <span className="nav-count nav-count-hot">{repCountBy(server)}</span>
          </button>
        </nav>

        <div className="rail-sec-l">Servers</div>
        <div className="servers">
          <button className={cx("srv", server === "all" && "srv-on")} onClick={() => setServer("all")}>
            <span className="srv-dot srv-all" />
            <span className="srv-host">All servers</span>
            <span className="srv-count">{view === "accounts" ? accCountBy("all") : repCountBy("all")}</span>
          </button>
          {instances.map((i) => (
            <button key={i.id} className={cx("srv", server === i.id && "srv-on")} onClick={() => setServer(i.id)}>
              <span className="srv-dot" style={{ background: i.color }} />
              <span className="srv-host">{i.host}</span>
              {!i.live && <span className="srv-demo">demo</span>}
              <span className="srv-sw">{i.software === "Sharkey" ? "SK" : i.software === "Misskey" ? "MK" : "MA"}</span>
              <span className="srv-count">{view === "accounts" ? accCountBy(i.id) : repCountBy(i.id)}</span>
            </button>
          ))}
          {instances.length === 0 && <div className="muted-line srv-empty">No servers shown. Connect an account or enable demo data.</div>}
        </div>

        <div className="rail-foot">
          <button className="tour-launch" onClick={() => setTourOpen(true)} title="Open the getting-started walkthrough">
            <span className="tour-launch-q">?</span>
            <span className="tour-launch-l">Getting started</span>
          </button>
          <button className="diag-btn" onClick={() => setDiagOpen(true)} title="Transport state, fetch errors & logs">
            <span className={cx("diag-btn-dot", fetchErrs.length ? "bad" : "ok")} />
            <span className="diag-btn-l">Diagnostics</span>
            {fetchErrs.length > 0 && <span className="diag-btn-n mono">{fetchErrs.length}</span>}
          </button>
          <div className="rail-sec-l">Connected sources</div>
          <div className="sources">
            {D.OSINT_SERVICES.map((s) => { const st = sourceState(s); return (
              <span key={s.key} className={cx("source", st.state !== "on" && "source-off", st.state === "planned" && "source-planned")} title={st.title}>
                <span className={cx("source-dot", st.state === "needskey" && "source-dot-warn")} />{s.name}
                {st.tag && <span className="source-tag">{st.tag}</span>}
              </span>
            ); })}
          </div>
        </div>
      </aside>

      <section className="queue">
        <header className="queue-h">
          <div className="queue-h-l">
            <h2>{view === "accounts" ? "New account review" : "Report queue"}</h2>
            <span className="queue-meta">
              {server === "all" ? "All servers" : (instOf(server) ? instOf(server).host : server)} ·
              {" "}{loading ? "loading…" : (view === "accounts" ? (serverMode ? accList.length + " result" + (accList.length === 1 ? "" : "s") : accList.length + " pending") : repList.length + " open")}
            </span>
          </div>
          <div className="queue-h-r">
            <button className={cx("seg", t.sortBy === "risk" && "seg-on")} onClick={() => setTweak("sortBy", "risk")}>Risk</button>
            <button className={cx("seg", t.sortBy === "recent" && "seg-on")} onClick={() => setTweak("sortBy", "recent")}>Recent</button>
          </div>
        </header>

        <div className="qtools">
          <div className="qsearch">
            <span className="qsearch-i">⌕</span>
            <input className="qsearch-input" placeholder={view === "accounts" ? "Search accounts — ↵ to query the server" : "Search loaded reports…"}
              value={query} onChange={(e) => setQuery(e.target.value)}
              onKeyDown={(e) => { if (view === "accounts" && e.key === "Enter") runServerSearch(); }} />
            {query && <button className="qsearch-x" onClick={() => setQuery("")}>✕</button>}
            {view === "accounts" && query.trim() && (
              <button className="qsearch-go" disabled={searching} onClick={runServerSearch} title="Search the whole server, not just the loaded sweep">
                {searching ? <span className="spinner" /> : "server ↵"}
              </button>
            )}
          </div>
          <button className={cx("qscope", scopeAll[view] && "qscope-on")}
            onClick={() => setScopeAll((s) => ({ ...s, [view]: !s[view] }))}
            title={view === "accounts" ? "Toggle pending-only vs all accounts" : "Toggle open-only vs include resolved"}>
            {view === "accounts" ? (scopeAll.accounts ? "All accounts" : "Pending only") : (scopeAll.reports ? "Incl. resolved" : "Open only")}
          </button>
          <ExportButton triggerClass="qexport" label="⤓" disabled={(view === "accounts" ? accList.length : repList.length) === 0}
            title={view === "accounts" ? "Export all loaded accounts" : "Export all loaded reports"}
            formats={view === "accounts" ? [
              { label: "Native JSON", sub: "archive bundle of all accounts", fn: () => ReefExport.exportAccounts(accList) },
              { label: "MISP Events", sub: "IoC events · MISP core model", fn: () => ReefExport.exportAccountsMISP(accList) },
              { label: "STIX 2.1", sub: "one bundle · all accounts", fn: () => ReefExport.exportAccountsSTIX(accList) },
            ] : [
              { label: "Native JSON", sub: "archive bundle of all reports", fn: () => ReefExport.exportReports(repList) },
              { label: "MISP Events", sub: "IoC events · MISP core model", fn: () => ReefExport.exportReportsMISP(repList) },
              { label: "STIX 2.1", sub: "one bundle · all reports", fn: () => ReefExport.exportReportsSTIX(repList) },
              { label: "xARF reports", sub: "abuse-desk format · one per report", fn: () => ReefExport.exportReportsXARF(repList) },
            ]} />
          <button className="qimport" onClick={() => importFileRef.current && importFileRef.current.click()} title="Import accounts & reports as test data (native Vantage JSON export, or an xARF abuse report)">⤒ Import</button>
          <input ref={importFileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={onImportFile} />
        </div>

        {fetchErrs.length > 0 && (
          <button className="fetch-warn" onClick={() => setDiagOpen(true)} title="Open diagnostics for full error details">
            <span className="fetch-warn-l">{fetchErrs.length} fetch issue{fetchErrs.length === 1 ? "" : "s"} · {fetchErrs[0].host}: {fetchErrs[0].msg.slice(0, 48)}</span>
            <span className="fetch-warn-cta">view details →</span>
          </button>
        )}

        {serverMode && (
          <div className="server-banner">
            <span className="sb-l">Server lookup · <b className="mono">{serverSearch.by}</b> “{serverSearch.q}” · {accList.length} found{serverSearch.demo ? " (demo dataset)" : ""}</span>
            {serverSearch.errs && serverSearch.errs.length > 0 && <button className="sb-err" onClick={() => setDiagOpen(true)} title="View errors in diagnostics">{serverSearch.errs.length} error{serverSearch.errs.length === 1 ? "" : "s"}</button>}
            <button className="sb-clear" onClick={() => setServerSearch(null)}>✕ back to sweep</button>
          </div>
        )}

        <div className="qlist">
          {view === "accounts"
            ? (accList.length ? accList.map((a) => <AccountRow key={a.id} acc={a} inst={instOf(a.instance)} active={a.id === selAcc} onClick={() => setSelAcc(a.id)} />)
                : (() => { const ev = fetchErrs.filter((e) => e.what === "accounts");
                    return ev.length
                      ? <Empty kind="error" label={`${ev.length} server${ev.length === 1 ? "" : "s"} couldn’t return pending signups.`} detail={scopeHintFor("accounts", ev)} onDiag={() => setDiagOpen(true)} />
                      : <Empty label={serverMode ? `No accounts on the server match “${serverSearch.q}”.` : (query ? "No matches in loaded items." : (liveMode && !showDemo && verified.length === 0 ? "Connect an account to pull live signups." : "Queue clear — no pending accounts."))} />; })())
            : (repList.length ? repList.map((r) => <ReportRow key={r.id} rep={r} inst={instOf(r.instance)} active={r.id === selRep} onClick={() => setSelRep(r.id)} />)
                : (() => { const ev = fetchErrs.filter((e) => e.what === "reports");
                    return ev.length
                      ? <Empty kind="error" label={`${ev.length} server${ev.length === 1 ? "" : "s"} couldn’t return reports.`} detail={scopeHintFor("reports", ev)} onDiag={() => setDiagOpen(true)} />
                      : <Empty label={query ? "No matches in loaded items." : (liveMode && !showDemo && verified.length === 0 ? "Connect an account to pull live reports." : "Queue clear — no open reports.")} />; })())}

          {liveMode && verified.length > 0 && !serverMode && (
            <button className="load-older" disabled={loading} onClick={() => setFetchN((n) => ({ ...n, [view]: n[view] + 40 }))}>
              {loading ? "Loading…" : `Load older from API  ·  fetching ${fetchN[view]}`}
            </button>
          )}
        </div>

        {t.showHints && <footer className="kbd-hint">
          <span><kbd>J</kbd><kbd>K</kbd> move</span>
          {view === "accounts"
            ? <span><kbd>A</kbd> approve <kbd>H</kbd> hold <kbd>X</kbd> reject</span>
            : <span><kbd>S</kbd> suspend <kbd>D</kbd> dismiss</span>}
          <span><kbd>1</kbd><kbd>2</kbd> switch</span>
        </footer>}
      </section>

      <section className="insp-pane">
        {view === "accounts"
          ? (curAcc ? <AccountInspector key={curAcc.id} acc={curAcc} inst={instOf(curAcc.instance)} onAction={resolveAccount} resolved={curAcc.status === "resolved"}
                connections={connections} acting={actingBy[curAcc.instance]} onActing={(id) => setActingBy((m) => ({ ...m, [curAcc.instance]: id }))}
                settings={settings} onEnriched={handleEnriched} onResend={resendConfirmation} onBlock={blockToDenylist} onUnblock={unblockFromDenylist} denyHits={accDenyHits} />
              : <EmptyBig label="Select an application to review." />)
          : (curRep ? <ReportInspector key={curRep.id} rep={curRep} inst={instOf(curRep.instance)} onAction={resolveReport} resolved={curRep.status === "resolved"}
                connections={connections} acting={actingBy[curRep.instance]} onActing={(id) => setActingBy((m) => ({ ...m, [curRep.instance]: id }))} settings={settings} denyHits={repDenyHits}
                allReports={reports} onSelectRep={setSelRep} caseTick={caseTick} onCaseChange={() => setCaseTick((c) => c + 1)} />
              : <EmptyBig label="Select a report to review." />)}
      </section>

      {toast && <div className={cx("toast", "toast-" + (toast.tone || "ok"))}>{toast.msg}</div>}

      <ConnectionsModal open={connOpen} onClose={() => setConnOpen(false)}
        connections={connections} settings={settings} instances={instances} serverSession={serverSession}
        onSave={saveConn} onRemove={removeConn} onSetDefault={setDefaultConn} onScopeAudit={setScopeAudit} onSettings={patchSettings} onSetKey={setKey} onSetAffirm={setAffirm} />

      <ServicesModal open={svcOpen} onClose={() => setSvcOpen(false)}
        settings={settings} onSettings={patchSettings} onSetKey={setKey} onDenylistChange={() => setDenyTick((t) => t + 1)}
        serverSession={serverSession} vaultKeys={vaultKeys} onVaultRefresh={refreshVaultKeys} />

      <ScoringModal open={scoreOpen} onClose={() => setScoreOpen(false)}
        settings={settings} onSettings={patchSettings} />

      <DenylistsModal open={dlOpen} onClose={() => setDlOpen(false)} onChange={() => setDenyTick((t) => t + 1)} />

      <CampaignsModal open={campOpen} onClose={() => setCampOpen(false)} onChange={() => setDenyTick((t) => t + 1)} />

      <DiagnosticsModal open={diagOpen} onClose={() => setDiagOpen(false)} fetchErrs={fetchErrs} diagLog={diagLog} connections={connections} settings={settings} />

      <GettingStartedTour open={tourOpen} onClose={() => setTourOpen(false)} onOpen={openTourPanel} />

      <TweaksPanel>
        <TweakSection label="Appearance" />
        <TweakColor label="Accent" value={t.accent} options={["#3aa0e6", "#7c5cff", "#1f9d6b", "#e0833a"]} onChange={(v) => setTweak("accent", v)} />
        <TweakRadio label="Density" value={t.density} options={["compact", "comfortable"]} onChange={(v) => setTweak("density", v)} />
        <TweakSection label="Triage" />
        <TweakRadio label="Default sort" value={t.sortBy} options={["risk", "recent"]} onChange={(v) => setTweak("sortBy", v)} />
        <TweakToggle label="Keyboard hints" value={t.showHints} onChange={(v) => setTweak("showHints", v)} />
      </TweaksPanel>
    </div>
  );
}

function scopeHintFor(view, errs) {
  const msg = (errs[0] && errs[0].msg) || "";
  if (/403|forbidd|permission|PERMISSION_DENIED|ACCESS_DENIED|role|denied/i.test(msg)) {
    return view === "accounts"
      ? "The token can't read pending signups. Grant admin:read:accounts (Mastodon) or read:admin:show-user (Sharkey/Misskey), and make sure the account holds the Moderator/Admin role, then re-add the connection."
      : "The token can't read reports. Grant admin:read:reports (Mastodon) or read:admin:abuse-user-reports (Sharkey/Misskey), confirm the account's Moderator/Admin role, then re-add the connection.";
  }
  if (/401|unauthor/i.test(msg)) return "Token rejected (401) — missing, expired, or wrong for this host. Re-add the connection with a fresh admin token.";
  if (/Failed to fetch|CORS|NetworkError|load failed|ERR_/i.test(msg)) return "The browser blocked the request (CORS) or the host is unreachable. Set a proxy in Services, or re-check the instance URL.";
  if (/404|not found/i.test(msg)) return "Endpoint not found (404) — the instance may be different software than detected, or the URL is off. Re-check it in Connections.";
  return msg.slice(0, 160);
}

function Empty({ label, kind, detail, onDiag }) {
  const err = kind === "error";
  return (
    <div className={cx("empty", err && "empty-err")}>
      <span className={cx("empty-mark", err && "empty-mark-err")}>{err ? "!" : "✓"}</span>
      <span className="empty-l">{label}</span>
      {detail && <span className="empty-detail">{detail}</span>}
      {onDiag && <button className="empty-diag" onClick={onDiag}>Open diagnostics →</button>}
    </div>
  );
}
function EmptyBig({ label }) { return <div className="empty-big">{label}</div>; }

// ---- "Sign in with your instance" gate (hosted-server mode only) ----
function LoginGate() {
  const [host, setHost] = useState("");
  const [busy, setBusy] = useState(false);
  const params = new URLSearchParams(window.location.search);
  const err = params.get("error");
  function submit(e) {
    e.preventDefault();
    const h = host.trim();
    if (!h) return;
    setBusy(true);
    ReefServer.login(h);
  }
  return (
    <div className="login-gate">
      <div className="login-card">
        <div className="login-brand">Vantage</div>
        <div className="login-sub">Fediverse moderation console</div>
        <form onSubmit={submit}>
          <label className="login-label">Sign in with your instance</label>
          <input className="conn-input mono login-input" placeholder="mastodon.example.com"
            value={host} onChange={(e) => setHost(e.target.value)} autoFocus autoCapitalize="none" autoCorrect="off" spellCheck={false} />
          <button className="act act-approve login-btn" type="submit" disabled={busy || !host.trim()}>
            {busy ? "Redirecting…" : "Continue"}
          </button>
        </form>
        {err && <div className="login-err tone-bad">{err}</div>}
        <div className="login-note">You'll be sent to your own server to authorize Vantage. Only moderators can sign in.</div>
      </div>
    </div>
  );
}

// Boot: decide server vs standalone, then render the gate, the app for a
// signed-in session, or the standalone app.
function Root() {
  const [boot, setBoot] = useState(null); // null = still probing
  useEffect(() => { ReefServer.init().then(setBoot); }, []);
  if (!boot) return <div className="login-gate"><div className="login-boot">Loading…</div></div>;
  if (boot.mode === "server" && !boot.session) return <LoginGate />;
  return <App serverSession={boot.mode === "server" ? boot.session : null} />;
}

Object.assign(window, { LoginGate, Root });
ReactDOM.createRoot(document.getElementById("root")).render(<Root />);

</script>
</body>
</html>
