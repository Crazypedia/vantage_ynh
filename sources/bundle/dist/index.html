<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — unified live API client (Sharkey/Misskey + Mastodon)
   Transport is megalodon (loaded as an ESM module; see mega.js):
   typed calls where megalodon covers them (verify, detect), and
   its low-level client for the admin API it doesn't. Falls back
   to raw fetch when megalodon is unavailable or a URL-prefix CORS
   proxy is configured (which megalodon can't apply). Normalizes
   responses into the UI's item shape and runs the heuristic
   assessor so live items get a risk score.
   Plain JS. Exposes window.ReefAPI.
   ============================================================ */
(function () {
  const A = window.ReefAssess;
  const { withProxy } = window.ReefUtil;

  async function rawHttp(conn, path, { method = "GET", body, mastoAuth } = {}) {
    const proxy = (window.__reefProxy || "");
    const url = withProxy(proxy, conn.baseUrl + path);
    const headers = { "Content-Type": "application/json" };
    let payload = body;
    if (conn.software === "Mastodon") {
      if (mastoAuth !== false) headers["Authorization"] = "Bearer " + conn.token;
      payload = body ? JSON.stringify(body) : undefined;
    } else {
      // Misskey/Sharkey: POST + token in body as `i`
      payload = JSON.stringify(Object.assign({ i: conn.token }, body || {}));
    }
    const res = await fetch(url, { method, headers, body: payload, mode: "cors" });
    if (!res.ok) {
      let msg = "HTTP " + res.status;
      try { const j = await res.json(); msg = (j.error && (j.error.message || j.error)) || j.error_description || msg; } catch (e) {}
      throw new Error(msg);
    }
    if (res.status === 204) return null;
    return res.json();
  }

  // ---- hosted-server transport ---------------------------------------------
  // In server mode the browser holds no token: every instance call goes to the
  // same-origin gateway, which attaches the vaulted token and (for Misskey) the
  // `i` field server-side. Path + method + body are exactly what the instance
  // expects; the gateway is transport-transparent. Mirrors rawHttp's errors so
  // callers can't tell which transport ran.
  function serverMode() { return !!(window.ReefServer && window.ReefServer.mode === "server"); }
  async function serverCall(path, { method = "GET", body, instance } = {}) {
    const init = { method, headers: { "Content-Type": "application/json" }, credentials: "same-origin" };
    if (method !== "GET" && method !== "HEAD") init.headers["X-Vantage-CSRF"] = (window.ReefServer && window.ReefServer.csrf) || "";
    // Act-as selector (phase 2.5): names which connected instance this call
    // runs against; the gateway only resolves hosts linked to the principal.
    if (instance) init.headers["X-Vantage-Instance"] = instance;
    if (body != null) init.body = JSON.stringify(body);
    const res = await fetch("/api/instance" + path, init);
    if (!res.ok) {
      let msg = "HTTP " + res.status;
      try { const j = await res.json(); msg = (j.error && (j.error.message || j.error)) || j.error_description || msg; } catch (e) {}
      throw new Error(msg);
    }
    if (res.status === 204) return null;
    return res.json();
  }

  // ---- unified dispatcher --------------------------------------------------
  // Mastodon: prefer megalodon's transport (its typed surface is genuinely useful
  // for the REST API), fall back to raw fetch under a proxy or if the CDN is down.
  // Misskey/Sharkey: ALWAYS raw fetch. megalodon has no typed admin methods, so for
  // the admin API it's only an HTTP shim — and it's the *Firefish* client, a transport
  // that forked away from the Misskey API Sharkey actually speaks, which also collapses
  // real HTTP errors into a vague "Network Error". Raw fetch sends the exact POST+`i`
  // the Misskey API wants and surfaces the honest `{error:{message}}` body. Mirrors
  // rawHttp's {method, body} shape; Mastodon GET query strings stay embedded in `path`.
  async function call(conn, path, opts) {
    opts = opts || {};
    // Hosted server: the gateway handles auth + proxying for both families;
    // conn.host picks which of the principal's connected instances acts.
    if (serverMode()) return serverCall(path, { method: opts.method, body: opts.body, instance: conn && conn.host });
    const proxy = (window.__reefProxy || "");
    if (conn.software !== "Mastodon") {
      // Misskey/Sharkey: POST + token in body as `i`; rawHttp handles proxy + honest errors.
      return rawHttp(conn, path, { method: opts.method, body: opts.body });
    }
    if (!proxy && window.ReefMega && await window.ReefMega.ready(6000)) {
      try {
        if ((opts.method || "GET") === "GET") return await window.ReefMega.lowGet(conn, path, {});
        return await window.ReefMega.lowPost(conn, path, opts.body || {});
      } catch (e) { if (window.ReefLog) window.ReefLog.debug("api", "megalodon transport failed for " + path + " — falling back to raw fetch", e && e.message); }
    }
    return rawHttp(conn, path, { method: opts.method, body: opts.body, mastoAuth: opts.mastoAuth });
  }

  // ---- software detection via nodeinfo ----
  async function detect(baseUrl) {
    const proxy = (window.__reefProxy || "");
    async function ni(href) {
      const r = await fetch(withProxy(proxy, baseUrl + href), { mode: "cors" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }
    let node;
    try { node = await ni("/nodeinfo/2.1"); }
    catch (e) {
      try { node = await ni("/nodeinfo/2.0"); }
      catch (e2) {
        // nodeinfo blocked/unavailable — fall back to megalodon's SNS detector
        try {
          if (!proxy && window.ReefMega && await window.ReefMega.ready(6000)) {
            const sns = String(await window.ReefMega.detect(baseUrl) || "").toLowerCase();
            const sw = sns === "mastodon" ? "Mastodon" : (sns === "misskey" || sns === "firefish") ? "Misskey" : sns === "pleroma" ? "Mastodon" : sns === "gotosocial" ? "Mastodon" : sns === "pixelfed" ? "Mastodon" : null;
            if (sw) return { software: sw, raw: sns, version: "", via: "megalodon" };
          }
        } catch (e3) {}
        throw new Error("Couldn't read nodeinfo at this URL — is it a Mastodon / GoToSocial / Pixelfed / Sharkey / Misskey instance?");
      }
    }
    const name = ((node.software && node.software.name) || "").toLowerCase();
    // Two admin "dialects": Mastodon (Bearer REST, /api/v1/admin/*) and Misskey
    // (POST + token as `i`, /api/admin/*). Each platform below reuses one of them:
    //   Mastodon dialect : Mastodon, glitch-soc, Hometown, GoToSocial, Pixelfed
    //   Misskey  dialect : Misskey, Sharkey, Firefish, Iceshrimp(.NET), CherryPick,
    //                      Foundkey, Catodon
    const software = name.includes("sharkey") ? "Sharkey"
      : name.includes("misskey") || name.includes("cherrypick") || name.includes("firefish") || name.includes("iceshrimp") || name.includes("foundkey") || name.includes("catodon") ? "Misskey"
      : name.includes("mastodon") || name.includes("hometown") || name.includes("glitch") || name.includes("gotosocial") || name.includes("pixelfed") ? "Mastodon"
      : null;
    if (window.ReefLog) window.ReefLog.debug("api", "nodeinfo detected software=\"" + name + "\" → dialect " + (software || "UNRECOGNIZED") + (node.software && node.software.version ? " v" + node.software.version : ""));
    return { software, raw: name, version: (node.software && node.software.version) || "" };
  }

  // ---- verify token, return identity + role ----
  async function verify(conn) {
    if (conn.software === "Mastodon") {
      // prefer megalodon's typed call; fall back to the dispatcher (raw fetch under proxy)
      let me = null;
      if (!(window.__reefProxy) && window.ReefMega && await window.ReefMega.ready(6000)) {
        const c = window.ReefMega.makeClient(conn);
        if (c) { try { const r = await c.verifyAccountCredentials(); me = r && r.data ? r.data : r; } catch (e) { me = null; } }
      }
      if (!me) me = await call(conn, "/api/v1/accounts/verify_credentials");
      const role = (me.role && me.role.name) || (me.role && me.role) || "user";
      return { id: me.id, username: me.username, name: me.display_name || me.username,
        role, isMod: /admin|moderator|owner/i.test(JSON.stringify(role)) };
    }
    const me = await call(conn, "/api/i", { method: "POST" });
    return { id: me.id, username: me.username, name: me.name || me.username,
      role: me.isAdmin ? "admin" : me.isModerator ? "moderator" : "user",
      isMod: !!(me.isAdmin || me.isModerator) };
  }

  // ---- token scope / permission audit ------------------------------------
  // Best-effort least-privilege check on a connected key. Mastodon runs Doorkeeper,
  // which exposes the *current* token's grant at GET /oauth/token/info — we read the
  // granted scopes and compare them to what Vantage actually uses. A key that also
  // grants e.g. `write` / `follow` / full `read` can post, follow, or read DMs as the
  // account, far beyond moderation, so it's flagged as over-provisioned. Misskey/
  // Sharkey have no token-introspection endpoint in the core API, so an access
  // token's permissions can't be read back there (readable:false) — we say so
  // honestly rather than guess.
  //
  // What the app needs on Mastodon: read:accounts (verify identity), write:accounts
  // (moderator note), admin:read (pending accounts + reports), admin:write (the
  // approve/reject/suspend/silence/resolve + ip/email-domain block writes).
  const MASTO_NEEDED = ["read:accounts", "write:accounts", "admin:read", "admin:write"];
  function evalMastoScopes(granted) {
    const set = new Set(granted);
    const covers = (need) => {
      if (set.has(need)) return true;
      const parts = need.split(":");
      for (let i = 1; i < parts.length; i++) if (set.has(parts.slice(0, i).join(":"))) return true; // a broader umbrella (read ⊇ read:accounts) grants it
      for (const g of granted) if (g.indexOf(need + ":") === 0) return true;                          // a narrower sub-scope (admin:read:accounts) partially satisfies an umbrella need
      return false;
    };
    // A granted scope is appropriate for a moderation console only if it's an admin
    // scope or one of the two specific non-admin scopes the app uses. Anything else
    // (bare read/write umbrellas, follow, push, write:statuses, …) is over-provisioned.
    const appropriate = (s) => s === "read:accounts" || s === "write:accounts" || s === "admin" || s.indexOf("admin:read") === 0 || s.indexOf("admin:write") === 0;
    const extra = granted.filter((s) => !appropriate(s));
    const missing = MASTO_NEEDED.filter((n) => !covers(n));
    return { needed: MASTO_NEEDED, extra, missing, overprovisioned: extra.length > 0, underprovisioned: missing.length > 0 };
  }

  async function tokenScopes(conn) {
    // Hosted server: the token lives in the server vault, not here — there's no
    // client-side key to audit. (The server requests least-privilege scopes.)
    if (serverMode()) return { platform: conn.software, supported: false, readable: false };
    if (conn.software === "Mastodon") {
      let info;
      try { info = await rawHttp(conn, "/oauth/token/info", { method: "GET" }); }
      catch (e) {
        if (window.ReefLog) window.ReefLog.debug("api", "token scope read failed on " + conn.host + " (/oauth/token/info) — " + (e && e.message));
        return { platform: "Mastodon", supported: true, readable: false, error: (e && e.message) || "unavailable" };
      }
      let scopes = [];
      if (Array.isArray(info.scopes)) scopes = info.scopes;
      else if (Array.isArray(info.scope)) scopes = info.scope;
      else if (typeof info.scope === "string") scopes = info.scope.split(/\s+/).filter(Boolean);
      const audit = Object.assign({ platform: "Mastodon", supported: true, readable: true, scopes }, evalMastoScopes(scopes));
      if (window.ReefLog) window.ReefLog.info("api", "token scopes on " + conn.host + ": [" + scopes.join(" ") + "]" + (audit.overprovisioned ? " — OVER-PROVISIONED, extra: " + audit.extra.join(" ") : audit.underprovisioned ? " — missing: " + audit.missing.join(" ") : " — least-privilege ok"));
      return audit;
    }
    // Misskey/Sharkey: access-token permissions are not self-introspectable.
    if (window.ReefLog) window.ReefLog.debug("api", conn.software + " exposes no token-introspection endpoint — scopes can't be audited on " + conn.host);
    return { platform: conn.software, supported: false, readable: false };
  }

  // ---- pending account signups ----
  async function fetchPendingAccounts(conn, opts = {}) {
    const want = Math.max(1, opts.limit || 40);
    const all = !!opts.all;
    if (conn.software === "Mastodon") {
      const status = all ? "" : "&status=pending";
      const list = await call(conn, `/api/v1/admin/accounts?origin=local${status}&limit=${Math.min(want, 200)}`);
      return (list || []).slice(0, want).map((acc) => normMastoAccount(conn, acc));
    }
    // Sharkey/Misskey: page show-users via offset; keep those awaiting approval unless `all`
    const matched = [];
    let offset = 0;
    while (matched.length < want && offset < want + 200) {
      const users = await call(conn, "/api/admin/show-users", { method: "POST", body: { limit: 100, offset, sort: "+createdAt", state: "all", origin: "local" } });
      if (!users || !users.length) break;
      const keep = all ? users : users.filter((u) => u.approved === false || u.isApproved === false);
      matched.push(...keep);
      offset += users.length;
      if (users.length < 100) break;
    }
    const detailed = await Promise.all(matched.slice(0, want).map((u) => detailMisskeyUser(conn, u)));
    return detailed;
  }

  async function detailMisskeyUser(conn, u) {
    let full = {}, ips = [];
    try { full = await call(conn, "/api/admin/show-user", { method: "POST", body: { userId: u.id } }); }
    catch (e) { if (window.ReefLog) window.ReefLog.debug("api", "admin/show-user failed for user " + u.id + " on " + conn.host + " (email/confirmation will be blank)", e && e.message); }
    try { ips = await call(conn, "/api/admin/get-user-ips", { method: "POST", body: { userId: u.id } }); }
    catch (e) { if (window.ReefLog) window.ReefLog.debug("api", "admin/get-user-ips failed for user " + u.id + " on " + conn.host + " (sign-in IP history unavailable)", e && e.message); }
    const signinIps = aggregateIps((Array.isArray(ips) ? ips : []).map((e) => ({ ip: e.ip, at: e.createdAt || e.at })));
    const ip = signinIps.length ? signinIps[0].ip : "";
    const email = full.email || "";
    return assembleAccount(conn, {
      rawId: u.id, username: u.username, displayName: u.name || u.username,
      email, emailDomain: email.split("@")[1] || "",
      emailConfirmed: typeof full.emailVerified === "boolean" ? full.emailVerified : undefined,
      ip, ipCountry: "", ipCity: "", asn: "", asnOrg: "", signinIps,
      ua: "", acceptLang: full.lang || "—", detectedLang: full.lang || "",
      createdAt: u.createdAt || full.createdAt || new Date().toISOString(),
      reason: full.signupReason || full.moderationNote || "",
      approved: !(u.approved === false || u.isApproved === false),
    });
  }

  // collapse a raw [{ip, at}] login log into [{ip, count, at}] newest-first
  function aggregateIps(list) {
    const m = new Map();
    (list || []).forEach((e) => {
      if (!e || !e.ip) return;
      const cur = m.get(e.ip) || { ip: e.ip, count: 0, at: e.at, country: "", city: "", asnOrg: "" };
      cur.count += 1;
      if (e.at && (!cur.at || new Date(e.at) > new Date(cur.at))) cur.at = e.at;
      m.set(e.ip, cur);
    });
    return [...m.values()].sort((a, b) => new Date(b.at || 0) - new Date(a.at || 0));
  }

  function normMastoAccount(conn, adm) {
    const acc = adm.account || adm;
    const ipArr = (adm.ips && adm.ips.length ? adm.ips : (adm.ip ? [{ ip: adm.ip, used_at: acc.created_at }] : []));
    const signinIps = aggregateIps(ipArr.map((e) => ({ ip: e.ip, at: e.used_at || e.usedAt })));
    return assembleAccount(conn, {
      rawId: adm.id, username: acc.username, displayName: acc.display_name || acc.username,
      email: adm.email || "", emailDomain: (adm.email || "").split("@")[1] || "",
      emailConfirmed: typeof adm.confirmed === "boolean" ? adm.confirmed : undefined,
      ip: (signinIps[0] && signinIps[0].ip) || adm.ip || "", signinIps,
      ipCountry: adm.location || "", ipCity: "", asn: "", asnOrg: "",
      ua: "", acceptLang: adm.locale || "—", detectedLang: adm.locale || "",
      createdAt: acc.created_at || adm.created_at, reason: adm.invite_request || "",
      approved: adm.approved !== false && !adm.pending,
    });
  }

  function assembleAccount(conn, f) {
    // LIVE items carry osint:null on purpose. The pre-baked OSINT cards in
    // account-review.jsx (AbuseIPDB/IPQS/EmailRep/VirusTotal/HIBP)
    // render ONLY when acc.osint exists — which is DEMO data only (see data.js).
    // For live accounts those cards are skipped and the real-lookup
    // <LiveEnrichment> panel runs instead (enrich.js), which now DOES wire EmailRep
    // (keyless+key) and HIBP (paid key) live. Spur.us and Maigret were removed from
    // the project (no free/hosted API).
    const item = Object.assign({
      id: conn.host + ":acc:" + f.rawId, rawId: f.rawId, instance: conn.host,
      status: f.approved ? "approved" : "pending", live: true, osint: null,
    }, f);
    Object.assign(item, A.account(item));
    return item;
  }

  // ---- server-side account search (beyond the recent sweep) ----
  // Mastodon admin accounts filter supports username / email / ip.
  // Misskey/Sharkey admin/show-users supports username only.
  async function searchAccounts(conn, opts) {
    opts = opts || {};
    const q = (opts.q || "").trim();
    const by = opts.by || "username";
    const want = Math.max(1, opts.limit || 40);
    if (!q) return [];
    if (conn.software === "Mastodon") {
      const param = by === "email" ? "email" : by === "ip" ? "ip" : "username";
      const list = await call(conn, `/api/v1/admin/accounts?${param}=${encodeURIComponent(q.replace(/^@/, ""))}&limit=${Math.min(want, 200)}`);
      return (list || []).slice(0, want).map((acc) => normMastoAccount(conn, acc));
    }
    if (by === "email" || by === "ip") {
      throw new Error(`${conn.software} admin search supports username only (not ${by})`);
    }
    const users = await call(conn, "/api/admin/show-users", { method: "POST", body: { limit: Math.min(want, 100), offset: 0, sort: "+createdAt", state: "all", origin: "local", username: q.replace(/^@/, "") } });
    return Promise.all((users || []).slice(0, want).map((u) => detailMisskeyUser(conn, u)));
  }

  // ---- reports ----
  async function fetchReports(conn, opts = {}) {
    const want = Math.max(1, opts.limit || 40);
    const all = !!opts.all;
    if (conn.software === "Mastodon") {
      const resolved = all ? "" : "resolved=false&";
      const list = await call(conn, `/api/v1/admin/reports?${resolved}limit=${Math.min(want, 200)}`);
      const reps = await Promise.all((list || []).slice(0, want).map((r) => normMastoReport(conn, r)));
      return reps;
    }
    // Misskey/Sharkey: page through abuse-user-reports via untilId.
    // NOTE: the endpoint is admin/abuse-user-reports (NOT .../list — that 404s).
    // Sharkey speaks the stock Misskey admin API here, so the same path serves both.
    const collected = [];
    let untilId = null;
    while (collected.length < want) {
      const body = { state: all ? "all" : "unresolved", limit: 100 };
      if (untilId) body.untilId = untilId;
      const page = await call(conn, "/api/admin/abuse-user-reports", { method: "POST", body });
      if (!page || !page.length) break;
      collected.push(...page);
      untilId = page[page.length - 1].id;
      if (page.length < 100) break;
    }
    const reps = await Promise.all(collected.slice(0, want).map((r) => normMisskeyReport(conn, r)));
    return reps;
  }

  async function statusesFor(conn, mastoId) {
    try { return await call(conn, `/api/v1/accounts/${mastoId}/statuses?limit=8&exclude_reblogs=false`); }
    catch (e) { if (window.ReefLog) window.ReefLog.debug("api", "couldn't load recent statuses for " + mastoId + " on " + conn.host, e && e.message); return []; }
  }
  async function notesFor(conn, userId) {
    try { return await call(conn, "/api/users/notes", { method: "POST", body: { userId, limit: 8 } }); }
    catch (e) { if (window.ReefLog) window.ReefLog.debug("api", "couldn't load recent notes for " + userId + " on " + conn.host, e && e.message); return []; }
  }

  function stripHtml(s) { return (s || "").replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim(); }

  async function normMastoReport(conn, r) {
    const tgt = r.target_account || {};
    const tacc = tgt.account || tgt;
    const targetRawId = tgt.id;
    // EVIDENCE CHAIN: r.statuses are the reporter-selected statuses (the actual
    // evidence). Fall back to the account's recent statuses only for CONTEXT when
    // the report cites no specific posts (account-level report).
    const reported = (r.statuses || []);
    const ctx = reported.length ? reported : await statusesFor(conn, tacc.id);
    const ageDays = tacc.created_at ? Math.floor((Date.now() - new Date(tacc.created_at)) / 86400000) : null;
    // reporter (full Admin::Account when present, not just a handle)
    const racc = (r.account && (r.account.account || r.account)) || {};
    const reporterRemote = !!(racc.acct && racc.acct.includes("@"));
    // moderator workflow: who it's assigned to + who actioned it (Admin::Account)
    const assignedAcct = r.assigned_account && (r.assigned_account.account || r.assigned_account);
    const actionByAcct = r.action_taken_by_account && (r.action_taken_by_account.account || r.action_taken_by_account);
    // cited server rules — Mastodon returns [{id, text}] (present for category=violation)
    const citedRules = (r.rules || []).map((x) => ({ id: String(x.id != null ? x.id : x), text: x.text || "" })).filter((x) => x.id);
    // Mastodon report category is one of: spam | legal | violation | other
    const cat = String(r.category || "other").toLowerCase();
    const CAT_DISPLAY = { spam: "Spam", legal: "Illegal content", violation: "Rule violation", other: "Other" };
    const item = {
      id: conn.host + ":rep:" + r.id, rawId: r.id, instance: conn.host,
      status: r.action_taken ? "resolved" : "open", live: true,
      category: CAT_DISPLAY[cat] || capitalize(cat),
      categoryType: ["spam", "legal", "violation", "other"].indexOf(cat) >= 0 ? cat : "other",
      citedRules, ruleIds: citedRules.map((x) => x.id),
      forwarded: !!r.forwarded,
      createdAt: r.created_at, updatedAt: r.updated_at || null,
      actionTaken: !!r.action_taken, actionTakenAt: r.action_taken_at || null,
      actionTakenBy: actionByAcct ? ("@" + (actionByAcct.acct || actionByAcct.username || "?")) : null,
      assignedTo: assignedAcct ? ("@" + (assignedAcct.acct || assignedAcct.username || "?")) : null,
      comment: r.comment || "(no comment)",
      reporter: {
        handle: "@" + (racc.acct || racc.username || "reporter"),
        local: !reporterRemote, accountId: racc.id || null, remote: reporterRemote,
      },
      target: {
        username: tacc.username, displayName: tacc.display_name || tacc.username, rawId: targetRawId,
        host: (tacc.acct && tacc.acct.includes("@")) ? tacc.acct.split("@")[1] : conn.host,
        remote: !!(tacc.acct && tacc.acct.includes("@")), bot: !!tacc.bot, suspended: !!tacc.suspended, silenced: !!tacc.silenced,
        avatarHue: 25, bio: stripHtml(tacc.note), followers: tacc.followers_count || 0,
        following: tacc.following_count || 0, notes: tacc.statuses_count || 0,
        ageDays: ageDays == null ? 0 : ageDays, url: tacc.url || "", links: [],
      },
      history: buildHistory(ctx.map((s) => ({ at: s.created_at, text: stripHtml(s.content), reply: !!s.in_reply_to_id }))),
      // posts = the evidence chain when present, else a few recent for context;
      // `evidence:true` marks the statuses the reporter actually cited.
      posts: (reported.length ? reported : ctx.slice(0, 3)).map((s) => ({
        id: s.id, text: stripHtml(s.content) || "[media-only post]", at: s.created_at,
        reactions: s.favourites_count || 0, renotes: s.reblogs_count || 0,
        cw: s.spoiler_text || "", sensitive: !!s.sensitive,
        url: s.url || s.uri || "", mediaCount: (s.media_attachments || []).length,
        evidence: reported.length > 0,
        flagged: s.sensitive ? ["sensitive"] : [],
      })),
      evidenceCount: reported.length,
    };
    Object.assign(item, A.report(item));
    return item;
  }

  /* Misskey/Sharkey reports carry NO category field — the reporter's free-text
     comment is the only classification carrier (verified against Sharkey's
     AbuseUserReportEntityService.pack). Infer one conservatively so triage and
     the category baseline aren't stuck on "Other"; severity order: illegal >
     interpersonal violation > spam. Returns null when nothing matches. */
  function inferReportCategory(comment) {
    const c = String(comment || "").toLowerCase();
    if (!c.trim()) return null;
    if (/\b(csam|csem|child\s*(porn|abuse|sexual)|loli(con)?|minor.{0,24}sexual|illegal|dmca|copyright|ncii|doxx?(ing|ed)?)\b/.test(c)) return { type: "legal", label: "Illegal content" };
    if (/\b(harass(ment|ing|es)?|threat(s|en|ening)?|hate(ful)?|slur|violence|violent|abusive|transphob\w*|homophob\w*|racis\w*|nazi|stalk(ing|er)?|dogpil\w*|brigad\w*)\b/.test(c)) return { type: "violation", label: "Rule violation" };
    if (/\b(spam|spammer|spamming|spambot|advertis\w*|promo(tion(al)?)?|solicit\w*|seo|scam(mer)?|phish(ing)?|crypto ?shill\w*)\b/.test(c)) return { type: "spam", label: "Spam" };
    return null;
  }

  async function normMisskeyReport(conn, r) {
    const tgt = r.targetUser || {};
    const notes = await notesFor(conn, tgt.id);
    const ageDays = tgt.createdAt ? Math.floor((Date.now() - new Date(tgt.createdAt)) / 86400000) : 0;
    // NOTE: Misskey/Sharkey abuse reports carry NO category and NO reporter-selected
    // evidence statuses (Mastodon DOES — see normMastoReport). Category is inferred
    // from the reporter's comment (categoryInferred marks it), and the notes below
    // are recent-context only (evidence:false), never a cited chain.
    // Misskey does expose assignee + resolved + forwarded — captured for parity.
    const assignee = r.assignee || (r.assigneeId ? { username: r.assigneeId } : null);
    const inf = inferReportCategory(r.comment);
    const item = {
      id: conn.host + ":rep:" + r.id, rawId: r.id, instance: conn.host, status: r.resolved ? "resolved" : "open", live: true,
      category: inf ? inf.label : "Other", categoryType: inf ? inf.type : "other", categoryInferred: !!inf, citedRules: [], ruleIds: [],
      forwarded: !!r.forwarded, createdAt: r.createdAt, updatedAt: r.updatedAt || null,
      actionTaken: !!r.resolved, actionTakenAt: r.resolved && r.updatedAt ? r.updatedAt : null,
      assignedTo: assignee ? ("@" + (assignee.username || assignee.id || "?")) : null,
      comment: r.comment || "(no comment)",
      reporter: { handle: "@" + ((r.reporter && r.reporter.username) || "reporter"), local: !(r.reporter && r.reporter.host), remote: !!(r.reporter && r.reporter.host) },
      target: {
        username: tgt.username, displayName: tgt.name || tgt.username, rawId: tgt.id,
        host: tgt.host || conn.host, remote: !!tgt.host, bot: !!tgt.isBot, suspended: !!tgt.isSuspended, silenced: !!tgt.isSilenced,
        avatarHue: 25, bio: stripHtml(tgt.description), followers: tgt.followersCount || 0,
        following: tgt.followingCount || 0, notes: tgt.notesCount || 0, ageDays, url: "", links: [],
      },
      history: buildHistory((notes || []).map((n) => ({ at: n.createdAt, text: n.text || "", reply: !!n.replyId }))),
      posts: (notes || []).slice(0, 3).map((n) => ({
        id: n.id, text: n.text || "[media-only note]", at: n.createdAt,
        reactions: Object.values(n.reactions || {}).reduce((a, b) => a + b, 0), renotes: n.renoteCount || 0,
        // Misskey/Sharkey: `cw` is the spoiler/content-warning string; media sensitivity
        // rides on each attached file (`files[].isSensitive`), not the note itself.
        cw: n.cw || "", sensitive: !!(n.files && n.files.some((f) => f && f.isSensitive)),
        url: n.url || n.uri || "", mediaCount: (n.files || []).length, evidence: false,
        flagged: [],
      })),
      evidenceCount: 0,
    };
    Object.assign(item, A.report(item));
    return item;
  }

  // Builds the "Posting behavior" history for a LIVE report from the few recent
  // posts/notes we can fetch. Volume + reply ratio are real; everything else is a
  // PLACEHOLDER because the source APIs don't give it to us cheaply:
  //   • toxicity  — all zeros: no toxicity classifier is wired (demo fakes a trend)
  //   • topTags / topDomains / reach — empty: would need full timeline + federation
  //     graph crawls
  //   • priorReports / priorActions — zero/empty: would need a moderation-history API
  // The demo dataset (data.js) hand-authors rich values for all of these so the UI
  // can be shown in full. Reports.jsx also hardcodes a "▲ rising" volume label.
  function buildHistory(posts) {
    const days = 15;
    const vol = new Array(days).fill(0);
    const now = Date.now();
    let replies = 0;
    posts.forEach((p) => {
      const idx = days - 1 - Math.floor((now - new Date(p.at)) / 86400000);
      if (idx >= 0 && idx < days) vol[idx]++;
      if (p.reply) replies++;
    });
    const rr = posts.length ? replies / posts.length : 0;
    return {
      volume: vol, toxicity: vol.map(() => 0), // toxicity placeholder — no classifier wired
      replyRatio: +rr.toFixed(2), originalRatio: +(1 - rr).toFixed(2),
      topTags: [], topDomains: [], reach: [], priorReports: 0, priorActions: [], // placeholders (live)
    };
  }

  // ---- actions ----
  async function actOnAccount(conn, item, decision) {
    if (conn.software === "Mastodon") {
      if (decision === "approve") return call(conn, `/api/v1/admin/accounts/${item.rawId}/approve`, { method: "POST" });
      if (decision === "reject") return call(conn, `/api/v1/admin/accounts/${item.rawId}/reject`, { method: "POST" });
      return null; // hold = no-op
    }
    if (decision === "approve") return call(conn, "/api/admin/approve-user", { method: "POST", body: { userId: item.rawId } });
    if (decision === "reject") {
      // Reject a signup = delete the account. The documented Misskey/Sharkey path is
      // admin/accounts/delete; some older builds expose admin/delete-account. Try the
      // documented one, then the legacy one, then fall back to suspend so a moderator
      // is never left with no enforcement.
      return call(conn, "/api/admin/accounts/delete", { method: "POST", body: { userId: item.rawId } })
        .catch((e) => {
          if (window.ReefLog) window.ReefLog.debug("api", "admin/accounts/delete failed on " + conn.host + " — trying legacy admin/delete-account", e && e.message);
          return call(conn, "/api/admin/delete-account", { method: "POST", body: { userId: item.rawId } });
        })
        .catch((e) => {
          if (window.ReefLog) window.ReefLog.warn("api", "delete-account failed on " + conn.host + " — falling back to suspend-user", e && e.message);
          return call(conn, "/api/admin/suspend-user", { method: "POST", body: { userId: item.rawId } });
        });
    }
    return null;
  }

  // Write a moderator note on an account.
  // Mastodon:         POST /api/v1/accounts/:id/note {comment: text}
  //                   Requires write:accounts scope. Sets a personal relationship note
  //                   visible to other staff in Mastodon's moderation UI.
  // Sharkey/Misskey:  No admin-note API endpoint — throw so the caller can show
  //                   a copy-paste fallback directing the moderator to the
  //                   "Moderator memo" field in the server's Admin panel.
  async function writeModeratorNote(conn, rawId, text) {
    if (!conn || !rawId) throw new Error("No connection or account ID available.");
    if (conn.software === "Mastodon") {
      return call(conn, `/api/v1/accounts/${rawId}/note`, { method: "POST", body: { comment: text } });
    }
    throw new Error(conn.software + " has no moderator-note API endpoint. Copy the text and paste it into the account\u2019s Moderator memo field: Admin \u2192 Users \u2192 [account] \u2192 Moderator memo.");
  }

  async function actOnReport(conn, item, decision) {
    if (conn.software === "Mastodon") {
      if (decision === "suspend" || decision === "silence") {
        await call(conn, `/api/v1/admin/accounts/${item.target.rawId || item.targetRawId || ""}/action`, { method: "POST", body: { type: decision } }).catch((e) => { if (window.ReefLog) window.ReefLog.warn("api", "account " + decision + " action failed on " + conn.host + " — resolving report anyway", e && e.message); });
      }
      return call(conn, `/api/v1/admin/reports/${item.rawId}/resolve`, { method: "POST" });
    }
    if (decision === "suspend") await call(conn, "/api/admin/suspend-user", { method: "POST", body: { userId: item.target.rawId } }).catch((e) => { if (window.ReefLog) window.ReefLog.warn("api", "suspend-user failed on " + conn.host + " — resolving report anyway", e && e.message); });
    if (decision === "silence") await call(conn, "/api/admin/silence-user", { method: "POST", body: { userId: item.target.rawId } }).catch((e) => { if (window.ReefLog) window.ReefLog.warn("api", "silence-user failed on " + conn.host + " — resolving report anyway", e && e.message); });
    return call(conn, "/api/admin/resolve-abuse-user-report", { method: "POST", body: { reportId: item.rawId } });
  }

  function capitalize(s) { return (s || "").charAt(0).toUpperCase() + (s || "").slice(1); }

  // ---- server-side IP block (Mastodon admin API) -----------------------
  // POST /api/v1/admin/ip_blocks  (Mastodon 4.0+, scope admin:write:ip_blocks)
  //   ip       : address (Mastodon appends /32 if no prefix) or CIDR range
  //   severity : sign_up_requires_approval | sign_up_block | no_access
  //   comment  : audit note · expires_in: optional TTL in seconds
  // Misskey/Sharkey ships NO admin IP-block endpoint — there is nothing to
  // call, so we throw a clear, honest error and the caller keeps the IP in
  // Vantage's local denylist only (enforce it at your reverse proxy / WAF).
  async function blockIP(conn, ip, opts) {
    opts = opts || {};
    if (!ip) throw new Error("No IP address to block");
    if (conn.software !== "Mastodon") {
      throw new Error(conn.software + " has no admin IP-block API — recorded in Vantage's local denylist only; enforce at your reverse proxy / firewall.");
    }
    const severity = opts.severity || "sign_up_block";
    const body = { ip: String(ip).trim(), severity };
    if (opts.comment) body.comment = opts.comment;
    if (opts.expiresIn) body.expires_in = opts.expiresIn;
    const r = await call(conn, "/api/v1/admin/ip_blocks", { method: "POST", body });
    if (window.ReefLog) window.ReefLog.info("action", "ip_block " + ip + " (" + severity + ") on " + conn.host);
    return r;
  }

  // ---- server-side email-domain block (Mastodon admin API) -------------
  // POST /api/v1/admin/email_domain_blocks (Mastodon 4.1+, admin:write:email_domain_blocks).
  // Blocks sign-ups whose email is on this domain — and, because Mastodon
  // resolves the address's MX at sign-up, also any domain whose MX matches.
  // That makes it the correct call for BOTH "block email domain" and
  // "block mail servers" (the MX-host base). No Misskey/Sharkey equivalent.
  async function blockEmailDomain(conn, domain) {
    if (!domain) throw new Error("No email domain to block");
    if (conn.software !== "Mastodon") {
      throw new Error(conn.software + " has no admin email-domain-block API — recorded in Vantage's local denylist only.");
    }
    const r = await call(conn, "/api/v1/admin/email_domain_blocks", { method: "POST", body: { domain: String(domain).trim() } });
    if (window.ReefLog) window.ReefLog.info("action", "email_domain_block " + domain + " on " + conn.host);
    return r;
  }

  // ---- lift a server-side IP block (Mastodon) --------------------------
  // The admin API keys blocks by an opaque id, not by IP, so we list, match the
  // address (Mastodon stores it as ip/prefix e.g. "1.2.3.4/32"), then DELETE.
  async function unblockIP(conn, ip) {
    if (!ip) return null;
    if (conn.software !== "Mastodon") throw new Error(conn.software + " has no admin IP-block API");
    const want = String(ip).trim().replace(/\/\d+$/, "");
    const list = await call(conn, "/api/v1/admin/ip_blocks?limit=200");
    const hit = (list || []).find((b) => String(b.ip || "").replace(/\/\d+$/, "") === want);
    if (!hit) return null; // nothing to lift
    const r = await call(conn, "/api/v1/admin/ip_blocks/" + hit.id, { method: "DELETE" });
    if (window.ReefLog) window.ReefLog.info("action", "ip_block lifted " + ip + " on " + conn.host);
    return r;
  }

  // ---- lift a server-side email-domain block (Mastodon) ----------------
  async function unblockEmailDomain(conn, domain) {
    if (!domain) return null;
    if (conn.software !== "Mastodon") throw new Error(conn.software + " has no admin email-domain-block API");
    const want = String(domain).trim().toLowerCase();
    const list = await call(conn, "/api/v1/admin/email_domain_blocks?limit=200");
    const hit = (list || []).find((b) => String(b.domain || "").toLowerCase() === want);
    if (!hit) return null;
    const r = await call(conn, "/api/v1/admin/email_domain_blocks/" + hit.id, { method: "DELETE" });
    if (window.ReefLog) window.ReefLog.info("action", "email_domain_block lifted " + domain + " on " + conn.host);
    return r;
  }

  // ---- resend email confirmation -------------------------------------
  // NOTE: neither core Mastodon nor core Misskey/Sharkey ship a documented
  // *admin-scoped* "resend confirmation" endpoint. We attempt the most
  // plausible route per platform and surface failures honestly rather than
  // pretending it worked. (Demo mode simulates a successful resend.)
  async function resendConfirmation(conn, item) {
    if (conn.software === "Mastodon") {
      // Mastodon's resend lives behind the *user's* own session
      // (POST /api/v1/emails/confirmations). There is no admin route to
      // re-trigger it for another account, so we say so plainly.
      throw new Error("Mastodon has no admin resend-confirmation route — the account holder must request a new link at /auth/confirmation/new");
    }
    // Misskey/Sharkey ship NO admin resend-confirmation endpoint. `admin/send-email`
    // exists but sends an arbitrary admin message, not a re-confirmation link, so we
    // don't pretend it's a resend. Be honest rather than fire a ghost call.
    throw new Error(conn.software + " has no admin resend-confirmation endpoint — ask the account holder to re-request confirmation, or approve manually once you've verified them another way.");
  }

  window.ReefAPI = { detect, verify, tokenScopes, fetchPendingAccounts, fetchReports, searchAccounts, actOnAccount, actOnReport, writeModeratorNote, resendConfirmation, blockIP, blockEmailDomain, unblockIP, unblockEmailDomain, inferReportCategory };
})();

</script>
<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — archive export (JSON)
   Mastodon/Sharkey give you no way to keep a record of a signup
   (and its OSINT) once you approve/reject it. This assembles a
   portable, self-describing JSON archive of everything Vantage knows
   about an account (or report) at the moment of export.
   Plain JS. Exposes window.ReefExport.
   ============================================================ */
(function () {
  const TOOL = "Vantage — Fediverse Moderation Console";

  function safeName(s) { return String(s || "item").replace(/[^a-z0-9._-]+/gi, "-").replace(/^-+|-+$/g, "").slice(0, 80) || "item"; }

  function denyMatches(host, username, instance) {
    const dl = window.ReefDenylist;
    if (!dl) return [];
    const hits = [];
    if (host) hits.push(...(dl.matchHost(host) || []));
    if (username && instance && dl.matchTarget) hits.push(...(dl.matchTarget({ username, host: instance }) || []));
    const seen = new Set(); const out = [];
    hits.forEach((m) => { const k = (m.listId || m.list) + ":" + m.on + ":" + m.matched; if (!seen.has(k)) { seen.add(k); out.push({ list: m.list, severity: m.severity, matched: m.matched, on: m.on, comment: m.comment || "" }); } });
    return out;
  }

  function signalsOut(sig) {
    return (sig || []).map((s) => ({ id: s.id || null, label: s.label, weight: s.weight, direction: s.dir, source: s.source || null }));
  }

  // ---- one account → archive record ----
  function accountRecord(acc) {
    const osint = acc.osint || acc._osintLive || null;
    return {
      _schema: "reef.account-archive/v1",
      exportedAt: new Date().toISOString(),
      tool: TOOL,
      source: { instance: acc.instance, live: !!acc.live },
      account: {
        id: acc.id, rawId: acc.rawId || null,
        username: acc.username, displayName: acc.displayName,
        instance: acc.instance, status: acc.status, createdAt: acc.createdAt || null,
        email: acc.email || null, emailDomain: acc.emailDomain || null,
        emailConfirmed: acc.emailConfirmed === undefined ? null : acc.emailConfirmed,
        confirmedAt: acc.confirmedAt || null,
        joinReason: acc.reason || null,
      },
      network: {
        signupIp: acc.ip || null, country: acc.ipCountry || null, city: acc.ipCity || null,
        asn: acc.asn || null, asnOrg: acc.asnOrg || null,
        userAgent: acc.ua || null, acceptLanguage: acc.acceptLang || null, detectedLanguage: acc.detectedLang || null,
      },

  // ---- one report → archive record ----
  function reportRecord(rep) {

      source: { instance: rep.instance, live: !!rep.live },

        forwarded: !!rep.forwarded,

  function bundle(records, kind) {

  // ============================================================
  // IMPORT accounts + reports (test data / cross-tool exchange).
  // Accepts our own native archive (full fidelity, round-trips the export
  // above) AND xARF (the community "eXtended Abuse Reporting Format" used by
  // abuse desks) for reports. Returns { accounts:[…], reports:[…] } of objects
  // shaped for the Vantage queue. assess.js re-scores anything missing signals.
  // ============================================================
  let _impSeq = 0;
  function impId(prefix) { _impSeq++; return prefix + "_imp" + Date.now().toString(36) + _impSeq; }

  function accountFromRecord(rec) {
    const a = rec.account || {}, n = rec.network || {}, as = rec.assessment || {};
    // OSINT arrives in one of two shapes. The flat "demo" card set (top-level
    // abuseipdb / ipqs / emailrep / virustotal / hibp) is what the demo inspector
    // panel renders. An exported LIVE account instead carries the enrichment shape
    // (net / dom / vt / ipqsEmail / sources / …). Route the live shape to
    // _osintLive (where the LiveEnrichment panel renders it) and keep acc.osint for
    // the demo shape only — the demo panel can't render the live shape and would
    // throw on it (o.abuseipdb.score) and blank the whole UI.
    const oin = rec.osint || null;

    const acc = {
      id: a.id || impId("acc"), rawId: a.rawId || null,
      username: a.username || "unknown", displayName: a.displayName || a.username || "Imported account",
      instance: a.instance || (rec.source && rec.source.instance) || "imported.example",
      status: a.status === "resolved" ? "pending" : (a.status || "pending"),
      createdAt: a.createdAt || new Date().toISOString(),
      email: a.email || "", emailDomain: a.emailDomain || (a.email ? a.email.split("@").pop() : ""),
      emailConfirmed: a.emailConfirmed === null ? undefined : a.emailConfirmed,
      confirmedAt: a.confirmedAt || null, reason: a.joinReason || "",
      ip: n.signupIp || "", ipCountry: n.country || "", ipCity: n.city || "",
      asn: n.asn || "", asnOrg: n.asnOrg || "", ua: n.userAgent || "",
      acceptLang: n.acceptLanguage || "", detectedLang: n.detectedLanguage || "",
      signinIps: Array.isArray(rec.signinIps) ? rec.signinIps : [],
      osint: liveShaped ? null : oin, _osintLive: liveShaped ? oin : undefined,
      risk: as.risk, tier: as.tier, recommend: as.recommend, rationale: as.rationale || "",
      signals: (as.signals || []).map((s) => ({ id: s.id || undefined, label: s.label, weight: s.weight, dir: s.direction || s.dir, source: s.source || undefined })),
      imported: true, live: false, demo: true,
    };
    if ((!acc.signals || !acc.signals.length) && window.ReefAssess) Object.assign(acc, window.ReefAssess.account(acc));
    return acc;
  }

  function reportFromRecord(rec) {
    const r = rec.report || {}, t = rec.target || {}, as = rec.assessment || {};
    const rep = {
      id: r.id || impId("rep"), rawId: r.rawId || null,

      reporter: r.reporter || { handle: "@imported", local: true }, comment: r.comment || "",
      instance: (rec.source && rec.source.instance) || t.host || "imported.example",
      target: {

        host: t.host || "imported.example", remote: !!t.remote, bot: !!t.bot, suspended: !!t.suspended, silenced: !!t.silenced, bio: t.bio || "",
        followers: t.followers, following: t.following, notes: t.posts != null ? t.posts : t.notes,
        ageDays: t.ageDays, avatarHue: 25, url: t.url || "", links: t.links || [],
      },

      severity: as.severity, tier: as.tier, recommend: as.recommend, rationale: as.rationale || "",
      severitySignals: (as.signals || []).map((s) => ({ id: s.id || undefined, label: s.label, weight: s.weight, dir: s.direction || s.dir, source: s.source || undefined })),

  }

  // xARF report → internal report. xARF (https://github.com/abusix/xarf) is the
  // JSON abuse-report format used by abuse desks. Map its report fields onto ours.
  const XARF_CATEGORY = { spam: "Spam", phishing: "Impersonation", malware: "Spam", harassment: "Harassment",
    abuse: "Harassment", "login-attack": "Spam", bot: "Spam", fraud: "Impersonation", csam: "CSAM flag",
    "child-abuse": "CSAM flag", impersonation: "Impersonation", copyright: "Other" };
  function b64decodeUtf8(s) { try { return decodeURIComponent(escape(atob(String(s || "")))); } catch (e) { return ""; } }
  // xARF v4 (https://xarf.org/docs/specification/) → internal report.
  // category+type (+ threat_type for the reputation container) → our category.
  const XARF_V4_TYPE = { spam: "Spam", csam: "CSAM flag", csem: "CSAM flag", brand_infringement: "Impersonation", phishing: "Impersonation", fraud: "Impersonation" };
  function reportFromXarfV4(x) {
    const cf = x.custom_fields || {};
    const type = String(x.type || "").toLowerCase();
    const threat = String(x.threat_type || "").toLowerCase();
    let category = XARF_V4_TYPE[type] || (threat ? (threat === "harassment" ? "Harassment" : threat === "spam" ? "Spam" : "Harassment") : "Other");
    // resolve the reported account: prefer the custom_fields handle, else source_identifier
    let username = "unknown", host = String(x.source_identifier || "").trim() || "imported.example";
    const acct = String(cf.reported_account || "");
    const m = acct.match(/@?([a-z0-9_.-]+)@([a-z0-9.-]+\.[a-z]{2,})/i);
    if (m) { username = m[1]; host = m[2]; }
    const posts = (Array.isArray(x.evidence) ? x.evidence : []).filter(Boolean).map((e, i) => ({
      id: "xarf_e" + i, text: (b64decodeUtf8(e.payload) || e.description || "").slice(0, 1200),
      at: x.timestamp || new Date().toISOString(), reactions: 0, renotes: 0, cw: "", sensitive: false, flagged: [],
    }));
    const rep = {
      id: impId("rep"), rawId: null, category,
      categoryType: category === "CSAM flag" ? "legal" : category === "Spam" ? "spam" : category === "Other" ? "other" : "violation",
      status: "open", createdAt: x.timestamp || new Date().toISOString(), forwarded: true,
      reporter: { handle: (x.reporter && (x.reporter.contact || x.reporter.org)) || "@xarf-reporter", local: false },
      comment: x.description || ("xARF " + (type || threat || "abuse") + " report"), instance: host,
      target: { username, displayName: username, host, remote: true, bot: false, bio: "",
        followers: null, following: null, notes: null, ageDays: null, avatarHue: 25, url: cf.profile_url || "", links: [] },
      history: null, posts, evidenceCount: posts.length,
      imported: true, live: false, demo: true, _xarf: true,
    };
    if (window.ReefAssess) Object.assign(rep, window.ReefAssess.report(rep));
    return rep;
  }

  function reportFromXarf(x) {
    if (x && x.xarf_version) return reportFromXarfV4(x);
    const ri = x.ReporterInfo || x.reporterInfo || {};
    const rp = x.Report || x.report || x;
    const type = String(rp.ReportType || rp.reportType || rp.Category || "abuse").toLowerCase();
    const srcRaw = String(rp.Source || rp.source || rp.SourceIp || "").replace(/^@/, "");
    let username = "unknown", host = "imported.example";
    const m = srcRaw.match(/([a-z0-9_.-]+)@([a-z0-9.-]+\.[a-z]{2,})/i);
    if (m) { username = m[1]; host = m[2]; } else if (srcRaw) { username = srcRaw; }
    const samples = rp.Samples || rp.samples || rp.Attachment || [];
    const posts = (Array.isArray(samples) ? samples : [samples]).filter(Boolean).map((s, i) => ({
      id: "xarf_s" + i, text: String(s.Payload || s.payload || s.Description || s.ContentType || s).slice(0, 800),
      at: rp.Timestamp || rp.timestamp || new Date().toISOString(), reactions: 0, renotes: 0, cw: "", sensitive: false, flagged: [],
    }));
    const rep = {
      id: impId("rep"), rawId: null, category: XARF_CATEGORY[type] || "Other",
      categoryType: (XARF_CATEGORY[type] === "CSAM flag" ? "legal" : XARF_CATEGORY[type] === "Spam" ? "spam" : XARF_CATEGORY[type] === "Other" || !XARF_CATEGORY[type] ? "other" : "violation"),
      status: "open",
      createdAt: rp.Timestamp || rp.timestamp || new Date().toISOString(), forwarded: true,
      reporter: { handle: ri.ReporterContactEmail || ri.ReporterOrg || ri.reporterOrg || "@xarf-reporter", local: false },
      comment: rp.Description || rp.description || ("xARF " + type + " report"), instance: host,
      target: { username, displayName: username, host, remote: true, bot: false, bio: "",
        followers: null, following: null, notes: null, ageDays: null, avatarHue: 25, url: "", links: [] },
      history: null, posts, evidenceCount: posts.length,
      imported: true, live: false, demo: true, _xarf: true,
    };
    if (window.ReefAssess) Object.assign(rep, window.ReefAssess.report(rep));
    return rep;
  }

  // internal report → xARF v4 (https://xarf.org/docs/specification/). Emits a
  // schema-valid xARF v4.0.0 JSON abuse report so a Vantage report can be sent
  // to an abuse desk and pass the official validator. Round-trips back through
  // reportFromXarf. The Vantage-specific analysis travels in `custom_fields`
  // (the sanctioned place for vendor data; standard-mode validators allow it).
  //
  // Mandatory top-level fields: xarf_version, report_id (UUID v4), timestamp
  // (ISO-8601 + TZ), reporter{org,contact,domain}, sender{…}, source_identifier
  // (IP/domain), category + type (enums). Category-specific mandatory field is
  // added too: content→url, messaging→protocol, reputation→threat_type.
  function b64utf8(s) { try { return btoa(unescape(encodeURIComponent(String(s || "")))); } catch (e) { return ""; } }
  // our category/categoryType → a valid xARF v4 {category, type[, threat_type]}.
  // The Fediverse has no native xARF type, so harassment/abuse map to the
  // reputation/threat_intelligence container (threat_type carries the nuance).
  function xarfV4Class(rep) {
    const c = rep.category, ct = rep.categoryType;
    if (c === "Spam" || ct === "spam") return { category: "messaging", type: "spam" };
    if (c === "CSAM flag" || ct === "legal") return { category: "content", type: "csam" };
    if (c === "Impersonation") return { category: "content", type: "brand_infringement" };
    if (c === "Harassment") return { category: "reputation", type: "threat_intelligence", threat_type: "harassment" };
    return { category: "reputation", type: "threat_intelligence", threat_type: "abuse" };
  }
  function reportToXarf(rep) {
    const t = rep.target || {};
    const host = t.host || rep.instance || "imported.example";
    const modDomain = rep.instance || host;
    const cls = xarfV4Class(rep);
    const ts = rep.createdAt ? new Date(rep.createdAt).toISOString() : new Date().toISOString();
    const profileUrl = t.url || ("https://" + host + "/@" + (t.username || ""));
    const party = { org: "Vantage — Fediverse Moderation Console", contact: "abuse@" + modDomain, domain: modDomain };
    const evidence = (rep.posts || rep.reportedPosts || []).map((p) => ({
      content_type: "text/plain",
      description: (p.evidence ? "Reported post (cited as evidence)" : "Recent post from reported account") + (p.url ? " — " + p.url : ""),
      payload: b64utf8(p.text || ""),
    })).filter((e) => e.payload);
    const desc = [];
    if (rep.comment) desc.push(rep.comment);
    if (rep.reporter && rep.reporter.handle) desc.push("Reported by " + rep.reporter.handle + (rep.reporter.local ? " (local)" : " (remote)"));
    if (rep.rationale) desc.push("Vantage assessment: " + rep.rationale);
    const abuse = (window.ReefText && window.ReefText.abuseReview) ? window.ReefText.abuseReview(rep.posts || []) : null;
    const out = {
      xarf_version: "4.0.0",
      report_id: uuid(),
      timestamp: ts,
      category: cls.category,
      type: cls.type,
      reporter: party,
      sender: party,
      source_identifier: host,
      evidence_source: "user_report",
      description: desc.join(" · ") || ("Fediverse " + (cls.threat_type || cls.type) + " report against @" + (t.username || "?") + "@" + host),
      evidence: evidence,
      tags: ["platform:fediverse"].concat(rep.tier ? ["tier:" + rep.tier] : []),
      custom_fields: {
        tool: party.org,
        internal_report_id: rep.id || null,
        reported_account: "@" + (t.username || "") + "@" + host,
        profile_url: profileUrl,
        category_label: rep.category || "Other",
        severity: rep.severity != null ? rep.severity : null,
        tier: rep.tier || null,
        recommendation: rep.recommend || null,
        forwarded: !!rep.forwarded,
        original_reporter: rep.reporter || null,
        signals: signalsOut(rep.severitySignals),
        denylist_matches: denyMatches(host, t.username, host),
        abuse_scan: abuse && abuse.evaluable
          ? { verdict: abuse.verdict, max_score: abuse.maxScore, categories: abuse.topCategories, severe: abuse.severe, abusive: abuse.abusive, borderline: abuse.borderline }
          : null,
      },
    };
    // category-specific mandatory field
    if (cls.category === "content") out.url = profileUrl;
    else if (cls.category === "messaging") out.protocol = "activitypub";
    else if (cls.category === "reputation") out.threat_type = cls.threat_type || "abuse";
    return out;
  }


  // Round-trips our own MISP export (see mispEventAccount / mispEventReport):
  // pulls the IoC Attributes + the vantage-assessment Object (risk/tier/
  // recommendation/rationale + the "<label> [weight=N, dir]" signal lines) back
  // into a queue item. Lets a MISP event exported from one instance be reviewed
  // as test data on another — the first leg of the MISP-integration roadmap.
  function mispTagVal(tags, prefix) {
    const t = (tags || []).find((x) => x && x.name && x.name.indexOf(prefix) === 0);
    const m = t && t.name.match(/=\s*"?([^"]*)"?\s*$/);
    return m ? m[1] : "";
  }
  function mispObject(ev, name) { return (ev.Object || []).find((o) => o.name === name) || null; }
  function mispObjRel(obj, rel) { const a = obj && (obj.Attribute || []).find((x) => x.object_relation === rel); return a ? a.value : undefined; }
  function mispSignals(obj) {
    return ((obj && obj.Attribute) || []).filter((a) => a.object_relation === "signal").map((a) => {
      const m = String(a.value || "").match(/^(.*)\s\[weight=(-?\d+),\s*(\w+)\]$/);
      return m ? { label: m[1], weight: parseInt(m[2], 10), dir: m[3], source: a.comment || undefined }
        : { label: String(a.value || ""), weight: 0, dir: "warn", source: a.comment || undefined };
    });
  }
  function mispKind(ev) {
    return mispTagVal(ev.Tag, "vantage:kind") || (/abuse[ -]report/i.test(ev.info || "") ? "abuse-report" : "account-review");
  }
  function accountFromMISP(ev) {
    const A = ev.Attribute || [], assess = mispObject(ev, "vantage-assessment");
    const ip = A.find((a) => a.type === "ip-src"), email = A.find((a) => a.type === "email-src");
    const dom = (A.find((a) => a.type === "domain") || {}).value;
    const user = (A.find((a) => a.type === "github-username") || {}).value;
    const host = (A.find((a) => a.type === "hostname") || {}).value;
    const risk = mispObjRel(assess, "risk-score");
    const acc = {
      id: impId("acc"), rawId: null,
      username: user || "unknown", displayName: user || "Imported account",
      instance: host || "imported.example", status: "pending",
      createdAt: ev.date ? new Date(ev.date).toISOString() : new Date().toISOString(),
      email: (email && email.value) || "", emailDomain: dom || (email && email.value ? email.value.split("@").pop() : ""),
      emailConfirmed: undefined, confirmedAt: null, reason: "",
      ip: (ip && ip.value) || "", ipCountry: "", asn: "", asnOrg: "", ua: "", acceptLang: "", detectedLang: "",
      signinIps: [], osint: null, _osintLive: undefined,
      risk: risk != null && risk !== "" ? Number(risk) : undefined,
      tier: mispObjRel(assess, "tier") || mispTagVal(ev.Tag, "vantage:tier") || undefined,
      recommend: mispObjRel(assess, "recommended-action") || mispTagVal(ev.Tag, "vantage:recommendation") || undefined,
      rationale: mispObjRel(assess, "rationale") || "",
      signals: mispSignals(assess), imported: true, live: false, demo: true,
    };
    if ((!acc.signals || !acc.signals.length) && window.ReefAssess) Object.assign(acc, window.ReefAssess.account(acc));
    return acc;
  }
  function reportFromMISP(ev) {
    const A = ev.Attribute || [], assess = mispObject(ev, "vantage-assessment");
    const actor = (A.find((a) => a.category === "Social network" && /^@[^@]+@.+/.test(String(a.value || ""))) || {}).value || "";
    const m = String(actor).match(/^@([^@]+)@(.+)$/);
    const username = m ? m[1] : "unknown";
    const host = m ? m[2] : ((A.find((a) => a.type === "hostname") || {}).value || "imported.example");
    const sev = mispObjRel(assess, "severity-score");
    const rep = {
      id: impId("rep"), rawId: null, category: mispTagVal(ev.Tag, "vantage:category") || "Other", categoryType: null,
      status: "open", createdAt: ev.date ? new Date(ev.date).toISOString() : new Date().toISOString(), forwarded: true,
      reporter: { handle: "@misp-import", local: false }, comment: mispObjRel(assess, "rationale") || (ev.info || ""), instance: host,
      target: { username, displayName: username, host, remote: true, bot: false, bio: "",
        followers: null, following: null, notes: null, ageDays: null, avatarHue: 25, url: "", links: [] },
      history: null, posts: [], evidenceCount: 0,
      severity: sev != null && sev !== "" ? Number(sev) : undefined,
      tier: mispObjRel(assess, "tier") || mispTagVal(ev.Tag, "vantage:tier") || undefined,
      recommend: mispObjRel(assess, "recommended-action") || mispTagVal(ev.Tag, "vantage:recommendation") || undefined,
      rationale: mispObjRel(assess, "rationale") || "", severitySignals: mispSignals(assess),
      imported: true, live: false, demo: true,
    };
    if ((!rep.severitySignals || !rep.severitySignals.length) && window.ReefAssess) Object.assign(rep, window.ReefAssess.report(rep));
    return rep;
  }

  function importQueueData(text) {
    let j; try { j = JSON.parse(text); } catch (e) { throw new Error("Not valid JSON"); }
    const accounts = [], reports = [];
    const takeRecord = (rec) => {
      if (!rec || typeof rec !== "object") return;
      const sch = rec._schema || "";
      if (rec.Event) { takeMISP(rec.Event); return; }
      if (sch.indexOf("account") >= 0 || rec.account) accounts.push(accountFromRecord(rec));
      else if (sch.indexOf("report") >= 0 || rec.report) reports.push(reportFromRecord(rec));
      else if (rec.xarf_version) reports.push(reportFromXarf(rec));
      else if (rec.Version && (rec.Report || rec.ReporterInfo)) reports.push(reportFromXarf(rec));
    };
    const takeMISP = (ev) => {
      if (!ev || typeof ev !== "object") return;
      if (mispKind(ev) === "abuse-report") reports.push(reportFromMISP(ev));
      else accounts.push(accountFromMISP(ev));
    };
    if (j.Event) { Array.isArray(j.Event) ? j.Event.forEach(takeMISP) : takeMISP(j.Event); }
    else if (Array.isArray(j.response)) j.response.forEach((r) => takeMISP(r.Event || r));
    else if (Array.isArray(j)) j.forEach(takeRecord);
    else if (j._schema === "reef.archive-bundle/v1" && Array.isArray(j.records)) j.records.forEach(takeRecord);
    else if (Array.isArray(j.records)) j.records.forEach(takeRecord);
    else if (j.xarf_version) reports.push(reportFromXarf(j));
    else if (j.Version && (j.Report || j.ReporterInfo)) reports.push(reportFromXarf(j));
    else if (Array.isArray(j.accounts) || Array.isArray(j.reports)) {
      (j.accounts || []).forEach((r) => accounts.push(r.account ? accountFromRecord(r) : accountFromRecord({ account: r })));
      (j.reports || []).forEach((r) => reports.push(r.report ? reportFromRecord(r) : reportFromRecord({ report: r })));
    } else takeRecord(j);
    if (!accounts.length && !reports.length) throw new Error("No accounts or reports found — expected a Vantage archive (native JSON export), a MISP Event, or an xARF report");
    if (window.ReefLog) window.ReefLog.info("import", "imported " + accounts.length + " account(s) + " + reports.length + " report(s) as test data");
