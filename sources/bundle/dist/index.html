    const t = rep.target || {}; const host = t.host || rep.instance;
    const objs = [], obsRefs = [], patterns = [];
    const mk = (s, pat) => { objs.push(s); obsRefs.push(s.id); if (pat) patterns.push(pat); };
    if (t.username) mk(sco("user-account", { account_login: t.username, display_name: t.displayName || undefined }));
    if (host) mk(sco("domain-name", { value: host }), "[domain-name:value = '" + pq(host) + "']");
    if (t.url) mk(sco("url", { value: t.url }));
    const domSet = new Set();
    (t.links || []).forEach((u) => { try { domSet.add(new URL(u).hostname.replace(/^www\./, "")); } catch (e) {} });
    (rep.posts || rep.reportedPosts || []).forEach((p) => (String((p && p.text) || "").match(/https?:\/\/[^\s<>"')\]]+/gi) || []).forEach((u) => { try { domSet.add(new URL(u).hostname.replace(/^www\./, "")); } catch (e) {} }));
    [...domSet].slice(0, 12).forEach((h) => { if (h && h !== host) mk(sco("domain-name", { value: h }), "[domain-name:value = '" + pq(h) + "']"); });
    const observed = sdo("observed-data", now, { first_observed: rep.createdAt ? new Date(rep.createdAt).toISOString() : now, last_observed: now, number_observed: 1, object_refs: obsRefs.slice() });
    objs.push(observed);
    const refs = [observed.id];
    const adverse = (rep.severitySignals || []).some((s) => s.dir !== "ok");
    if (patterns.length && (rep.tier === "high" || rep.tier === "medium" || adverse)) {
      const ind = sdo("indicator", now, {
        name: "Vantage abuse report — @" + (t.username || "?") + "@" + host, description: rep.rationale || undefined,
        indicator_types: indicatorTypes(rep.tier), pattern: patterns.join(" OR "), pattern_type: "stix", pattern_version: "2.1", valid_from: now,
        x_vantage_tier: rep.tier, x_vantage_severity: rep.severity, x_vantage_recommendation: rep.recommend, x_vantage_category: rep.category,
      });
      objs.push(ind); refs.push(ind.id);
    }
    const note = sdo("note", now, { abstract: "Vantage abuse-report assessment", content: assessmentNoteContent("report", rep.severity, rep.tier, rep.recommend, rep.rationale, rep.severitySignals), object_refs: refs.slice() });
    objs.push(note);
    const grouping = sdo("grouping", now, { name: "Abuse report @" + (t.username || "?") + "@" + host, context: "suspicious-activity", object_refs: objs.map((o) => o.id) });
    objs.push(grouping);
    return objs;
  }

  function stixBundle(recordObjArrays) {
    const objects = [stixIdentity(), stixTlp()];
    recordObjArrays.forEach((arr) => arr.forEach((o) => objects.push(o)));
    return { type: "bundle", id: sid("bundle"), objects };
  }
  function stixEventAccount(acc) { return stixBundle([stixRecordAccount(acc, stixNow())]); }
  function stixEventReport(rep) { return stixBundle([stixRecordReport(rep, stixNow())]); }

  function stixRecordCache(items, now) {
    const objs = [], indRefs = [];
    const typeMap = { ip: "ipv4-addr", domain: "domain-name", hostname: "domain-name" };
    items.forEach((it) => {
      const bad = cacheBad(it), comment = cacheSummary(it);
      let s = null, pat = null;
      if (it.type === "ip") { s = sco("ipv4-addr", { value: it.value }); pat = "[ipv4-addr:value = '" + pq(it.value) + "']"; }
      else if (it.type === "domain" || it.type === "hostname") { s = sco("domain-name", { value: it.value }); pat = "[domain-name:value = '" + pq(it.value) + "']"; }
      else if (it.type === "actor") { s = sco("user-account", { account_login: it.value }); }
      else if (it.type === "username") { s = sco("user-account", { account_login: it.value }); }
      if (!s) return;
      objs.push(s);
      if (it.type === "ip" && it.data.asn) { const n = String(it.data.asn).replace(/[^0-9]/g, ""); if (n) objs.push(sco("autonomous-system", { number: parseInt(n, 10), name: it.data.asnOrg || undefined })); }
      if (bad && pat) {
        const ind = sdo("indicator", now, { name: it.type + " " + it.value, description: comment, indicator_types: ["malicious-activity"], pattern: pat, pattern_type: "stix", pattern_version: "2.1", valid_from: now, x_vantage_namespaces: it.ns, x_vantage_accounts_seen: it.data.accountsSeen || undefined });
        objs.push(ind); indRefs.push(ind.id);
      }
    });
    return objs;
  }
  function stixEventCache(dump) {
    const items = aggregateCache(dump);
    return stixBundle([stixRecordCache(items, stixNow())]);
  }

  function download(name, obj) {
    const text = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
    downloadText(name, text, typeof obj === "string" ? "text/csv" : "application/json");
  }
  function downloadText(name, text, mime) {
    const b = new Blob([text], { type: (mime || "text/plain") + ";charset=utf-8" });
    const u = URL.createObjectURL(b);
    const a = document.createElement("a");
    a.href = u; a.download = name; document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(u); a.remove(); }, 1000);
  }

  // convenience: build + download for a single account / report
  function exportAccount(acc) { download(safeName("vantage-" + acc.username + "-" + acc.instance) + ".json", accountRecord(acc)); }
  function exportReport(rep) { download(safeName("vantage-report-" + (rep.target && rep.target.username) + "-" + rep.instance) + ".json", reportRecord(rep)); }
  function exportAccounts(list) { download("vantage-accounts-archive-" + new Date().toISOString().slice(0, 10) + ".json", bundle((list || []).map(accountRecord), "accounts")); }
  function exportReports(list) { download("vantage-reports-archive-" + new Date().toISOString().slice(0, 10) + ".json", bundle((list || []).map(reportRecord), "reports")); }

  // xARF convenience downloads (reports only — xARF is an abuse-report format)
  function exportReportXARF(rep) { download(safeName("xarf-report-" + (rep.target && rep.target.username) + "-" + rep.instance) + ".json", reportToXarf(rep)); }
  function exportReportsXARF(list) { download("vantage-xarf-reports-" + new Date().toISOString().slice(0, 10) + ".json", (list || []).map(reportToXarf)); }

  // MISP convenience downloads
  function exportAccountMISP(acc) { download(safeName("misp-" + acc.username + "-" + acc.instance) + ".json", mispEventAccount(acc)); }
  function exportReportMISP(rep) { download(safeName("misp-report-" + (rep.target && rep.target.username) + "-" + rep.instance) + ".json", mispEventReport(rep)); }
  function exportAccountsMISP(list) { download("vantage-misp-accounts-" + new Date().toISOString().slice(0, 10) + ".json", mispCollection((list || []).map(mispEventAccount))); }
  function exportReportsMISP(list) { download("vantage-misp-reports-" + new Date().toISOString().slice(0, 10) + ".json", mispCollection((list || []).map(mispEventReport))); }

  // STIX 2.1 convenience downloads
  function exportAccountSTIX(acc) { download(safeName("stix-" + acc.username + "-" + acc.instance) + ".json", stixEventAccount(acc)); }
  function exportReportSTIX(rep) { download(safeName("stix-report-" + (rep.target && rep.target.username) + "-" + rep.instance) + ".json", stixEventReport(rep)); }
  function exportAccountsSTIX(list) { download("vantage-stix-accounts-" + new Date().toISOString().slice(0, 10) + ".json", stixBundle((list || []).map((a) => stixRecordAccount(a, stixNow())))); }
  function exportReportsSTIX(list) { download("vantage-stix-reports-" + new Date().toISOString().slice(0, 10) + ".json", stixBundle((list || []).map((r) => stixRecordReport(r, stixNow())))); }

  // OSINT cache database downloads (dump from ReefCache)
  function cacheDump() { return (window.ReefCache && window.ReefCache.dump) ? window.ReefCache.dump() : { cache: {}, corr: {}, history: {} }; }
  function exportCacheMISP() { download("vantage-misp-osint-cache-" + new Date().toISOString().slice(0, 10) + ".json", mispEventCache(cacheDump())); }
  function exportCacheCSV() { downloadText("vantage-osint-cache-" + new Date().toISOString().slice(0, 10) + ".csv", cacheCSV(cacheDump()), "text/csv"); }
  function exportCacheJSON() { const d = cacheDump(); download("vantage-osint-cache-raw-" + new Date().toISOString().slice(0, 10) + ".json", { _schema: "reef.osint-cache/v1", exportedAt: new Date().toISOString(), tool: TOOL, indicators: aggregateCache(d), raw: d }); }
  function exportCacheSTIX() { download("vantage-stix-osint-cache-" + new Date().toISOString().slice(0, 10) + ".json", stixEventCache(cacheDump())); }

  // ============================================================
  // Import threat intel (MISP event/collection OR STIX 2.1 bundle) INTO the
  // local OSINT cache, under an "intel" namespace keyed by indicator value.
  // Pre-seeds known-bad IPs / domains so a reviewed account/report that
  // references one is already flagged, without re-querying any API.
  // Returns { format, imported, skipped }.
  // ============================================================
  function isIpValue(s) { s = String(s || "").trim(); return /^(\d{1,3}\.){3}\d{1,3}$/.test(s) || /^[0-9a-f:]+:[0-9a-f:]+$/i.test(s); }
  function intelType(value) { return isIpValue(value) ? "ip" : "domain"; }
  function putIntel(value, rec, seen) {
    value = String(value || "").trim().toLowerCase().replace(/^\*\./, "");
    if (!value) return false;
    const key = intelType(value) + "|" + value;
    if (seen[key]) { // merge malicious flag if a later record is stronger
      if (rec.malicious) seen[key].malicious = true;
      return false;
    }
    seen[key] = rec;
    if (window.ReefCache) window.ReefCache.set("intel", value, rec);
    return true;
  }
  function importMISPToCache(j, seen, counts) {
    const events = [];
    const pushEv = (e) => { if (e && e.Event) events.push(e.Event); else if (e && (e.Attribute || e.Object)) events.push(e); };
    if (Array.isArray(j)) j.forEach(pushEv);
    else if (Array.isArray(j.response)) j.response.forEach(pushEv);
    else if (Array.isArray(j.Event)) j.Event.forEach((ev) => events.push(ev));
    else pushEv(j);
    const handle = (a, evInfo) => {
      const t = String(a.type || "").toLowerCase(), val = String(a.value || "").trim();
      if (!val) return;
      const tags = (a.Tag || a.tags || []).map((x) => (typeof x === "string" ? x : x.name)).filter(Boolean);
      const malicious = a.to_ids === true || tags.some((x) => /reputation="?bad|malicious|tlp/i.test(x));
      const rec = { malicious, tags, comment: a.comment || evInfo || "", source: "MISP", at: Date.now() };
      let ok = false;
      if (/(ip-src|ip-dst|ip|ipv4-addr|ipv6-addr)$/.test(t) || (t === "value" && isIpValue(val))) ok = putIntel(val, Object.assign({}, rec), seen);
      else if (/(domain|hostname|domain-name)/.test(t)) ok = putIntel(val, Object.assign({}, rec), seen);
      else if (/(url|link|uri)/.test(t)) { try { ok = putIntel(new URL(val).hostname, Object.assign({}, rec), seen); } catch (e) {} }
      else return;
      if (ok) counts.imported++; else counts.skipped++;
    };
    events.forEach((ev) => {
      const info = ev.info ? String(ev.info).slice(0, 80) : "";
      (ev.Attribute || []).forEach((a) => handle(a, info));
      (ev.Object || []).forEach((o) => (o.Attribute || []).forEach((a) => handle(a, info)));
    });
  }
  function importSTIXToCache(j, seen, counts) {
    const objs = Array.isArray(j.objects) ? j.objects : (Array.isArray(j) ? j : []);
    const patRe = /(ipv4-addr|ipv6-addr|domain-name|url):value\s*=\s*'((?:[^'\\]|\\.)*)'/gi;
    objs.forEach((o) => {
      if (!o || !o.type) return;
      const put = (val, malicious, comment) => { if (putIntel(val, { malicious, tags: o.labels || [], comment: comment || "", source: "STIX", at: Date.now() }, seen)) counts.imported++; else counts.skipped++; };
      if (o.type === "ipv4-addr" || o.type === "ipv6-addr" || o.type === "domain-name") put(o.value, false, "");
      else if (o.type === "url") { try { put(new URL(o.value).hostname, false, ""); } catch (e) {} }
      else if (o.type === "indicator" && o.pattern) {
        const malicious = (o.indicator_types || []).some((x) => /malicious/i.test(x));
        const desc = o.name || (o.description ? String(o.description).slice(0, 80) : "");
        let m; while ((m = patRe.exec(o.pattern)) !== null) {
          const tt = m[1], vv = m[2].replace(/\\'/g, "'");
          if (tt === "url") { try { put(new URL(vv).hostname, malicious, desc); } catch (e) {} } else put(vv, malicious, desc);
        }
      }
    });
  }
  function importCacheText(text) {
    let j; try { j = JSON.parse(text); } catch (e) { throw new Error("Not valid JSON"); }
    const seen = {}, counts = { imported: 0, skipped: 0 };
    const isStix = j.type === "bundle" || Array.isArray(j.objects) || (Array.isArray(j) && j[0] && j[0].spec_version);
    const isMisp = j.Event || Array.isArray(j.response) || j.Attribute || (Array.isArray(j) && j[0] && (j[0].Event || j[0].Attribute));
    let format;
    if (isStix) { format = "STIX 2.1"; importSTIXToCache(j, seen, counts); }
    else if (isMisp) { format = "MISP"; importMISPToCache(j, seen, counts); }
    else throw new Error("Unrecognized file — expected a MISP event/collection or a STIX 2.1 bundle");
    if (!counts.imported && !counts.skipped) throw new Error("No IP / domain indicators found in the file");
    if (window.ReefLog) window.ReefLog.info("cache", "imported " + counts.imported + " intel indicator(s) from " + format + " (" + counts.skipped + " dup/skip)");
    return Object.assign({ format }, counts);
  }

  window.ReefExport = { accountRecord, reportRecord, bundle, download, downloadText, exportAccount, exportReport, exportAccounts, exportReports,
    mispEventAccount, mispEventReport, mispEventCache, mispCollection, aggregateCache, cacheCSV, exportAccountMISP, exportReportMISP, exportAccountsMISP, exportReportsMISP,
    stixEventAccount, stixEventReport, stixEventCache, stixBundle, exportAccountSTIX, exportReportSTIX, exportAccountsSTIX, exportReportsSTIX,
    exportCacheMISP, exportCacheCSV, exportCacheJSON, exportCacheSTIX, importCacheText,
    importQueueData, accountFromRecord, reportFromRecord, reportFromXarf, reportToXarf, exportReportXARF, exportReportsXARF };
})();

</script>
<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — shared UI primitives (React, classic createElement-free JSX)
   ============================================================ */
const { useState, useEffect, useRef, useMemo } = React;

const cx = (...a) => a.filter(Boolean).join(" ");

// relative time
function ago(iso) {
  const d = (Date.now() - new Date(iso).getTime()) / 1000;
  if (d < 60) return Math.floor(d) + "s ago";
  if (d < 3600) return Math.floor(d / 60) + "m ago";
  if (d < 86400) return Math.floor(d / 3600) + "h ago";
  return Math.floor(d / 86400) + "d ago";
}

const TIER_LABEL = { high: "High risk", medium: "Elevated", low: "Low risk" };

// ---- Software badge (Sharkey / Mastodon) -------------------------------
function SoftwareBadge({ software, name, className }) {
  const isShark = software === "Sharkey";
  // `name` is the real platform (e.g. GoToSocial, Pixelfed, Firefish) when it
  // differs from the admin-API dialect Vantage speaks to it through.
  const label = name && name.toLowerCase() !== String(software || "").toLowerCase() ? name : software;
  return (
    <span className={cx("sw-badge", isShark ? "sw-shark" : "sw-masto", className)} title={label !== software ? label + " \u2014 speaks the " + software + " admin API" : undefined}>
      <span className="sw-dot" />
      {label}
    </span>
  );
}

// ---- Tier / severity chip ----------------------------------------------
function TierChip({ tier, children, className }) {
  return <span className={cx("tier-chip", "t-" + tier, className)}>{children || TIER_LABEL[tier]}</span>;
}

// ---- Avatar (initial, hue-tinted) --------------------------------------
function Avatar({ name, hue = 230, size = 36, square, src }) {
  const [broken, setBroken] = useState(false);
  const initial = (name || "?").replace(/[^A-Za-z0-9\u00C0-\uFFFF]/g, "").slice(0, 2).toUpperCase() || "?";
  const radius = square ? Math.round(size * 0.28) : "50%";
  // A real profile image (from report OSINT) renders when available; broken/blocked
  // URLs fall back to the hue-tinted initial so the card never shows a dead image.
  if (src && !broken) {
    return (
      <img
        className="avatar avatar-img" src={src} alt="" loading="lazy" onError={() => setBroken(true)}
        style={{ width: size, height: size, borderRadius: radius, objectFit: "cover", display: "block" }}
      />
    );
  }
  return (
    <span
      className="avatar"
      style={{
        width: size, height: size, borderRadius: radius,
        background: `oklch(0.32 0.07 ${hue})`, color: `oklch(0.9 0.09 ${hue})`,
        fontSize: size * 0.38,
      }}
    >{initial}</span>
  );
}

// ---- Circular risk gauge -----------------------------------------------
function RiskGauge({ score, tier, size = 116, label = "Risk score" }) {
  const r = size / 2 - 9;
  const c = 2 * Math.PI * r;
  const off = c * (1 - score / 100);
  const color = `var(--${tier === "high" ? "bad" : tier === "medium" ? "warn" : "ok"})`;
  const band = tier === "high" ? "High (\u226566)" : tier === "medium" ? "Elevated (34\u201365)" : "Low (<34)";
  const tip = label + " " + score + "/100 \u2014 " + band + ".\nStarts at 5; each matched signal adds its weight (negative weights lower it). Bands: Low <34 \u00b7 Elevated 34\u201365 \u00b7 High \u226566. Tune weights in Scoring.";
  return (
    <div className="gauge" style={{ width: size }} title={tip}>
      <svg width={size} height={size} className="gauge-svg" role="img" aria-label={tip}>
        <circle cx={size / 2} cy={size / 2} r={r} className="gauge-track" strokeWidth="9" fill="none" />
        <circle cx={size / 2} cy={size / 2} r={r} stroke={color} strokeWidth="9" fill="none"
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
          transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dashoffset .6s cubic-bezier(.2,.7,.2,1)" }} />
      </svg>
      <div className="gauge-center">
        <span className="gauge-num" style={{ color }}>{score}</span>
        <span className="gauge-cap">{label}</span>
      </div>
    </div>
  );
}

// ---- Sparkline (line) ---------------------------------------------------
function Sparkline({ data, w = 220, h = 44, color = "var(--accent)", fill = true }) {
  const max = Math.max(1, ...data);
  const pts = data.map((v, i) => [ (i / (data.length - 1)) * w, h - (v / max) * (h - 6) - 3 ]);
  const line = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const area = line + ` L${w} ${h} L0 ${h} Z`;
  const gid = useMemo(() => "sg" + Math.random().toString(36).slice(2, 8), []);
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" className="spark">
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {fill && <path d={area} fill={`url(#${gid})`} />}
      <path d={line} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

// ---- Bar mini-chart -----------------------------------------------------
function BarChart({ data, h = 44, color = "var(--accent)" }) {
  const max = Math.max(1, ...data);
  return (
    <div className="barchart" style={{ height: h }}>
      {data.map((v, i) => (
        <span key={i} className="bar" style={{ height: Math.max(2, (v / max) * h) + "px", background: color, opacity: 0.45 + 0.55 * (v / max) }} />
      ))}
    </div>
  );
}

// ---- Signal weight bar (expandable to show evidence) -------------------
function SignalRow({ s }) {
  const [open, setOpen] = useState(false);
  const color = s.dir === "bad" ? "var(--bad)" : s.dir === "warn" ? "var(--warn)" : "var(--ok)";
  const hasDetail = !!(s.detail && (Array.isArray(s.detail) ? s.detail.length : true)) || !!s.source;
  return (
    <div className={cx("signal-wrap", open && "sw-open", hasDetail && "sw-has")}>
      <div className={cx("signal-row", hasDetail && "signal-click")} onClick={() => hasDetail && setOpen((o) => !o)}>
        <span className="signal-dot" style={{ background: color }} />
        <span className="signal-label">{s.label}</span>
        <span className="signal-track">
          <span className="signal-fill" style={{ width: Math.min(100, Math.abs(s.weight) * 2.6) + "%", background: color }} />
        </span>
        <span className="signal-w" style={{ color: s.weight ? color : "var(--txt-3)" }}>{s.weight > 0 ? "+" + s.weight : s.weight < 0 ? "\u2212" + Math.abs(s.weight) : "—"}</span>
        <span className="signal-chev">{hasDetail ? (open ? "▾" : "▸") : ""}</span>
      </div>
      {open && hasDetail && (
        <div className="signal-detail">
          {Array.isArray(s.detail)
            ? s.detail.map((d, i) => <div key={i} className="sd-line"><span className="sd-k">{d.k}</span><span className="sd-v mono">{d.v}</span></div>)
            : (s.detail ? <div className="sd-text">{s.detail}</div> : null)}
          <div className="sd-foot">
            {s.source && <span className="sd-source">source · {s.source}</span>}
            {typeof s.weight === "number" && <span className="sd-weight" style={{ color }}>{s.weight > 0 ? "+" + s.weight + " to score" : s.weight < 0 ? "\u2212" + Math.abs(s.weight) + " (reduces risk)" : "no score impact"}</span>}
          </div>
        </div>
      )}
    </div>
  );
}

// ---- Key/value metric row ----------------------------------------------
function KV({ k, v, mono, tone, title }) {
  return (
    <div className="kv" title={title}>
      <span className="kv-k">{k}</span>
      <span className={cx("kv-v", mono && "mono", tone && "tone-" + tone)}>{v}</span>
    </div>
  );
}

// ---- Verdict pill (proxy/vpn etc) --------------------------------------
function Flag({ on, label, invert }) {
  const bad = invert ? !on : on;
  return (
    <span className={cx("flag", bad ? "flag-bad" : "flag-ok")}>
      <span className="flag-i">{bad ? "!" : "✓"}</span>{label}
    </span>
  );
}

// ---- Section header inside inspector -----------------------------------
function Section({ title, sub, right, children, service }) {
  return (
    <section className="insp-sec">
      <header className="insp-sec-h">
        <div className="insp-sec-tt">
          <h4>{title}</h4>
          {sub && <span className="insp-sec-sub">{sub}</span>}
        </div>
        {service && <span className="src-tag">{service}</span>}
        {right}
      </header>
      {children}
    </section>
  );
}

// ---- Donut ratio (reply vs original) -----------------------------------
function RatioBar({ reply, original }) {
  return (
    <div className="ratio">
      <div className="ratio-bar">
        <span className="ratio-seg r-reply" style={{ width: reply * 100 + "%" }} />
        <span className="ratio-seg r-orig" style={{ width: original * 100 + "%" }} />
      </div>
      <div className="ratio-legend">
        <span><i className="dot r-reply" /> Replies {Math.round(reply * 100)}%</span>

}

// ---- External pivot links ----------------------------------------------
// Small "look this value up on the service's own page" links that open in a new
// tab. Lets a moderator jump from a Vantage result straight to the upstream
// source (VirusTotal, AbuseIPDB, Shodan…) to read the full detail / re-verify.
const PIVOT_DEFS = {
  ip: [
    { name: "AbuseIPDB", url: (v) => "https://www.abuseipdb.com/check/" + v },
    { name: "VirusTotal", url: (v) => "https://www.virustotal.com/gui/ip-address/" + v },
    { name: "Shodan", url: (v) => "https://www.shodan.io/host/" + v },
    { name: "GreyNoise", url: (v) => "https://viz.greynoise.io/ip/" + v },
    { name: "Spamhaus", url: (v) => "https://check.spamhaus.org/results/?query=" + v },
    { name: "IPinfo", url: (v) => "https://ipinfo.io/" + v },
  ],
  domain: [
    { name: "VirusTotal", url: (v) => "https://www.virustotal.com/gui/domain/" + v },
    { name: "RDAP", url: (v) => "https://rdap.org/domain/" + v },
    { name: "MXToolbox", url: (v) => "https://mxtoolbox.com/SuperTool.aspx?action=mx%3a" + v + "&run=toolpage" },
    { name: "urlscan", url: (v) => "https://urlscan.io/domain/" + v },
  ],
  email: [
    { name: "EmailRep", url: (v) => "https://emailrep.io/" + encodeURIComponent(v) },
    { name: "SFS", url: (v) => "https://www.stopforumspam.com/search?q=" + encodeURIComponent(v) },
  ],
  username: [
    { name: "GitHub", url: (v) => "https://github.com/" + encodeURIComponent(v) },
    { name: "SFS", url: (v) => "https://www.stopforumspam.com/search?q=" + encodeURIComponent(v) },
  ],
};
function PivotLinks({ type, value, only, exclude, label }) {
  if (!value) return null;
  let defs = PIVOT_DEFS[type] || [];
  if (only) defs = defs.filter((d) => only.indexOf(d.name) >= 0);
  if (exclude) defs = defs.filter((d) => exclude.indexOf(d.name) < 0);
  if (!defs.length) return null;
  return (
    <div className="pivots">
      <span className="pivots-l">{label || "look up"}</span>
      {defs.map((d) => (
        <a key={d.name} className="pivot" href={d.url(String(value).trim())} target="_blank" rel="noopener noreferrer"
          title={"Open " + value + " on " + d.name + " (new tab)"}>{d.name}<span className="pivot-ic">↗</span></a>
      ))}
    </div>
  );
}

<script type="text/babel">
// Vantage · design surface: VIEW — safe to restyle/recompose. Consume engines via window.Reef* (shapes in src/types.js); do not change scoring/data logic. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — custom React hooks extracted from the app shell
   Keeps cohesive, self-contained slices of App's state out of
   the main component. Loaded after ui.jsx (which exposes the
   React hooks as globals) and before app.jsx.
   ============================================================ */

// Live-data concern: derive the per-host read connections, fetch pending
// accounts + reports whenever the live inputs change, and own the resulting
// state. Returns the derived keys plus the state and its setters so the App
// shell can still apply optimistic updates (actions) and enrichment patches.
function useLiveData({ verified, liveMode, settings, fetchN, scopeAll, onFetchErrLog }) {
  // One verified connection PER HOST for READING the queues. Several keys/accounts
  // on the same server return the identical pending-signup + report lists, so pulling
  // with every one duplicated every row. Dedup to a single read connection per host
  // (prefer that host's default account). Writes/acting still use the full set via
  // connFor(), so a non-default key can still be the one that performs an action.
  const fetchConns = verified.filter((c) => {
    const peers = verified.filter((o) => o.host === c.host);
    return ((peers.find((o) => o.isDefault) || peers[0]).id === c.id);
  });

  const [liveAcc, setLiveAcc] = useState([]);
  const [liveRep, setLiveRep] = useState([]);
  const [loading, setLoading] = useState(false);
  const [fetchErrs, setFetchErrs] = useState([]);

  // fetch live data when in live mode / connections change
  const connKey = fetchConns.map((c) => c.id).join(",") + "|" + settings.mode + "|" + settings.proxy + "|" + JSON.stringify(fetchN) + "|" + JSON.stringify(scopeAll);
  useEffect(() => {
    if (!liveMode || verified.length === 0) { setLiveAcc([]); setLiveRep([]); setFetchErrs([]); return; }
    let cancelled = false;
    setLoading(true); setFetchErrs([]);
    window.__reefProxy = settings.proxy || "";
    (async () => {
      const accs = [], reps = [], errs = [];
      await Promise.all(fetchConns.map(async (c) => {
        try { accs.push(...await ReefAPI.fetchPendingAccounts(c, { limit: fetchN.accounts, all: scopeAll.accounts })); }
        catch (e) { errs.push({ host: c.host, what: "accounts", msg: e.message }); }
        try { reps.push(...await ReefAPI.fetchReports(c, { limit: fetchN.reports, all: scopeAll.reports })); }
        catch (e) { errs.push({ host: c.host, what: "reports", msg: e.message }); }
      }));
      if (cancelled) return;
      setLiveAcc(accs); setLiveRep(reps); setFetchErrs(errs); setLoading(false);
      if (window.ReefLog) window.ReefLog.info("fetch", "Pulled " + accs.length + " accounts · " + reps.length + " reports from " + fetchConns.length + " server(s)" + (errs.length ? " · " + errs.length + " issue(s)" : ""));
      errs.forEach((e) => { if (window.ReefLog) window.ReefLog.warn("fetch", e.host + " — " + e.what + ": " + e.msg); });
      if (errs.length && onFetchErrLog) onFetchErrLog(errs);
    })();
    return () => { cancelled = true; };
  }, [connKey]);

  return { fetchConns, connKey, liveAcc, setLiveAcc, liveRep, setLiveRep, loading, fetchErrs, setFetchErrs };
}
