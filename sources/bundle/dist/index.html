<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — Fediverse instance intelligence (ReefFedi)
   ------------------------------------------------------------
   Two fedi-specific, KEYLESS checks that pivot off the only
   thing a remote instance reliably exposes — its own public
   metadata endpoints — plus the software project's public
   release feed:

     1. softwareFreshness(software, reportedVersion)
        Looks up the LATEST published release of the instance's
        server software from the project's own repo (GitHub /
        GitLab / Forgejo release API) and compares it to the
        version the instance self-reports via nodeinfo. A server
        running far behind latest is an "unmanaged / abandoned"
        signal. (nodeinfo software/version is spoofable + often
        stale — see ModShark's note — so this is a SOFT signal,
        weighted accordingly.)

     2. registrationMode(host, software, nodeinfo)
        Determines whether sign-ups are OPEN and, crucially,
        whether they are MODERATED (approval / activation gate)
        or UNCHECKED. Open + unchecked registration is the
        classic mass-account-abuse signature. The approval flag
        is NOT in standard nodeinfo, so we read it from each
        software's own meta endpoint:
          • Mastodon/forks → GET /api/v2/instance
              registrations.{enabled, approval_required}
          • Misskey/Sharkey → POST /api/meta
              {disableRegistration, emailRequiredForSignup,
               approvalRequiredForSignup?}
          • Pleroma/Akkoma → nodeinfo metadata
              {accountActivationRequired, invitesEnabled}

   All keyless, browser-direct with proxy fallback, and
   cache-first (shares ReefCache). Everything degrades to null
   on any failure — a missing field is never a crash.
   ============================================================ */

(function () {
  "use strict";

  function log(level, msg, extra) { if (window.ReefLog && window.ReefLog[level]) window.ReefLog[level]("fedi", msg, extra); }
  const { withProxy } = window.ReefUtil;

  // direct → proxy-fallback JSON GET, hard 8s timeout (mirrors enrich.js policy)
  async function getJSON(url, headers, proxy) {
    async function one(u) {
      const ctrl = new AbortController();
      const tm = setTimeout(() => ctrl.abort(), 8000);
      try { const r = await fetch(u, { headers: headers || {}, mode: "cors", signal: ctrl.signal }); if (!r.ok) throw new Error("HTTP " + r.status); return await r.json(); }
      finally { clearTimeout(tm); }
    }
    try { return await one(url); }
    catch (e) { if (proxy) { try { return await one(withProxy(proxy, url)); } catch (e2) {} } throw e; }
  }
  // POST variant (Misskey/Sharkey meta is POST-only)
  async function postJSON(url, body, proxy) {
    async function one(u) {
      const ctrl = new AbortController();
      const tm = setTimeout(() => ctrl.abort(), 8000);
      try {
        const r = await fetch(u, { method: "POST", headers: { "Content-Type": "application/json", Accept: "application/json" }, body: JSON.stringify(body || {}), mode: "cors", signal: ctrl.signal });
        if (!r.ok) throw new Error("HTTP " + r.status); return await r.json();
      } finally { clearTimeout(tm); }
    }
    try { return await one(url); }
    catch (e) { if (proxy) { try { return await one(withProxy(proxy, url)); } catch (e2) {} } throw e; }
  }

  // ---- software → release-feed registry ------------------------------------
  // Maps the lowercased nodeinfo software.name to its public repo + host kind.
  // GitHub: api.github.com/repos/{path}/releases/latest → tag_name (CORS-ok, keyless,
  //   60 req/hr unauth — fine with the 7-day cache below).
  // GitLab: {base}/api/v4/projects/{urlencoded path}/releases?per_page=1 → [0].tag_name
  // Forgejo/Gitea: {base}/api/v1/repos/{path}/releases?limit=1 → [0].tag_name
  // CORS varies for self-hosted GitLab/Forgejo; failures degrade to null (proxy helps).
  const REGISTRY = {
    mastodon:    { kind: "github",  path: "mastodon/mastodon",            project: "Mastodon" },
    hometown:    { kind: "github",  path: "hometown-fork/hometown",       project: "Hometown" },
    "glitchcafe":{ kind: "github",  path: "glitch-soc/mastodon",          project: "glitch-soc" },
    misskey:     { kind: "github",  path: "misskey-dev/misskey",          project: "Misskey" },
    sharkey:     { kind: "gitlab",  base: "https://activitypub.software", path: "TransFem-org/Sharkey", project: "Sharkey" },
    iceshrimp:   { kind: "forgejo", base: "https://iceshrimp.dev",        path: "iceshrimp/iceshrimp", project: "Iceshrimp" },
    firefish:    { kind: "forgejo", base: "https://firefish.dev",         path: "firefish/firefish",   project: "Firefish" },
    akkoma:      { kind: "forgejo", base: "https://akkoma.dev",           path: "AkkomaGang/akkoma",   project: "Akkoma" },
    pleroma:     { kind: "gitlab",  base: "https://git.pleroma.social",   path: "pleroma/pleroma",     project: "Pleroma" },
    pixelfed:    { kind: "github",  path: "pixelfed/pixelfed",            project: "Pixelfed" },
    lemmy:       { kind: "github",  path: "LemmyNet/lemmy",               project: "Lemmy" },
    gotosocial:  { kind: "github",  path: "superseriousbusiness/gotosocial", project: "GoToSocial" },
    peertube:    { kind: "github",  path: "Chocobozzz/PeerTube",          project: "PeerTube" },
    bookwyrm:    { kind: "github",  path: "bookwyrm-social/bookwyrm",     project: "BookWyrm" },
    friendica:   { kind: "github",  path: "friendica/friendica",          project: "Friendica" },
  };

  function normSoftware(name) { return String(name || "").trim().toLowerCase(); }

  // Parse a version string into a numeric component array, ignoring a leading
  // "v" and any pre-release / build suffix after the first non [digit.] run.
  // "4.2.10" → [4,2,10]; "2024.9.0-rc.3" → [2024,9,0]; "v13.0.0-beta" → [13,0,0].
  function parseVer(v) {
    const m = String(v || "").replace(/^v/i, "").match(/^\d+(?:\.\d+)*/);
    if (!m) return null;
    return m[0].split(".").map((n) => parseInt(n, 10)).filter((n) => !isNaN(n));
  }
  // Compare two component arrays. Returns >0 if a>b, <0 if a<b, 0 if equal-ish.
  function cmpVer(a, b) {
    if (!a || !b) return 0;
    const n = Math.max(a.length, b.length);
    for (let i = 0; i < n; i++) { const x = a[i] || 0, y = b[i] || 0; if (x !== y) return x - y; }
    return 0;
  }

  async function fetchLatestTag(entry, proxy) {
    if (entry.kind === "github") {
      const j = await getJSON("https://api.github.com/repos/" + entry.path + "/releases/latest", { Accept: "application/vnd.github+json" }, proxy);
      return j && j.tag_name ? String(j.tag_name) : null;
    }
    if (entry.kind === "gitlab") {
      // releases first; fall back to repo tags (some projects tag without GitLab Releases)
      try { const j = await getJSON(entry.base + "/api/v4/projects/" + encodeURIComponent(entry.path) + "/releases?per_page=1", { Accept: "application/json" }, proxy); if (Array.isArray(j) && j[0] && j[0].tag_name) return String(j[0].tag_name); } catch (e) {}
      const t = await getJSON(entry.base + "/api/v4/projects/" + encodeURIComponent(entry.path) + "/repository/tags?per_page=1", { Accept: "application/json" }, proxy);
      return Array.isArray(t) && t[0] && t[0].name ? String(t[0].name) : null;
    }
    if (entry.kind === "forgejo") {
      try { const j = await getJSON(entry.base + "/api/v1/repos/" + entry.path + "/releases?limit=1", { Accept: "application/json" }, proxy); if (Array.isArray(j) && j[0] && j[0].tag_name) return String(j[0].tag_name); } catch (e) {}
      const t = await getJSON(entry.base + "/api/v1/repos/" + entry.path + "/tags?limit=1", { Accept: "application/json" }, proxy);
      return Array.isArray(t) && t[0] && t[0].name ? String(t[0].name) : null;
    }
    return null;
  }

  // GitHub-hosted software works browser-direct; self-hosted GitLab/Forgejo
  // (Sharkey, Pleroma, Akkoma, Firefish, Iceshrimp) usually block CORS and need
  // the proxy. Lets the UI show "needs proxy" instead of a bare "no data".
  function directOK(software) { const e = REGISTRY[normSoftware(software)]; return !!e && e.kind === "github"; }
  function isKnown(software) { return !!REGISTRY[normSoftware(software)]; }

  // latestVersion(software) → { project, raw, parts } | null  (cache-first, ~7d)
  async function latestVersion(software, opts) {
    opts = opts || {};
    const proxy = opts.proxy || "";
    const key = normSoftware(software);
    const entry = REGISTRY[key];
    if (!entry) return null;
    const C = window.ReefCache;
    const run = async () => {
      const raw = await fetchLatestTag(entry, proxy);
      if (!raw) throw new Error("no release tag");
      return { project: entry.project, raw: raw.replace(/^v/i, ""), parts: parseVer(raw) };
    };
    try {
      if (C && C.through) { const r = await C.through("swver", key, () => run().catch((e) => ({ _err: e.message })), { force: !!opts.force, ttlDays: 7 }); return r.value && !r.value._err ? r.value : null; }
      return await run();
    } catch (e) { log("debug", "latestVersion failed for " + key, e && e.message); return null; }
  }

  // softwareFreshness(software, reportedVersion) →
  //   { software, latest, reported, behind, status, project } | null
  //   status: "current" | "behind" | "ahead" | "unknown"
  //   behind: integer count on the first differing version component (rough age proxy)
  async function softwareFreshness(software, reportedVersion, opts) {
    opts = opts || {};
    const observer = opts.observer || null;
    let latest = await latestVersion(software, opts);
    let latestSource = latest && latest.parts ? "repo" : "";
    // Fall back to Fediverse Observer's tracked latest (masterversion) when the
    // project's own release feed is unreachable — the CORS-blocked GitLab/Forgejo
    // forks (Sharkey, Pleroma, Akkoma, Firefish, Iceshrimp). Observer can't always
    // resolve those either (junk like "e.r.r"), so observer.latestParts is pre-validated.
    if ((!latest || !latest.parts) && observer && observer.latestParts) {
      latest = { project: (latest && latest.project) || observerProject(observer.software), raw: observer.latest, parts: observer.latestParts };
      latestSource = "observer";
    }
    const rep = parseVer(reportedVersion);
    // Independent-observation mismatch: the version the instance self-reports via
    // nodeinfo disagrees with what Observer actually crawled. Could be a spoof OR
    // just Observer lag (\u226424h) / a fresh upgrade \u2014 so it's a SOFT corroboration flag.
    const mismatch = !!(observer && observer.runningParts && rep && cmpVer(rep, observer.runningParts) !== 0);
    if (!latest || !latest.parts) {
      // No "latest" from either source. Still surface an independent-observation
      // record when Observer saw a running version (enables the mismatch signal).
      if (observer && (observer.running || mismatch)) {
        return { software: normSoftware(software), project: observerProject(observer.software), latest: "", reported: reportedVersion || "", observed: observer.running || "", status: "unknown", source: latestSource, mismatch };
      }
      return null;
    }
    const out = { software: normSoftware(software), project: latest.project, latest: latest.raw, reported: reportedVersion || "", behind: 0, status: "unknown", source: latestSource, mismatch };
    if (observer && observer.running) out.observed = observer.running;
    if (!rep) return out;
    const c = cmpVer(rep, latest.parts);
    if (c >= 0) { out.status = c === 0 ? "current" : "ahead"; return out; }
    out.status = "behind";
    // rough "how far behind" on the most-significant differing component
    const n = Math.max(rep.length, latest.parts.length);
    for (let i = 0; i < n; i++) { const x = latest.parts[i] || 0, y = rep[i] || 0; if (x !== y) { out.behind = x - y; out.behindLevel = i === 0 ? "major" : i === 1 ? "minor" : "patch"; break; } }
    return out;
  }

  // ---- Fediverse Observer — independent software / version / liveness source ----
  // api.fediverse.observer (GraphQL, keyless, CORS-open). An INDEPENDENT crawler:
  // unlike self-reported nodeinfo it reports the version Observer actually saw
  // (corroborates spoofable self-reports), the latest version it tracks per
  // software (masterversion — fills the gap when a project's own release feed is
  // CORS-blocked), live up/down + all-time uptime, and activity counts. Shape:
  //   POST { query: '{ node(domain:"…"){…} }' } → { data: { node: [ {…} ] } }
  // Unknown domain → empty array → null. Degrades to null on any failure. NOTE:
  // Observer often can't read active-user / local-post counts from Misskey/Sharkey
  // nodeinfo (returns 0), so DON'T derive ghost-instance flags from it — use it for
  // version + liveness, where it's authoritative.
  const OBSERVER_EP = "https://api.fediverse.observer/";
  function observerProject(sw) { const e = REGISTRY[normSoftware(sw)]; return (e && e.project) || (sw ? String(sw).charAt(0).toUpperCase() + String(sw).slice(1) : ""); }
  function normObserver(n) {
    if (!n) return null;
    const running = String(n.shortversion || n.fullversion || "").trim();
    const latestRaw = String(n.masterversion || "").trim();
    const latestParts = parseVer(latestRaw);          // null/empty when Observer couldn't resolve latest (e.g. "e.r.r")
    const latestValid = !!(latestParts && latestParts.length);
    const int = (v) => { const x = parseInt(v, 10); return isNaN(x) ? null : x; };
    const flo = (v) => { const x = parseFloat(v); return isNaN(x) ? null : x; };
    return {
      domain: n.domain || "",
      software: normSoftware(n.softwarename),
      running: running, runningParts: parseVer(running),
      latest: latestValid ? latestRaw.replace(/^v/i, "") : null,
      latestParts: latestValid ? latestParts : null,
      signup: typeof n.signup === "boolean" ? n.signup : null,
      up: n.status === 1 || n.status === "1",
      score: int(n.score),
      uptime: flo(n.uptime_alltime),
      totalUsers: int(n.total_users),
      activeMonth: int(n.active_users_monthly),
      activeHalfyear: int(n.active_users_halfyear),
      localPosts: int(n.local_posts),
      lastChecked: n.date_laststats || "",
      country: n.countryname && n.countryname !== "Private" ? n.countryname : "",
      owner: n.owner && n.owner !== "unknown" ? n.owner : "",
    };
  }
  async function observerFetch(host, proxy) {
    const q = '{ node(domain:' + JSON.stringify(host) + ') { domain softwarename shortversion fullversion masterversion signup status score uptime_alltime total_users active_users_monthly active_users_halfyear local_posts date_laststats countryname owner } }';
    const j = await postJSON(OBSERVER_EP, { query: q }, proxy);
    if (j && j.errors && j.errors.length) throw new Error((j.errors[0] && j.errors[0].message) || "observer error");
    const arr = j && j.data && j.data.node;
    if (!Array.isArray(arr)) throw new Error("observer: bad response");
    return arr.length ? normObserver(arr[0]) : null;   // empty array → unknown domain
  }
  // observerNode(host) → normalized node | null. Uncached (runReport wraps it in
  // its own cache layer, like nodeinfo/regmode); never throws.
  async function observerNode(host, opts) {
    opts = opts || {};
    if (!host) return null;
    try { return await observerFetch(host, opts.proxy || ""); }
    catch (e) { log("debug", "observerNode failed for " + host, e && e.message); return null; }
  }

  // ---- registration moderation posture -------------------------------------
  // mode: "open-unmoderated" | "open-moderated" | "closed" | "invite" | "unknown"
  async function registrationMode(host, software, ni, opts) {
    opts = opts || {};
    const proxy = opts.proxy || "";
    const sw = normSoftware(software);
    const out = { host, software: sw, open: null, approvalRequired: null, emailRequired: null, invitesOnly: null, mode: "unknown", source: "" };
    if (!host) return out;
    const decide = () => {
      if (out.open === false) { out.mode = out.invitesOnly ? "invite" : "closed"; return; }
      if (out.open === true) { out.mode = (out.approvalRequired || out.emailRequired) ? "open-moderated" : "open-unmoderated"; return; }
      out.mode = "unknown";
    };

    try {
      if (sw === "mastodon" || sw === "hometown" || sw === "glitchcafe" || sw === "gotosocial" || sw === "iceshrimp" || sw === "firefish") {
        // Mastodon-API family — /api/v2/instance carries the registration block
        try {
          const j = await getJSON("https://" + host + "/api/v2/instance", { Accept: "application/json" }, proxy);
          if (j && j.registrations) {
            out.open = typeof j.registrations.enabled === "boolean" ? j.registrations.enabled : null;
            out.approvalRequired = typeof j.registrations.approval_required === "boolean" ? j.registrations.approval_required : null;
            out.source = "/api/v2/instance";
          }
        } catch (e) {
          // older servers only have v1
          const j1 = await getJSON("https://" + host + "/api/v1/instance", { Accept: "application/json" }, proxy);
          if (j1) { out.open = typeof j1.registrations === "boolean" ? j1.registrations : null; out.approvalRequired = typeof j1.approval_required === "boolean" ? j1.approval_required : null; out.source = "/api/v1/instance"; }
        }
      } else if (sw === "misskey" || sw === "sharkey" || sw === "cherrypick" || sw === "foundkey") {
        // Misskey/Sharkey — POST /api/meta (public, no auth)
        const j = await postJSON("https://" + host + "/api/meta", { detail: false }, proxy);
        if (j) {
          if (typeof j.disableRegistration === "boolean") out.open = !j.disableRegistration;
          if (typeof j.emailRequiredForSignup === "boolean") out.emailRequired = j.emailRequiredForSignup;
          if (typeof j.approvalRequiredForSignup === "boolean") out.approvalRequired = j.approvalRequiredForSignup; // Sharkey + newer Misskey
          out.source = "/api/meta";
        }
      } else if (sw === "pleroma" || sw === "akkoma") {
        // Pleroma/Akkoma — flags live in nodeinfo metadata (already fetched upstream)
        const md = ni && ni.metadata;
        if (md) {
          if (typeof md.accountActivationRequired === "boolean") out.emailRequired = md.accountActivationRequired;
          if (typeof md.invitesEnabled === "boolean") out.invitesOnly = md.invitesEnabled;
          out.source = "nodeinfo.metadata";
        }
        if (out.open == null && ni && typeof ni.openRegistration === "boolean") out.open = ni.openRegistration;
      }
    } catch (e) { log("debug", "registrationMode lookup failed for " + host, e && e.message); }

    // fall back to the standard nodeinfo openRegistrations boolean for "open"
    if (out.open == null && ni && typeof ni.openRegistration === "boolean") out.open = ni.openRegistration;
    decide();
    return out;
  }

  window.ReefFedi = { latestVersion, softwareFreshness, registrationMode, observerNode, REGISTRY, parseVer, cmpVer, directOK, isKnown };
})();

<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — OSINT enrichment engine (real lookups)
   No-key, CORS-friendly sources run browser-direct:
     • Team Cymru IP→ASN over DoH (dns.google)   — ASN, org, country
     • Reverse DNS (PTR) over DoH                  — datacenter / tor hints
     • DNSBL over DoH (DroneBL, blocklist.de…)     — IP blocklisting
     • RDAP (rdap.org)                             — domain age + registrar
     • DoH MX                                      — mail deliverability
     • kickbox open                                — disposable email
     • GitHub API                                  — username existence
   Key-based sources (AbuseIPDB, VirusTotal, IPQualityScore, HIBP,
   and EmailRep with its optional key) have two transports:
     • hosted-server mode — the same-origin /api/osint gateway;
       the server resolves the vaulted key (yours, or one your
       instance admin shared) and injects it server-side. The
       browser never holds a key and needs no CORS proxy.
     • standalone — key from localStorage through the optional
       CORS proxy, exactly as before.
   Plain JS. Exposes window.ReefEnrich.
   ============================================================ */
(function () {
  const cache = new Map();
  const { withProxy } = window.ReefUtil;

  // Hosted-server transport (hosted-design §10 phase 3). In server mode the
  // `key` arguments below are truthy sentinels ("vault:xxxx") that only gate
  // WHETHER a lookup fires — the real key never reaches the browser.
  const hosted = () => !!(window.ReefServer && window.ReefServer.mode === "server");
  function gw(path, opts) {
    opts = opts || {};
    const init = { method: opts.method || "GET", credentials: "same-origin", headers: { Accept: "application/json" } };
    if (init.method !== "GET") {
      init.headers["X-Vantage-CSRF"] = (window.ReefServer && window.ReefServer.csrf) || "";
      if (opts.body) { init.headers["Content-Type"] = "application/json"; init.body = JSON.stringify(opts.body); }
    }
    return fetch("/api/osint" + path, init);
  }

  const DC_WORDS = ["host", "hosting", "cloud", "server", "vps", "dedi", "datacenter", "data-center", "colo", "ovh", "hetzner", "digitalocean", "amazon", "aws", "google", "azure", "linode", "vultr", "m247", "leaseweb", "choopa", "contabo", "scaleway", "oracle", "quintex", "worldstream", "frantech", "ifog"];
  const TOR_WORDS = ["tor-exit", "torexit", "tor.exit", "exit-tor", "tor-node", "torrelay", "tor-relay"];
  const DNSBL_ZONES = [
    { zone: "dnsbl.dronebl.org", name: "DroneBL" },
    { zone: "bl.blocklist.de", name: "blocklist.de" },
    { zone: "all.s5h.net", name: "s5h" },
  ];

  async function doh(name, type) {
    const r = await fetch(`https://dns.google/resolve?name=${encodeURIComponent(name)}&type=${type}`);
    if (!r.ok) throw new Error("doh " + r.status);
    return r.json();
  }
  function rev4(ip) { return ip.split(".").reverse().join("."); }
  function isIPv4(ip) { return /^\d{1,3}(\.\d{1,3}){3}$/.test(ip || ""); }
  function txt(ans) { return (ans || []).map((a) => (a.data || "").replace(/^"|"$/g, "").replace(/\\"/g, '"')); }

  // ---- IP / network ----
  async function ipNetwork(ip) {
    const net = { ip, asn: "", asnOrg: "", country: "", prefix: "", rdns: "", datacenter: false, tor: false };
    if (!isIPv4(ip)) { net.note = "No IPv4 to analyze"; return net; }
    const rev = rev4(ip);
    // Cymru origin ASN
    try {
      const j = await doh(`${rev}.origin.asn.cymru.com`, "TXT");
      const line = txt(j.Answer)[0]; // "15169 | 8.8.8.0/24 | US | arin | ..."
      if (line) { const p = line.split("|").map((s) => s.trim()); net.asn = "AS" + p[0]; net.prefix = p[1]; net.country = p[2]; }
    } catch (e) {}
    // Cymru AS name
    if (net.asn) {
      try {
        const j = await doh(`${net.asn}.asn.cymru.com`, "TXT");
        const line = txt(j.Answer)[0]; // "15169 | US | arin | .. | GOOGLE, US"
        if (line) net.asnOrg = line.split("|").map((s) => s.trim()).pop();
      } catch (e) {}
    }
    // PTR
    try {
      const j = await doh(`${rev}.in-addr.arpa`, "PTR");
      net.rdns = (txt(j.Answer)[0] || "").replace(/\.$/, "");
    } catch (e) {}
    const hay = (net.asnOrg + " " + net.rdns).toLowerCase();
    net.datacenter = DC_WORDS.some((w) => hay.includes(w));
    net.tor = TOR_WORDS.some((w) => hay.includes(w));
    return net;
  }

  async function dnsbl(ip) {
    if (!isIPv4(ip)) return { listed: [], count: 0 };
    const rev = rev4(ip);
    const listed = [];
    await Promise.all(DNSBL_ZONES.map(async (z) => {
      try { const j = await doh(`${rev}.${z.zone}`, "A"); if (j.Status === 0 && j.Answer && j.Answer.length) listed.push(z.name); }
      catch (e) {}
    }));
    return { listed, count: listed.length };
  }

  // ---- email / domain ----
  // Registrable base of a host. Small MX-host-focused 2-level-TLD list (good enough
  // for the handful of country-code suffixes that show up in mail-server hostnames).
  const TWO_LEVEL_TLD = ["co.uk", "org.uk", "gov.uk", "ac.uk", "co.jp", "ne.jp", "co.nz", "co.za", "com.au", "net.au", "org.au", "com.br", "com.cn", "com.mx", "co.in", "co.kr"];
  function baseDomain(host) {
    const h = String(host || "").toLowerCase().replace(/\.$/, "").replace(/^.*@/, "");
    const parts = h.split(".").filter(Boolean);
    if (parts.length <= 2) return h;
    const last2 = parts.slice(-2).join(".");
    if (TWO_LEVEL_TLD.indexOf(last2) >= 0) return parts.slice(-3).join(".");
    return last2;
  }
  // Map an MX exchange host to a recognizable mail provider / service.
  const MAIL_PROVIDERS = [
    { re: /\.l\.google\.com$|(^|\.)(aspmx|googlemail)\.(com|l\.google\.com)$|aspmx.*\.google|gmr-smtp|(^|\.)google\.com$/i, name: "Google Workspace / Gmail" },
    { re: /(outlook|office365|microsoft|hotmail)\.com$|protection\.outlook\.com$|mail\.protection\.outlook/i, name: "Microsoft 365 / Outlook" },
    { re: /(protonmail|proton)\.(ch|me)$|protonmail/i, name: "Proton Mail" },
    { re: /(icloud|mac|apple)\.com$|mail\.icloud/i, name: "Apple iCloud Mail" },
    { re: /yahoodns\.net$|(yahoo|ymail|rocketmail|aol)\.com$/i, name: "Yahoo / AOL" },
    { re: /zoho(mail)?\.(com|eu)$/i, name: "Zoho Mail" },
    { re: /(messagingengine|fastmail)\.com$/i, name: "Fastmail" },
    { re: /yandex\.(net|ru|com)$/i, name: "Yandex Mail" },
    { re: /(gmx|web\.de|1and1|ionos|kundenserver)\b/i, name: "GMX / IONOS" },
    { re: /pphosted\.com$|proofpoint/i, name: "Proofpoint (gateway)" },
    { re: /mimecast/i, name: "Mimecast (gateway)" },
    { re: /barracuda/i, name: "Barracuda (gateway)" },
    { re: /(improvmx|forwardemail|migadu|mxroute|purelymail|tutanota|tuta)\b/i, name: "Indie / forwarding host" },
    { re: /(mailgun|sendgrid|mandrillapp|amazonses|sparkpostmail|postmarkapp)/i, name: "Transactional ESP" },
    { re: /(secureserver\.net|registrar-servers\.com|namecheap|name\.com)/i, name: "Registrar mail" },
  ];
  function mailProviderOf(host) {
    const h = String(host || "").toLowerCase();
    const hit = MAIL_PROVIDERS.find((p) => p.re.test(h));
    return hit ? hit.name : "";
  }

  async function domainInfo(domain) {
    const out = { domain, disposable: null, hasMX: null, mx: [], mxHosts: [], mxBase: [], mxProviders: [], domainAgeDays: null, registrar: "", created: "" };
    if (!domain) return out;
    await Promise.all([
      (async () => { try { const r = await fetch(`https://open.kickbox.com/v1/disposable/${domain}`); const j = await r.json(); out.disposable = !!j.disposable; } catch (e) {} })(),
      (async () => {
        try {
          const j = await doh(domain, "MX");
          const ans = (j.Answer || []).filter((a) => a.type === 15 && a.data);
          out.hasMX = ans.length > 0;
          out.mx = ans.map((a) => {
            const m = String(a.data).trim().replace(/\.$/, "").split(/\s+/);
            const priority = m.length > 1 ? parseInt(m[0], 10) : null;
            const host = (m.length > 1 ? m[1] : m[0]).toLowerCase().replace(/\.$/, "");
            return { priority: (priority == null || isNaN(priority)) ? null : priority, host };
          }).filter((x) => x.host).sort((a, b) => (a.priority == null ? 999 : a.priority) - (b.priority == null ? 999 : b.priority));
          out.mxHosts = out.mx.map((x) => x.host);
          out.mxBase = out.mxHosts.map(baseDomain).filter((d, i, arr) => arr.indexOf(d) === i);
          out.mxProviders = out.mxHosts.map(mailProviderOf).filter(Boolean).filter((d, i, arr) => arr.indexOf(d) === i);
        } catch (e) {}
      })(),
      (async () => {
        try {
          const r = await fetch(`https://rdap.org/domain/${domain}`);
          if (!r.ok) return;
          const j = await r.json();
          const reg = (j.events || []).find((e) => e.eventAction === "registration");
          if (reg) { out.created = reg.eventDate; out.domainAgeDays = Math.floor((Date.now() - new Date(reg.eventDate)) / 86400000); }
          const ent = (j.entities || []).find((e) => (e.roles || []).includes("registrar"));
          if (ent && ent.vcardArray) { const fn = ent.vcardArray[1].find((x) => x[0] === "fn"); out.registrar = fn ? fn[3] : ""; }
        } catch (e) {}
      })(),
    ]);
    return out;
  }

  // ---- identity ----
  async function github(username) {
    if (!username) return "unknown";
    try { const r = await fetch(`https://api.github.com/users/${encodeURIComponent(username)}`); return r.status === 200 ? "exists" : r.status === 404 ? "none" : "unknown"; }
    catch (e) { return "unknown"; }
  }

  // ---- keyed sources (hosted gateway / proxy) ----
  async function abuseipdb(ip, key, proxy) {
    if (!key || !isIPv4(ip)) return null;
    const r = hosted()
      ? await gw(`/abuseipdb/check?ip=${encodeURIComponent(ip)}`)
      : await fetch(withProxy(proxy, `https://api.abuseipdb.com/api/v2/check?ipAddress=${ip}&maxAgeInDays=90`), { headers: { Key: key, Accept: "application/json" } });
    // AbuseIPDB is the one source that reports remaining quota in response headers
    // (when the proxy forwards them) — capture it; always tally the local call.
    if (window.ReefUsage) {
      window.ReefUsage.tally("abuseipdb");
      const rem = r.headers.get("X-RateLimit-Remaining"), lim = r.headers.get("X-RateLimit-Limit"), rst = r.headers.get("X-RateLimit-Reset");
      if (rem != null || lim != null) window.ReefUsage.setServer("abuseipdb", { remaining: rem, limit: lim, reset: rst });
    }
    if (!r.ok) throw new Error("AbuseIPDB " + r.status);
    const d = (await r.json()).data || {};
    return { score: d.abuseConfidenceScore, reports: d.totalReports, lastReported: d.lastReportedAt ? d.lastReportedAt.slice(0, 10) : null, usage: d.usageType || "—", whitelisted: !!d.isWhitelisted, tor: !!d.isTor };
  }
  async function virustotal(domain, key, proxy) {
    if (!key || !domain) return null;
    const r = hosted()
      ? await gw(`/virustotal/domain?domain=${encodeURIComponent(domain)}`)
      : await fetch(withProxy(proxy, `https://www.virustotal.com/api/v3/domains/${domain}`), { headers: { "x-apikey": key } });
    if (window.ReefUsage) window.ReefUsage.tally("virustotal");
    if (!r.ok) throw new Error("VirusTotal " + r.status);
    const a = ((await r.json()).data || {}).attributes || {};
    const s = a.last_analysis_stats || {};
    return { malicious: s.malicious || 0, suspicious: s.suspicious || 0, registrar: a.registrar || "", created: a.creation_date ? new Date(a.creation_date * 1000).getUTCFullYear() : "" };
  }
  async function ipqs(ip, key, proxy) {
    if (!key || !isIPv4(ip)) return null;
    const r = hosted()
      ? await gw(`/ipqs/ip?ip=${encodeURIComponent(ip)}`)
      : await fetch(withProxy(proxy, `https://ipqualityscore.com/api/json/ip/${key}/${ip}`));
    if (window.ReefUsage) window.ReefUsage.tally("ipqs");
    if (!r.ok) throw new Error("IPQS " + r.status);
    const d = await r.json();
    return { fraud: d.fraud_score, proxy: !!d.proxy, vpn: !!d.vpn, tor: !!d.tor, recentAbuse: !!d.recent_abuse, bot: !!d.bot_status };
  }
  // IPQS also validates EMAIL (same key as the IP service)
  async function ipqsEmail(email, key, proxy) {
    if (!key || !email || !email.includes("@")) return null;
    const r = hosted()
      ? await gw(`/ipqs/email?email=${encodeURIComponent(email)}`)
      : await fetch(withProxy(proxy, `https://ipqualityscore.com/api/json/email/${key}/${encodeURIComponent(email)}`));
    if (window.ReefUsage) window.ReefUsage.tally("ipqs");
    if (!r.ok) throw new Error("IPQS email " + r.status);
    const d = await r.json();
    return {
      valid: !!d.valid, disposable: !!d.disposable, deliverability: d.deliverability || "",
      fraud: d.fraud_score, recentAbuse: !!d.recent_abuse, leaked: !!d.leaked,
      honeypot: !!d.honeypot, suspect: !!d.suspect, dnsValid: !!d.dns_valid,
      firstSeen: (d.first_seen && (d.first_seen.human || d.first_seen)) || "",
    };
  }
  // EmailRep.io — email / persona reputation (social profiles, breach + leak history,
  // blacklists, deliverability, domain age). A key is OPTIONAL (raises rate limits;
  // request a free one at emailrep.io/free), but the address itself works keyless at a
  // low limit. CORS-blocked in the browser, so it runs through the proxy like the other
  // keyed sources; the browser supplies its own User-Agent (EmailRep requires one).
  // 401 = bad key, 429 = rate-limited (degrade gracefully, don't pretend).
  async function emailrep(email, key, proxy) {
    if (!email || !email.includes("@")) return null;
    const headers = { Accept: "application/json" };
    if (key) headers.Key = key;
    const r = hosted()
      ? await gw(`/emailrep/query?email=${encodeURIComponent(email.trim())}`)
      : await fetch(withProxy(proxy, `https://emailrep.io/${encodeURIComponent(email.trim())}`), { headers });
    if (window.ReefUsage) window.ReefUsage.tally("emailrep");
    if (r.status === 401) throw new Error("EmailRep 401 \u2014 invalid API key");
    if (r.status === 429) throw new Error("EmailRep 429 \u2014 rate limit (add a key in Services \u2192 EmailRep for higher limits)");
    if (!r.ok) throw new Error("EmailRep " + r.status);
    const d = await r.json();
    const det = d.details || {};
    return {
      reputation: d.reputation || "none",          // none | low | medium | high
      suspicious: !!d.suspicious,
      references: d.references || 0,
      blacklisted: !!det.blacklisted,
      maliciousActivity: !!det.malicious_activity,
      maliciousRecent: !!det.malicious_activity_recent,
      credentialsLeaked: !!det.credentials_leaked,
      dataBreach: !!det.data_breach,
      spam: !!det.spam,
      disposable: !!det.disposable,
      freeProvider: !!det.free_provider,
      deliverable: det.deliverable !== false,
      domainReputation: det.domain_reputation || "",
      daysSinceDomainCreation: det.days_since_domain_creation != null ? det.days_since_domain_creation : null,
      suspiciousTld: !!det.suspicious_tld,
      profiles: Array.isArray(det.profiles) ? det.profiles : [],
      firstSeen: det.first_seen || "", lastSeen: det.last_seen || "",
    };
  }
  // Have I Been Pwned — breach search (v3). PAID key REQUIRED (hibp-api-key header); HIBP
  // has no free search endpoint, so we skip silently when no key is set. CORS-blocked \u2192
  // needs the proxy. 404 is the EXPECTED "no breaches" result (not an error); 200 returns
  // the breach array; 401 = bad key; 429 = rate-limited.
  async function hibp(email, key, proxy) {
    if (!key) return null;                       // keyed-only: no free tier exists
    if (!email || !email.includes("@")) return null;
    const url = `https://haveibeenpwned.com/api/v3/breachedaccount/${encodeURIComponent(email.trim())}?truncateResponse=false`;
    const r = hosted()
      ? await gw(`/hibp/breachedaccount?email=${encodeURIComponent(email.trim())}`)
      : await fetch(withProxy(proxy, url), { headers: { "hibp-api-key": key, Accept: "application/json" } });
    if (window.ReefUsage) window.ReefUsage.tally("hibp");
    if (r.status === 404) return { breaches: 0, list: [], names: [], newest: 0, recent: false };
    if (r.status === 401) throw new Error("HIBP 401 \u2014 invalid API key");
    if (r.status === 429) throw new Error("HIBP 429 \u2014 rate limit (retry shortly)");
    if (!r.ok) throw new Error("HIBP " + r.status);
    const arr = await r.json();
    const list = Array.isArray(arr) ? arr : [];
    const years = list.map((b) => parseInt(String(b.BreachDate || "").slice(0, 4), 10)).filter((y) => y > 0);
    const newest = years.length ? Math.max(...years) : 0;
    return {
      breaches: list.length,
      names: list.map((b) => b.Name).filter(Boolean),
      list: list.map((b) => b.Title || b.Name).filter(Boolean),
      newest,
      recent: newest >= (new Date().getFullYear() - 1),
    };
  }

  // ---- StopForumSpam — community spammer registry (keyless query API) ----
  // Multi-field GET to api.stopforumspam.org: one query can carry ip + email +
  // username and returns per-field {appears, frequency, lastseen, confidence,
  // blacklisted (freq 255), torexit, asn, country}. We prefer JSONP (the API
  // supports it natively) so it works browser-direct with NO proxy and NO CORS
  // grief; falls back to a plain JSON fetch (through the proxy) if JSONP fails.

  // ============================================================
  // REPORT-MODE enrichment — given an abuse report (target handle +
  // host + cited posts) instead of a signup, mine the pivots we DO
  // have. All keyless + browser-direct + cache-first (shares the
  // `ip` / `domain` cache namespaces with account enrichment, so a
  // host/domain already looked up for a signup is reused for free).
  //   • origin instance: nodeinfo (software/users/registration),
  //     RDAP domain age, hosting ASN + reverse DNS + DNSBL
  //   • reported actor: WebFinger → ActivityPub actor (real avatar,
  //     account age, follower/following/post counts, profile fields)
  //   • cited links: reputation-check the destination domains
  //   • internal correlation: have we reviewed this actor / instance
  //     / linked-domain before?
  // NOTE: IP / email / Spur / AbuseIPDB etc. do NOT apply here — a
  // report hands us no IP or email, only public federation handles.
  // ============================================================
  function stripTags(s) { return (s || "").replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim(); }

  // keyless federation reads go direct; if CORS-blocked and a proxy is
  // configured, retry through it (matches the account-side fallback policy).
  // Hard 8s timeout per request so a dead/slow instance degrades to "unavailable"
  // instead of leaving the intelligence panel spinning forever.
  async function fetchJSON(url, headers, proxy) {
    async function one(u) {
      const ctrl = new AbortController();
      const tm = setTimeout(() => ctrl.abort(), 8000);
      try { const r = await fetch(u, { headers: headers || {}, mode: "cors", signal: ctrl.signal }); if (r.ok) return await r.json(); throw new Error("HTTP " + r.status); }
      finally { clearTimeout(tm); }
    }
    try { return await one(url); }
    catch (e) {
      if (proxy) { try { return await one(withProxy(proxy, url)); } catch (e2) {} }
      throw e;
    }
  }

  async function hostIPv4(host) {
    try { const j = await doh(host, "A"); const a = (j.Answer || []).find((x) => x.type === 1 && isIPv4(x.data)); return a ? a.data : ""; }
    catch (e) { return ""; }
  }

  async function nodeinfo(host, proxy) {
    const out = { host, software: "", version: "", totalUsers: null, activeMonth: null, activeHalfyear: null, localPosts: null, openRegistration: null, nodeName: "", nodeDescription: "", metadata: null, contact: "", mrfPolicies: [], quarantined: null, federationEnabled: null };
    if (!host) return out;
    const base = "https://" + host;
    let href = "";
    try {
      const disc = await fetchJSON(base + "/.well-known/nodeinfo", { Accept: "application/json" }, proxy);
      const links = (disc && disc.links) || [];
      const pick = links.find((l) => /2\.1$/.test(l.rel || "")) || links.find((l) => /2\.0$/.test(l.rel || "")) || links[0];
      href = pick && pick.href;
    } catch (e) {}
    const tryHrefs = href ? [href] : [base + "/nodeinfo/2.1", base + "/nodeinfo/2.0"];
    for (const u of tryHrefs) {
      try {
        const n = await fetchJSON(u, { Accept: "application/json" }, proxy);
        out.software = (n.software && n.software.name) || "";
        out.version = (n.software && n.software.version) || "";
        const users = (n.usage && n.usage.users) || {};
        out.totalUsers = users.total != null ? users.total : null;
        out.activeMonth = users.activeMonth != null ? users.activeMonth : null;
        out.activeHalfyear = users.activeHalfyear != null ? users.activeHalfyear : null;
        out.localPosts = n.usage && n.usage.localPosts != null ? n.usage.localPosts : null;
        out.openRegistration = typeof n.openRegistrations === "boolean" ? n.openRegistrations : null;
        const md = n.metadata || null;
        out.metadata = md;
        out.nodeName = (md && (md.nodeName || md.name)) || "";
        out.nodeDescription = (md && (md.nodeDescription || md.description)) || "";
        // admin/maintainer contact (shape varies: string, {name,email}, or array)
        const mc = md && (md.maintainer || md.contact || md.adminAccount);
        out.contact = typeof mc === "string" ? mc : (mc && (mc.email || mc.name || mc.handle)) || "";
        // Pleroma/Akkoma federation posture (moderation policies + quarantine list)
        const fed = md && md.federation;
        if (fed) {
          out.federationEnabled = typeof fed.enabled === "boolean" ? fed.enabled : null;
          if (Array.isArray(fed.mrf_policies)) out.mrfPolicies = fed.mrf_policies;
          if (Array.isArray(fed.quarantined_instances)) out.quarantined = fed.quarantined_instances.length;
        }
        break;
      } catch (e) {}
    }
    return out;
  }

  async function collectionCount(ref, proxy) {
    if (ref == null) return null;
    if (typeof ref === "object") return ref.totalItems != null ? ref.totalItems : null;
    try { const j = await fetchJSON(ref, { Accept: "application/activity+json" }, proxy); return j && j.totalItems != null ? j.totalItems : null; }
    catch (e) { return null; }
  }

  async function actorInfo(username, host, proxy) {
    const out = { handle: "@" + username + "@" + host, exists: null, avatar: "", summary: "", bot: null, createdAt: "", ageDays: null, followers: null, following: null, posts: null, fields: [], actorUrl: "" };
    if (!username || !host) return out;
    let actorUrl = "";
    try {
      const wf = await fetchJSON("https://" + host + "/.well-known/webfinger?resource=" + encodeURIComponent("acct:" + username + "@" + host), { Accept: "application/jrd+json" }, proxy);
      const self = ((wf && wf.links) || []).find((l) => l.rel === "self" && /activity|json/i.test(l.type || ""));
      if (self) actorUrl = self.href;
      out.exists = !!(wf && wf.links);
    } catch (e) {}
    if (!actorUrl) actorUrl = "https://" + host + "/users/" + encodeURIComponent(username); // best-guess fallback
    out.actorUrl = actorUrl;
    try {
      const a = await fetchJSON(actorUrl, { Accept: "application/activity+json" }, proxy);
      out.exists = true;
      const icon = a.icon;
      out.avatar = (icon && (icon.url || (Array.isArray(icon) && icon[0] && icon[0].url))) || "";
      out.summary = stripTags(a.summary || "");
      out.bot = a.type === "Service" || a.type === "Application";
      out.createdAt = a.published || "";
      if (a.published) out.ageDays = Math.floor((Date.now() - new Date(a.published)) / 86400000);

      out.followers = f1; out.following = f2; out.posts = f3;

  function extractDomains(posts) {
    const re = /https?:\/\/[^\s<>"')\]]+/gi;
    const set = new Set();
    (posts || []).forEach((p) => { const m = ((p && p.text) || "").match(re) || []; m.forEach((u) => { try { set.add(new URL(u).hostname.replace(/^www\./, "").toLowerCase()); } catch (e) {} }); });
    return [...set].slice(0, 8);

  async function runReport(rep, opts) {

    const observer = obsR.value && !obsR.value._err ? obsR.value : null;

    // Observer's tracked latest (masterversion) when the feed is CORS-blocked, and
    // flags a self-reported-vs-observed version mismatch.

    const REG_LABEL = { "open-unmoderated": "open · unmoderated", "open-moderated": "open · moderated", closed: "closed", invite: "invite-only", unknown: "unknown" };

    src("Software version", freshness ? (freshness.status === "behind" ? "err" : "ok") : (window.ReefFedi && ni && ni.software && window.ReefFedi.isKnown(ni.software) && !window.ReefFedi.directOK(ni.software) && !proxy ? "off" : "na"), freshness ? (freshness.status === "behind" ? freshness.reported + " → " + freshness.latest : (freshness.status === "current" ? "current" : freshness.status)) : (window.ReefFedi && ni && ni.software && window.ReefFedi.isKnown(ni.software) && !window.ReefFedi.directOK(ni.software) && !proxy ? "needs proxy" : "no data"), false, null);

    const w = window.__reefW || (window.ReefWeights ? window.ReefWeights.make({}) : function (id, fb) { return fb != null ? fb : 0; });
    const sig = [];
    if (remote && ni && ni.totalUsers != null && ni.totalUsers <= 3) sig.push({ id: "tiny_instance", label: `Origin instance has only ${ni.totalUsers} user${ni.totalUsers === 1 ? "" : "s"}`, weight: 14, dir: "warn", source: "nodeinfo", detail: [{ k: "Instance", v: host }, { k: "Software", v: (ni.software || "?") + " " + (ni.version || "") }, { k: "Users", v: String(ni.totalUsers) }, { k: "Why", v: "One- or few-user instances are a common throwaway / single-purpose-abuse pattern." }] });
    // registration moderation posture (open + unchecked = mass-abuse signature)

    // independent liveness: origin already offline / unreachable to Observer

    if (remote && registration && registration.mode === "open-unmoderated" && ni && ni.mrfPolicies && ni.federationEnabled !== null && ni.mrfPolicies.length === 0) sig.push({ id: "no_mrf", label: "Origin runs no automated moderation policies (MRF)", weight: 5, dir: "warn", source: "nodeinfo.metadata", detail: [{ k: "Instance", v: host }, { k: "MRF policies", v: "none" }, { k: "Why", v: "A Pleroma/Akkoma server with open registration and no Message Rewrite Facility policies applies no automated content moderation." }] });
    if (remote && dom && dom.domainAgeDays != null && dom.domainAgeDays < 60) sig.push({ id: "new_instance_domain", label: `Instance domain registered ${dom.domainAgeDays}d ago`, weight: w("domain_new"), dir: "warn", source: "RDAP", detail: [{ k: "Domain", v: host }, { k: "Registered", v: (dom.created || "").slice(0, 10) }, { k: "Registrar", v: dom.registrar || "—" }] });
    if (net && net.dnsblCount) sig.push({ id: "instance_dnsbl", label: `Instance IP on ${net.dnsblCount} blocklist${net.dnsblCount > 1 ? "s" : ""} (${(net.dnsbl || []).join(", ")})`, weight: w("dnsbl_listed"), dir: "bad", source: "DNSBL", detail: [{ k: "IP", v: net.ip }, { k: "Lists", v: (net.dnsbl || []).join(", ") }] });
    if (net && net.datacenter) sig.push({ id: "instance_dc", label: `Instance hosted on ${net.asnOrg || "a datacenter"}`, weight: 4, dir: "warn", source: "Team Cymru ASN", detail: [{ k: "ASN", v: (net.asn || "—") + " " + (net.asnOrg || "") }, { k: "Reverse DNS", v: net.rdns || "(none)" }] });
    if (actor && actor.ageDays != null && actor.ageDays < 14) sig.push({ id: "new_actor", label: `Reported account is ${actor.ageDays}d old`, weight: 10, dir: "warn", source: "ActivityPub actor", detail: [{ k: "Created", v: (actor.createdAt || "").slice(0, 10) }, { k: "Why", v: "Freshly-created accounts are over-represented in spam / ban-evasion." }] });

      else if (l.risk === "dnsbl") sig.push({ id: "link_dnsbl_" + l.domain, label: `Cited link IP blocklisted: ${l.domain}`, weight: 12, dir: "bad", source: "DNSBL", detail: [{ k: "Domain", v: l.domain }, { k: "Listings", v: String(l.dnsbl) }] });
      else if (l.risk === "new") sig.push({ id: "link_new_" + l.domain, label: `Cited link domain is new (${l.ageDays}d): ${l.domain}`, weight: 8, dir: "warn", source: "RDAP", detail: [{ k: "Domain", v: l.domain }, { k: "Registered", v: (l.created || "").slice(0, 10) }] });
    });

    if (corr.host && corr.host.length) sig.push({ id: "repeat_host", label: `Seen ${corr.host.length} prior item${corr.host.length === 1 ? "" : "s"} from ${host}`, weight: 6, dir: "warn", source: "internal correlation", detail: [{ k: "Instance", v: host }, { k: "Why", v: "You have triaged other reports/accounts from this instance — possible recurring source." }] });

    }

      const iRec = window.ReefAssess && window.ReefAssess.sfsRecency ? window.ReefAssess.sfsRecency(sfs.ip.lastseen) : null; // no signup here \u2014 recency vs today

    }

    const osintScore = Math.max(0, Math.min(100, sig.reduce((a, s) => a + (s.dir === "ok" ? 0 : s.weight), 0)));
    const tier = window.ReefAssess ? window.ReefAssess.tierOf(osintScore) : (osintScore >= 60 ? "high" : osintScore >= 30 ? "medium" : "low");

    // TODO (content classifier — planned, see ARCHITECTURE.md §8): run ReefText plus a
    // curated dog-whistle / coded-hate lexicon and a gaslighting/toxicity model over
    // rep.posts to emit *content*-risk signals here. Deliberately NOT wired yet — coded,
    // neutral-sounding abuse defeats plain VADER sentiment, so we show no content score
    // rather than fabricate one (the demo's toxicity trend is the thing we're replacing).

    if (window.ReefLog) {
      const failed = sources.filter((s) => s.status === "err").map((s) => s.name);
      window.ReefLog.info("enrich", "report on @" + ((rep.target && rep.target.username) || "?") + "@" + host + " → OSINT score " + osintScore + " (" + tier + ") · " + sources.length + " sources" + (failed.length ? " · " + failed.length + " failed: " + failed.join(", ") : "") + (links.length ? " · " + links.length + " cited domain(s)" : ""));

    return { instance: { host, remote, nodeinfo: ni, domain: dom, net, registration, freshness, observer }, actor, sfs, links, correlation: corr, sources, signals: sig.sort((a, b) => Math.abs(b.weight) - Math.abs(a.weight)), osintScore, tier, at: Date.now() };
  }

  // ============================================================
  // GRANULAR report lookups — the same data + signal logic as runReport,
  // split so a moderator can run (and cache-refresh) each pivot on its own:
  //   • runReportActor    → reported account profile + username lookups
  //                         (WebFinger/AP profile & fields, GitHub, SFS
  //                         username) + LOCAL sentiment/abuse scan of the
  //                         profile text (display name · bio · field values)
  //   • runReportInstance → origin server OSINT (nodeinfo, RDAP domain age,
  //                         hosting ASN/PTR/DNSBL, registration posture,
  //                         software freshness, Observer, SFS instance-IP) +
  //                         cited-link reputation + host correlation
  // Both share the `ip`/`domain`/`actor`/`nodeinfo` cache namespaces with
  // runReport and the account path, so nothing is re-fetched while fresh.
  // ============================================================
  function makeReportCache(force) {
    const C = window.ReefCache;
    async function cached(ns, id, fn) {
      const guard = () => fn().catch((e) => { if (window.ReefLog) window.ReefLog.debug("enrich", ns + " (report) lookup failed for \"" + id + "\"", e && e.message); return { _err: e.message }; });
      if (!C || !id) { const v = await guard(); return { value: v, cached: false, ageDays: 0 }; }
      return C.through(ns, id, guard, { force });
    }
    function ipReport(ip) {
      return cached("ip", ip, async () => {
        const [net, bl] = await Promise.all([ipNetwork(ip).catch(() => null), dnsbl(ip).catch(() => ({ listed: [], count: 0 }))]);
        const n = net || { ip }; n.dnsbl = bl.listed; n.dnsblCount = bl.count; return n;
      });
    }
    return { C, cached, ipReport };
  }

  async function runReportActor(rep, opts) {
    opts = opts || {};
    const proxy = opts.proxy || "";
    const force = !!opts.force;
    const sfsOpts = opts.sfs || {};
    window.__reefProxy = proxy;
    const { C, cached } = makeReportCache(force);
    const target = rep.target || {};
    const host = target.host || rep.instance;
    if (window.ReefLog) window.ReefLog.debug("enrich", "report actor lookup @" + (target.username || "?") + "@" + host + (force ? " [force]" : ""));

    const sources = [];
    const src = (name, status, note, cached, ageDays) => sources.push({ name, status, note, cached: !!cached, ageDays: ageDays != null ? ageDays : null });

    // AP profile (avatar, age, counts, fields)
    let actorR = { value: null, cached: false, ageDays: 0 };
    if (target.username) actorR = await cached("actor", "@" + target.username + "@" + host, () => actorInfo(target.username, host, proxy));
    const actor = actorR.value && !actorR.value._err ? actorR.value : null;

  async function test(service, key, proxy, opts) {

      const so = opts && opts.sfs ? opts.sfs : {};
      const reg = so.region && so.region !== "auto" ? " \u00b7 " + sfsHost(so.region) + " region" : "";

      } catch (e) {
        if (window.ReefLog) window.ReefLog.debug("enrich", "SFS test failed", e && e.message);
        if (hosted()) return { status: "error", detail: "Lookup failed: " + (e.message || "") + " (submissions go via the server)" };
        return proxy ? { status: "error", detail: "Lookup failed via proxy: " + (e.message || "") } : { status: "needsproxy", detail: "Lookup blocked \u2014 set a proxy to use submission; lookups normally use JSONP" };
      }
    }

        if (r.status === 429) return { status: "error", detail: "Rate limit (429) — add or upgrade a key" };

      } catch (e) {
        if (window.ReefLog) window.ReefLog.debug("enrich", "emailrep test failed", e && e.message);

      }

    // Hosted mode: 412 = the gateway found no vaulted key for this service

    const noVaultKey = { status: "unconfigured", detail: "No key in the server vault — save one below" };
    try {

        if (r.status === 412) return noVaultKey;
        if (r.status === 401) return { status: "error", detail: "Invalid API key (401)" };
        if (r.status === 429) return { status: "error", detail: "Rate / quota exceeded (429)" };
        if (!r.ok) return { status: "error", detail: "HTTP " + r.status };
        await r.json();
        return { status: "ok", detail: "Connected — domain lookup OK" };
      }
      if (service === "abuseipdb") {
        const r = hosted()
          ? await gw("/abuseipdb/check?ip=8.8.8.8")
          : await fetch(withProxy(proxy, "https://api.abuseipdb.com/api/v2/check?ipAddress=8.8.8.8&maxAgeInDays=90"), { headers: { Key: key, Accept: "application/json" } });
        if (r.status === 412) return noVaultKey;
        if (r.status === 401) return { status: "error", detail: "Invalid API key (401)" };
        if (r.status === 429) return { status: "error", detail: "Rate limit (429)" };
        if (!r.ok) return { status: "error", detail: "HTTP " + r.status };
        await r.json();
        return { status: "ok", detail: "Connected — IP check OK" };
      }
      if (service === "ipqs") {
        const r = hosted()
          ? await gw("/ipqs/ip?ip=8.8.8.8")
          : await fetch(withProxy(proxy, `https://ipqualityscore.com/api/json/ip/${key}/8.8.8.8`));
        if (r.status === 412) return noVaultKey;
        if (!r.ok) return { status: "error", detail: "HTTP " + r.status };
        const j = await r.json();
        return j.success === false ? { status: "error", detail: j.message || "Rejected" } : { status: "ok", detail: "Connected — IP check OK" };
      }
      if (service === "hibp") {
        // 404 = key valid, just no breaches for the probe address (the expected success case).
        const r = hosted()
          ? await gw("/hibp/breachedaccount?email=" + encodeURIComponent("test@example.com"))
          : await fetch(withProxy(proxy, "https://haveibeenpwned.com/api/v3/breachedaccount/test@example.com?truncateResponse=true"), { headers: { "hibp-api-key": key, Accept: "application/json" } });
        if (r.status === 412) return noVaultKey;
        if (r.status === 404) return { status: "ok", detail: "Connected — key valid (no breaches for probe)" };
        if (r.status === 401) return { status: "error", detail: "Invalid API key (401)" };
        if (r.status === 429) return { status: "error", detail: "Rate limit (429)" };
        if (!r.ok) return { status: "error", detail: "HTTP " + r.status };
        await r.json();
        return { status: "ok", detail: "Connected — breach lookup OK" };
      }
      return { status: "error", detail: "Unknown service" };
    } catch (e) {
      if (window.ReefLog) window.ReefLog.debug("enrich", service + " test failed" + (hosted() ? " (hosted gateway)" : proxy ? " (via proxy)" : " (no proxy)"), e && e.message);
      if (hosted()) return { status: "error", detail: "Vantage server unreachable or gateway error" };
      return proxy
        ? { status: "error", detail: "Proxy unreachable or blocked the request" }
        : { status: "needsproxy", detail: "Browser CORS blocked — set a proxy to use this service" };
    }
  }
})();

<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — megalodon transport layer
   ------------------------------------------------------------
   We standardize the live client on megalodon (loaded as an ESM
   module in the page <head>). megalodon gives us:
     • detector(url)            — SNS auto-detection
     • generator('mastodon',…)  — typed Mastodon interface
     • new Firefish(url,token)  — Misskey-API-compatible client
   used for Sharkey & Misskey (megalodon v10 dropped the dedicated
   Misskey class; Sharkey speaks the Misskey API, and the Firefish
   client's transport is Misskey-shaped: POST + token in body).

   IMPORTANT — coverage & proxy notes (see api.js for how these
   are handled):
     • megalodon's *typed* surface does NOT cover the admin API
       (pending-account approval, admin reports, suspend/silence,
       instance domain blocks). For Mastodon those ride megalodon's
       low-level client (.client.get/.post), which still gives us its
       auth, baseUrl and cancellation handling.
     • For Misskey/Sharkey, api.js does NOT route through megalodon at
       all anymore: the Firefish client is a forked, Firefish-shaped
       transport (not the Misskey API Sharkey speaks) and it only
       offers a low-level POST for admin calls while masking real HTTP
       errors as "Network Error". api.js talks to Misskey/Sharkey with
       raw fetch (POST + token in body as `i`). megalodon is still used
       for Misskey/Sharkey *detection* via the SNS detector below.
     • megalodon talks to the instance directly. It cannot apply
       REEF's URL-prefix CORS proxy, so when a proxy is configured
       api.js falls back to raw fetch for instance calls.
   The module load is non-blocking: if esm.sh is unreachable the
   app still boots and api.js uses its raw-fetch fallback.
   Plain JS. Exposes window.ReefMega.
   ============================================================ */
(function () {
  function status() { return window.__megalodonStatus || "loading"; }
  function available() { return !!window.__megalodon; }

  // resolve once the module load settles (or after a timeout, so a hung
  // CDN never blocks a live request — callers fall back to raw fetch)
  async function ready(timeoutMs) {
    if (window.__megalodon) return true;
    if (String(status()).startsWith("failed")) return false;
    const to = new Promise((r) => setTimeout(() => r("timeout"), timeoutMs || 7000));
    await Promise.race([window.__megalodonReady || Promise.resolve(), to]);
    return !!window.__megalodon;
  }

  function makeClient(conn) {
    const m = window.__megalodon;
    if (!m) return null;
    try {
      if (conn.software === "Mastodon") return m.default("mastodon", conn.baseUrl, conn.token);
      // Sharkey / Misskey / forks → Firefish client (Misskey API transport)
      return new m.Firefish(conn.baseUrl, conn.token);
    } catch (e) { if (window.ReefLog) window.ReefLog.warn("mega", "couldn't build megalodon client for " + conn.host, e && e.message); return null; }
  }

  // unwrap megalodon's axios-style Response → parsed body
  function body(res) { return res && typeof res === "object" && "data" in res ? res.data : res; }

  async function lowGet(conn, path, params) {
    const c = makeClient(conn);
    if (!c || !c.client) throw new Error("megalodon client unavailable");
    return body(await c.client.get(path, params || {}));
  }
  async function lowPost(conn, path, payload) {
    const c = makeClient(conn);
    if (!c || !c.client) throw new Error("megalodon client unavailable");
    return body(await c.client.post(path, payload || {}));
  }

  // SNS detection via megalodon's detector → 'mastodon' | 'pleroma' |
  // 'misskey' | 'firefish' | 'friendica' | 'gotosocial' | 'pixelfed'
  async function detect(baseUrl) {
    const m = window.__megalodon;
    if (!m || !m.detector) throw new Error("megalodon detector unavailable");
    return m.detector(baseUrl);
  }

  window.ReefMega = { ready, status, available, makeClient, lowGet, lowPost, detect };
})();
