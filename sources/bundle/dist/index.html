<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="vantage-version" content="v0.1.4-20260717" />
<title>Vantage — Fediverse Moderation Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:        oklch(0.165 0.012 256);
  --bg-2:      oklch(0.205 0.013 256);
  --bg-3:      oklch(0.245 0.014 256);
  --bg-inset:  oklch(0.142 0.011 256);
  --rail:      oklch(0.185 0.012 256);
  --line:      oklch(0.30 0.013 256);
  --line-soft: oklch(0.255 0.012 256);
  --txt:       oklch(0.95 0.006 256);
  --txt-2:     oklch(0.74 0.012 256);
  --txt-3:     oklch(0.56 0.012 256);
  --accent:    oklch(0.72 0.13 232);
  --accent-d:  oklch(0.40 0.08 232);
  --ok:        oklch(0.76 0.13 158);
  --warn:      oklch(0.82 0.13 80);
  --bad:       oklch(0.67 0.19 24);
  --ok-bg:     oklch(0.76 0.13 158 / 0.12);
  --warn-bg:   oklch(0.82 0.13 80 / 0.13);
  --bad-bg:    oklch(0.67 0.19 24 / 0.14);
  --accent-bg: oklch(0.72 0.13 232 / 0.13);
  --sans:'Atkinson Hyperlegible',system-ui,sans-serif;
  --mono:'Fira Mono',ui-monospace,monospace;
  --r:9px; --r-s:6px;
  --shadow:0 1px 0 oklch(1 0 0 / 0.03) inset, 0 8px 24px -12px oklch(0 0 0 / 0.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans); background:var(--bg); color:var(--txt);
  font-size:1rem; line-height:1.5; letter-spacing:0.015em; text-align:left; -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
.mono{font-family:var(--mono); font-variant-ligatures:none}
.tone-ok{color:var(--ok)} .tone-warn{color:var(--warn)} .tone-bad{color:var(--bad)} .tone-accent{color:var(--accent)}
kbd{font-family:var(--mono); font-size:10px; background:var(--bg-3); border:1px solid var(--line);
  border-radius:4px; padding:1px 5px; color:var(--txt-2); box-shadow:0 1px 0 oklch(0 0 0/.3)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px; border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--line-soft)}

/* ====== app grid ====== */
.app{display:grid; grid-template-columns:236px minmax(330px,400px) 1fr; height:100vh; overflow:hidden}

/* ====== left rail ====== */
.rail{background:var(--rail); border-right:1px solid var(--line); display:flex; flex-direction:column;
  padding:16px 12px; overflow-y:auto}
.brand{display:flex; align-items:center; gap:9px; padding:4px 8px 18px}
.brand-mark{width:20px; height:20px; border-radius:5px; flex:none;
  background:conic-gradient(from 220deg, var(--accent), oklch(0.72 0.13 300), var(--accent));
  box-shadow:0 0 0 1px oklch(1 0 0/.1) inset, 0 0 14px -2px var(--accent)}
.brand-name{font-weight:700; letter-spacing:.14em; font-size:14px}
.brand-sub{font-size:10px; color:var(--txt-3); letter-spacing:.16em; text-transform:uppercase; margin-left:-2px; align-self:flex-end; padding-bottom:2px}
.nav{display:flex; flex-direction:column; gap:3px; margin-bottom:18px}
.nav-item{display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:var(--r-s);
  background:none; border:none; color:var(--txt-2); cursor:pointer; font-family:var(--sans);
  font-size:13.5px; font-weight:500; text-align:left; width:100%; transition:.12s}
.nav-item:hover{background:var(--bg-2); color:var(--txt)}
.nav-on{background:var(--bg-3); color:var(--txt); box-shadow:0 0 0 1px var(--line-soft)}
.nav-i{width:18px; text-align:center; color:var(--txt-3); font-size:15px}
.nav-on .nav-i{color:var(--accent)}
.nav-l{flex:1}
.nav-count{font-family:var(--mono); font-size:11px; color:var(--txt-2); background:var(--bg-inset);
  border-radius:20px; padding:1px 8px; min-width:22px; text-align:center}
.nav-count-hot{color:var(--bad); background:var(--bad-bg)}
.rail-sec-l{font-size:10px; letter-spacing:.13em; text-transform:uppercase; color:var(--txt-3);
  padding:0 10px 8px; font-weight:600}
.servers{display:flex; flex-direction:column; gap:2px}
.srv{display:flex; align-items:center; gap:9px; padding:7px 10px; border-radius:var(--r-s);
  background:none; border:none; cursor:pointer; width:100%; text-align:left; color:var(--txt-2); transition:.12s}
.srv:hover{background:var(--bg-2)}
.srv-on{background:var(--bg-2); box-shadow:0 0 0 1px var(--line-soft); color:var(--txt)}
.srv-dot{width:8px; height:8px; border-radius:50%; flex:none}
.srv-all{background:linear-gradient(135deg,var(--accent),oklch(0.72 0.13 300))}
.srv-host{flex:1; font-size:12.5px; font-family:var(--mono); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.srv-sw{font-size:9px; font-weight:600; letter-spacing:.05em; color:var(--txt-3); background:var(--bg-inset);
  border-radius:3px; padding:1px 4px}
.srv-count{font-family:var(--mono); font-size:11px; color:var(--txt-3); min-width:16px; text-align:right}
.rail-foot{margin-top:auto; padding-top:20px}
.sources{display:flex; flex-direction:column; gap:5px}
.source{display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--txt-2); padding:0 10px}
.source-dot{width:6px; height:6px; border-radius:50%; background:var(--ok); flex:none; box-shadow:0 0 6px -1px var(--ok)}
.source-off{color:var(--txt-3)}
.source-off .source-dot{background:var(--txt-3); box-shadow:none}
.source-dot-warn{background:var(--warn); box-shadow:none}
.source-planned{opacity:.55}
.source-tag{margin-left:auto; font-size:8px; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
  color:var(--txt-3); background:var(--bg-inset); border-radius:4px; padding:1px 5px}
.source-planned .source-tag{color:var(--warn); background:var(--warn-bg)}

/* ====== queue (middle) ====== */
.queue{border-right:1px solid var(--line); display:flex; flex-direction:column; min-width:0; min-height:0; background:var(--bg)}
.queue-h{display:flex; align-items:flex-end; justify-content:space-between; padding:16px 18px 12px;
  border-bottom:1px solid var(--line-soft)}
.queue-h-l h2{font-size:15px; font-weight:600; letter-spacing:-.01em}
.queue-meta{font-size:11.5px; color:var(--txt-3); font-family:var(--mono)}
.queue-h-r{display:flex; gap:2px; background:var(--bg-inset); border-radius:7px; padding:2px; border:1px solid var(--line-soft)}
.seg{font-family:var(--sans); font-size:11.5px; font-weight:500; color:var(--txt-3); background:none;
  border:none; padding:4px 11px; border-radius:5px; cursor:pointer; transition:.12s}
.seg-on{background:var(--bg-3); color:var(--txt); box-shadow:0 1px 2px oklch(0 0 0/.3)}
.qlist{flex:1; min-height:0; overflow-y:auto; padding:8px}

/* queue tools: search + scope */
.qtools{display:flex; align-items:center; gap:8px; padding:9px 12px 8px; border-bottom:1px solid var(--line-soft)}
.qsearch{flex:1; display:flex; align-items:center; gap:7px; background:var(--bg-inset); border:1px solid var(--line-soft);
  border-radius:7px; padding:0 9px; transition:.12s}
.qsearch:focus-within{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-bg)}
.qsearch-i{color:var(--txt-3); font-size:13px}
.qsearch-input{flex:1; background:none; border:none; outline:none; color:var(--txt); font-family:var(--sans);
  font-size:12.5px; padding:7px 0}
.qsearch-x{background:none; border:none; color:var(--txt-3); cursor:pointer; font-size:11px; padding:2px}
.qsearch-x:hover{color:var(--txt)}
.qscope{flex:none; font-family:var(--sans); font-size:11.5px; font-weight:500; color:var(--txt-2);
  background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:7px; padding:6px 11px; cursor:pointer; transition:.12s; white-space:nowrap}
.qscope:hover{color:var(--txt)}
.qscope-on{background:var(--accent-bg); color:var(--accent); border-color:var(--accent-d)}
.load-older{width:calc(100% - 8px); margin:8px 4px 4px; padding:10px; border-radius:var(--r-s);
  background:var(--bg-2); border:1px dashed var(--line); color:var(--txt-2); cursor:pointer;
  font-family:var(--mono); font-size:11.5px; transition:.12s}
.load-older:hover:not(:disabled){background:var(--bg-3); color:var(--txt); border-color:var(--accent-d)}
.load-older:disabled{opacity:.5; cursor:wait}

.qrow{display:flex; align-items:center; gap:11px; width:100%; text-align:left; cursor:pointer;
  background:none; border:none; border-radius:var(--r-s); padding:10px 11px 10px 13px; position:relative;
  color:var(--txt); transition:.1s; font-family:var(--sans)}
.qrow:hover{background:var(--bg-2)}
.qrow-active{background:var(--bg-2); box-shadow:0 0 0 1px var(--line-soft)}
.qrow-rail{position:absolute; left:0; top:8px; bottom:8px; width:3px; border-radius:3px}
.t-high{background:var(--bad)} .t-medium{background:var(--warn)} .t-low{background:var(--ok)}
.qrow-main{flex:1; min-width:0; display:flex; flex-direction:column; gap:2px}
.qrow-top{display:flex; align-items:center; gap:8px}
.qrow-name{font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.qrow-cat{font-size:10.5px; color:var(--txt-2); background:var(--bg-inset); border:1px solid var(--line-soft);
  border-radius:4px; padding:0 6px; white-space:nowrap}
.qrow-score{margin-left:auto; font-size:13px; font-weight:600}
.qrow-sub{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--txt-3); min-width:0}
.qrow-host{color:var(--txt-2); white-space:nowrap}
.qrow-dot{opacity:.5}
.qrow-reason{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0}
.qrow-when{font-size:10.5px; color:var(--txt-3); flex:none; align-self:flex-start; padding-top:2px}
.kbd-hint{display:flex; gap:14px; padding:9px 18px; border-top:1px solid var(--line-soft);
  font-size:10.5px; color:var(--txt-3); flex-wrap:wrap}
.kbd-hint kbd{margin-right:2px}
.empty{display:flex; flex-direction:column; align-items:center; gap:10px; padding:60px 20px; color:var(--txt-3); font-size:13px}
.empty-mark{width:34px; height:34px; border-radius:50%; background:var(--ok-bg); color:var(--ok);
  display:grid; place-items:center; font-size:16px}
.empty-err{color:var(--txt-2)}
.empty-mark-err{background:var(--bad-bg); color:var(--bad); font-weight:700}
.empty-l{font-weight:600; color:var(--txt); text-align:center}
.empty-detail{max-width:46ch; text-align:center; line-height:1.55; font-size:12px; color:var(--txt-3)}
.empty-diag{background:none; border:1px solid var(--line); color:var(--accent); border-radius:7px; padding:5px 11px; font-size:11.5px; font-weight:600; cursor:pointer; font-family:var(--sans)}
.empty-diag:hover{background:var(--bg-inset)}

/* ====== inspector (right) ====== */
.insp-pane{overflow-y:auto; min-height:0; background:linear-gradient(180deg,var(--bg-2),var(--bg) 240px)}
.empty-big{display:grid; place-items:center; height:100%; color:var(--txt-3); font-size:14px}
.inspector{max-width:760px; margin:0 auto; padding:22px 26px 60px}

.insp-id{display:flex; align-items:center; gap:14px; padding-bottom:14px}
.insp-id-main{flex:1; min-width:0}
.insp-id-name{font-size:18px; font-weight:600; letter-spacing:-.01em}
.insp-id-handle{font-size:12.5px; color:var(--txt-2); margin-top:1px}
.tier-chip{font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; white-space:nowrap}
.tier-chip.t-high{background:var(--bad-bg); color:var(--bad)}
.tier-chip.t-medium{background:var(--warn-bg); color:var(--warn)}
.tier-chip.t-low{background:var(--ok-bg); color:var(--ok)}
.insp-id-meta{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line-soft);
  border:1px solid var(--line-soft); border-radius:var(--r); overflow:hidden; margin-bottom:6px}
.insp-id-meta .kv{background:var(--bg-2); padding:9px 12px; flex-direction:column; align-items:flex-start; gap:3px}

.kv{display:flex; align-items:baseline; justify-content:space-between; gap:12px}
.kv-k{font-size:10.5px; color:var(--txt-3); text-transform:uppercase; letter-spacing:.05em; font-weight:600; white-space:nowrap}
.kv-v{font-size:13px; color:var(--txt); text-align:right; overflow:hidden; text-overflow:ellipsis}
.insp-id-meta .kv-v{text-align:left; font-size:12.5px; white-space:normal; overflow:visible; word-break:break-word}

/* sections */
.insp-sec{margin-top:22px}
.insp-sec-h{display:flex; align-items:center; gap:10px; margin-bottom:12px; padding-bottom:8px;
  border-bottom:1px solid var(--line-soft)}
.insp-sec-tt{display:flex; align-items:baseline; gap:9px; flex:1; min-width:0}
.insp-sec-h h4{font-size:13px; font-weight:600; letter-spacing:.01em}
.insp-sec-sub{font-size:11px; color:var(--txt-3)}
.src-tag{font-family:var(--mono); font-size:10px; color:var(--txt-3); background:var(--bg-inset);
  border:1px solid var(--line-soft); border-radius:5px; padding:2px 7px; white-space:nowrap}

/* assessment */
.assess{display:flex; gap:18px; align-items:flex-start; margin-bottom:14px}
.gauge{position:relative; flex:none}
.gauge-svg{display:block}
.gauge-track{stroke:var(--bg-inset)}
.gauge-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px}
.gauge-num{font-family:var(--mono); font-size:30px; font-weight:600; line-height:1}
.gauge-cap{font-size:9.5px; color:var(--txt-3); text-transform:uppercase; letter-spacing:.08em}
.assess-body{flex:1; min-width:0}
.rec-banner{display:flex; align-items:center; gap:10px; padding:9px 13px; border-radius:var(--r); margin-bottom:10px;
  border:1px solid}
.rec-banner.tone-ok{background:var(--ok-bg); border-color:oklch(0.76 0.13 158/.3)}
.rec-banner.tone-warn{background:var(--warn-bg); border-color:oklch(0.82 0.13 80/.3)}
.rec-banner.tone-bad{background:var(--bad-bg); border-color:oklch(0.67 0.19 24/.3)}
.rec-k{font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--txt-3); font-weight:600}
.rec-v{font-size:15px; font-weight:700}
.tone-ok .rec-v{color:var(--ok)} .tone-warn .rec-v{color:var(--warn)} .tone-bad .rec-v{color:var(--bad)}
.rec-note{margin-left:auto; font-size:10.5px; color:var(--txt-3); font-style:italic}
.rationale{font-size:12.5px; color:var(--txt-2); line-height:1.55}
.rationale.soft{color:var(--txt-3); font-size:12px}
.signals{display:flex; flex-direction:column; gap:4px; background:var(--bg-inset); border:1px solid var(--line-soft);
  border-radius:var(--r); padding:8px 10px}
.signal-wrap{border-radius:7px}
.signal-wrap.sw-open{background:var(--bg-2); box-shadow:0 0 0 1px var(--line-soft)}
.signal-row{display:flex; align-items:center; gap:10px; padding:4px 4px}
.signal-click{cursor:pointer; border-radius:7px}
.signal-click:hover{background:var(--bg-3)}
.signal-dot{width:7px; height:7px; border-radius:50%; flex:none}
.signal-label{font-size:12px; color:var(--txt); flex:none; width:44%}
.signal-track{flex:1; height:5px; background:var(--bg-3); border-radius:4px; overflow:hidden}
.signal-fill{display:block; height:100%; border-radius:4px}
.signal-w{font-family:var(--mono); font-size:11px; width:32px; text-align:right; flex:none}
.signal-chev{width:12px; flex:none; text-align:center; color:var(--txt-3); font-size:9px}
.signal-detail{padding:4px 10px 11px 27px; display:flex; flex-direction:column; gap:5px;
  animation:sdopen .16s ease}
@keyframes sdopen{from{opacity:0; transform:translateY(-3px)}to{opacity:1; transform:none}}
.sd-line{display:flex; gap:10px; align-items:baseline; font-size:11.5px}
.sd-k{flex:none; width:96px; color:var(--txt-3); text-transform:uppercase; letter-spacing:.04em; font-size:9.5px; font-weight:600; padding-top:1px}
.sd-v{flex:1; min-width:0; color:var(--txt); word-break:break-word; line-height:1.45}
.sd-text{font-size:11.5px; color:var(--txt-2); line-height:1.5}
.sd-foot{display:flex; align-items:center; gap:12px; margin-top:3px; padding-top:6px; border-top:1px dashed var(--line-soft)}
.sd-source{font-family:var(--mono); font-size:10px; color:var(--txt-3)}
.sd-weight{font-family:var(--mono); font-size:10px; margin-left:auto}

/* application fields */
.appfields{display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line-soft);
  border:1px solid var(--line-soft); border-radius:var(--r); overflow:hidden}
.appfields .kv{background:var(--bg-2); padding:9px 13px; flex-direction:column; align-items:flex-start; gap:3px}
.appfields .kv-v{text-align:left; font-size:12px; max-width:100%; word-break:break-word; white-space:normal; overflow:visible}
.appfields .kv:nth-child(5),.appfields .kv:nth-child(6){grid-column:1/-1}
.joinreason{margin-top:10px; background:var(--bg-inset); border:1px solid var(--line-soft);
  border-left:2px solid var(--accent-d); border-radius:var(--r); padding:11px 14px}
.joinreason-l{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--txt-3); font-weight:600}
.joinreason-t{font-size:13px; color:var(--txt); line-height:1.55; margin-top:5px; font-style:italic; text-wrap:pretty}

/* osint cards */
.osint-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px}
.osint-grid.two{grid-template-columns:1fr 1fr}
.osint-card{background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r); padding:12px 13px;
  display:flex; flex-direction:column; gap:9px}
.osint-card-h{display:flex; align-items:baseline; justify-content:space-between; gap:8px}
.oc-name{display:flex; align-items:baseline; gap:6px}
.osint-demo{font-size:8px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--warn);
  background:var(--warn-bg); border-radius:4px; padding:1px 5px; align-self:center}
.osint-card-h b{font-size:12px; font-weight:600}
.osint-card-h .mono{font-size:10px; color:var(--txt-3)}
.osint-meter{display:flex; align-items:center; gap:8px}
.osint-meter-track{flex:1; height:7px; background:var(--bg-inset); border-radius:5px; overflow:hidden}
.osint-meter-fill{display:block; height:100%; border-radius:5px}
.osint-meter-fill.tone-ok{background:var(--ok)} .osint-meter-fill.tone-warn{background:var(--warn)} .osint-meter-fill.tone-bad{background:var(--bad)}
.osint-meter-num{font-size:12px; font-weight:600; width:22px; text-align:right}
.osint-mini{display:flex; flex-direction:column; gap:5px}
.osint-mini .kv-k{font-size:9.5px}
.osint-mini .kv-v{font-size:11.5px}
.flag-row{display:flex; flex-wrap:wrap; gap:5px}
/* Fediverse instance posture pills (registration mode + software freshness) */
.inst-posture{display:flex; flex-wrap:wrap; gap:6px}
.posture-pill{display:inline-flex; align-items:center; font-size:10px; font-weight:600; font-family:var(--mono);
  letter-spacing:.01em; padding:2px 9px; border-radius:20px; white-space:nowrap; border:1px solid transparent}
.posture-pill.pp-ok{background:var(--ok-bg); color:var(--ok)}
.posture-pill.pp-warn{background:var(--warn-bg); color:var(--warn)}
.posture-pill.pp-bad{background:var(--bad-bg); color:var(--bad)}
.flag{display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:500; padding:2px 7px 2px 5px;
  border-radius:20px; white-space:nowrap}
.flag-i{width:13px; height:13px; border-radius:50%; display:grid; place-items:center; font-size:9px; font-weight:700}
.flag-bad{background:var(--bad-bg); color:var(--bad)} .flag-bad .flag-i{background:var(--bad); color:var(--bg)}
.flag-ok{background:var(--bg-inset); color:var(--txt-3)} .flag-ok .flag-i{background:var(--txt-3); color:var(--bg)}
/* StopForumSpam panel (live OSINT + demo card) */
.sfs-card{background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r); padding:12px 13px;
  display:flex; flex-direction:column; gap:10px; margin-top:12px}
.sfs-card.sfs-card-flat{margin-top:0; background:transparent; border:none; padding:0}
.sfs-card-h{display:flex; align-items:baseline; justify-content:space-between; gap:8px}
.sfs-card-h b{font-size:12px; font-weight:600}
.sfs-verdict{font-size:10px; font-family:var(--mono); text-transform:uppercase; letter-spacing:.05em; font-weight:600}
.sfs-rows{display:flex; flex-direction:column; gap:1px; background:var(--line-soft);
  border:1px solid var(--line-soft); border-radius:8px; overflow:hidden}
.sfs-row{display:grid; grid-template-columns:74px 1fr auto; align-items:center; gap:10px; padding:8px 11px; background:var(--bg-2)}
.sfs-row-k{font-size:10px; color:var(--txt-3); text-transform:uppercase; letter-spacing:.05em; font-weight:600}
.sfs-row-v{font-size:11.5px; color:var(--txt-2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.sfs-tag{display:inline-flex; align-items:center; gap:5px; font-size:10.5px; font-weight:600; font-family:var(--mono);
  padding:2px 9px; border-radius:20px; white-space:nowrap}
.sfs-conf{font-size:9.5px; opacity:.85; padding-left:5px; margin-left:1px; border-left:1px solid currentColor}
.sfs-tag.sfs-ok{background:var(--ok-bg); color:var(--ok)}
.sfs-tag.sfs-warn{background:var(--warn-bg); color:var(--warn)}
.sfs-tag.sfs-bad{background:var(--bad-bg); color:var(--bad)}
.sfs-tag.sfs-na{background:var(--bg-inset); color:var(--txt-3)}
.sfs-foot{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap}
.sfs-note{font-size:10.5px; color:var(--txt-3); line-height:1.4}
.sfs-submit{font-family:var(--sans); font-size:11px; font-weight:600; color:var(--accent); background:transparent;
  border:1px solid color-mix(in oklab, var(--accent) 45%, transparent); border-radius:7px; padding:5px 11px;
  cursor:pointer; transition:.12s; white-space:nowrap}
.sfs-submit:hover:not(:disabled){background:var(--accent); color:var(--bg)}
.sfs-submit:disabled{opacity:.45; cursor:not-allowed}
.sfs-sub-ok{font-size:11px; font-weight:600; color:var(--ok); white-space:nowrap}
/* StopForumSpam — richer listed-row meta line */
.sfs-row-mid{display:flex; flex-direction:column; gap:2px; min-width:0}
.sfs-row-meta{font-size:9.5px; color:var(--txt-3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
/* StopForumSpam — full query options panel (Services) */
.sfs-opts{background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r); padding:12px 13px;
  display:flex; flex-direction:column; gap:11px; margin-top:-4px}
.sfs-opts-h{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--txt-2)}
.sfs-opts-h .opt{font-size:10px; font-weight:400; text-transform:none; letter-spacing:0; color:var(--txt-3); margin-left:6px}
.sfs-opt-row{display:flex; align-items:center; justify-content:space-between; gap:14px}
.sfs-opt-lbl{display:flex; flex-direction:column; gap:1px; min-width:0}
.sfs-opt-lbl b{font-size:12px; font-weight:600}
.sfs-opt-lbl span{font-size:10.5px; color:var(--txt-3); line-height:1.4}
.sfs-opt-lbl code{font-family:var(--mono); font-size:10px; background:var(--bg-inset); padding:0 4px; border-radius:4px}
.sfs-seg{display:flex; gap:0; background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:8px; padding:2px; flex:none}
.sfs-seg-btn{font-family:var(--sans); font-size:11px; font-weight:600; color:var(--txt-3); background:transparent;
  border:none; border-radius:6px; padding:5px 12px; cursor:pointer; transition:.12s; white-space:nowrap}
.sfs-seg-btn:hover{color:var(--txt-2)}
.sfs-seg-btn.on{background:var(--accent); color:var(--bg)}
.sfs-toggle{flex:none; width:38px; height:22px; border-radius:20px; border:1px solid var(--line-soft);
  background:var(--bg-inset); position:relative; cursor:pointer; transition:.14s; padding:0}
.sfs-toggle.on{background:var(--accent); border-color:var(--accent)}
.sfs-toggle-dot{position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:var(--txt-2); transition:.14s}
.sfs-toggle.on .sfs-toggle-dot{left:18px; background:var(--bg)}
.sfs-num-wrap{display:flex; align-items:center; gap:6px; flex:none}
.sfs-num{width:74px; text-align:right}
.sfs-num-suffix{font-size:10.5px; color:var(--txt-3)}
.sfs-chips{display:flex; gap:5px; flex:none}
.sfs-chip-toggle{font-family:var(--mono); font-size:10.5px; font-weight:600; color:var(--txt-3); background:var(--bg-inset);
  border:1px solid var(--line-soft); border-radius:7px; padding:4px 10px; cursor:pointer; transition:.12s}
.sfs-chip-toggle.on{background:color-mix(in oklab, var(--accent) 16%, transparent); color:var(--accent); border-color:color-mix(in oklab, var(--accent) 45%, transparent)}
.vt-row{display:flex; gap:6px}
.vt-pill{font-size:10.5px; font-weight:600; padding:3px 8px; border-radius:6px; background:var(--bg-inset)}
.vt-pill.tone-ok{color:var(--txt-3)}
.muted-line{font-size:11.5px; color:var(--txt-3); line-height:1.5}
.chiprow{display:flex; flex-wrap:wrap; gap:5px}
.chip{font-size:11px; padding:3px 9px; border-radius:6px; background:var(--bg-inset); border:1px solid var(--line-soft); color:var(--txt-2)}
.chip-link{color:var(--accent); border-color:var(--accent-d)}
.chip-warn{background:var(--warn-bg); color:var(--warn); border-color:transparent}
.userhits{display:flex; flex-wrap:wrap; gap:4px}
.userhit{font-size:10.5px; padding:3px 8px; border-radius:6px; border:1px solid var(--line-soft)}
.uh-yes{background:var(--accent-bg); color:var(--accent); border-color:var(--accent-d)}
.uh-bad{background:var(--bad-bg); color:var(--bad); border-color:color-mix(in oklab, var(--bad) 42%, transparent); font-weight:600}
.uh-no{background:var(--bg-inset); color:var(--txt-3); opacity:.65; text-decoration:line-through}
.userhit-warn{margin-top:9px; font-size:11px; line-height:1.5; color:var(--bad); background:var(--bad-bg);
  border:1px solid color-mix(in oklab, var(--bad) 30%, transparent); border-radius:7px; padding:8px 11px; text-wrap:pretty}
.userhit-warn b{font-weight:700}

/* text analysis */
.text-metrics{display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px 16px; margin-bottom:11px}
.tm{display:flex; flex-direction:column; gap:5px}
.tm-k{font-size:10.5px; color:var(--txt-3); text-transform:uppercase; letter-spacing:.04em; font-weight:600}
.tm-v{font-size:13px}
.nonsense-flag{margin:0 0 11px; padding:9px 12px; border-radius:var(--r); border:1px solid}
.nonsense-flag.nf-bad{background:var(--bad-bg); border-color:color-mix(in oklch, var(--bad) 35%, transparent)}
.nonsense-flag.nf-warn{background:var(--warn-bg); border-color:color-mix(in oklch, var(--warn) 35%, transparent)}
.nf-tag{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em}
.nf-bad .nf-tag{color:var(--bad)}
.nf-warn .nf-tag{color:var(--warn)}
.nf-reasons{margin:6px 0 0; padding-left:16px; display:flex; flex-direction:column; gap:3px}
.nf-reasons li{font-size:11.5px; color:var(--txt-2); line-height:1.45}

/* action bar */
.action-bar{display:grid; grid-template-columns:1fr 1fr 1.4fr; gap:9px; margin-top:26px;
  position:sticky; bottom:0; padding-top:14px;
  background:linear-gradient(180deg, transparent, var(--bg) 40%)}
.action-bar.wide{grid-template-columns:repeat(4,1fr)}
.act{font-family:var(--sans); font-size:13px; font-weight:600; padding:11px; border-radius:var(--r);
  cursor:pointer; border:1px solid var(--line); background:var(--bg-3); color:var(--txt); transition:.12s}
.act:hover{transform:translateY(-1px)}
.act-approve{background:var(--ok); color:oklch(0.18 0.03 158); border-color:transparent}
.act-reject{background:var(--bad); color:oklch(0.98 0.02 24); border-color:transparent}
.act-hold{background:var(--bg-3); color:var(--warn); border-color:oklch(0.82 0.13 80/.3)}
.act-ghost{background:none; color:var(--txt-2)}
.resolved-bar{margin-top:26px; text-align:center; padding:13px; border-radius:var(--r);
  background:var(--bg-inset); border:1px solid var(--line-soft); color:var(--txt-2); font-size:13px; font-weight:500}

/* report-specific */
.rep-head{display:flex; align-items:center; justify-content:space-between; gap:10px; padding-bottom:12px}
.rep-cat{display:flex; align-items:center; gap:8px}
.cat-chip{font-size:13px; font-weight:600; padding:5px 12px; border-radius:7px}
.cat-chip.t-high{background:var(--bad-bg); color:var(--bad)}
.cat-chip.t-medium{background:var(--warn-bg); color:var(--warn)}
.cat-chip.t-low{background:var(--ok-bg); color:var(--ok)}
.fwd-chip,.lock-chip{font-size:10.5px; color:var(--txt-3); background:var(--bg-inset); border:1px solid var(--line-soft);
  border-radius:6px; padding:3px 8px}
.lock-chip{color:var(--warn); border-color:oklch(0.82 0.13 80/.3)}
.rep-reporter{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--txt-3); margin-bottom:8px}
.rep-reporter-k{text-transform:uppercase; font-size:10px; letter-spacing:.06em; font-weight:600}
.rep-reporter-when{margin-left:auto; font-family:var(--mono); font-size:11px}
.rep-comment{font-size:13.5px; color:var(--txt); line-height:1.55; background:var(--bg-inset);
  border:1px solid var(--line-soft); border-left:2px solid var(--accent-d); border-radius:var(--r);
  padding:12px 15px; font-style:italic; text-wrap:pretty}

.tgt{display:flex; gap:13px; align-items:flex-start}
.tgt-main{flex:1; min-width:0}
.tgt-name{font-size:15px; font-weight:600; display:flex; align-items:center; gap:8px}
.bot-tag{font-size:9px; font-weight:700; letter-spacing:.06em; background:var(--warn-bg); color:var(--warn); padding:1px 5px; border-radius:4px}
.tgt-handle{font-size:12px; color:var(--txt-2); margin:1px 0 6px}
.tgt-bio{font-size:12.5px; color:var(--txt-2); line-height:1.5}
.tgt-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line-soft);
  border:1px solid var(--line-soft); border-radius:var(--r); overflow:hidden; margin-top:12px}
.tgt-stat{background:var(--bg-2); padding:10px 13px; display:flex; flex-direction:column; gap:2px}
.tgt-stat b{font-size:16px; font-weight:600; font-family:var(--mono)}
.tgt-stat span{font-size:10px; color:var(--txt-3); text-transform:uppercase; letter-spacing:.04em}
.tgt-links{margin-top:10px}
.avatar-img{flex:none; border:1px solid var(--line-soft)}

/* report OSINT — instance & actor intelligence */
.tgt-instance{display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-top:10px; padding:8px 10px;
  background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:var(--r)}
.tgt-instance .ti-k{font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--txt-3)}
.tgt-instance .ti-v{font-size:12px; color:var(--txt)}
.tgt-instance .ti-soft{font-size:11px; color:var(--txt-2)}
.tgt-instance .ti-users{font-size:11px; color:var(--txt-3)}
.tgt-instance .ti-open{font-size:10px; padding:2px 7px; border-radius:5px; background:var(--warn-bg); color:var(--warn)}
.intel-actor{display:flex; gap:11px; align-items:flex-start}
.intel-fields{display:flex; flex-direction:column; gap:4px; margin-top:2px}
.intel-field{display:flex; justify-content:space-between; gap:10px; font-size:11px}
.intel-field .if-k{color:var(--txt-3); flex:none}
.intel-field .if-v{color:var(--txt-2); text-align:right; word-break:break-all}
.intel-links{margin-top:12px; border:1px solid var(--line-soft); border-radius:var(--r); overflow:hidden}
.intel-h{display:flex; align-items:baseline; justify-content:space-between; padding:9px 12px; background:var(--bg-2);
  font-size:11.5px; font-weight:600; border-bottom:1px solid var(--line-soft)}
.intel-h .mono{font-size:10.5px; font-weight:400; color:var(--txt-3)}
.intel-link{display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:1px solid var(--line-soft)}
.intel-link:last-child{border-bottom:none}
.intel-link .il-dom{flex:1; font-size:12px; color:var(--txt); word-break:break-all}
.intel-link .il-meta{font-size:10.5px; color:var(--txt-3); flex:none}
.il-tag{font-size:10px; padding:2px 8px; border-radius:5px; flex:none}
.ilt-ok{background:var(--ok-bg); color:var(--ok)}
.ilt-warn{background:var(--warn-bg); color:var(--warn)}
.ilt-bad{background:var(--bad-bg); color:var(--bad)}
.il-bad .il-dom{color:var(--bad)}
.il-pivot{margin-left:auto}

.behav-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px}
.behav-card{background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r); padding:11px 13px}
.behav-h{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:9px; font-size:11.5px; color:var(--txt-2)}
.behav-h .mono{font-size:11px}
.barchart{display:flex; align-items:flex-end; gap:2px}
.bar{flex:1; border-radius:2px 2px 0 0; min-height:2px}
.spark{display:block; overflow:visible}
.behav-row2{margin-bottom:12px}
.ratio{background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r); padding:11px 13px}
.ratio-bar{display:flex; height:9px; border-radius:5px; overflow:hidden; gap:2px; margin-bottom:8px}
.ratio-seg{display:block; height:100%; border-radius:3px}
.r-reply{background:var(--warn)} .r-orig{background:var(--accent)}
.ratio-legend{display:flex; gap:16px; font-size:11px; color:var(--txt-2)}
.ratio-legend .dot{display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:5px; vertical-align:middle}
.behav-tags{display:flex; flex-direction:column; gap:10px}
.bt-group{display:flex; flex-direction:column; gap:6px}
.bt-k{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--txt-3); font-weight:600}
.prior{margin-top:12px; background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:var(--r); padding:11px 13px}
.prior-k{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--txt-3); font-weight:600}
.prior-body{display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-top:7px}
.prior-count{font-size:12px; color:var(--txt); font-weight:500}

.posts{display:flex; flex-direction:column; gap:8px}
.post{background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r); padding:12px 14px}
.post-withheld{border-style:dashed; border-color:var(--bad); background:var(--bad-bg)}
.post-text{font-size:13px; line-height:1.55; color:var(--txt); text-wrap:pretty}
.post-foot{display:flex; align-items:center; gap:10px; margin-top:9px; flex-wrap:wrap}
.post-when{font-size:10.5px; color:var(--txt-3)}
.post-metrics{font-size:10.5px; color:var(--txt-3)}
.post-flags{display:flex; gap:4px; margin-left:auto; flex-wrap:wrap}
.pflag{font-size:9.5px; font-weight:600; padding:2px 6px; border-radius:4px; background:var(--bg-inset); color:var(--txt-3); text-transform:uppercase; letter-spacing:.03em}
.pflag-bad{background:var(--bad-bg); color:var(--bad)}
/* content-warning (CW / spoiler) review + per-post banners */
.cw-review{display:flex; gap:10px; align-items:flex-start; padding:9px 12px; border-radius:var(--r);
  border:1px solid var(--line-soft); margin-bottom:10px}
.cw-review-ok{background:var(--ok-bg); border-color:color-mix(in oklab, var(--ok) 30%, transparent)}
.cw-review-warn{background:var(--warn-bg); border-color:color-mix(in oklab, var(--warn) 30%, transparent)}
.cw-review-bad{background:var(--bad-bg); border-color:color-mix(in oklab, var(--bad) 35%, transparent)}
.cw-review-icon{font-size:14px; line-height:1.5}
.cw-review-ok .cw-review-icon{color:var(--ok)} .cw-review-warn .cw-review-icon{color:var(--warn)} .cw-review-bad .cw-review-icon{color:var(--bad)}
.cw-review-body{display:flex; flex-direction:column; gap:1px}
.cw-review-body b{font-size:12px}
.cw-review-detail{font-size:10.5px; color:var(--txt-2); text-wrap:pretty}
.post-cw{display:flex; align-items:baseline; gap:8px; margin-bottom:8px; padding:6px 9px; border-radius:6px;
  background:var(--warn-bg); border:1px solid color-mix(in oklab, var(--warn) 28%, transparent)}
.post-cw-label{font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  color:var(--warn); padding:1px 5px; border:1px solid currentColor; border-radius:4px; flex:none; line-height:1.4}
.post-cw-text{font-size:12px; font-weight:500; color:var(--txt-2); text-wrap:pretty}
.post-cw-hit{margin-left:auto; font-size:9.5px; font-weight:700; color:var(--bad); white-space:nowrap; flex:none}
.post-cw-bad{background:var(--bad-bg); border-color:color-mix(in oklab, var(--bad) 38%, transparent)}
.post-cw-bad .post-cw-label{color:var(--bad)}
.post-cw-missing{background:transparent; border-style:dashed; border-color:color-mix(in oklab, var(--warn) 45%, transparent)}
.post-cw-missing .post-cw-text{color:var(--txt-3); font-style:italic; font-weight:400}

.sw-badge{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:500; color:var(--txt-2)}
.sw-dot{width:7px; height:7px; border-radius:50%}
.sw-shark .sw-dot{background:oklch(0.72 0.13 300)} .sw-masto .sw-dot{background:var(--accent)}
.avatar{display:inline-grid; place-items:center; font-family:var(--sans); font-weight:600; flex:none;
  box-shadow:0 0 0 1px oklch(1 0 0/.06) inset}

/* toast */
.toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:50;
  background:var(--bg-3); border:1px solid var(--line); border-radius:var(--r); padding:10px 18px;
  font-size:13px; font-weight:500; box-shadow:var(--shadow); animation:rise .2s ease}
.toast-ok{border-left:3px solid var(--ok)} .toast-warn{border-left:3px solid var(--warn)} .toast-bad{border-left:3px solid var(--bad)}
@keyframes rise{from{opacity:0; transform:translate(-50%,8px)}to{opacity:1; transform:translate(-50%,0)}}

/* density */
.density-compact{font-size:13px}
.density-compact .qrow{padding:7px 11px 7px 13px}
.density-compact .inspector{padding:16px 22px 50px}
.density-compact .insp-sec{margin-top:16px}

@media (max-width:1100px){
  .app{grid-template-columns:200px minmax(290px,360px) 1fr}
  .osint-grid{grid-template-columns:1fr 1fr}
}

/* ====== connections / live ====== */
.conn-btn{display:flex; align-items:center; gap:8px; width:100%; margin-bottom:16px; padding:8px 10px;
  background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r-s); cursor:pointer;
  color:var(--txt-2); font-family:var(--sans); transition:.12s}
.conn-btn:hover{background:var(--bg-3); color:var(--txt)}
.mode-pill{font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:.08em; padding:2px 6px; border-radius:4px}
.mode-live{background:var(--ok-bg); color:var(--ok)}
.mode-demo{background:var(--bg-inset); color:var(--txt-3)}
.conn-btn-l{flex:1; text-align:left; font-size:13px; font-weight:500}
.conn-btn-n{font-size:11px; color:var(--txt-3)}
.srv-demo{font-size:8.5px; letter-spacing:.04em; text-transform:uppercase; color:var(--txt-3); background:var(--bg-inset); border-radius:3px; padding:1px 4px}
.srv-empty{padding:8px 10px; font-size:11px}
.live-tick{color:var(--ok); font-size:8px; line-height:1}
.fetch-warn{margin:8px 8px 0; padding:7px 11px; background:var(--warn-bg); border:1px solid oklch(0.82 0.13 80/.3);
  border-radius:var(--r-s); font-size:11px; color:var(--warn); font-family:var(--mono)}

.modal-scrim{position:fixed; inset:0; background:oklch(0.1 0.01 256/.66); backdrop-filter:blur(3px);
  display:grid; place-items:center; z-index:60; padding:24px}
.modal{width:min(640px,100%); max-height:88vh; overflow-y:auto; background:var(--bg-2);
  border:1px solid var(--line); border-radius:14px; box-shadow:0 24px 60px -20px oklch(0 0 0/.7)}
.modal-h{display:flex; align-items:flex-start; justify-content:space-between; padding:20px 22px 14px;
  border-bottom:1px solid var(--line-soft); position:sticky; top:0; background:var(--bg-2); z-index:1}
.modal-h h3{font-size:16px; font-weight:600}
.modal-sub{font-size:12px; color:var(--txt-3)}
.modal-x{background:none; border:none; color:var(--txt-3); font-size:15px; cursor:pointer; padding:4px}
.modal-x:hover{color:var(--txt)}
.modal-body{padding:18px 22px 24px; display:flex; flex-direction:column; gap:20px}

.conn-settings{display:flex; flex-direction:column; gap:13px; background:var(--bg-inset);
  border:1px solid var(--line-soft); border-radius:var(--r); padding:14px 16px}
.mode-toggle{display:flex; align-items:center; justify-content:space-between}
.ms-l{font-size:12.5px; font-weight:600; color:var(--txt)}
.seg-group{display:flex; gap:2px; background:var(--bg); border-radius:7px; padding:2px; border:1px solid var(--line-soft)}
.conn-check{display:flex; align-items:center; gap:9px; font-size:12.5px; color:var(--txt-2); cursor:pointer}
.conn-check input{accent-color:var(--accent); width:15px; height:15px}
.conn-check code{font-family:var(--mono); font-size:11px; background:var(--bg); padding:1px 5px; border-radius:4px; color:var(--txt-2)}
.conn-proxy{display:flex; flex-direction:column; gap:6px}
.conn-field-l{font-size:11px; font-weight:600; color:var(--txt-2)}
.opt{font-weight:400; color:var(--txt-3); font-size:10.5px}
.conn-input{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:7px;
  padding:9px 11px; color:var(--txt); font-size:13px; font-family:var(--sans); outline:none; transition:.12s}
.conn-input.mono{font-family:var(--mono); font-size:12px}
.conn-input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-bg)}
.conn-add{display:flex; flex-direction:column; gap:11px}
.conn-add-h{font-size:13px; font-weight:600}
.conn-grid{display:grid; grid-template-columns:1fr 1fr; gap:11px}
.conn-field{display:flex; flex-direction:column; gap:6px}
.conn-actions{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
.conn-connect{padding:9px 18px; flex:none}
.conn-connect:disabled{opacity:.45; cursor:not-allowed}
.conn-status{font-size:12px; flex:1; min-width:0; line-height:1.4}

.conn-list{display:flex; flex-direction:column; gap:10px}
.conn-list-h{font-size:13px; font-weight:600; display:flex; gap:8px; align-items:baseline}
.conn-list-h .mono{font-size:11px; color:var(--txt-3)}
.conn-host-group{display:flex; flex-direction:column; gap:5px}
.conn-host-l{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--txt-2); padding:2px 0}
.conn-row{display:flex; align-items:center; gap:10px; background:var(--bg-inset); border:1px solid var(--line-soft);
  border-radius:var(--r-s); padding:9px 12px}
.conn-row-err{border-color:oklch(0.67 0.19 24/.4)}
.conn-dot{width:8px; height:8px; border-radius:50%; flex:none}
.conn-dot.ok{background:var(--ok); box-shadow:0 0 6px -1px var(--ok)}
.conn-dot.bad{background:var(--bad)}
.conn-row-main{flex:1; min-width:0}
.conn-row-id{font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px}
.conn-role{font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--accent); background:var(--accent-bg); border-radius:4px; padding:1px 6px; font-weight:600}
.conn-row-sub{font-size:11px; color:var(--txt-3)}
.conn-default{font-family:var(--sans); font-size:11px; background:none; border:1px solid var(--line); border-radius:6px;
  padding:4px 9px; color:var(--txt-3); cursor:pointer; transition:.12s; white-space:nowrap}
.conn-default:hover{color:var(--txt)}
.conn-default.is-default{color:var(--warn); border-color:oklch(0.82 0.13 80/.4); background:var(--warn-bg)}
.conn-remove{background:none; border:none; color:var(--txt-3); cursor:pointer; padding:4px; font-size:13px}
.conn-remove:hover{color:var(--bad)}

.action-wrap{margin-top:26px; position:sticky; bottom:0; padding-top:14px;
  background:linear-gradient(180deg, transparent, var(--bg) 40%)}
.action-wrap .action-bar{margin-top:0; position:static; padding-top:0; background:none}
.acting-as{display:flex; align-items:center; gap:9px; margin-bottom:9px; justify-content:flex-end}
.aa-l{font-size:11px; color:var(--txt-3); text-transform:uppercase; letter-spacing:.05em; font-weight:600}
.aa-select{background:var(--bg-3); border:1px solid var(--line); border-radius:6px; color:var(--txt);
  font-size:12px; padding:5px 9px; outline:none; cursor:pointer}
.aa-select:focus{border-color:var(--accent)}

/* ====== enrichment ====== */
.conn-keys{display:flex; flex-direction:column; gap:7px}
.conn-keys-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px}
.conn-keys-note{font-size:10.5px; color:var(--txt-3); line-height:1.4}
.enrich-run{font-family:var(--sans); font-size:13px; font-weight:600; background:var(--accent-bg); color:var(--accent);
  border:1px solid var(--accent-d); border-radius:var(--r); padding:10px 16px; cursor:pointer; transition:.12s}
.enrich-run:hover{background:var(--accent); color:var(--bg)}
.enrich-rerun{background:none; border:1px solid var(--line); border-radius:6px; color:var(--txt-2); cursor:pointer; padding:2px 9px; font-size:13px}
.enrich-rerun:hover{color:var(--txt)}
.enrich-loading{display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--txt-2); padding:6px 0}
.spinner{width:14px; height:14px; border-radius:50%; border:2px solid var(--line); border-top-color:var(--accent); animation:spin .7s linear infinite; flex:none}
@keyframes spin{to{transform:rotate(360deg)}}
.src-strip{display:flex; flex-wrap:wrap; gap:5px}
.src-chip{display:inline-flex; align-items:center; gap:6px; font-size:10.5px; color:var(--txt-2);
  background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:20px; padding:3px 9px}
.src-chip-dot{width:6px; height:6px; border-radius:50%; background:var(--txt-3)}
.src-ok .src-chip-dot{background:var(--ok); box-shadow:0 0 5px -1px var(--ok)}
.src-na .src-chip-dot{background:var(--txt-3)}
.src-err .src-chip-dot{background:var(--bad)}
.src-off{opacity:.55}
.src-off .src-chip-dot{background:var(--txt-3)}
.kv-strong{display:flex; align-items:center; justify-content:space-between; gap:10px; padding-top:7px;
  margin-top:3px; border-top:1px solid var(--line-soft); font-size:11.5px; color:var(--txt-3)}
.kv-strong b{font-size:12px; font-family:var(--mono)}
.pivots{display:flex; flex-wrap:wrap; align-items:center; gap:5px; margin-top:4px}
.pivots-l{font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--txt-3); font-weight:600; margin-right:1px}
.pivot{display:inline-flex; align-items:center; gap:2px; font-size:10.5px; font-weight:500; color:var(--txt-2);
  background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:5px; padding:2px 6px; text-decoration:none; transition:.12s}
.pivot:hover{color:var(--accent); border-color:var(--accent-d); background:var(--bg-2)}
.pivot-ic{font-size:8px; opacity:.6}
.osint-pivots{display:flex; flex-direction:column; gap:4px; margin-top:2px}
.app-pivots{display:flex; flex-direction:column; gap:5px; margin-top:9px; padding-top:9px; border-top:1px solid var(--line-soft)}
.enrich-verdict{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:12px;
  background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:var(--r); padding:11px 14px}
.ev-l{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--txt-3); font-weight:600}
.ev-score{font-family:var(--mono); font-size:18px; font-weight:600}
.ev-rec{font-size:12px; font-weight:600; text-transform:capitalize; color:var(--txt-2)}
.ev-note{flex:1; min-width:160px; font-size:11.5px; color:var(--txt-3); line-height:1.45}

/* ====== services panel ====== */
.svc-btn{margin-top:-8px}
.svc-btn-i{font-size:12px; color:var(--accent)}
.conn-svc-hint{font-size:11.5px; color:var(--txt-3)}
.conn-svc-hint b{color:var(--txt-2)}
.svc-section-h{font-size:13px; font-weight:600; margin-bottom:10px}
.svc-proxy-box{display:flex; flex-direction:column; gap:9px; background:var(--bg-inset);
  border:1px solid var(--line-soft); border-radius:var(--r); padding:14px 16px}
.svc-proxy-note{font-size:11px; color:var(--txt-3); line-height:1.5}
.svc-proxy-note code{font-family:var(--mono); font-size:10.5px; background:var(--bg); padding:1px 5px; border-radius:4px; color:var(--txt-2)}
.svc-list{display:flex; flex-direction:column; gap:11px}
.svc-card{background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r); padding:13px 15px;
  display:flex; flex-direction:column; gap:9px}
.svc-card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:12px}
.svc-name{font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:8px}
.svc-proxy-tag{font-size:9px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--warn);
  background:var(--warn-bg); border-radius:4px; padding:1px 6px}
.svc-scope{font-size:11.5px; color:var(--txt-3); margin-top:2px}
.svc-status{display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:500; white-space:nowrap;
  padding:3px 9px; border-radius:20px; background:var(--bg-inset)}
.svc-status-dot{width:6px; height:6px; border-radius:50%; background:var(--txt-3)}
.ss-ok{color:var(--ok)} .ss-ok .svc-status-dot{background:var(--ok); box-shadow:0 0 6px -1px var(--ok)}
.ss-bad{color:var(--bad)} .ss-bad .svc-status-dot{background:var(--bad)}
.ss-warn{color:var(--warn)} .ss-warn .svc-status-dot{background:var(--warn)}
.ss-accent{color:var(--accent)} .ss-accent .svc-status-dot{background:var(--accent)}
.ss-na{color:var(--txt-3)}
.svc-used{font-size:11px; color:var(--txt-3)}
.svc-key-row{display:flex; gap:7px}
.svc-key-row .conn-input{flex:1}
.svc-vault-row{display:flex; align-items:center; gap:9px; font-size:11.5px; padding:6px 9px;
  background:var(--bg-inset); border-radius:8px}
.svc-vault-row .conn-remove{margin-left:auto}
.svc-vault-l{font-size:10px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--txt-3); flex:none}
.svc-vault-meta{color:var(--txt-3)}
.svc-share-row{display:flex; align-items:center; gap:9px}
.svc-reveal{background:var(--bg-3); border:1px solid var(--line); border-radius:7px; color:var(--txt-2);
  cursor:pointer; width:38px; flex:none; font-size:14px}
.svc-test{background:var(--accent-bg); border:1px solid var(--accent-d); color:var(--accent); border-radius:7px;
  font-family:var(--sans); font-size:12px; font-weight:600; padding:0 16px; cursor:pointer; flex:none; transition:.12s}
.svc-test:hover:not(:disabled){background:var(--accent); color:var(--bg)}
.svc-test:disabled{opacity:.4; cursor:not-allowed}
.svc-detail{font-size:11.5px; line-height:1.45}
.svc-usage{margin-top:2px; padding:7px 9px; background:var(--bg-inset); border-radius:8px; display:flex; flex-direction:column; gap:4px}
.svc-usage-top{display:flex; align-items:baseline; justify-content:space-between; font-size:11px; color:var(--txt-3); letter-spacing:.02em}
.svc-usage-top b{font-size:12.5px}
.svc-usage-q{display:inline-flex; align-items:center; justify-content:center; width:13px; height:13px; border-radius:50%; background:var(--rail); color:var(--txt-3); font-size:8px; font-weight:700; margin-left:4px; cursor:help}
.svc-usage-bar{height:5px; border-radius:3px; background:var(--rail); overflow:hidden}
.svc-usage-fill{display:block; height:100%; border-radius:3px; background:var(--ok); transition:width .4s ease}
.svc-usage-fill.u-warn{background:var(--warn)} .svc-usage-fill.u-bad{background:var(--bad)}
.svc-usage-sub{font-size:10px; color:var(--txt-3); font-family:var(--mono)}
.svc-link{font-size:11px; color:var(--txt-3); text-decoration:none; font-family:var(--mono)}
.svc-link:hover{color:var(--accent)}
.svc-free{display:flex; flex-direction:column}
.svc-free-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px}
.svc-free-item{display:flex; align-items:flex-start; gap:9px; background:var(--bg-inset); border:1px solid var(--line-soft);
  border-radius:var(--r-s); padding:9px 12px}
.svc-free-dot{width:7px; height:7px; border-radius:50%; background:var(--ok); flex:none; margin-top:4px; box-shadow:0 0 6px -1px var(--ok)}
.svc-free-item b{font-size:12px; font-weight:600; display:block}
.svc-free-item span{font-size:10.5px; color:var(--txt-3); display:block; margin-top:1px}

/* ====== scoring panel ====== */
.score-tabs{display:flex; gap:4px; padding:0 4px; margin-bottom:2px; border-bottom:1px solid var(--line-soft)}
.score-tab{font-family:var(--sans); font-size:12.5px; font-weight:600; color:var(--txt-3); background:none; border:none;
  border-bottom:2px solid transparent; padding:9px 13px; margin-bottom:-1px; cursor:pointer}
.score-tab:hover{color:var(--txt-2)}
.score-tab-on{color:var(--txt); border-bottom-color:var(--accent)}
.crow-unit{color:var(--txt-3); font-weight:400}
.pd-reset{display:inline-block; margin-top:0; margin-left:auto; font-size:11px; padding:3px 9px}
.pd-add{display:flex; gap:7px; margin:8px 0}
.pd-add .conn-input{flex:1}
.pd-block{margin-top:9px}
.pd-sub{font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--txt-3); font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:6px}
.pd-count{background:var(--bg-inset); border-radius:5px; padding:1px 6px; font-size:10px}
.pd-chips{display:flex; flex-wrap:wrap; gap:5px}
.pd-chip{display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-size:11px; color:var(--txt-2);
  background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:6px; padding:3px 4px 3px 8px}
.pd-chip button{background:none; border:none; color:var(--txt-3); cursor:pointer; font-size:13px; line-height:1; padding:0 3px; border-radius:4px}
.pd-chip button:hover{color:var(--bad); background:var(--bad-bg)}
.pd-chip-add{border-color:color-mix(in oklab, var(--accent) 40%, transparent); color:var(--txt)}
.pd-chip-off{opacity:.5; text-decoration:line-through}
.pd-chip-off button:hover{color:var(--ok); background:var(--ok-bg)}
.wgroup-h .pd-reset{text-transform:none; letter-spacing:0}
.score-intro{font-size:12px; color:var(--txt-2); line-height:1.6; background:var(--bg-inset);
  border:1px solid var(--line-soft); border-radius:var(--r); padding:13px 15px}
.score-intro b{color:var(--txt)}
.score-reset-all{display:block; margin-top:9px; font-family:var(--sans); font-size:11.5px; font-weight:500;
  background:var(--bg-3); border:1px solid var(--line); border-radius:6px; color:var(--txt-2); padding:5px 11px; cursor:pointer}
.score-reset-all:hover:not(:disabled){color:var(--txt)}
.score-reset-all:disabled{opacity:.4; cursor:not-allowed}
.wgroup{display:flex; flex-direction:column; gap:3px}
.wgroup-h{font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--txt-3); font-weight:600; margin-bottom:5px; display:flex; align-items:center; gap:8px}
.wrow{display:flex; align-items:center; gap:11px; padding:4px 0}
.wrow-l{display:flex; align-items:center; gap:8px; flex:1; min-width:0}
.wdot{width:7px; height:7px; border-radius:50%; flex:none}
.wdot.tone-bad{background:var(--bad)} .wdot.tone-warn{background:var(--warn)} .wdot.tone-ok{background:var(--ok)}
.wrow-label{font-size:12px; color:var(--txt); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.wrow-reset{background:none; border:none; color:var(--accent); cursor:pointer; font-size:12px; padding:0 2px; flex:none}
.wrow-help{flex:none; width:14px; height:14px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700; color:var(--txt-3); background:var(--bg-inset); cursor:help; user-select:none}
.wrow-help:hover,.wrow-help:focus{color:var(--accent); outline:none}
.wrange{width:150px; flex:none; accent-color:var(--accent); height:4px; cursor:pointer}
.wr-bad{accent-color:var(--bad)} .wr-warn{accent-color:var(--warn)} .wr-ok{accent-color:var(--ok)}
.wnum{width:50px; flex:none; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--txt);
  font-size:12px; padding:5px 7px; text-align:center; outline:none}
.wnum:focus{border-color:var(--accent)}
.cache-note{font-size:11.5px; color:var(--txt-3); line-height:1.55}
.cache-note b{color:var(--txt-2); font-weight:600}
.cache-stats{display:flex; flex-wrap:wrap; gap:8px; margin:10px 0}
.cstat{background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:8px; padding:8px 13px; display:flex; flex-direction:column; gap:1px; min-width:64px}
.cstat b{font-size:16px; font-family:var(--mono); font-weight:600}
.cstat span{font-size:9.5px; color:var(--txt-3); text-transform:uppercase; letter-spacing:.04em}
.cache-actions{display:flex; gap:8px; flex-wrap:wrap}
.cache-import{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:8px}
.cache-import-msg{font-size:11px; font-weight:500}
.cache-note-sub{margin-top:7px}
.cache-btn{font-family:var(--sans); font-size:11.5px; font-weight:500; background:var(--bg-3); border:1px solid var(--line);
  border-radius:7px; color:var(--txt-2); padding:7px 13px; cursor:pointer; transition:.12s}
.cache-btn:hover{color:var(--txt)}
.cache-btn-warn{color:var(--bad); border-color:oklch(0.67 0.19 24/.3)}

/* affirmation terms */
.affirm-row{display:flex; align-items:center; gap:11px; padding:5px 0}
.affirm-host{display:flex; align-items:center; gap:8px; width:200px; flex:none; font-size:12px; color:var(--txt-2); overflow:hidden}
.affirm-host .mono{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.affirm-input{flex:1; font-size:12px}

/* cache age on source chips */
.src-cached{opacity:.85}
.src-cached .src-chip-dot{background:var(--accent)}
.src-age{margin-left:5px; font-family:var(--mono); font-size:9px; color:var(--accent); background:var(--accent-bg); border-radius:4px; padding:0 4px}
.enrich-btns{display:flex; gap:5px}

/* IP correlation card */
.corr-card{margin-top:12px; background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r); padding:12px 14px}
.corr-h{display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-bottom:9px}
.corr-h b{font-size:12.5px}
.corr-h .mono{font-size:10.5px; color:var(--txt-3)}
.corr-list{display:flex; flex-wrap:wrap; gap:6px}
.corr-chip{display:inline-flex; align-items:center; gap:7px; font-size:11.5px; background:var(--bg-inset);
  border:1px solid var(--line-soft); border-radius:7px; padding:4px 9px; color:var(--txt)}
.corr-chip.corr-bad{border-color:oklch(0.67 0.19 24/.4); background:var(--bad-bg)}
.corr-chip.corr-ok{border-color:oklch(0.76 0.13 158/.3); background:var(--ok-bg)}
.corr-meta{color:var(--txt-3); font-size:10px}
.corr-note{font-size:10.5px; color:var(--txt-3); margin-top:9px; line-height:1.45}

/* trend card */
.trend-card{margin-top:12px; background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r); padding:12px 14px}
.trend-h{font-size:12.5px; font-weight:600; margin-bottom:8px; display:flex; justify-content:space-between; align-items:baseline}
.trend-h .mono{font-size:10px; color:var(--txt-3); font-weight:400}
.trend-row{display:flex; align-items:center; gap:12px; margin-top:6px}
.trend-k{font-size:11px; color:var(--txt-3); width:96px; flex:none}

/* ====== email confirmation gate ====== */
.confirm-pill{font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:20px; white-space:nowrap; display:inline-flex; align-items:center; gap:4px}
.confirm-pill.cp-ok{background:var(--ok-bg); color:var(--ok)}
.confirm-pill.cp-bad{background:var(--bad-bg); color:var(--bad)}
.confirm-gate{display:flex; align-items:center; gap:13px; padding:11px 14px; border-radius:var(--r); border:1px solid; margin-top:4px}
.confirm-gate .cg-icon{width:26px; height:26px; border-radius:50%; flex:none; display:grid; place-items:center; font-size:14px; font-weight:700}
.confirm-gate .cg-body{flex:1; min-width:0; display:flex; flex-direction:column; gap:2px}
.confirm-gate .cg-body b{font-size:13px; font-weight:600}
.confirm-gate .cg-sub{font-size:11px; color:var(--txt-2); line-height:1.45; text-wrap:pretty}
.confirm-gate .cg-tag{font-size:10.5px; color:var(--txt-3); flex:none; white-space:nowrap}
.confirm-ok{background:var(--ok-bg); border-color:oklch(0.76 0.13 158/.3)}
.confirm-ok .cg-icon{background:var(--ok); color:oklch(0.18 0.03 158)}
.confirm-ok .cg-body b{color:var(--ok)}
.confirm-bad{background:var(--bad-bg); border-color:oklch(0.67 0.19 24/.35)}
.confirm-bad .cg-icon{background:var(--bad); color:oklch(0.98 0.02 24)}
.confirm-bad .cg-body b{color:var(--bad)}
.confirm-unknown{background:var(--warn-bg); border-color:oklch(0.82 0.13 80/.3)}
.confirm-unknown .cg-icon{background:var(--warn); color:oklch(0.2 0.03 80)}
.confirm-unknown .cg-body b{color:var(--warn)}
.confirm-resend{flex:none; font-family:var(--sans); font-size:12px; font-weight:600; padding:8px 14px; border-radius:7px;
  background:var(--bad); color:oklch(0.98 0.02 24); border:none; cursor:pointer; white-space:nowrap; transition:.12s}
.confirm-resend:hover{transform:translateY(-1px); box-shadow:0 4px 12px -4px oklch(0.67 0.19 24/.5)}
.cg-resent{flex:none; font-size:12px; font-weight:600; color:var(--ok); background:var(--ok-bg); border-radius:7px; padding:7px 13px; white-space:nowrap}

/* unconfirmed marker in the queue row */
.qrow-unconf{font-size:11px; color:var(--bad); flex:none; line-height:1; opacity:.9}

/* ====== sign-in IP history ====== */
.signin-summary{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:11px}
.ss-stat{font-size:11.5px; color:var(--txt-2); background:var(--bg-inset); border:1px solid var(--line-soft);
  border-radius:7px; padding:5px 11px; white-space:nowrap}
.ss-stat b{font-family:var(--mono); font-size:13px; font-weight:600; color:var(--txt); margin-right:3px}
.ss-stat.ss-warn{background:var(--warn-bg); color:var(--warn)} .ss-stat.ss-warn b{color:var(--warn)}
.ss-stat.ss-bad{background:var(--bad-bg); color:var(--bad); font-weight:600}
.signin-list{display:flex; flex-direction:column; gap:1px; background:var(--line-soft); border:1px solid var(--line-soft);
  border-radius:var(--r); overflow:hidden}
.signin-row{display:flex; align-items:center; gap:11px; background:var(--bg-2); padding:9px 13px}
.signin-row.signin-flag{background:var(--bad-bg)}
.signin-ip{font-size:12px; color:var(--txt); flex:none; width:128px}
.signin-geo{flex:1; min-width:0; font-size:11px; color:var(--txt-3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.signin-flags{display:flex; gap:4px; flex:none}
.signin-tag{font-size:9px; font-weight:700; letter-spacing:.04em; padding:1px 5px; border-radius:4px}
.signin-tag.st-bad{background:var(--bad-bg); color:var(--bad)} .signin-tag.st-warn{background:var(--warn-bg); color:var(--warn)}
.signin-count{font-size:11px; color:var(--txt-2); flex:none; width:38px; text-align:right}
.signin-when{font-size:10.5px; color:var(--txt-3); flex:none; width:62px; text-align:right}
.signin-corr{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px}
.signin-corr .corr-chip{font-size:11px}

/* ====== denylists modal ====== */
.dl-import{display:flex; flex-direction:column; gap:11px; background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:var(--r); padding:14px 16px}
.dl-presets{display:flex; flex-wrap:wrap; align-items:center; gap:7px}
.dl-presets-l{font-size:11.5px; color:var(--txt-3); margin-right:2px}
.dl-preset{font-family:var(--sans); font-size:11.5px; font-weight:500; color:var(--accent); background:var(--accent-bg);
  border:1px solid var(--accent-d); border-radius:20px; padding:5px 12px; cursor:pointer; transition:.12s}
.dl-preset:hover:not(:disabled){background:var(--accent); color:var(--bg)}
.dl-preset:disabled{opacity:.5; cursor:wait}
.dl-row{display:flex; gap:9px}
.dl-name{flex:1}
.dl-select{flex:none; width:210px; background:var(--bg); border:1px solid var(--line); border-radius:7px; color:var(--txt);
  font-family:var(--sans); font-size:12.5px; padding:9px 10px; outline:none; cursor:pointer}
.dl-select:focus{border-color:var(--accent)}
.dl-modes{align-self:flex-start}
.dl-textarea{min-height:104px; resize:vertical; line-height:1.5; font-size:12px; white-space:pre}
.dl-upload{display:flex; align-items:center; gap:11px; background:var(--bg); border:1px dashed var(--line);
  border-radius:8px; padding:14px 16px; cursor:pointer; font-size:12.5px; color:var(--txt-2)}
.dl-upload:hover{border-color:var(--accent-d)}
.dl-upload input{font-size:12px; color:var(--txt-3)}
.dl-url-row{display:flex; gap:7px}
.dl-url-row .conn-input{flex:1}
.dl-err{font-size:11.5px; color:var(--warn); background:var(--warn-bg); border:1px solid oklch(0.82 0.13 80/.3);
  border-radius:7px; padding:8px 11px; line-height:1.45}
.dl-preview{display:flex; align-items:center; gap:11px; padding-top:4px}
.dl-preview-fmt{font-size:10.5px; color:var(--txt-3); background:var(--bg); border:1px solid var(--line-soft); border-radius:5px; padding:2px 8px}
.dl-preview-counts{font-size:12.5px; color:var(--txt); font-weight:500}
.dl-add{margin-left:auto; font-family:var(--sans); font-size:12.5px; font-weight:600; background:var(--accent);
  color:var(--bg); border:none; border-radius:7px; padding:8px 16px; cursor:pointer; transition:.12s}
.dl-add:hover:not(:disabled){transform:translateY(-1px)}
.dl-add:disabled{opacity:.4; cursor:not-allowed}
.dl-lists{display:flex; flex-direction:column; gap:10px}
.dl-lists-h{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap}
.dl-export{display:flex; gap:7px; flex-wrap:wrap}
.dl-card{display:flex; flex-direction:column; gap:9px; background:var(--bg-2); border:1px solid var(--line-soft);
  border-radius:var(--r); padding:12px 14px}
.dl-card-off{opacity:.55}
.dl-card-top{display:flex; align-items:flex-start; gap:11px}
.dl-toggle{flex:none; display:flex; align-items:center; padding-top:1px}
.dl-toggle input{accent-color:var(--accent); width:16px; height:16px; cursor:pointer}
.dl-card-id{flex:1; min-width:0}
.dl-card-name{font-size:13.5px; font-weight:600}
.dl-card-meta{font-size:10.5px; color:var(--txt-3); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.dl-card-stats{display:flex; flex-wrap:wrap; gap:7px}
.dl-stat{font-size:11px; color:var(--txt-2); background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:6px; padding:3px 9px}
.dl-stat b{font-family:var(--mono); color:var(--txt); margin-right:3px}
.dl-stat-bad{background:var(--bad-bg); color:var(--bad); border-color:transparent}
.dl-stat-warn{background:var(--warn-bg); color:var(--warn); border-color:transparent}
.dl-empty{padding:14px 4px}
.dl-note{font-size:11px; color:var(--txt-3); line-height:1.55; border-top:1px solid var(--line-soft); padding-top:13px}
/* moderator note panel */
.modnote-body{display:flex; flex-direction:column; gap:8px}
.modnote-ta{font-family:var(--mono); font-size:11px; line-height:1.55; background:var(--bg-inset); border:1px solid var(--line); border-radius:7px; padding:9px 11px; color:var(--txt); resize:vertical; min-height:88px; width:100%; box-sizing:border-box}
.modnote-ta:focus{outline:2px solid var(--accent); outline-offset:1px}
.modnote-hint{font-size:10.5px; color:var(--txt-3); line-height:1.55}
.modnote-hint-path{background:var(--bg-inset); border-radius:6px; padding:6px 9px}
.modnote-actions{display:flex; gap:8px; align-items:center}
.modnote-regen{background:none; border:1px solid var(--line); color:var(--txt-3); border-radius:6px; padding:4px 10px; font-size:11px; font-family:var(--sans); cursor:pointer; flex:none}
.modnote-regen:hover{color:var(--txt); border-color:var(--txt-3)}
.modnote-write{background:var(--ok); color:#fff; border:none; border-radius:6px; padding:5px 13px; font-size:11.5px; font-weight:600; font-family:var(--sans); cursor:pointer; margin-left:auto; flex:none}
.modnote-write:hover{opacity:.88} .modnote-write:disabled{opacity:.45; cursor:not-allowed}
.modnote-copy{background:var(--accent); color:#fff; border:none; border-radius:6px; padding:5px 13px; font-size:11.5px; font-weight:600; font-family:var(--sans); cursor:pointer; margin-left:auto; flex:none}
.modnote-copy:hover{opacity:.88}
.modnote-err{font-size:11px; color:var(--bad); line-height:1.45}
.modnote-expand{background:var(--bg-inset); border:1px dashed var(--line); color:var(--accent); border-radius:7px; padding:6px 12px; font-size:11.5px; font-weight:600; font-family:var(--sans); cursor:pointer; width:100%}
.modnote-expand:hover{background:var(--rail); border-style:solid}
.resolved-hold-note{font-size:10.5px; color:var(--warn); font-weight:400}
/* tour download links */
.tour-dl-link{color:var(--accent); font-weight:600; text-decoration:none; border-bottom:1px solid var(--accent)}
.tour-dl-link:hover{opacity:.8}
.tour-dl-note{font-size:10px; color:var(--txt-3)}
.selfcheck{display:flex; flex-direction:column; gap:4px; margin-top:8px}
.selfcheck-sum{font-size:11.5px; font-weight:600; padding:5px 0 8px}
.selfcheck-row{display:grid; grid-template-columns:68px 148px 1fr; gap:8px; align-items:baseline; font-size:12px; padding:5px 0; border-bottom:1px solid var(--line-soft)}
.selfcheck-k{font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--txt-3)}
.selfcheck-n{font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.selfcheck-d{font-size:11.5px; color:var(--txt-2); line-height:1.45}

/* ====== known-bad-actor banner (report + account inspector) ====== */
.deny-banner{display:flex; gap:13px; padding:12px 14px; border-radius:var(--r); border:1px solid; margin-bottom:14px}
.deny-banner.deny-bad{background:var(--bad-bg); border-color:oklch(0.67 0.19 24/.4)}
.deny-banner.deny-warn{background:var(--warn-bg); border-color:oklch(0.82 0.13 80/.35)}
.deny-icon{width:28px; height:28px; border-radius:7px; flex:none; display:grid; place-items:center; font-size:16px; font-weight:700}
.deny-bad .deny-icon{background:var(--bad); color:oklch(0.98 0.02 24)}
.deny-warn .deny-icon{background:var(--warn); color:oklch(0.2 0.03 80)}
.deny-body{flex:1; min-width:0; display:flex; flex-direction:column; gap:7px}
.deny-title{font-size:13.5px; font-weight:700; display:flex; align-items:baseline; gap:9px; flex-wrap:wrap}
.deny-bad .deny-title{color:var(--bad)} .deny-warn .deny-title{color:var(--warn)}
.deny-sub{font-family:var(--mono); font-size:11px; font-weight:400; color:var(--txt-2)}
.deny-hits{display:flex; flex-wrap:wrap; gap:6px}
.deny-hit{display:inline-flex; align-items:center; gap:7px; font-size:11px; background:var(--bg-2);
  border:1px solid var(--line-soft); border-radius:7px; padding:3px 9px}
.deny-hit b{font-weight:600; color:var(--txt)}
.deny-hit-sev{font-size:9px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:1px 5px; border-radius:4px}
.dh-bad .deny-hit-sev{background:var(--bad-bg); color:var(--bad)}
.dh-warn .deny-hit-sev{background:var(--warn-bg); color:var(--warn)}
.dh-noop .deny-hit-sev{background:var(--bg-inset); color:var(--txt-3)}
.deny-hit-on{font-size:10px; color:var(--txt-3)}
.deny-comment{font-size:11.5px; color:var(--txt-2); font-style:italic; line-height:1.45; text-wrap:pretty}

/* ====== per-IP check (sign-in history) ====== */
.signin-row-wrap{display:flex; flex-direction:column; background:var(--bg-2)}
.signin-row-wrap.signin-open{box-shadow:inset 0 0 0 1px var(--line-soft)}
.signin-row-wrap .signin-row{background:none}
.signin-check{flex:none; font-family:var(--sans); font-size:11px; font-weight:600; color:var(--accent);
  background:var(--accent-bg); border:1px solid var(--accent-d); border-radius:6px; padding:4px 10px; min-width:54px;
  display:grid; place-items:center; cursor:pointer; transition:.12s}
.signin-check:hover:not(:disabled){background:var(--accent); color:var(--bg)}
.signin-check:disabled{opacity:.6; cursor:wait}
.signin-check .spinner{width:12px; height:12px}
.signin-res{display:flex; flex-wrap:wrap; align-items:center; gap:7px 14px; padding:9px 13px 11px;
  border-top:1px dashed var(--line-soft); background:var(--bg-inset); animation:sdopen .16s ease}
.signin-res-err{color:var(--bad); font-size:11.5px; font-family:var(--mono)}
.sr-item{display:inline-flex; align-items:baseline; gap:6px; font-size:11px}
.sr-k{color:var(--txt-3); text-transform:uppercase; letter-spacing:.04em; font-size:9.5px; font-weight:600}
.sr-v{color:var(--txt); font-size:11px}
.sr-na{color:var(--txt-3); font-style:italic}
.sr-flag{font-size:9px; font-weight:700; letter-spacing:.04em; padding:2px 6px; border-radius:4px}
.sr-flag.sf-bad{background:var(--bad-bg); color:var(--bad)} .sr-flag.sf-warn{background:var(--warn-bg); color:var(--warn)}
/* per-row IP block button */
.signin-block{flex:none; font-family:var(--sans); font-size:13px; line-height:1; color:var(--bad);
  background:var(--bad-bg); border:1px solid var(--bad-line, var(--line)); border-radius:6px; padding:5px 9px;
  cursor:pointer; transition:.12s}
.signin-block:hover:not(:disabled){background:var(--bad); color:var(--bg)}
.signin-block-done{color:var(--ok); background:var(--ok-bg); cursor:default}
.signin-block:disabled{cursor:default}

/* ====== block buttons (email domain / mail servers / IP) ====== */
.block-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:4px}
.block-row-app{margin-top:12px; padding-top:12px; border-top:1px solid var(--line-soft)}
.block-btn{display:inline-flex; align-items:center; gap:7px; font-family:var(--sans); font-size:11.5px; font-weight:600;
  color:var(--bad); background:var(--bad-bg); border:1px solid color-mix(in oklab, var(--bad) 35%, transparent);
  border-radius:7px; padding:6px 11px; cursor:pointer; transition:.12s}
.block-btn:hover:not(:disabled){background:var(--bad); color:var(--bg)}
.block-btn:hover:not(:disabled) .block-sub{color:var(--bg); opacity:.85}
.block-ic{font-size:13px; line-height:1}
.block-sub{font-size:10px; font-weight:500; color:var(--txt-3); padding-left:2px; max-width:230px; overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap}
.block-btn.block-protected{color:var(--txt-3); background:var(--bg-inset); border-color:var(--line-soft); cursor:not-allowed}
.block-btn.block-protected .block-sub{color:var(--txt-3)}
.block-btn.block-done{color:var(--ok); background:var(--ok-bg); border-color:color-mix(in oklab, var(--ok) 35%, transparent); cursor:default}
.block-btn.block-done .block-sub{color:var(--ok)}

/* MX server list inside the email card */
.mx-block{padding-top:8px; margin-top:3px; border-top:1px solid var(--line-soft); display:flex; flex-direction:column; gap:6px}
.mx-h{display:flex; align-items:baseline; justify-content:space-between; gap:8px; font-size:10px; font-weight:600;
  text-transform:uppercase; letter-spacing:.05em; color:var(--txt-3)}
.mx-prov{font-family:var(--sans); font-size:10.5px; font-weight:600; text-transform:none; letter-spacing:0; color:var(--accent)}
.mx-list{display:flex; flex-direction:column; gap:3px}
.mx-row{display:flex; align-items:center; gap:8px; font-size:11px; color:var(--txt-2)}
.mx-pri{display:inline-grid; place-items:center; min-width:22px; height:16px; padding:0 4px; border-radius:4px;
  background:var(--bg-inset); color:var(--txt-3); font-size:10px}
.mx-blocked{margin-left:auto; font-size:9px; font-weight:700; letter-spacing:.04em; color:var(--bad);
  background:var(--bad-bg); border-radius:4px; padding:1px 6px}

/* ====== diagnostics ====== */
.fetch-warn{display:flex; align-items:center; gap:10px; width:calc(100% - 16px); text-align:left; cursor:pointer;
  font-family:var(--mono)}
.fetch-warn:hover{background:oklch(0.82 0.13 80/.2)}
.fetch-warn-l{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.fetch-warn-cta{flex:none; font-family:var(--sans); font-weight:600; font-size:10.5px; text-decoration:underline}
.diag-btn{display:flex; align-items:center; gap:8px; width:100%; margin-bottom:16px; padding:7px 10px;
  background:none; border:1px solid var(--line-soft); border-radius:var(--r-s); cursor:pointer; color:var(--txt-2);
  font-family:var(--sans); font-size:12.5px; transition:.12s}
.diag-btn:hover{background:var(--bg-2); color:var(--txt)}
.diag-btn-dot{width:7px; height:7px; border-radius:50%; flex:none}
.diag-btn-dot.ok{background:var(--ok); box-shadow:0 0 6px -1px var(--ok)}
.diag-btn-dot.bad{background:var(--bad)}
.diag-btn-l{flex:1; text-align:left}
.diag-btn-n{font-size:11px; color:var(--bad); background:var(--bad-bg); border-radius:20px; padding:0 7px}
.diag-env,.diag-sec{display:flex; flex-direction:column; gap:9px}
.diag-env-grid{display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line-soft);
  border:1px solid var(--line-soft); border-radius:var(--r); overflow:hidden}
.diag-kv{display:flex; flex-direction:column; gap:3px; background:var(--bg-2); padding:9px 13px}
.diag-kv span{font-size:9.5px; color:var(--txt-3); text-transform:uppercase; letter-spacing:.05em; font-weight:600}
.diag-kv b{font-size:12px; font-weight:600; word-break:break-word}
.diag-tip{font-size:11px; color:var(--txt-3); line-height:1.5; background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:7px; padding:9px 12px}
.diag-tip b{color:var(--txt-2)}
.diag-clean{color:var(--ok)}
.diag-err{background:var(--bg-2); border:1px solid var(--line-soft); border-left:2px solid var(--bad); border-radius:var(--r); padding:11px 13px; display:flex; flex-direction:column; gap:6px}
.diag-err-top{display:flex; align-items:center; gap:9px}
.diag-err-host{font-size:12.5px; font-weight:600; color:var(--txt)}
.diag-err-what{font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--txt-3); background:var(--bg-inset); border-radius:4px; padding:1px 7px}
.diag-err-msg{font-size:11.5px; color:var(--bad); background:var(--bad-bg); border-radius:6px; padding:7px 10px; word-break:break-word; line-height:1.45}
.diag-err-hint{font-size:11.5px; color:var(--txt-2); line-height:1.5; text-wrap:pretty}
.diag-conn{display:flex; align-items:center; gap:9px; background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:var(--r-s); padding:8px 11px; flex-wrap:wrap}
.diag-conn-host{font-size:12px; font-weight:600; color:var(--txt)}
.diag-conn-sw{font-size:10px; color:var(--txt-3); background:var(--bg); border:1px solid var(--line-soft); border-radius:4px; padding:1px 6px}
.diag-conn-id{flex:1; min-width:0; font-size:11px; color:var(--txt-2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.diag-conn-st{font-size:11px; font-weight:500}
.diag-log{display:flex; flex-direction:column; gap:2px; max-height:200px; overflow-y:auto; background:var(--bg-inset); border:1px solid var(--line-soft); border-radius:var(--r); padding:8px 10px}
.diag-log-row{display:flex; gap:9px; font-size:10.5px; line-height:1.5; color:var(--txt-2)}
.diag-log-time{flex:none; color:var(--txt-3)}
.diag-log-host{flex:none; color:var(--accent)}
.diag-log-what{flex:none; color:var(--txt-3)}
.diag-log-msg{flex:1; min-width:0; color:var(--bad); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}

/* ====== archive export buttons ====== */
.export-btn{flex:none; font-family:var(--sans); font-size:11px; font-weight:600; color:var(--txt-2);
  background:var(--bg-3); border:1px solid var(--line); border-radius:6px; padding:5px 10px; cursor:pointer;
  white-space:nowrap; transition:.12s}

.export-menu-item span{font-size:10.5px; color:var(--txt-3); font-family:var(--mono)}
.qexport{flex:none; font-family:var(--sans); font-size:13px; font-weight:600; color:var(--txt-2);

/* ====== server-side account search ====== */
