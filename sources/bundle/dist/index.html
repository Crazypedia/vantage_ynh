<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — campaign wordlist store + matcher
   ------------------------------------------------------------
   Operator-editable lists of terms / regex patterns tied to a
   named spam or abuse campaign. Two states:
     • "suspected" — a hunch / emerging pattern (lighter weight)
     • "confirmed" — a verified, actioned campaign (heavier weight)
   Matches are surfaced in the join-reason text analysis and added
   as tunable signals in the live risk score. Each campaign carries
   its OWN weight so severity is per-campaign, not global.
   Persists in localStorage. Plain JS. Exposes window.ReefCampaigns.
   ============================================================ */
(function () {
  const KEY = "reef.campaigns.v1";
  let _version = 0;

  const DEFAULT_WEIGHT = { suspected: 14, confirmed: 32 };

  // Seeded starter campaigns (operator can edit / disable / delete).
  const SEED = [
    {
      id: "seed_gaming", name: "Gaming-currency giveaway spam", status: "suspected", lens: "spam",
      weight: 22, enabled: true, notes: "Free in-game currency bait — classic engagement spam.",
      terms: ["free v-bucks", "free vbucks", "v-bucks", "robux", "free robux", "giveaway", "claim now", "limited time"],
      patterns: ["bit\\.ly/\\S+"],
    },
    {
      id: "seed_phish", name: "Credential reverify phishing", status: "suspected", lens: "spam",
      weight: 28, enabled: true, notes: "Impersonates staff; directs users to a 'reverify' page.",
      terms: ["reverify", "re-verify", "verify your password", "unusual activity", "confirm your account", "avoid suspension"],
      patterns: ["\\bverify\\b.{0,20}\\bpassword\\b"],
    },
    {
      id: "seed_advfee", name: "Advance-fee / investment solicitation", status: "suspected", lens: "spam",
      weight: 18, enabled: true, notes: "Advance-fee fraud language in a join reason.",
      terms: ["investment opportunity", "financial consultant", "mutual investment", "god bless", "dear friend", "business proposal"],
      patterns: [],
    },
    {
      id: "seed_iftas_usernames", name: "IFTAS spam username strings (starter)", status: "suspected", lens: "spam",
      weight: 16, enabled: true, notes: "Representative spam username tokens \u2014 replace with the live IFTAS \u2018Spam User Name Text Strings\u2019 list.",
      terms: ["casino", "porn", "escort", "viagra", "crypto", "forex", "bet365", "loan", "seo", "cheap", "buy now", "telegram"],
      patterns: ["[a-z]{2,}\\d{4,}$"],
    },
  ];

  function readJSON(fb) { return window.ReefUtil.lsRead(KEY, fb); }
  function writeJSON(v) { window.ReefUtil.lsWrite(KEY, v, "campaigns"); _version++; }
  function uid() { return window.ReefUtil.uid("cmp"); }

  // first-run seed
  function ensure() {
    const raw = localStorage.getItem(KEY);
    if (raw == null) {
      const map = {};
      SEED.forEach((c) => { map[c.id] = Object.assign({ importedAt: Date.now() }, c); });
      writeJSON(map);
    }
  }
  ensure();

  function lists() { return Object.values(readJSON({})).sort((a, b) => (b.importedAt || 0) - (a.importedAt || 0)); }
  function get(id) { return readJSON({})[id] || null; }

  function normalize(meta) {
    const status = meta.status === "confirmed" ? "confirmed" : "suspected";
    const terms = (Array.isArray(meta.terms) ? meta.terms : String(meta.terms || "").split(/[\n,]/))
      .map((t) => String(t || "").trim().toLowerCase()).filter(Boolean);
    const patterns = (Array.isArray(meta.patterns) ? meta.patterns : String(meta.patterns || "").split(/\n/))
      .map((p) => String(p || "").trim()).filter(Boolean);
    const w = meta.weight != null && meta.weight !== "" ? Math.max(0, Math.min(80, Math.round(+meta.weight))) : DEFAULT_WEIGHT[status];
    return { status, terms, patterns, weight: w };
  }

  function save(meta) {
    const all = readJSON({});
    const id = meta.id || uid();
    const norm = normalize(meta);
    all[id] = {
      id, name: (meta.name || "Untitled campaign").trim(),
      status: norm.status, weight: norm.weight,
      terms: norm.terms, patterns: norm.patterns,
      notes: (meta.notes || "").trim(),
      enabled: meta.enabled !== false,
      importedAt: (all[id] && all[id].importedAt) || Date.now(),
    };
    writeJSON(all);
    return id;
  }
  function remove(id) { const all = readJSON({}); delete all[id]; writeJSON(all); }
  function setEnabled(id, on) { const all = readJSON({}); if (all[id]) { all[id].enabled = !!on; writeJSON(all); } }
  function clearAll() { writeJSON({}); }

  // compile a campaign's regexes once (tolerate bad patterns)
  function compile(c) {
    return (c.patterns || []).map((p) => { try { return new RegExp(p, "i"); } catch (e) { if (window.ReefLog) window.ReefLog.debug("campaigns", "bad regex in '" + c.name + "': " + p, e && e.message); return null; } }).filter(Boolean);
  }

  // match() runs per join-reason/post, so the per-call work (re-read the store,
  // re-sort, re-compile every regex) is hot. Cache the campaign list with its
  // compiled regexes, keyed on _version — rebuilt only when a campaign changes.
  let _compiled = null, _compiledVer = -1;
  function compiled() {
    if (_compiled && _compiledVer === _version) return _compiled;
    _compiled = lists().map((c) => ({ c, res: compile(c) }));
    _compiledVer = _version;
    return _compiled;
  }

  // match text → [{ id, name, status, weight, matched:[...], on:"text" }]
  function match(text) {
    const t = String(text || "").toLowerCase();
    if (!t.trim()) return [];
    const out = [];
    compiled().forEach(({ c, res }) => {
      if (c.enabled === false) return;
      const hits = [];
      (c.terms || []).forEach((term) => { if (term && t.includes(term)) hits.push(term); });
      res.forEach((re) => { const m = t.match(re); if (m) hits.push(m[0]); });
      if (hits.length) {
        const seen = new Set(); const matched = hits.filter((h) => (!seen.has(h) && seen.add(h)));
        // lens: which scanner consumes this list — "spam" (default: solicitation /
        // SEO / fraud wordlists) or "abuse" (operator hate / harassment lists).
        // ReefText.abuseScan folds only "abuse" campaigns; spamScan the "spam" ones.
        out.push({ id: c.id, name: c.name, status: c.status, weight: c.weight, matched: matched, on: "text", lens: c.lens || "spam" });
      }
    });
    return out;
  }

  function stats() {
    const L = lists();
    let terms = 0, patterns = 0;
    L.forEach((c) => { terms += (c.terms || []).length; patterns += (c.patterns || []).length; });
    return { total: L.length, enabled: L.filter((c) => c.enabled !== false).length, terms, patterns };
  }

  function exportJSON() { return JSON.stringify({ _schema: "vantage.campaigns/v1", exportedAt: new Date().toISOString(), campaigns: lists() }, null, 2); }
  function importJSON(text) {
    let data; try { data = JSON.parse(text); } catch (e) { throw new Error("Not valid JSON"); }
    const arr = Array.isArray(data) ? data : (data.campaigns || []);
    if (!Array.isArray(arr) || !arr.length) throw new Error("No campaigns found in file");
    let n = 0;
    arr.forEach((c) => { if (c && (c.name || (c.terms && c.terms.length))) { save(Object.assign({}, c, { id: c.id || undefined })); n++; } });
    return n;
  }

  window.ReefCampaigns = {
    lists, get, save, remove, setEnabled, clearAll,
    match, stats, version: () => _version,
    exportJSON, importJSON, DEFAULT_WEIGHT,
  };
})();

</script>
<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — join-reason text analysis (local, no LLM)
   ------------------------------------------------------------
   Reuses two proven, in-browser libraries (loaded once at runtime
   the same way the megalodon transport is):
     • franc-min  (MIT)        — statistical language detection
     • vader-sentiment (Apache-2.0) — lexicon+rule sentiment, tuned
                                      for short, informal social text
   If those modules can't load (offline / blocked), it falls back to
   a built-in Unicode-script language guess and a compact sentiment
   lexicon, so the panel always returns something.

   Also computes, fully locally:
     • template / boilerplate similarity (char-shingle Jaccard vs a
       built-in corpus of known copy-paste application templates)
     • a rough coherence heuristic (type/token ratio + length)
     • link count
     • campaign matches (window.ReefCampaigns)
   Plain JS. Exposes window.ReefText.
   ============================================================ */
(function () {
  // ---- optional libraries (non-blocking dynamic import) ----
  let franc = null, vader = null;
  const ready = (async () => {
    await Promise.all([
      import("https://esm.sh/franc-min@6").then((m) => { franc = m.franc || (m.default && m.default.franc) || null; })
        .catch((e) => { if (window.ReefLog) window.ReefLog.debug("text", "franc-min unavailable — using local language fallback", e && e.message); }),
      import("https://esm.sh/vader-sentiment@1.1.3").then((m) => { vader = (m.SentimentIntensityAnalyzer) || (m.default && m.default.SentimentIntensityAnalyzer) || null; })
        .catch((e) => { if (window.ReefLog) window.ReefLog.debug("text", "vader unavailable — using local sentiment fallback", e && e.message); }),
    ]);
    if (window.ReefLog) window.ReefLog.info("text", "text engine ready" + (franc ? " · franc" : " · franc(local)") + (vader ? " · vader" : " · vader(local)"));
    return true;
  })();

  const ISO3 = {
    eng: "English", spa: "Spanish", fra: "French", deu: "German", ita: "Italian", por: "Portuguese",
    nld: "Dutch", jpn: "Japanese", kor: "Korean", cmn: "Chinese", rus: "Russian", ara: "Arabic",
    heb: "Hebrew", ell: "Greek", tur: "Turkish", vie: "Vietnamese", ind: "Indonesian", hin: "Hindi",
    tha: "Thai", swe: "Swedish", pol: "Polish", ukr: "Ukrainian", ron: "Romanian", fin: "Finnish",
    ces: "Czech", dan: "Danish", nob: "Norwegian", und: "Unknown",
  };
  const ONLY = ["eng","spa","fra","deu","ita","por","nld","jpn","kor","cmn","rus","ara","heb","ell","tur","vie","ind","hin","tha","swe","pol","ukr","ron"];

  // built-in script ranges for the offline fallback
  function scriptGuess(t) {
    if (/[\u3040-\u30ff]/.test(t)) return { code: "jpn", name: "Japanese", reliable: true };
    if (/[\uac00-\ud7a3]/.test(t)) return { code: "kor", name: "Korean", reliable: true };
    if (/[\u4e00-\u9fff]/.test(t)) return { code: "cmn", name: "Chinese", reliable: true };
    if (/[\u0600-\u06ff]/.test(t)) return { code: "ara", name: "Arabic", reliable: true };
    if (/[\u0590-\u05ff]/.test(t)) return { code: "heb", name: "Hebrew", reliable: true };
    if (/[\u0400-\u04ff]/.test(t)) return { code: "rus", name: "Cyrillic", reliable: false };
    if (/[\u0370-\u03ff]/.test(t)) return { code: "ell", name: "Greek", reliable: true };
    if (/[\u0e00-\u0e7f]/.test(t)) return { code: "tha", name: "Thai", reliable: true };
    if (/[\u0900-\u097f]/.test(t)) return { code: "hin", name: "Devanagari", reliable: true };
    if (/[a-z]/i.test(t)) return { code: "lat", name: "Latin script", reliable: false };
    return { code: "und", name: "Unknown", reliable: false };
  }

  function detectLanguage(text) {
    const t = String(text || "");
    const wordish = t.replace(/https?:\/\/\S+/g, " ").trim();
    if (franc && wordish.length >= 12) {
      try {
        const code = franc(wordish, { only: ONLY, minLength: 3 });
        if (code && code !== "und") return { code, name: ISO3[code] || code, reliable: wordish.length >= 24 };
      } catch (e) { if (window.ReefLog) window.ReefLog.debug("text", "franc threw", e && e.message); }
    }
    const g = scriptGuess(t);
    // for short Latin text, assume English-ish but mark unreliable
    if (g.code === "lat") return { code: "eng", name: "English (assumed)", reliable: false };
    return g;
  }

  // ---- sentiment ----
  const POS = ["love","great","awesome","cozy","welcome","friendly","kind","happy","excited","glad","wonderful","good","nice","passionate","creative","community","share","learn","hope","thanks","thank","appreciate","genuine","curious"];
  const NEG = ["free","click","buy","cheap","urgent","now","limited","guarantee","cash","money","crypto","investment","winner","prize","act","hurry","offer","deal","earn","profit","bonus","claim","verify","suspicious","scam","hate","kill","slur"];
  function localSentiment(text) {
    const toks = String(text || "").toLowerCase().match(/[a-z']+/g) || [];
    let p = 0, n = 0;
    toks.forEach((w) => { if (POS.includes(w)) p++; if (NEG.includes(w)) n++; });
    const raw = (p - n);
    const compound = Math.max(-1, Math.min(1, raw / Math.sqrt(raw * raw + 8)));
    return compound;
  }
  function sentimentOf(text) {
    let compound = null;
    if (vader) { try { compound = vader.polarity_scores(String(text || "")).compound; } catch (e) { if (window.ReefLog) window.ReefLog.debug("text", "vader threw", e && e.message); } }
    if (compound == null) compound = localSentiment(text);
    const label = compound >= 0.45 ? "positive" : compound >= 0.05 ? "mildly positive"
      : compound <= -0.45 ? "negative" : compound <= -0.05 ? "solicitous / negative" : "neutral";
    return { compound: +compound.toFixed(2), label };
  }

  // ---- template / boilerplate similarity ----
  // a small corpus of known copy-paste application templates
  const TEMPLATES = [
    "i want to join because your instance looks like a good place and i will follow the rules and be active member of community thank you",
    "hello i am interested in the community and i will be active thank you",
    "hi please approve my account i want to join your server and be active",
    "i would like to join this instance because it looks nice and i will respect the rules",
    "click here for free claim your reward limited time act now",
    "dear friend i am a financial consultant interested in a mutual investment opportunity god bless",
  ];
  function shingles(s, n) {
    const c = String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
    const set = new Set();
    if (c.length < n) { if (c) set.add(c); return set; }
    for (let i = 0; i + n <= c.length; i++) set.add(c.slice(i, i + n));
    return set;
  }
  function jaccard(a, b) {
    if (!a.size || !b.size) return 0;
    let inter = 0; a.forEach((x) => { if (b.has(x)) inter++; });
    return inter / (a.size + b.size - inter);
  }
  function boilerplateScore(text, extraTemplates) {
    const sh = shingles(text, 4);
    let max = 0;
    TEMPLATES.concat(approvedTemplates()).concat(extraTemplates || []).forEach((tpl) => { max = Math.max(max, jaccard(sh, shingles(tpl, 4))); });
    return Math.round(max * 100);
  }

  // ---- operator-reviewed template corpus, grown from rejected join reasons ----
  // Rejecting an account is a moderator judgment call, not ground truth, so a
  // rejected join reason lands here as a CANDIDATE, not directly in TEMPLATES —
  // an operator must approve it (Campaigns panel) before it affects scoring.
  // Mirrors the campaigns.js store pattern: localStorage, capped, deduped.
  const CAND_KEY = "reef.boilerplate.candidates.v1";
  const APPROVED_KEY = "reef.boilerplate.approved.v1";
  const MAX_CANDIDATES = 200;
  function readArr(key) { return window.ReefUtil.lsRead(key, []); }
  function writeArr(key, v, label) { window.ReefUtil.lsWrite(key, v, label); }
  function normTpl(s) { return String(s || "").trim().toLowerCase().replace(/\s+/g, " "); }

  function candidates() { return readArr(CAND_KEY); }
  function addCandidate(text, meta) {
    const norm = normTpl(text);
    if (norm.split(" ").length < 5) return null; // too short to be a meaningful template
    const cur = candidates();
    if (cur.some((c) => normTpl(c.text) === norm)) return null; // already queued
    if (approvedTemplates().some((t) => normTpl(t) === norm)) return null; // already approved
    const entry = Object.assign({ id: window.ReefUtil.uid("btc"), text: String(text || "").trim(), at: Date.now() }, meta || {});
    const next = [entry].concat(cur).slice(0, MAX_CANDIDATES);
    writeArr(CAND_KEY, next, "boilerplate-candidates");
    return entry;
  }
  function discardCandidate(id) { writeArr(CAND_KEY, candidates().filter((c) => c.id !== id), "boilerplate-candidates"); }

  function approved() { return readArr(APPROVED_KEY); }
  function approvedTemplates() { return approved().map((a) => a.text); }
  function approveCandidate(id) {
    const cand = candidates().find((c) => c.id === id);
    if (!cand) return null;
    discardCandidate(id);
    const entry = { id: window.ReefUtil.uid("bta"), text: cand.text, at: Date.now() };
    writeArr(APPROVED_KEY, [entry].concat(approved()), "boilerplate-approved");
    return entry;
  }
  function removeApproved(id) { writeArr(APPROVED_KEY, approved().filter((a) => a.id !== id), "boilerplate-approved"); }

  // ---- relevance / intent (is this actually a "why I want to join" answer?) ----
  // Genuine join reasons are overwhelmingly first-person and reference joining /
  // the community / an interest. A reason with NEITHER first-person voice NOR any
  // join-intent vocabulary is off-topic — the single most general nonsense tell.
  const FIRST_PERSON = /\b(i|i'?m|i'?d|i'?ve|i'?ll|me|my|mine|myself|we|we'?re|our|ours|us)\b/i;
  const INTENT = /\b(join(?:ing)?|want(?:ed|s)?|wanna|like|love|interest(?:ed)?|enjoy|community|communit(?:ies|y)|instance|server|fedi(?:verse)?|mastodon|sharkey|misskey|account|sign[\s-]?up|register(?:ing)?|hope|hoping|looking|follow(?:ing)?|posting?|share|sharing|friends?|connect|explore|migrat(?:e|ing)|moved|moving|because|reason|here|home|local|hobby|hobbies|fan|enthusiast)\b/i;
  function relevanceOf(text) {
    const t = String(text || "");
    const firstPerson = FIRST_PERSON.test(t);
    const intent = INTENT.test(t);
    const onTopic = firstPerson || intent;
    // start neutral; reward the human/topical markers, floor low when both absent
    let score = 30 + (firstPerson ? 35 : 0) + (intent ? 35 : 0);
    if (/\?$|\bplease\b|\bthank/i.test(t)) score += 5;
    return { score: Math.max(0, Math.min(100, score)), firstPerson, intent, onTopic };
  }

  // ---- generated-data / faker fingerprint ----
  // Bot signups often stuff the field with library-generated "profile" data.
  // Two robust local tells: (1) data-generator geographic strings that never
  // occur in a human's prose, e.g. "Micronesia (Federated States of)"; (2) a
  // pile-up of mid-sentence proper nouns (a stitched bio, not a sentence).
  const FAKER_GEO = [
    /\((?:federated states|plurinational state|bolivarian republic|islamic republic|democratic (?:people'?s )?republic|republic|kingdom|province|state|territory)\s+of\)/i,
    /,\s*(?:united republic|province|state|islamic republic|plurinational state)\s+of\b/i,
  ];
  const FAKER_SCAFFOLD = [/\bknown for\b/i, /\bbackground and work\b/i, /\btrust the\b/i];
  function properNounRatio(text) {
    const sents = String(text || "").split(/[.!?]+/);
    let proper = 0, content = 0;
    sents.forEach((s) => {
      const toks = (s.match(/[A-Za-z][A-Za-z'()]*/g) || []);
      toks.forEach((tok, i) => {
        content++;
        const bare = tok.replace(/[^A-Za-z]/g, "");
        if (i > 0 && /^[A-Z][a-z]{2,}$/.test(bare)) proper++; // Title-Case, not sentence-initial
      });
    });
    return content ? proper / content : 0;
  }
  function generatednessOf(text) {
    const t = String(text || "");
    const reasons = [];
    let score = 0;
    if (FAKER_GEO.some((re) => re.test(t))) { score += 50; reasons.push("contains a data-generator location string (e.g. \"Country (… of)\") that doesn't occur in human prose"); }
    if (FAKER_SCAFFOLD.filter((re) => re.test(t)).length >= 2) { score += 20; reasons.push("phrasing matches a generated-bio scaffold"); }
    const pr = properNounRatio(t);
    if (pr > 0.3) { score += 25; reasons.push("dense with proper nouns (" + Math.round(pr * 100) + "%) — reads like stitched profile data, not a sentence"); }
    else if (pr > 0.22) { score += 12; reasons.push("high proper-noun density (" + Math.round(pr * 100) + "%)"); }
    return { score: Math.min(100, score), properNounRatio: pr, reasons };
  }

  // ---- coherence (now salad-aware) ----
  // The OLD heuristic rewarded type/token ratio — but a word-salad has TTR ≈ 1.0
  // (every word unique), so it scored AS coherent. Genuine short sentences also
  // have high TTR, so high TTR alone means nothing. We only penalize the
  // *conjunction* that actually marks salad: high TTR + proper-noun pile-up +
  // no first-person/intent. That leaves terse genuine reasons unharmed.
  function coherenceScore(text, rel, gen) {
    const words = (String(text || "").toLowerCase().match(/[a-z']+/g) || []);
    if (words.length < 3) return 35;
    rel = rel || relevanceOf(text);
    gen = gen || generatednessOf(text);
    const uniq = new Set(words).size;
    const ttr = uniq / words.length;
    const fw = words.filter((w) => FUNCTION_WORDS.has(w)).length / words.length;
    let s = 60;
    const saladish = words.length >= 8 && ttr > 0.88 && gen.properNounRatio > 0.22 && !rel.firstPerson && !rel.intent;
    if (saladish) s -= 45;                                  // word-salad / stitched fragments
    if (gen.properNounRatio > 0.3 && !rel.firstPerson) s -= 12;
    if (words.length >= 8 && fw < 0.15) s -= 18;            // a list of nouns, not a sentence
    if (rel.firstPerson) s += 10;
    if (rel.intent) s += 8;
    if (words.length < 6) s = Math.max(s, 45);
    return Math.max(0, Math.min(100, Math.round(s)));
  }
  const FUNCTION_WORDS = new Set(("the a an of to and in for is are was were be been on that this it as at by with from or but not no so if then than too very can will would just about into out up down over your you my me i we our us they them he she his her their its have has had do does").split(" "));

  // ---- combined nonsense / off-topic verdict ----
  // Folds relevance + generatedness + salad-coherence into one read the panel
  // shows and assess.js scores. Only meaningful once there's enough text that
  // "short reason" wouldn't already explain it (>= 5 words).
  function nonsenseOf(text, rel, gen, coherence) {
    const words = (String(text || "").match(/\S+/g) || []);
    rel = rel || relevanceOf(text);
    gen = gen || generatednessOf(text);
    if (coherence == null) coherence = coherenceScore(text, rel, gen);
    const reasons = [];
    let score = 0;
    if (words.length < 5) return { score: 0, label: "ok", reasons: [], evaluable: false };
    if (!rel.onTopic) { score += 40; reasons.push("no first-person voice or join/community intent — off-topic for a \"reason for joining\""); }
    if (gen.score >= 50) { score += 35; reasons.push(...gen.reasons); }
    else if (gen.score >= 20) { score += 18; reasons.push(...gen.reasons); }
    if (coherence < 25) { score += 20; reasons.push("very low coherence (word-salad / unrelated fragments)"); }
    score = Math.min(100, score);
    const label = score >= 55 ? "likely nonsense / generated" : score >= 30 ? "questionable / off-topic" : "ok";
    return { score, label, reasons, evaluable: true };
  }

  function linkCount(text) {
    const m = String(text || "").match(/https?:\/\/\S+|\b[a-z0-9-]+\.(?:com|net|org|io|help|online|gg|me|ru|info|xyz|top)\b\/?\S*/gi);
    return m ? m.length : 0;
  }

  function buildNote(a) {
    const bits = [];
    bits.push("Language: " + a.language.name + (a.language.reliable ? "" : " (low confidence — short text)") + ".");
    bits.push("Sentiment " + a.sentiment.label + " (" + a.sentiment.compound + ").");
    if (a.nonsense && a.nonsense.score >= 55) bits.push("⚠ Reads as nonsense / generated text: " + a.nonsense.reasons.join("; ") + ".");
    else if (a.nonsense && a.nonsense.score >= 30) bits.push("Possibly off-topic / low-relevance: " + a.nonsense.reasons.join("; ") + ".");
    else if (a.relevance && !a.relevance.onTopic && a.wordCount >= 5) bits.push("No first-person voice or stated intent — doesn't read like a reason for joining.");
    if (a.boilerplate >= 60) bits.push("High overlap (" + a.boilerplate + "%) with known copy-paste templates.");
    else if (a.boilerplate >= 35) bits.push("Some overlap (" + a.boilerplate + "%) with boilerplate phrasing.");
    if (a.links) bits.push(a.links + " link" + (a.links === 1 ? "" : "s") + " in the text.");
    if (a.campaigns.length) bits.push("Matches campaign" + (a.campaigns.length > 1 ? "s" : "") + ": " + a.campaigns.map((c) => c.name + " (" + c.status + ")").join(", ") + ".");
    if (!a.campaigns.length && a.boilerplate < 35 && a.links === 0 && (!a.nonsense || a.nonsense.score < 30)) bits.push("No campaign, boilerplate or coherence signals.");
    return bits.join(" ");
  }

  function compute(text) {
    const campaigns = (window.ReefCampaigns && window.ReefCampaigns.match) ? window.ReefCampaigns.match(text) : [];
    const relevance = relevanceOf(text);
    const generated = generatednessOf(text);
    const coherence = coherenceScore(text, relevance, generated);
    const a = {
      language: detectLanguage(text),
      sentiment: sentimentOf(text),
      boilerplate: boilerplateScore(text),
      relevance: relevance,
      generated: generated,
      coherence: coherence,
      nonsense: nonsenseOf(text, relevance, generated, coherence),
      links: linkCount(text),
      campaigns: campaigns,
      wordCount: (String(text || "").match(/\S+/g) || []).length,
    };
    a.note = buildNote(a);
    return a;
  }

  // async: waits (briefly) for the libraries, then computes
  async function analyze(text) {
    try { await Promise.race([ready, new Promise((r) => setTimeout(r, 6000))]); } catch (e) {}
    return compute(text);
  }
  // sync: immediate result using whatever is loaded (libs or fallback)
  function analyzeSync(text) { return compute(text); }

  // ---- content-warning (CW / spoiler) moderation analysis ------------------
  // The CW field is moderator-relevant in BOTH directions:
  //   • a MISSING CW on sensitive/graphic content is itself the violation, and
  //   • abuse can hide IN the CW text — a slur/threat in the "warning" line
  //     bypasses a body-only scan — so we run the SAME operator-curated campaign
  //     patterns over the CW string separately from the post body.
  // Honest about limits: "sensitive" is taken from source flags we actually have
  // (Mastodon `sensitive`/`spoiler_text`, Misskey note `cw` + file isSensitive, or
  // a graphic-*/nsfw/no-cw evidence flag) — we do NOT infer graphicness from prose.
  const CW_SENSITIVE_FLAGS = ["graphic-image", "graphic", "gore", "sensitive", "media-withheld", "nsfw", "no-cw", "self-harm"];
  function cwAnalysis(post) {
    post = post || {};
    const cw = String(post.cw || "").trim();
    const hasCw = !!cw;
    const flags = (post.flagged || []).map((f) => String(f).toLowerCase());
    const sensitive = !!post.sensitive || flags.some((f) => CW_SENSITIVE_FLAGS.includes(f));
    // scan the CW text itself against the campaign patterns (body-scan blind spot)
    const campaigns = (hasCw && window.ReefCampaigns && window.ReefCampaigns.match) ? window.ReefCampaigns.match(cw) : [];
    const cwWeight = campaigns.reduce((a, c) => a + (c.weight || 0), 0);
    let state, weight = 0, dir = "ok", note = "";
    if (hasCw && campaigns.length) {
      state = "abusive"; dir = "bad"; weight = Math.min(40, 18 + cwWeight);
      note = "The content-warning text itself matches a flagged pattern — abuse hidden in the warning line, which a body-only scan would miss.";
    } else if (sensitive && !hasCw) {
      state = "missing"; dir = "warn"; weight = 12;
      note = "Sensitive / graphic content posted with no content warning — a CW-policy violation (gate the media, not the account).";
    } else if (hasCw) {
      state = "present"; dir = "ok"; weight = 0;
      note = "Content warning applied — a good-faith effort to gate sensitive content.";
    } else {
      state = "none"; dir = "ok"; weight = 0; note = "";
    }
    return { hasCw, cw, sensitive, state, dir, weight, campaigns, note };
  }

  // ---- abusive-content scan (reported posts) ------------------------------
  // Runs the SAME local sentiment engine as the join-reason analysis, but asks a
  // DIFFERENT question with DIFFERENT parameters: is a REPORTED POST abusive?
  // We are not scoring spam/boilerplate/relevance here — we are looking for
  // interpersonal harm: harassment & abuse, threats, sexism / misogyny, racism &
  // identity hate, and general toxicity. Signal comes from four local sources,
  // folded into one per-post verdict:
  //   1. VADER (or the local fallback) negative-sentiment magnitude
  //   2. built-in category lexicons (below) — behavioural phrases + patterns
  //   3. the operator's own campaign wordlists (window.ReefCampaigns) — this is
  //      where instance-specific slur / hate lists live; we don't hard-code slurs
  //   4. any upstream evidence flags already on the post (slur/threat/doxxing/…)
  // Local only — no text leaves the browser, no LLM. Plain lexicon + rules.
  const ABUSE_LEX = {
    harassment: {
      label: "Harassment & abuse", weight: 22,
      terms: ["kill yourself", "kys", "you should die", "go die", "go kill yourself", "neck yourself",
        "end yourself", "nobody likes you", "everyone hates you", "you're worthless", "youre worthless",
        "you are worthless", "waste of space", "you deserve to", "you're a disgrace", "pathetic loser",
        "worthless piece", "delete your account", "no one wants you here"],
      patterns: ["\\bk+\\s*y+\\s*s+\\b", "\\b(go|just) (die|rot)\\b"],
    },
    threats: {
      label: "Threats & intimidation", weight: 32,
      terms: ["i will kill you", "i'll kill you", "i will find you", "i'll find you", "hunt you down",
        "watch your back", "we know where you live", "i know where you live", "you're dead", "youre dead",
        "beat you up", "you better watch", "coming to your house", "i'll make you pay"],
      patterns: ["\\bi('?| wi)ll (kill|hurt|find|end|destroy|get) (you|u|ya)\\b", "\\b(rape|assault|stab|shoot) (you|her|him|them)\\b"],
    },
    misogyny: {
      label: "Sexism & misogyny", weight: 24,
      terms: ["bitch", "slut", "whore", "cunt", "thot", "femoid", "roastie", "make me a sandwich",
        "get back in the kitchen", "belong in the kitchen", "women are property", "she was asking for it",
        "stupid woman", "dumb woman", "typical female", "gold digger", "hysterical woman", "dumb bitch"],
      patterns: ["\\bwomen (are|belong|should)\\b.{0,24}\\b(kitchen|property|inferior|objects?|men)\\b", "\\b(females?) (are|should|belong)\\b"],
    },
    hate: {
      label: "Racism & identity hate", weight: 28,
      terms: ["go back to your country", "go back to where you came", "your kind", "you people", "subhuman",
        "vermin", "white power", "great replacement", "deport them all", "they're animals", "theyre animals",
        "master race", "ethnic cleansing", "rapefugees", "blood and soil"],
      patterns: ["\\bgo back to (your|where)\\b", "\\b(deport|gas|exterminate|cleanse) (them|all|the)\\b"],
    },
    toxicity: {
      label: "General toxicity", weight: 12,
      terms: ["stfu", "gtfo", "fuck you", "screw you", "piece of shit", "eat shit", "go to hell",
        "brain dead", "braindead", "retard", "retarded", "you suck", "trash human", "human garbage"],
      patterns: ["\\bf+u+c+k+\\s*(you|u|off)\\b", "\\bsh+i+t+\\s*(head|bag|stain)\\b"],
    },
  };
  // upstream evidence flags → category + heavy weight (already operator-verified)
  const ABUSE_FLAGS = {
    slur: { cat: "hate", label: "slur (flagged upstream)", weight: 30 },
    threat: { cat: "threats", label: "threat (flagged upstream)", weight: 34 },
    doxxing: { cat: "threats", label: "doxxing (flagged upstream)", weight: 32 },
    harassment: { cat: "harassment", label: "harassment (flagged upstream)", weight: 26 },
  };

  // ---- spam / solicitation scan (reported posts) ---------------------------
  // The other half of the reported-content story: abuseScan asks "is this
  // interpersonal harm?"; spamScan asks "is this bulk solicitation?" — SEO copy,
  // deal/coupon feeds, link farms, hashtag walls. Structural signals dominate
  // (hashtag stuffing, link+read-more shape, price strings, keyword repetition,
  // cross-post template reuse) so it works in any language; the small lexicon
  // just sharpens it. Spam-lens campaign wordlists fold in here.
  const SPAM_TERMS = ["read more:", "promo code", "coupon", "discount", "% off", "free shipping",
    "subscribe & save", "order now", "buy now", "shop now", "limited time", "sale ends",
    "best deals", "hot deals", "deal alert", "save money", "price drop", "click here",
    "sign up now", "earn money", "work from home", "crypto giveaway", "investment opportunity"];
  const PRICE_RE = /\$\s?\d+(?:[.,]\d{2})?|\d+\s?%\s?off/gi;
  const HASHTAG_RE = /(^|\s)#[\p{L}\d_]{2,}/gu;
  const URL_COUNT_RE = /\bhttps?:\/\/\S+/gi;

  function commercialSignals(lower) {
    const terms = SPAM_TERMS.filter((t) => lower.includes(t));
    const prices = (lower.match(PRICE_RE) || []).length;
    const tags = (lower.match(HASHTAG_RE) || []).length;
    const links = (lower.match(URL_COUNT_RE) || []).length;
    return { terms, prices, tags, links };
  }
  // cheap yes/no used by abuseScan to keep deal copy out of the hostility verdict
  function isCommercialShaped(lower) {
    const c = commercialSignals(lower);
    return c.tags >= 6 || c.terms.length >= 2 || (c.prices >= 2 && (c.links > 0 || c.terms.length > 0));
  }

  function spamScan(post) {
    post = (typeof post === "string") ? { text: post } : (post || {});
    const text = String(post.text || "");
    const evaluable = !!text.trim();
    if (!evaluable) return { evaluable: false, score: 0, verdict: "clean", signals: [], campaigns: [], hashtags: [] };
    const lower = text.toLowerCase();
    const c = commercialSignals(lower);
    const signals = [];
    let score = 0;
    if (c.tags >= 6) { const w = 12 + Math.min((c.tags - 6) * 2, 10); signals.push({ k: "hashtag wall", v: c.tags + " hashtags", w }); score += w; }
    if (c.terms.length) { const w = Math.min(4 * c.terms.length, 16) + (c.links > 0 ? 4 : 0); signals.push({ k: "promo language", v: c.terms.slice(0, 5).join(", "), w }); score += w; }
    if (c.prices >= 2) { signals.push({ k: "price strings", v: String(c.prices), w: 6 }); score += 6; }
    // keyword stuffing: one long token hammered over and over (SEO copy signature)
    const counts = {};
    (lower.match(/[\p{L}]{6,}/gu) || []).forEach((tok) => { counts[tok] = (counts[tok] || 0) + 1; });
    const top = Object.keys(counts).sort((a, b) => counts[b] - counts[a])[0];
    if (top && counts[top] >= 6) { signals.push({ k: "keyword stuffing", v: `"${top}" ×` + counts[top], w: 12 }); score += 12; }
    // spam-lens operator campaigns (abuse-lens ones belong to abuseScan)
    const campaigns = ((window.ReefCampaigns && window.ReefCampaigns.match) ? window.ReefCampaigns.match(text) : [])
      .filter((x) => x.lens !== "abuse");
    campaigns.forEach((x) => { const w = Math.min(x.weight || 0, 30); signals.push({ k: "campaign: " + x.name, v: x.matched.join(", "), w }); score += w; });
    score = Math.max(0, Math.min(100, Math.round(score)));
    const verdict = score >= 40 ? "spam" : score >= 18 ? "promotional" : "clean";
    const hashtags = (text.match(HASHTAG_RE) || []).map((h) => h.trim().toLowerCase());
    return { evaluable: true, score, verdict, signals, campaigns, hashtags };
  }

  // Roll-up across cited posts, plus template-reuse detection: bulk spammers post
  // the same hashtag wall under every item, so a shared tag set across posts is a
  // strong bulk-automation tell even when each post's own score is middling.
  function spamReview(posts) {
    const per = (posts || []).map((p) => ({ post: p, scan: spamScan(p) })).filter((x) => x.scan.evaluable);
    const spam = per.filter((x) => x.scan.verdict === "spam").length;
    const promotional = per.filter((x) => x.scan.verdict === "promotional").length;
    const clean = per.filter((x) => x.scan.verdict === "clean").length;
    let templated = false;
    for (let i = 0; i < per.length && !templated; i++) {
      for (let j = i + 1; j < per.length && !templated; j++) {
        const a = new Set(per[i].scan.hashtags), b = new Set(per[j].scan.hashtags);
        if (a.size >= 4 && b.size >= 4) {
          let shared = 0; a.forEach((t) => { if (b.has(t)) shared++; });
          if (shared / Math.max(a.size, b.size) >= 0.8) templated = true;
        }
      }
    }
    const maxScore = per.reduce((m, x) => Math.max(m, x.scan.score), 0);
    const verdict = (spam || (templated && promotional)) ? "spam" : promotional ? "promotional" : "clean";
    return { per, spam, promotional, clean, total: per.length, templated, verdict, maxScore, evaluable: per.length > 0 };
  }

  function abuseScan(post) {
    post = (typeof post === "string") ? { text: post } : (post || {});
    const text = String(post.text || "");
    const evaluable = !!text.trim();
    const sentiment = sentimentOf(text);
    if (!evaluable) return { evaluable: false, sentiment, categories: [], campaigns: [], score: 0, verdict: "clean", note: "" };
    const lower = text.toLowerCase();
    const byId = {}; // category id → { id, label, matched:[], weight }
    function add(id, label, term, weight) {
      const c = byId[id] || (byId[id] = { id, label, matched: [], weight: 0, terms: new Set() });
      if (term && !c.terms.has(term)) { c.terms.add(term); c.matched.push(term); }
      c.weight += weight;
    }
    // 1) built-in category lexicons
    Object.keys(ABUSE_LEX).forEach((id) => {
      const lex = ABUSE_LEX[id];
      let hit = false, extra = 0;
      lex.terms.forEach((t) => { if (t && lower.includes(t)) { add(id, lex.label, t, 0); hit = true; extra++; } });
      (lex.patterns || []).forEach((p) => { try { const m = lower.match(new RegExp(p, "i")); if (m) { add(id, lex.label, m[0].trim(), 0); hit = true; extra++; } } catch (e) {} });
      if (hit) byId[id].weight += Math.min(lex.weight + (extra - 1) * 4, lex.weight + 16);
    });
    // 2) upstream evidence flags
    (post.flagged || []).map((f) => String(f).toLowerCase()).forEach((f) => {
      const fl = ABUSE_FLAGS[f];
      if (fl) add(fl.cat, ABUSE_LEX[fl.cat].label, fl.label, fl.weight);
    });
    // 3) operator campaign wordlists — ABUSE-lens lists only. Spam wordlists
    // (the default lens) must not brand commercial text as hostile; they feed
    // spamScan instead. (A coupon post matching "limited time" in a giveaway-spam
    // list used to surface here as "borderline / hostile" — wrong lens.)
    const campaigns = ((window.ReefCampaigns && window.ReefCampaigns.match) ? window.ReefCampaigns.match(text) : [])
      .filter((c) => c.lens === "abuse");
    let campWeight = 0; campaigns.forEach((c) => { campWeight += Math.min(c.weight || 0, 36); });
    // assemble
    const categories = Object.values(byId).map((c) => ({ id: c.id, label: c.label, matched: c.matched, weight: c.weight }))
      .sort((a, b) => b.weight - a.weight);
    let score = categories.reduce((a, c) => a + c.weight, 0) + campWeight;
    // 4) negative-sentiment amplifier (only when there's already a lexical/flag hit)
    if (score > 0) {
      if (sentiment.compound <= -0.5) score += 12;
      else if (sentiment.compound <= -0.2) score += 6;
    } else if (sentiment.compound <= -0.6 && !isCommercialShaped(lower)) {
      // strongly hostile tone with no lexicon hit — surface as borderline. Skipped
      // for commercial/promo-shaped text: deal/price copy reads "negative" to the
      // sentiment engine but it's spam-lens material, not interpersonal hostility.
      score += 8;
    }
    score = Math.max(0, Math.min(100, Math.round(score)));
    const verdict = score >= 60 ? "severe" : score >= 35 ? "abusive" : score >= 15 ? "borderline" : "clean";
    const note = verdict === "clean"
      ? "No harassment, hate or threat patterns detected; tone " + sentiment.label + "."
      : (verdict === "severe" ? "Severe abuse — " : verdict === "abusive" ? "Abusive content — " : "Borderline — ")
        + categories.map((c) => c.label.toLowerCase()).join(", ")
        + (campaigns.length ? (categories.length ? "; " : "") + "matches campaign " + campaigns.map((c) => c.name).join(", ") : "")
        + " (tone " + sentiment.label + ").";
    return { evaluable: true, sentiment, categories, campaigns, score, verdict, note };
  }

  // Roll-up across every cited post — the same shape pattern as cwReview, so the
  // inspector can show a single headline before the per-post detail.
  function abuseReview(posts) {
    const per = (posts || []).map((p) => ({ post: p, scan: abuseScan(p) })).filter((x) => x.scan.evaluable);
    const severe = per.filter((x) => x.scan.verdict === "severe").length;
    const abusive = per.filter((x) => x.scan.verdict === "abusive").length;
    const borderline = per.filter((x) => x.scan.verdict === "borderline").length;
    const clean = per.filter((x) => x.scan.verdict === "clean").length;
    const cats = {};
    per.forEach((x) => x.scan.categories.forEach((c) => { cats[c.label] = (cats[c.label] || 0) + 1; }));
    const topCategories = Object.keys(cats).sort((a, b) => cats[b] - cats[a]);
    const verdict = severe ? "severe" : abusive ? "abusive" : borderline ? "borderline" : "clean";
    const maxScore = per.reduce((m, x) => Math.max(m, x.scan.score), 0);
    return { per, severe, abusive, borderline, clean, total: per.length, topCategories, verdict, maxScore, evaluable: per.length > 0 };
  }

  // Roll-up across all cited posts in a report. evaluable=false → nothing to say
  // (no CWs present and nothing flagged sensitive) so the UI can stay quiet.
  function cwReview(posts) {
    const per = (posts || []).map((p) => ({ post: p, cw: cwAnalysis(p) }));
    const abusive = per.filter((x) => x.cw.state === "abusive").length;
    const missing = per.filter((x) => x.cw.state === "missing").length;
    const present = per.filter((x) => x.cw.state === "present").length;
    const verdict = abusive ? "abusive" : missing ? "missing" : present ? "present" : "none";
    const weight = per.reduce((a, x) => a + x.cw.weight, 0);
    return { per, abusive, missing, present, verdict, weight, evaluable: per.some((x) => x.cw.state !== "none") };
  }

  window.ReefText = {
    analyze, analyzeSync, ready, sentimentOf, detectLanguage, boilerplateScore, relevanceOf, generatednessOf, nonsenseOf, cwAnalysis, cwReview, abuseScan, abuseReview, spamScan, spamReview,
    candidates, addCandidate, discardCandidate, approved, approvedTemplates, approveCandidate, removeApproved,
  };
})();

</script>
<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — casework: report assignment + decision audit log
   ------------------------------------------------------------
   Accountability layer for the Reports tab:
     • who has CLAIMED a report (Mastodon assigned_account)
     • an append-only AUDIT trail of every decision (who / when /
       action / reason note / whether the user was notified)
   This is the "statement of reasons" + audit record that DSA/OSA
   compliance and appeals depend on. Persists in localStorage and
   mirrors entries into the debug log. Plain JS → window.ReefCasework.
   ============================================================ */
(function () {
  const KEY = "reef.casework.v1";
  let _version = 0;

  function read() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { return {}; } }
  function write(v) { try { localStorage.setItem(KEY, JSON.stringify(v)); } catch (e) { if (window.ReefLog) window.ReefLog.error("casework", "couldn't persist casework", e && e.message); } _version++; }

  function state() { const s = read(); s.assign = s.assign || {}; s.audit = s.audit || {}; return s; }

  function assignedTo(repId) { return state().assign[repId] || null; }
  function assign(repId, who) {
    const s = state();
    if (who) s.assign[repId] = who; else delete s.assign[repId];
    write(s);
    addAudit(repId, { action: who ? "claimed" : "released", who: who || "—", note: "", notify: false });
  }

  function auditFor(repId) { return (state().audit[repId] || []).slice(); }
  function addAudit(repId, entry) {
    const s = state();
    const e = Object.assign({ at: Date.now() }, entry);
    s.audit[repId] = (s.audit[repId] || []).concat([e]);
    write(s);
    if (window.ReefLog) window.ReefLog.info("casework", "report " + repId + ": " + e.action + (e.who ? " by " + e.who : "") + (e.note ? " — \u201c" + e.note.slice(0, 60) + "\u201d" : "") + (e.notify ? " (user notified)" : ""));
    return e;
  }

  function clearAll() { write({ assign: {}, audit: {} }); }

  window.ReefCasework = { assignedTo, assign, auditFor, addAudit, clearAll, version: () => _version };
})();

</script>
<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — scoring weights (transparent + user-tunable)
   Every account-review signal has a stable id and a default
   weight. Weights are overridable from the Scoring panel and
   persisted in settings.weights. Negative weights REDUCE risk
   (e.g. affirmation terms, trusted community).
   Philosophy baked into defaults:
     • Disposable email — strong (bad)
     • Tor / VPN — mild (NOT inherently bad)
     • Affirmation terms in join reason — reduce risk
   Plain JS. Exposes window.ReefWeights.
   ============================================================ */
(function () {
  // id: [default weight, direction, human label, group]
  const SPEC = [
    ["email_unconfirmed", 20, "bad", "Email address not yet confirmed (hard gate)", "Email & domain"],
    ["disposable_email", 30, "bad", "Disposable / throwaway email", "Email & domain"],

  // exists on changes its meaning. A GitHub/GitLab profile mildly corroborates a
  // real person; an account on a platform with a documented child-safety problem
  // is a strong NEGATIVE. The old enumeration treated every "taken" identically
  // (and never scored it at all), so a Pixiv hit read the same as a GitHub hit.
  //

  // Pixiv (Japanese art host with a long-documented CSAM / sexualised-minor
  // content problem — an active account there is a big negative for a fedi
  // applicant). Add your own per-policy; everything unlisted stays neutral.
  const USERNAME_PLATFORMS = {
    adverse: {
      note: "Pixiv is a Japanese art host with a long-documented CSAM / sexualised-minor content problem. An active account there is a strong negative signal for a fediverse applicant — corroborate it's the same person, then weigh heavily.",
      sites: ["pixiv"],
    },
    corroborating: {
      note: "An established developer / public footprint slightly raises legitimacy. Handles collide across sites — confirm it's the same person before leaning on it.",
      sites: ["github", "gitlab"],
    },
  };
  // normalise a display name to a comparable token: "X / Twitter" -> "x", "Pixiv" -> "pixiv"
  function normSite(name) { return String(name || "").toLowerCase().replace(/\s*[\/(].*/, "").replace(/[^a-z0-9]/g, "").trim(); }
  function platformValence(name) {
    const n = normSite(name);
    if (!n) return { valence: "neutral", note: "" };

    return { valence: "neutral", note: "" };
  }

  function resolve(settings) {
    const over = (settings && settings.weights) || {};
    const w = Object.assign({}, DEFAULTS, over);
    return w;
  }
  // weight getter bound to a resolved table
  function make(settings) {
    const w = resolve(settings);
    return (id, fallback) => (id in w ? w[id] : (fallback != null ? fallback : 0));
  }

  window.ReefWeights = { SPEC, DEFAULTS, HELP, resolve, make, USERNAME_PLATFORMS, platformValence };
})();

<script>
// Vantage · design surface: PROTECTED CORE (engine) — call via window.Reef*; do not rewrite logic or rename signal/weight ids. Edit src/ then run "npm run build". See CLAUDE.md.
/* ============================================================
   Vantage — client-side heuristic assessor
   Produces a risk score, tier, suggested action, signals, and a
   rationale from whatever native fields are available — so LIVE
   items get a real (if lighter) assessment before any OSINT proxy
   is wired. When OSINT enrichment IS present, it folds those in.
   Plain JS. Exposes window.ReefAssess.
   ============================================================ */
(function () {
  const DISPOSABLE = ["mailinator.com", "guerrillamail.com", "10minutemail.com", "tempmail", "trashmail", "yopmail.com", "dispostable", "sharklasers.com", "getnada"];
  const AUTOMATED_UA = [/python-requests/i, /curl\//i, /go-http/i, /node-fetch/i, /axios\//i, /bot/i, /scrapy/i, /headless/i];
  const SCAM_PATTERNS = [/free\s*(v-?bucks|robux|crypto|giveaway)/i, /click here/i, /bit\.ly|tinyurl|t\.co\//i, /investment opportunity/i, /financial (consultant|adviser)/i, /\bairdrop\b/i, /reverify|verify your (password|account)/i, /god bless/i];
  const URL_RE = /\bhttps?:\/\/|\b[a-z0-9-]+\.[a-z]{2,}\/[^\s]/i;

  function W() { return window.__reefW || (window.ReefWeights ? window.ReefWeights.make({}) : function (id, fb) { return fb != null ? fb : 0; }); }

  function affirmFor(host) { const m = window.__reefAffirm || {}; return (m[host] || m["*"] || []).filter(Boolean); }

  function tierOf(score) { return score >= 66 ? "high" : score >= 34 ? "medium" : "low"; }

  const clamp = (n) => window.ReefUtil.clamp(n);

  // shared rollup-part collector: clamp severity to 1, skip zero-weight/zero-sev
  // sources, record weighted contribution. Used by ip + email reputation.
  function mkAdd(parts) {
    return (name, sev, base, detail) => { sev = Math.min(1, sev); if (sev > 0 && base) parts.push({ name, sev, base, contribution: sev * base, detail }); };
  }
  // StopForumSpam listings age out of relevance. `lastseen` measured against a
  // reference date (the account's signup when available, else today) buckets the
  // listing: within ±14d of signup = "concurrent" — the identity was actively
  // being burned in a campaign when it registered here (observed pattern in the
  // 2026 signup waves: SFS detection dates cluster around the signup) — while a
  // years-old hit is often a recycled email or a CGNAT neighbour. The factor
  // DECAYS stale listings (concurrent/recent stay at full weight — the positive
  // correlation is scored once, by the sfs_signup_correlation signal in enrich,
  // not double-counted here). Returns null when lastseen is missing/unparseable.
  function sfsRecency(lastseen, refIso) {
    if (!lastseen) return null;
    let s = String(lastseen).trim().replace(" ", "T");
    if (!/[zZ]$|[+-]\d\d:?\d\d$/.test(s)) s += "Z"; // SFS timestamps are UTC
    const seen = Date.parse(s);
    if (isNaN(seen)) return null;
    const ref = refIso ? Date.parse(refIso) : NaN;
    const days = Math.abs((isNaN(ref) ? Date.now() : ref) - seen) / 86400000;
    const band = days <= 14 ? "concurrent" : days <= 90 ? "recent" : days <= 365 ? "aging" : days <= 3 * 365 ? "stale" : "historic";
    const factor = band === "aging" ? 0.75 : band === "stale" ? 0.5 : band === "historic" ? 0.3 : 1;
    return { band, factor, days: Math.round(days) };
  }

  // StopForumSpam contributes identically to both rollups (only its weight key and
  // the blacklisted-detail wording differ) — factor the shared shape out.
  // `ref` = the reviewed account's signup date; recency of the listing relative
  // to it scales the weight (see sfsRecency above).
  function addSFS(add, sfs, weightVal, blacklistedDetail, ref) {
    if (!(sfs && sfs.appears)) return;
    const conf = sfs.confidence != null ? sfs.confidence : (sfs.blacklisted ? 100 : 50);
    const rec = sfsRecency(sfs.lastseen, ref);
    const base = rec ? Math.max(2, Math.round(weightVal * rec.factor)) : weightVal;
    const detail = (sfs.blacklisted ? blacklistedDetail : sfs.frequency + "× · " + conf + "%")
      + (rec ? " · seen " + String(sfs.lastseen).slice(0, 10) + " (" + rec.band + ")" : "");
    add("StopForumSpam", sfs.blacklisted ? 1 : conf / 100, base, detail);
  }

  // ---- reputation rollups (consolidate overlapping "is this thing known-bad" sources) ----
  // One blended verdict instead of summing 3–4 independent lookups that answer the SAME
  // question (and would otherwise multi-count a single bad IP / email). The highest single
  // source dominates; each *corroborating* source adds +15% of the dominant (not a full
  // re-add). Each source's contribution still respects its tunable Scoring-panel weight, so
  // the rollup stays transparent. Returns null when no reputation source fired.
  function blend(parts, opts) {
    opts = opts || {};
    if (!parts.length) return null;
    parts.sort((a, b) => b.contribution - a.contribution);
    const dominant = parts[0].contribution;
    let weight = Math.round(dominant + (parts.length - 1) * 0.15 * dominant);
    if (opts.suppress) weight = Math.round(weight * 0.3); // e.g. AbuseIPDB-whitelisted IP
    const score = Math.min(100, Math.round(Math.max.apply(null, parts.map((p) => p.sev)) * 100));

  }
  // input: { abuseScore, abuseReports, whitelisted, ipqsFraud, ipqsRecentAbuse, dnsbl:[names], sfs:{appears,frequency,confidence,blacklisted,lastseen}, ref:signupIso }
  function ipReputation(inp, w) {
    inp = inp || {}; w = w || W();
    const parts = [];
    const add = mkAdd(parts);
    if (typeof inp.abuseScore === "number" && inp.abuseScore >= 25) add("AbuseIPDB", inp.abuseScore / 100, w("abuseipdb_high"), inp.abuseScore + "% confidence \u00b7 " + (inp.abuseReports || 0) + " reports");
    if (typeof inp.ipqsFraud === "number" && inp.ipqsFraud >= 75) add("IPQualityScore", inp.ipqsFraud / 100, w("ipqs_fraud") + 4, "fraud score " + inp.ipqsFraud + (inp.ipqsRecentAbuse ? " \u00b7 recent abuse" : ""));
    if (inp.dnsbl && inp.dnsbl.length) add("DNSBL", Math.min(1, 0.6 + 0.2 * (inp.dnsbl.length - 1)), w("dnsbl_listed") + (inp.dnsbl.length - 1) * 6, "listed on " + inp.dnsbl.join(", "));
    addSFS(add, inp.sfs, w("sfs_ip"), "blacklisted (freq 255)", inp.ref);
    return blend(parts, { suppress: !!inp.whitelisted });
  }
  // input: { disposable, disposableSrc, invalid, recentAbuse, honeypot, leaked, sfs:{...}, rep:"malicious"|"suspicious", ref:signupIso }
  function emailReputation(inp, w) {
    inp = inp || {}; w = w || W();
    const parts = [];
    const add = mkAdd(parts);
    if (inp.disposable) add("Disposable", 1, w("disposable_email"), inp.disposableSrc || "throwaway provider");
    if (inp.invalid) add("Deliverability", 0.6, w("email_invalid"), "invalid / undeliverable");
    if (inp.recentAbuse || inp.honeypot || inp.leaked) add("Abuse history", 0.7, w("email_compromised"), [inp.recentAbuse && "recent abuse", inp.honeypot && "honeypot", inp.leaked && "leaked"].filter(Boolean).join(", "));

    if (inp.rep === "malicious" || inp.rep === "suspicious") add("EmailRep", inp.rep === "malicious" ? 1 : 0.5, w("email_compromised"), "reputation: " + inp.rep);
    return blend(parts, {});
  }
  // turn a rollup into a single scoreable signal with per-source breakdown
  function repToSignal(id, label, source, rep, lead) {
    if (!rep) return null;
    const detail = [];
    if (lead) detail.push(lead);
    rep.parts.forEach((p) => detail.push({ k: p.name, v: p.detail }));
    if (rep.suppressed) detail.push({ k: "Whitelisted", v: "On the AbuseIPDB whitelist \u2014 rollup weight reduced 70%." });
    detail.push({ k: "Rollup", v: rep.parts.length > 1 ? rep.parts.length + " sources agree \u2014 highest dominates, +15% per corroboration (not summed)." : "Single source reporting." });

  }

  // ---- account assessment ----
  function account(a) {
    const sig = [];
    const w = W();
    let score = 5;
    const reason = (a.reason || "").trim();
    const domain = (a.emailDomain || "").toLowerCase();
    const ua = a.ua || "";

    const dispHit = DISPOSABLE.find((d) => domain.includes(d));
    if (dispHit) { const wt = w("disposable_email"); sig.push({ id: "disposable_email", label: "Disposable email domain", weight: wt, dir: "bad", source: "email domain",
      detail: [{ k: "Domain", v: domain }, { k: "Matched list entry", v: dispHit }, { k: "Why", v: "Domain appears on the known throwaway-mail list." }] }); score += wt; }
    const uaHit = AUTOMATED_UA.find((re) => re.test(ua));
    if (uaHit) { const wt = w("automated_ua"); sig.push({ id: "automated_ua", label: "Automated user agent", weight: wt, dir: "bad", source: "signup user agent",
      detail: [{ k: "User agent", v: ua || "(empty)" }, { k: "Matched pattern", v: String(uaHit) }, { k: "Why", v: "Looks like a script/library, not a real browser." }] }); score += wt; }
    if (!a.acceptLang || a.acceptLang === "—") { const wt = w("no_accept_language"); sig.push({ id: "no_accept_language", label: "No Accept-Language header", weight: wt, dir: "warn", source: "request headers",
      detail: [{ k: "Accept-Language", v: a.acceptLang || "(none)" }, { k: "Why", v: "Real browsers send this; absence suggests automation. Note: some privacy tools strip it — verify before relying on this alone." }] }); score += wt; }
    const scamHits = SCAM_PATTERNS.filter((re) => re.test(reason));
    if (scamHits.length) { const wt = w("scam_language"); sig.push({ id: "scam_language", label: "Spam / scam language in reason", weight: wt, dir: "bad", source: "join reason",
      detail: [{ k: "Patterns matched", v: scamHits.map((re) => (reason.match(re) || [String(re)])[0]).join("  ·  ") }, { k: "Reason text", v: reason || "(empty)" }] }); score += wt; }
    const linkM = reason.match(URL_RE);
    if (linkM) { const wt = w("link_in_reason"); sig.push({ id: "link_in_reason", label: "Link present in join reason", weight: wt, dir: "bad", source: "join reason",
      detail: [{ k: "Matched", v: linkM[0] }, { k: "Reason text", v: reason }] }); score += wt; }
    if (reason.length > 0 && reason.length < 20) { const wt = w("short_reason"); sig.push({ id: "short_reason", label: "Very short join reason", weight: wt, dir: "warn", source: "join reason",
      detail: [{ k: "Length", v: reason.length + " chars" }, { k: "Text", v: reason }] }); score += wt; }
    if (reason.length === 0) { const wt = w("no_reason"); sig.push({ id: "no_reason", label: "No join reason provided", weight: wt, dir: "warn", source: "signup form",

    if (reason && window.ReefText && window.ReefText.nonsenseOf) {

    const ips = Array.isArray(a.signinIps) ? a.signinIps : [];
    if (ips.length > 1) {
      const countries = [...new Set(ips.map((x) => x.country).filter(Boolean))];
      const dc = ips.filter((x) => x.datacenter || x.tor).length;
      const shared = ips.flatMap((x) => x.sharedWith || []).filter((s) => s.resolution === "reject" || s.tier === "high");

        detail: [{ k: "Addresses", v: String(ips.length) }, { k: "Countries", v: countries.join(", ") || "—" }, { k: "Datacenter/Tor", v: String(dc) }, { k: "Why", v: "A wide or datacenter-heavy sign-in spread can indicate shared credentials or evasion. Travel and VPN use produce false positives — read the full history before acting." }] }); score += wt; }
    }

    const hitTerms = terms.filter((tm) => reason.toLowerCase().includes(String(tm).toLowerCase()));
    if (hitTerms.length) { const wt = w("affirm_term"); sig.push({ id: "affirm_term", label: `Affirmation term in reason (${hitTerms.length})`, weight: wt, dir: "ok", source: "per-server affirm list",

    const o = a.osint;
    if (o) {
      // consolidated IP-reputation rollup (AbuseIPDB + IPQS fraud + SFS-IP; DNSBL n/a in demo OSINT)
      const ipRep = ipReputation({
        abuseScore: o.abuseipdb ? o.abuseipdb.score : null, abuseReports: o.abuseipdb ? o.abuseipdb.reports : 0,
        whitelisted: !!(o.abuseipdb && o.abuseipdb.whitelisted),
        ipqsFraud: o.ipqs ? o.ipqs.fraud : null, ipqsRecentAbuse: !!(o.ipqs && o.ipqs.recentAbuse),
        sfs: o.sfs ? o.sfs.ip : null,
        ref: a.createdAt,
      }, w);
      const ipSig = repToSignal("ip_reputation", "IP reputation", "AbuseIPDB \u00b7 IPQS \u00b7 StopForumSpam", ipRep, a.ip ? { k: "IP", v: a.ip } : null);
      if (ipSig) { sig.push(ipSig); score += ipSig.weight; }
      // consolidated email-reputation rollup (disposable + EmailRep + SFS-email)
      const emRep = emailReputation({
        disposable: !!(o.emailrep && o.emailrep.disposable) || !!dispHit, disposableSrc: dispHit ? "throwaway list" : "EmailRep",
        invalid: !!(o.emailrep && o.emailrep.deliverable === false),
        recentAbuse: !!(o.emailrep && o.emailrep.suspicious),
        sfs: o.sfs ? o.sfs.email : null,
        rep: o.emailrep ? o.emailrep.reputation : null,
        ref: a.createdAt,
      }, w);
      const emSig = repToSignal("email_reputation", "Email reputation", "EmailRep \u00b7 StopForumSpam", emRep, a.email ? { k: "Email", v: a.email } : null);
      if (emSig) {
        // the native disposable_email heuristic is now subsumed by the rollup — drop it to avoid double-count
        const di = sig.findIndex((s) => s.id === "disposable_email");
        if (di >= 0) { score -= sig[di].weight; sig.splice(di, 1); }
        sig.push(emSig); score += emSig.weight;
      }
      if (o.ipqs && o.ipqs.tor) { const wt = w("tor_exit"); sig.push({ id: "tor_exit", label: "IP is a Tor exit", weight: wt, dir: "warn", source: "IPQualityScore", detail: "IPQS classifies the signup IP as a Tor exit node. Tor is not inherently abuse \u2014 weighted lightly by default." }); score += wt; }
      // cross-platform username enumeration — score by platform VALENCE, not mere presence.
      // (Previously collected and rendered but never scored; a Pixiv hit read like a GitHub hit.)
      const valence = (window.ReefWeights && window.ReefWeights.platformValence) || (() => ({ valence: "neutral", note: "" }));
      if (o.username && Array.isArray(o.username.platforms)) {
        const taken = o.username.platforms.filter((p) => p.status === "taken");
        taken.filter((p) => valence(p.name).valence === "adverse").forEach((p) => { const wt = w("username_adverse"); const v = valence(p.name); sig.push({ id: "username_adverse_" + p.name, label: `Username active on ${p.name} — high-risk platform`, weight: wt, dir: "bad", source: "Username enumeration",
          detail: [{ k: "Platform", v: p.name }, { k: "Why", v: v.note }] }); score += wt; });
        const corrob = taken.filter((p) => valence(p.name).valence === "corroborating");
        if (corrob.length) { const wt = w("github_exists"); sig.push({ id: "github_exists", label: `Established footprint (${corrob.map((p) => p.name).join(", ")})`, weight: wt, dir: "ok", source: "Username enumeration",
          detail: [{ k: "Found on", v: corrob.map((p) => p.name).join(", ") }, { k: "Why", v: valence(corrob[0].name).note }] }); score += wt; }
      }
    } else if (sig.filter((s) => s.dir !== "ok").length === 0) {
      sig.push({ id: "clean", label: "No automatic risk signals found", weight: 0, dir: "ok", detail: "None of the native-field heuristics fired. Run live OSINT enrichment for IP / domain / breach depth." });
    }

    score = clamp(score);
    const tier = tierOf(score);
    const recommend = tier === "high" ? "reject" : tier === "medium" ? "hold" : "approve";
    const rationale = buildRationale(a, sig, tier, "account", !!o);
    return { risk: score, tier, recommend, signals: sig.sort((x, y) => Math.abs(y.weight) - Math.abs(x.weight)), rationale };
  }

  // ---- report assessment ----
  const CAT_BASE = { "csam flag": 95, "harassment": 55, "impersonation": 55, "spam": 35, "misinfo / cw": 25, "other": 30,
    // Mastodon-native report category types (normMastoReport sets categoryType)
    "legal": 90, "violation": 50 };
  const BAD_FLAGS = ["slur", "threat", "doxxing", "phishing", "csam-hashmatch"];

  function report(r) {
    const sig = [];
    let score = CAT_BASE[String(r.categoryType || r.category || "other").toLowerCase()] ?? 30;
    sig.push({ label: `Category baseline: ${r.category}`, weight: Math.round(score / 4), dir: score >= 60 ? "bad" : "warn", source: "report category",
      detail: `The report was filed under "${r.category}", which carries a baseline severity of ${score} before other signals are added.` });

    const flags = new Set();
    const flagPosts = {};
    (r.posts || []).forEach((p) => (p.flagged || []).forEach((f) => { flags.add(f); (flagPosts[f] = flagPosts[f] || []).push(p.text); }));
    BAD_FLAGS.forEach((f) => { if (flags.has(f)) { sig.push({ label: `Flagged: ${f}`, weight: 16, dir: "bad", source: "content classifier",
      detail: [{ k: "Flag", v: f }, { k: "On post", v: (flagPosts[f][0] || "").slice(0, 140) || "(media)" }] }); score += 16; } });

    // content-warning review — abuse hidden in a CW, or sensitive content with no CW.
    // (ReefText scans the CW field separately from the body; see textanalysis.js cwReview.)
    if (window.ReefText && window.ReefText.cwReview) {
      const cwr = window.ReefText.cwReview(r.posts);
      if (cwr.abusive) {
        const hit = cwr.per.find((x) => x.cw.state === "abusive");
        const terms = hit ? hit.cw.campaigns.flatMap((c) => c.matched).slice(0, 4).join(", ") : "";
        sig.push({ label: `Abuse hidden in the content-warning text${cwr.abusive > 1 ? ` (${cwr.abusive} posts)` : ""}`, weight: 20, dir: "bad", source: "CW scan",
          detail: [{ k: "CW", v: (hit && hit.cw.cw) || "" }, { k: "Matched", v: terms || "campaign pattern" }, { k: "Why", v: "A slur/threat in the warning line bypasses a body-only scan." }] }); score += 20; }
      else if (cwr.missing) {
        sig.push({ label: `Sensitive content with no content warning${cwr.missing > 1 ? ` (${cwr.missing} posts)` : ""}`, weight: 12, dir: "warn", source: "CW scan",
          detail: [{ k: "Posts missing CW", v: String(cwr.missing) }, { k: "Why", v: "Graphic/sensitive media without a CW is a content-warning policy issue — gate the media, not the account." }] }); score += 12; }
    }

    // spam lens over the same posts — bulk solicitation is what most "Spam"
    // reports are actually about, and the abuse scan deliberately ignores it
    if (window.ReefText && window.ReefText.spamReview) {
      const sr = window.ReefText.spamReview(r.posts);
      if (sr.evaluable && sr.verdict !== "clean") {
        const strong = sr.verdict === "spam";
        const wt = strong ? (sr.templated ? 34 : 26) : 12;
        const worst = sr.per.slice().sort((a, b) => b.scan.score - a.scan.score)[0];
        sig.push({ label: strong
            ? `Spam-patterned content (${sr.spam || sr.promotional}/${sr.total} posts${sr.templated ? " · template reuse" : ""})`
            : `Promotional content in reported posts (${sr.promotional}/${sr.total})`,
          weight: wt, dir: strong ? "bad" : "warn", source: "spam scan",
          detail: [
            { k: "Posts", v: `${sr.spam} spam · ${sr.promotional} promotional · ${sr.clean} clean` },
            sr.templated ? { k: "Template reuse", v: "the same hashtag wall repeats across posts — bulk-automation tell" } : null,
            worst && worst.scan.signals.length ? { k: "Top signals", v: worst.scan.signals.map((s) => s.k + " (" + s.v + ")").slice(0, 4).join(" · ") } : null,
            { k: "Why", v: "Structural solicitation markers (hashtag walls, promo language, price strings, keyword stuffing, spam campaign wordlists) — the lens the abuse scan deliberately doesn't apply." },
          ].filter(Boolean) });
        score += wt;
      }
    }

    const t = r.target || {};
    // zero-audience broadcast bot: thousands of posts into a void is a feed-spam
    // shape regardless of any single post's content
    if (t.followers === 0 && typeof t.posts === "number" && t.posts >= 200 && (t.bot || t.posts >= 1000)) {
      sig.push({ label: `Broadcast account: ${t.posts.toLocaleString()} posts, 0 followers${t.bot ? " · bot flag" : ""}`, weight: 12, dir: "warn", source: "target profile",
        detail: [{ k: "Posts", v: String(t.posts) }, { k: "Followers", v: "0" }, t.bot ? { k: "Bot", v: "self-declared" } : null,
          { k: "Why", v: "High-volume output with no audience is the shape of an unattended feed/spam relay. Legitimate relay bots exist — check what it posts." }].filter(Boolean) });
      score += 12;
    }
    if (typeof t.ageDays === "number" && t.ageDays < 14) { sig.push({ label: `New account (${t.ageDays}d old)`, weight: 10, dir: "warn", source: "target profile",
      detail: [{ k: "Account age", v: t.ageDays + " days" }, { k: "Why", v: "Very new accounts are more often throwaways. Not damning on its own." }] }); score += 10; }
    const h = r.history || {};
    if (typeof h.replyRatio === "number" && h.replyRatio > 0.75) { sig.push({ label: "Reply-dominant behavior", weight: 8, dir: "warn", source: "post history",
      detail: [{ k: "Replies", v: Math.round(h.replyRatio * 100) + "%" }, { k: "Original", v: Math.round((h.originalRatio || 0) * 100) + "%" }, { k: "Why", v: "Mostly-replies can indicate targeted pile-ons — but is also normal for conversational users." }] }); score += 8; }
    if (h.priorActions && h.priorActions.length) { sig.push({ label: "Prior moderation actions on file", weight: 7, dir: "warn", source: "moderation history",
      detail: [{ k: "Prior reports", v: String(h.priorReports || 0) }, { k: "Actions", v: h.priorActions.join("; ") }] }); score += 7; }

    score = clamp(score);
    const tier = tierOf(score);
    const recommend = flags.has("csam-hashmatch") ? "suspend"
      : tier === "high" ? "suspend" : tier === "medium" ? "silence" : "warn";
    const rationale = buildRationale(r, sig, tier, "report", false);
    return { severity: score, tier, recommend, severitySignals: sig.sort((x, y) => y.weight - x.weight), rationale };
  }

  function buildRationale(item, sig, tier, kind, enriched) {
    const top = sig.filter((s) => s.dir !== "ok").slice(0, 2).map((s) => s.label.toLowerCase());
    const lead = kind === "account"
      ? (tier === "high" ? "Multiple strong risk signals point to a throwaway or abusive registration."
        : tier === "medium" ? "Mixed signals — worth a manual look before approving."
        : "No material risk signals; this looks like a legitimate applicant.")
      : (tier === "high" ? "Reported content includes independently actionable violations."
        : tier === "medium" ? "A real policy issue, but not the most severe tier."
        : "Likely a minor guideline issue rather than abuse.");
    const because = top.length ? ` Key drivers: ${top.join("; ")}.` : "";
    const note = enriched ? "" : " Heuristic assessment from native fields — connect an OSINT proxy + keys for IP / domain / breach depth.";
    return lead + because + note;
  }

  window.ReefAssess = { account, report, tierOf, ipReputation, emailReputation, repToSignal, sfsRecency };
})();
