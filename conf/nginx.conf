location __PATH__/ {
  alias __INSTALL_DIR__/;
  index index.html;

  # Single static file (a self-contained build, not a router) — no try_files
  # rewriting needed, just serve it directly.

  # Include SSOWAT user panel + enforce login (sso = "true" in manifest.toml
  # makes this app require an authenticated, permitted user; do not comment
  # this out).
  include conf.d/yunohost_panel.conf.inc;
}
