#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;

location __PATH__/ {

    # Vantage serves its routes at the origin root, so it expects its own
    # (sub)domain and the full path is forwarded unchanged.
    proxy_pass http://127.0.0.1:__PORT__;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # The moderation UI download bundles (exports, denylists) can be large.
    client_max_body_size 25M;
    proxy_read_timeout 120s;

    # SSO is off by default (Vantage authenticates users against their own
    # instance). If you set sso = "true" to add an outer gate, uncomment:
    # include conf.d/yunohost_panel.conf.inc;
}
