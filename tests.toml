#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/tests.v1.schema.json

test_format = 1.0

[default]

    # Vantage serves at the origin root — test on a dedicated (sub)domain, path "/".
    exclude = ["change_url"]

    [default.args]
    domain = "domain.tld"
    path = "/"
    init_main_permission = "visitors"
    allowed_instances = ""
